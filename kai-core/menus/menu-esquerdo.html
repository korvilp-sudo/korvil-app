  <div class="sideHeader">

  </div>

  <div class="sideSection">
    <div class="sideTitle">DIAGNÓSTICO TÁTICO</div>
    <div class="sideItem">ALVOS: <b id="alvos">0</b></div>
    <div class="sideItem">RADAR: <b>ATIVO</b></div>
    <div class="sideItem">SCAN: <b>360°</b></div>

  </div>

  <div class="sideSection">
    <div class="sideTitle">K-AI TRANSFORMAR</div>
    <div class="sideItem" onclick="abrirTransformacao()">🔮 TRANSFORMAÇÃO ATIVA</div>
    <div class="sideItem" onclick="mostrarArmadura('v-2026')">🛡️ ARMADURA: v-2026 MASTER</div>
  </div>

  <div class="sideSection">
    <div class="sideTitle">TRANSFORMAÇÃO EM CIMA DE ARMADURAS</div>
    <div class="peca-lista" id="listaPecasEsq"></div>
  </div>
</div>

<script>
// LISTA DAS 17 PEÇAS REAIS DA PASTA pecas/
const PECAS = [
  'ante-bracos','bracos','peitoral','costas','pelvis',
  'femur','patela','tibia','botas','luvas',
  'capacete','corvonas','ombros','abdomen','maos',
  'pescoco','cintura'
];

function carregarPeca(nome){
  fetch(`kai-transformar/armaduras/v-2026/pecas/${nome}/${nome}.html`)
  .then(r=>r.text())
  .then(html=>{document.getElementById('hologramaContainer').innerHTML = html;})
  .catch(()=>falar(`Peça ${nome} ativada`));
}

// GERA OS BOTÕES AUTOMÁTICO
window.addEventListener('load', ()=>{
  const lista = document.getElementById('listaPecasEsq');
  if(lista){
    PECAS.forEach(p=>{
      const btn = document.createElement('div');
      btn.className = 'sideItem peca-btn';
      btn.innerText = p.toUpperCase();
      btn.onclick = ()=>carregarPeca(p);
      lista.appendChild(btn);
    })
  }
})
</script>
