<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#000;--top:#0d1a20;--chat:#0b141a;--balao:#132e36}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#e9edef;font-family:'Segoe UI',Roboto,sans-serif}

/*... TODO SEU CSS ANTERIOR MANTIDO... */
.arrow{position:absolute;z-index:102;pointer-events:none;display:flex;justify-content:center;align-items:center}
.arrow svg{width:42px;height:42px;stroke:var(--c);stroke-width:2.5;filter:drop-shadow(0 0 12px var(--c))}
.arrow-down{top:0;left:50%;transform:translateX(-50%);width:100%;height:70px}
.arrow-down svg{animation:arrowDown 1.4s infinite}
@keyframes arrowDown{0%,100%{transform:translateY(-6px);opacity:.5}50%{transform:translateY(6px);opacity:1}}
.arrow-right{top:50%;left:0;transform:translateY(-50%);width:70px;height:100%}
.arrow-right svg{animation:arrowRight 1.4s infinite}
@keyframes arrowRight{0%,100%{transform:translateX(-6px);opacity:.5}50%{transform:translateX(6px);opacity:1}}
.arrow-left{top:50%;right:0;transform:translateY(-50%);width:70px;height:100%}
.arrow-left svg{animation:arrowLeft 1.4s infinite}
@keyframes arrowLeft{0%,100%{transform:translateX(6px);opacity:.5}50%{transform:translateX(-6px);opacity:1}}
.arrow-up{bottom:95px;left:50%;transform:translateX(-50%);width:100%;height:70px}
.arrow-up svg{animation:arrowUp 1.4s infinite}
@keyframes arrowUp{0%,100%{transform:translateY(6px);opacity:.5}50%{transform:translateY(-6px);opacity:1}}

.status{height:36px;background:#000;display:flex;justify-content:space-between;align-items:center;padding:0 18px;font-size:15px;font-weight:700;color:var(--c);flex-shrink:0;border-bottom:2px solid var(--c);box-shadow:0 0 15px var(--c)40;position:relative;z-index:5}
#notiPanel{position:absolute;top:-480px;left:0;width:100%;height:480px;background:linear-gradient(180deg,#0d1a20 0%,#000 100%);z-index:100;transition:top.35s cubic-bezier(.4,0,.2,1);border-bottom:2px solid var(--c);box-shadow:0 10px 30px var(--c)50}
#notiPanel.open{top:36px}
.handle{width:70px;height:7px;background:linear-gradient(90deg,var(--c),var(--c2));border-radius:4px;margin:12px auto;box-shadow:0 0 15px var(--c)}
.shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:20px}
.shortcut{text-align:center;font-size:13px;color:var(--c2);font-weight:800;letter-spacing:.5px}
.shortcut.btn{width:75px;height:75px;background:linear-gradient(145deg,#132e36,#0a1419);border:2px solid var(--c);border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;box-shadow:0 0 18px var(--c)40;transition:.2s}
.shortcut.btn:active{transform:scale(.92);box-shadow:0 0 30px var(--c)}
.notis{padding:0 20px;max-height:250px;overflow-y:auto;border-top:1px solid #132e36}
.noti{background:linear-gradient(90deg,#132e36,#0a1419);padding:15px;border-radius:10px;margin:10px 0;font-size:15px;border-left:4px solid var(--c);box-shadow:0 0 12px var(--c)25;font-weight:600}

.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:99;backdrop-filter:blur(5px)}
.overlay.show{display:block}

#sideMenu{position:fixed;top:0;left:-360px;width:330px;height:100%;background:linear-gradient(180deg,#0a0f14 0%,#000 100%);z-index:101;transition:left.35s cubic-bezier(.4,0,.2,1);border-right:2px solid var(--c);overflow-y:auto;box-shadow:5px 0 30px var(--c)50}
#sideMenu.open{left:0}
.sideHeader{height:95px;background:linear-gradient(135deg,var(--c),var(--c2));padding:20px;display:flex;align-items:center;justify-content:space-between;color:#000;font-weight:900;font-size:19px}
.sideHeader.modo{background:#000;color:var(--c);padding:7px 14px;border-radius:20px;font-size:13px;border:2px solid var(--c);box-shadow:0 0 15px var(--c)}
.sideSection{padding:14px 0;border-bottom:1px solid #132e36}
.sideTitle{padding:12px 20px;font-size:13px;color:var(--c2);font-weight:800;letter-spacing:1.8px;text-transform:uppercase}
.sideItem{padding:16px 20px;display:flex;align-items:center;gap:14px;font-size:16px;color:var(--c);cursor:pointer;transition:.25s;border-left:4px solid transparent;font-weight:600}
.sideItem:hover{background:#132e36;border-left:4px solid var(--c);padding-left:22px}
.sideItem small{color:#8696a0;font-size:13px;display:block;margin-top:4px;font-weight:400}

.header{height:75px;background:linear-gradient(180deg,var(--top),#000);display:flex;align-items:center;padding:0 18px;gap:18px;border-bottom:2px solid var(--c);flex-shrink:0;box-shadow:0 5px 20px var(--c)40;position:relative;z-index:5}
.header.menuBtn{font-size:36px;color:var(--c);cursor:pointer;font-weight:900;text-shadow:0 0 15px var(--c);transition:.2s}
.header.menuBtn:active{transform:scale(.9)}
.header.titulo{flex:1;text-align:center;color:var(--c);font-weight:900;letter-spacing:3px;font-size:16px;text-shadow:0 0 20px var(--c)}

#chat{flex:1;display:flex;flex-direction:column-reverse;overflow-y:auto;padding:14px;background:var(--chat);position:relative;z-index:3}
#canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.12;pointer-events:none;z-index:0}

.bubble{max-width:82%;padding:14px 18px;border-radius:12px;margin-bottom:12px;font-size:16px;line-height:1.5;position:relative;z-index:2;font-weight:500}
.bubble.me{background:linear-gradient(135deg,#005c4b,#004a3d);margin-left:auto;border-radius:12px 0 12px 12px;border:2px solid var(--c2)}
.bubble.kai{background:linear-gradient(135deg,var(--balao),#0f1f25);border:2px solid var(--c);border-radius:0 12px 12px 12px;box-shadow:0 0 18px var(--c)25}
.bubble.time{font-size:12px;color:var(--c2);text-align:right;margin-top:6px;font-weight:700}

.footer{height:95px;background:linear-gradient(0deg,var(--top),#000);display:flex;align-items:center;padding:0 16px;gap:14px;border-top:2px solid var(--c);flex-shrink:0;box-shadow:0 -5px 20px var(--c)40;position:relative;z-index:5}
.footer input{flex:1;height:65px;background:linear-gradient(145deg,#132e36,#0a1419);border:2.5px solid var(--c);border-radius:32px;padding:0 24px;color:#fff;font-size:17px;font-weight:700;outline:none;box-shadow:inset 0 0 18px #000}
.footer input::placeholder{color:var(--c2);font-weight:600}
.footer.btn{width:65px;height:65px;border-radius:50%;background:linear-gradient(145deg,var(--c),var(--c2));color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;cursor:pointer;box-shadow:0 0 25px var(--c)70;border:2.5px solid var(--c);transition:.2s}
.footer.btn:active{transform:scale(.92)}
.footer.btn.rec{background:linear-gradient(145deg,#ff3b30,#ff1a0a);color:#fff;box-shadow:0 0 25px #ff3b30;animation:pulseMic 1s infinite}
@keyframes pulseMic{0%,100%{box-shadow:0 0 25px #ff3b30}50%{box-shadow:0 0 50px #ff3b30}}

.table-box{position:fixed;background:linear-gradient(180deg,#0a1419,#000);border:2.5px solid var(--c);border-radius:14px;z-index:103;box-shadow:0 0 30px var(--c)60;display:none;padding:18px}
.table-box h3{color:var(--c);margin-bottom:14px;font-size:17px;text-shadow:0 0 12px var(--c);font-weight:900}
.table-box table{width:100%;color:#fff;font-size:15px;font-weight:600}
.table-box td{padding:10px;border-bottom:1px solid #132e36}
.table-box.close{position:absolute;top:10px;right:14px;color:var(--c);font-size:28px;cursor:pointer;font-weight:900;text-shadow:0 0 10px var(--c)}
#tableRight{top:50%;right:12px;transform:translateY(-50%);width:88%;max-width:420px}
#tableBottom{bottom:110px;left:50%;transform:translateX(-50%);width:96%;max-width:650px}

#armaduraOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:transparent;pointer-events:auto}
#armaduraCanvas{width:100%;height:100%;pointer-events:auto}
.btn-fechar-armor{position:absolute;top:90px;right:20px;background:#000;border:2px solid var(--c);color:var(--c);padding:10px 20px;border-radius:20px;font-weight:900;z-index:201;cursor:pointer;box-shadow:0 0 15px var(--c);font-family:'Segoe UI',Arial;pointer-events:auto}
.hud-armor{position:absolute;top:90px;left:50%;transform:translateX(-50%);color:#00FFFF;font-weight:900;font-size:15px;letter-spacing:2px;text-shadow:0 0 10px #00FFFF;z-index:201;pointer-events:none}

/* INDICADOR WAKE WORD */
#wakeIndicator{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;text-align:center}
#wakeIndicator.active{display:block}
.wakeCircle{width:150px;height:150px;border:4px solid #00FFFF;border-radius:50%;margin:0 auto;animation:wakePulse 1s infinite;box-shadow:0 0 40px #00FFFF}
@keyframes wakePulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}
.wakeTxt{color:#00FFFF;font-size:24px;font-weight:900;margin-top:20px;letter-spacing:3px;text-shadow:0 0 20px #00FFFF}
</style>
</head>
<body>
<div class="phone">

  <div class="arrow arrow-down"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6"/></svg></div>

<!-- SOM DE ATIVAÇÃO TIPO ALEXA -->
<audio id="somAtivacao" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE"></audio>

<script>
let memoria = JSON.parse(localStorage.getItem('kai')) || {hist:[], mems:[]};
let touchStartX = 0, touchStartY = 0;
let armaduraScene, armaduraCamera, armaduraRenderer, armaduraControls, armaduraGroup;
let asas, olhos, garras, tempo = 0;

// NOVAS VARIAVEIS WAKE WORD
let modoWake = false;
let timeoutWake = null;
let recognitionWake, recognitionComando;

const PAGINAS = {
  'sistema k': 'https://korvilp-sudo.github.io/korvil-app/sections/sistemak/index.html',
  'ktp': 'https://korvilp-sudo.github.io/korvil-app/sections/ktp/index.html',
  'kafortunado': 'https://korvilp-sudo.github.io/korvil-app/sections/kafortunado/index.html',
  'kalma': 'https://korvilp-sudo.github.io/korvil-app/sections/kalma/index.html',
  'central': 'https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/index.html'
}

// TOLERANCIA DE PRONUNCIA
const PALAVRAS_WAKE = ['k-ai', 'kai', 'cai', 'key', 'kay', 'olá k-ai', 'oi k-ai', 'ei k-ai', 'ola k-ai'];
const PALAVRAS_LIXO = ['pra mim', 'por favor', 'agora', 'já', 'então', 'me', 'pode', 'consegue'];

//... TODO SEU JS ANTERIOR ATE A FUNCAO EXECUTAR...

// SUBSTITUI A FUNCAO EXECUTAR E ADICIONA O SISTEMA WAKE WORD

function iniciarWakeWord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return falar("Seu navegador não suporta comando de voz");

  recognitionWake = new SR();
  recognitionWake.lang = 'pt-BR';
  recognitionWake.continuous = true; // Fica escutando sempre
  recognitionWake.interimResults = false;

  recognitionWake.onresult = e => {
    let txt = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    console.log("Ouvindo:", txt);

    // 1. VERIFICA COMANDO DIRETO: "K-AI abre o K-TP"
    let comandoDireto = extrairComandoDireto(txt);
    if(comandoDireto){
      addMsg('me', txt);
      executar(comandoDireto);
      return;
    }

    // 2. VERIFICA SÓ WAKE WORD: "K-AI"
    for(let palavra of PALAVRAS_WAKE){
      if(txt === palavra || txt.startsWith(palavra + ')){
        ativarKAI();
        break;
      }
    }
  }

  recognitionWake.onerror = e => console.log("Erro Wake:", e);
  recognitionWake.start();
}

function extrairComandoDireto(txt){
  for(let palavra of PALAVRAS_WAKE){
    if(txt.startsWith(palavra)){
      let comando = txt.replace(palavra, '').trim();
      // Limpa palavras de enfeite
      PALAVRAS_LIXO.forEach(p => comando = comando.replace(p, '').trim());
      return comando;
    }
  }
  return null;
}

function ativarKAI(){
  if(modoWake) return; // Já está ativo
  modoWake = true;

  document.getElementById('somAtivacao').play();
  document.getElementById('mic').classList.add('rec');
  document.getElementById('wakeIndicator').classList.add('active');

  falar("Pois não Chefe?");
  iniciarReconhecimentoComando();

  // Timeout de 5 segundos
  clearTimeout(timeoutWake);
  timeoutWake = setTimeout(() => {
    desativarKAI();
    falar("Tempo esgotado. Me chame de novo.");
  }, 5000);
}

function iniciarReconhecimentoComando(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognitionComando = new SR();
  recognitionComando.lang = 'pt-BR';
  recognitionComando.continuous = false; // Só 1 comando

  recognitionComando.onresult = e => {
    let comando = e.results[0][0].transcript;
    clearTimeout(timeoutWake);
    addMsg('me', comando);
    executar(comando);
    desativarKAI();
  }

  recognitionComando.onend = () => {
    if(modoWake) desativarKAI();
  }

  recognitionComando.start();
}

function desativarKAI(){
  modoWake = false;
  clearTimeout(timeoutWake);
  document.getElementById('mic').classList.remove('rec');
  document.getElementById('wakeIndicator').classList.remove('active');
  if(recognitionComando) recognitionComando.stop();
}

// SUBSTITUI SUA FUNCAO EXECUTAR PELA INTELIGENTE
function executar(cmd){
  cmd = cmd.toLowerCase().trim();

  // Limpa palavras de enfeite
  PALAVRAS_LIXO.forEach(p => cmd = cmd.replace(p, '').trim());

  memoria.hist.push(cmd);
  localStorage.setItem('kai',JSON.stringify(memoria));

  // NAVEGAÇÃO - ACEITA VARIAS FORMAS
  if(cmd.includes('armadura') || cmd.includes('transformar')) return mostrarArmadura('v-2026');

  if(cmd.includes('abrir') || cmd.includes('ir para') || cmd.includes('acessar') || cmd.includes('navegar')){
    if(cmd.includes('sistema')) return goPage('sistema k');
    if(cmd.includes('ktp') || cmd.includes('treinamento')) return goPage('ktp');
    if(cmd.includes('afortunado') || cmd.includes('finança')) return goPage('kafortunado');
    if(cmd.includes('alma') || cmd.includes('saude')) return goPage('kalma');
    if(cmd.includes('central') || cmd.includes('painel')) return goPage('central');
  }

  // OUTROS COMANDOS
  if(cmd.includes('criar') && cmd.includes('post')) return falar('Abrindo Criador de Post KORVIL');
  if(cmd.includes('criar') && cmd.includes('imagem')) return falar('Abrindo Gerador de Imagem IA');
  if(cmd.includes('hora')) return falar('Agora são ' + new Date().toLocaleTimeString('pt-BR'));
  if(cmd.includes('salvar memória')){
    memoria.mems.push('Memória salva');
    localStorage.setItem('kai',JSON.stringify(memoria));
    addNoti('🧠 Memória salva');
    return falar('Memória salva Chefe');
  }
  if(cmd.includes('limpar memória')){
    localStorage.removeItem('kai');
    memoria={hist:[],mems:[]};
    addNoti('🧠 Memória limpa');
    return falar('Memória limpa');
  }
  if(cmd.includes('estatística')){ openTable('right'); return falar('Abrindo estatísticas'); }
  if(cmd.includes('resumir')) return falar('Modo Resumir ativado');
  if(cmd.includes('anexar')) return falar('Função Anexar Arquivo ativada');
  if(cmd.includes('voz')) return falar('Voz alterada. K-AI pronto');

  falar('Entendi: ' + cmd);
}

// SUBSTITUI O CLIQUE DO MIC
document.getElementById('mic').onclick = () => {
  if(modoWake) desativarKAI();
  else ativarKAI();
}

// INICIA O WAKE WORD QUANDO CARREGAR
setTimeout(()=>{
  falar(`K-AI: Sistema Online. Diga K-AI`);
  addNoti('🔵 K-AI Sistema Iniciado - Escutando Wake Word');
  iniciarWakeWord();
}, 1000);

// MANTEM O RESTO DO SEU CODIGO: send, toggleMenu, goPage, etc...
function send(){ const val = document.getElementById('input').value; if(!val) return; addMsg('me',val); executar(val); document.getElementById('input').value=''; }
function toggleBtn(el, tipo){ el.classList.toggle('active'); if(tipo=='mic') document.getElementById('mic').click(); }
function limparMem(){ localStorage.removeItem('kai'); memoria={hist:[],mems:[]}; addNoti('🧠 Memória limpa'); return 'Memória limpa Chefe'; }
function openPanel(){ panel.classList.add('open'); overlay.classList.add('show'); }
function closePanel(){ panel.classList.remove('open'); overlay.classList.remove('show'); }
function toggleMenu(){ document.getElementById('sideMenu').classList.toggle('open'); }
function openTable(side){ document.getElementById('table'+side.charAt(0).toUpperCase()+side.slice(1)).style.display='block'; updateStats(); }
function closeTable(side){ document.getElementById('table'+side.charAt(0).toUpperCase()+side.slice(1)).style.display='none'; }
function updateStats(){ document.getElementById('statConv').innerText = memoria.hist.length; document.getElementById('statMem').innerText = memoria.mems.length; document.getElementById('statCmd').innerText = memoria.hist.length * 2; }
function addNoti(txt){ document.getElementById('notis').innerHTML = `<div class="noti">${txt}</div>` + document.getElementById('notis').innerHTML; }
function addMsg(who, txt){ const div = document.createElement('div'); div.className = 'bubble ' + who; div.innerHTML = txt + `<div class="time">${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>`; chatEl.prepend(div); }
function falar(txt){ addMsg('kai',txt); speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }

setInterval(()=>{ document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) },1000);
document.getElementById('input').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
</script>
