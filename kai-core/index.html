<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
:root{--c:#00FFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{width:100%;height:100dvh;background:#000;color:#fff;font-family:'Segoe UI',Arial;overflow:hidden}
.header{height:70px;background:#0d1a20;display:flex;align-items:center;padding:0 20px;border-bottom:2px solid var(--c)}
.menuBtn{font-size:32px;color:var(--c);cursor:pointer}
#chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column-reverse}
.bubble{max-width:80%;padding:12px 16px;border-radius:10px;margin-bottom:10px}
.bubble.me{background:#005c4b;margin-left:auto}
.bubble.kai{background:#132e36;border:2px solid var(--c)}
.footer{height:90px;background:#0d1a20;display:flex;align-items:center;padding:0 15px;gap:10px;border-top:2px solid var(--c)}
.footer input{flex:1;height:60px;background:#132e36;border:2px solid var(--c);border-radius:30px;padding:0 20px;color:#fff;font-size:16px}
.footer.btn{width:60px;height:60px;border-radius:50%;background:var(--c);color:#000;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.footer.btn.rec{background:#ff3b30;color:#fff}
#armaduraOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:#000}
#armaduraCanvas{width:100%;height:100%}
.btn-fechar{position:absolute;top:90px;right:20px;background:#000;border:2px solid var(--c);color:var(--c);padding:10px 20px;border-radius:20px;cursor:pointer;z-index:1000}
#wakeIndicator{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1001}
#wakeIndicator.active{display:block}
.wakeCircle{width:120px;height:120px;border:3px solid var(--c);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.3);opacity:0}}
</style>
</head>
<body>
<div class="header">
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  <div style="flex:1;text-align:center;color:var(--c);font-weight:900">K-AI KORVIL</div>
</div>

<div id="chat"></div>

<div id="armaduraOverlay">
  <canvas id="armaduraCanvas"></canvas>
  <button class="btn-fechar" onclick="fecharArmadura()">FECHAR</button>
</div>

<div id="wakeIndicator">
  <div class="wakeCircle"></div>
  <div style="color:var(--c);margin-top:15px;font-weight:900">ESCUTANDO...</div>
</div>

<div class="footer">
  <input type="text" id="input" placeholder="Diga: K-AI abre o K-TP">
  <div class="btn" id="mic">🎤</div>
  <div class="btn" onclick="send()">➤</div>
</div>

<audio id="somAtivacao" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE"></audio>

<script>
let modoWake = false; let timeoutWake = null;
let recognitionWake, recognitionComando;
const PALAVRAS_WAKE = ['k-ai', 'kai', 'cai', 'key', 'kay'];

function addMsg(who, txt){
  const div = document.createElement('div'); div.className = 'bubble ' + who;
  div.innerText = txt; document.getElementById('chat').prepend(div);
}
function falar(txt){ addMsg('kai',txt); speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }

function iniciarWakeWord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return falar("Seu navegador não suporta voz");
  recognitionWake = new SR(); recognitionWake.lang = 'pt-BR'; recognitionWake.continuous = true;
  recognitionWake.onresult = e => {
    let txt = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    console.log("Ouviu:", txt);
    // COMANDO DIRETO
    for(let p of PALAVRAS_WAKE){
      if(txt.startsWith(p)){
        let comando = txt.replace(p, '').replace(/pra mim|por favor/g,'').trim();
        if(comando){ addMsg('me', txt); executar(comando); return; }
        else { ativarKAI(); return; }
      }
    }
  }
  recognitionWake.start();
}

function ativarKAI(){
  modoWake = true;
  document.getElementById('somAtivacao').play();
  document.getElementById('mic').classList.add('rec');
  document.getElementById('wakeIndicator').classList.add('active');
  falar("Pois não?");
  iniciarComando();
  clearTimeout(timeoutWake);
  timeoutWake = setTimeout(desativarKAI, 5000);
}

function iniciarComando(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognitionComando = new SR(); recognitionComando.lang = 'pt-BR';
  recognitionComando.onresult = e => {
    let comando = e.results[0][0].transcript;
    addMsg('me', comando); executar(comando); desativarKAI();
  }
  recognitionComando.start();
}

function desativarKAI(){
  modoWake = false; clearTimeout(timeoutWake);
  document.getElementById('mic').classList.remove('rec');
  document.getElementById('wakeIndicator').classList.remove('active');
  if(recognitionComando) recognitionComando.stop();
}

function executar(cmd){
  cmd = cmd.toLowerCase().trim();
  if(cmd.includes('armadura') || cmd.includes('transformar')) return mostrarArmadura('v-2026');
  if(cmd.includes('ktp') || cmd.includes('treinamento')) return falar("Abrindo K-TP");
  if(cmd.includes('sistema')) return falar("Abrindo Sistema K");
  if(cmd.includes('hora')) return falar('Agora são ' + new Date().toLocaleTimeString('pt-BR'));
  falar("Entendi: " + cmd);
}

function mostrarArmadura(v){
  document.getElementById('armaduraOverlay').style.display = 'block';
  falar("Montando armadura " + v);
  if(!armaduraScene) initArmadura();
}

function fecharArmadura(){
  document.getElementById('armaduraOverlay').style.display = 'none';
  falar("Armadura desativada");
}

let armaduraScene, armaduraCamera, armaduraRenderer, armaduraControls;
function initArmadura(){
  armaduraScene = new THREE.Scene();
  armaduraCamera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  armaduraCamera.position.set(0, 2, 12);
  armaduraRenderer = new THREE.WebGLRenderer({canvas:document.getElementById('armaduraCanvas'), alpha:true, antialias:true});
  armaduraRenderer.setSize(window.innerWidth, window.innerHeight);
  armaduraScene.add(new THREE.AmbientLight(0x00FFFF, 0.5));
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF}));
  armaduraScene.add(mesh);
  armaduraControls = new THREE.OrbitControls(armaduraCamera, armaduraRenderer.domElement);
  function animate(){ requestAnimationFrame(animate); mesh.rotation.y += 0.01; armaduraControls.update(); armaduraRenderer.render(armaduraScene, armaduraCamera); }
  animate();
}

function send(){ const val = document.getElementById('input').value; if(!val) return; addMsg('me',val); executar(val); document.getElementById('input').value=''; }
document.getElementById('mic').onclick = () => { if(modoWake) desativarKAI(); else ativarKAI(); }

setTimeout(()=>{ falar("K-AI Online. Diga K-AI"); iniciarWakeWord(); }, 1000);
</script>
</body>
</html>
