<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI | KORVIL</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;}
.header{background:var(--card);padding:14px;border-bottom:2px solid var(--c);display:flex;justify-content:space-between;align-items:center;}
.header h1{color:var(--c);font-size:18px;letter-spacing:2px;}
.header select{background:#111;border:1px solid var(--c);color:var(--c);padding:6px 8px;border-radius:6px;font-size:12px;}
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:80%;padding:12px 14px;border-radius:12px;line-height:1.5;animation:fadeIn.3s;}
.msg.kai{background:rgba(0,245,255,.1);border:1px solid var(--c);align-self:flex-start;}
.msg.usuario{background:var(--c);color:#000;font-weight:600;align-self:flex-end;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}}
.input-area{display:flex;gap:8px;padding:12px;background:var(--card);border-top:2px solid var(--c);}
.input-area input{flex:1;background:#111;border:1.5px solid #333;border-radius:8px;padding:12px;color:#fff;font-size:15px;outline:none;}
.input-area input:focus{border-color:var(--c);}
.btn{width:48px;height:48px;border-radius:8px;border:1.5px solid var(--c);background:transparent;color:var(--c);font-size:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;}
.btn:active{background:var(--c);color:#000;transform:scale(.95);}
.btn.gravar.gravando{background:red;color:#fff;border-color:red;animation:piscar 1s infinite;}
@keyframes piscar{50%{opacity:.5}}
</style>
</head>
<body>

<div class="header">
  <h1>K-AI</h1>
  <div>
    <select id="selectGenero" onchange="trocarVoz()">
      <option value="masculino" selected>Masculino</option>
      <option value="feminino">Feminino</option>
    </select>
    <select id="selectModo" onchange="trocarVoz()">
      <option value="ilimitada" selected>Ilimitada</option>
      <option value="limitada">Limitada</option>
    </select>
  </div>
</div>

<div class="chat-box" id="chatBox">
  <div class="msg kai"><b>K-AI:</b> Olá Paulo! Sou o K-AI versão Corvo. Fale ou digite seu comando.</div>
</div>

<div class="input-area">
  <button class="btn" onclick="anexarArquivo()">📎</button>
  <input type="text" id="inputTexto" placeholder="Digite ou segure o microfone...">
  <button class="btn gravar" id="btnGravar">🎤</button>
  <button class="btn" onclick="enviarTexto()">➤</button>
</div>

<script src="kai.js"></script>
<script>
const input = document.getElementById('inputTexto');
const btnGravar = document.getElementById('btnGravar');
let recognition;

// 1. ENVIAR TEXTO
function enviarTexto(){
  const texto = input.value;
  if(texto.trim() === "") return;
  KAI.entender(texto);
  input.value = "";
}
input.addEventListener('keypress', e => { if(e.key === 'Enter') enviarTexto(); });

// 2. TROCAR VOZ PELOS SELECTS
function trocarVoz(){
  const genero = document.getElementById('selectGenero').value;
  const modo = document.getElementById('selectModo').value;
  KAI.mudarVoz(modo, genero);
}

// 3. RECONHECIMENTO DE VOZ
if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;

  btnGravar.addEventListener('mousedown', () => {
    btnGravar.classList.add('gravando');
    recognition.start();
  });
  btnGravar.addEventListener('mouseup', () => {
    btnGravar.classList.remove('gravando');
    recognition.stop();
  });

  recognition.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    KAI.entender(texto);
  };
} else {
  btnGravar.style.display = 'none';
}

// 4. ANEXAR ARQUIVO
function anexarArquivo(){
  alert('Função de anexar arquivo: PDF, Imagem. Em breve.');
}
</script>
</body>
</html>
