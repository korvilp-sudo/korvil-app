<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000;overflow:hidden;color:var(--c)}

#canvas3d{position:fixed;inset:0;z-index:0;cursor:pointer}
.ui{position:fixed;z-index:10;pointer-events:none}

.telaSelecao{top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:999}
.telaSelecao h1{font-size:48px;text-shadow:0 0 30px var(--c);margin-bottom:10px}
.telaSelecao p{color:var(--c2);margin-bottom:40px;font-size:14px}
.btnVersao{width:340px;background:rgba(0,255,255,.05);border:2px solid var(--c);color:var(--c);padding:22px;margin:12px 0;border-radius:15px;cursor:pointer;font-size:16px;font-weight:900;transition:.3s;text-align:left}
.btnVersao:hover{background:rgba(0,255,255,.2);box-shadow:0 0 30px var(--c);transform:scale(1.02)}
.btnVersao small{display:block;font-size:11px;color:var(--c2);margin-top:6px;font-weight:400}

.logo{top:30px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;letter-spacing:6px;text-shadow:0 0 25px var(--c)}
.logo span{color:var(--c2);font-size:14px;letter-spacing:2px;display:block;text-align:center;margin-top:5px}
.modo{top:30px;right:20px;font-size:12px;font-weight:700;padding:8px 14px;border:1px solid var(--c);border-radius:20px;background:rgba(0,255,255,.1);pointer-events:auto;cursor:pointer}
.modo.admin{border-color:#00ff88; color:#00ff88; box-shadow:0 0 15px #00ff88;}

.menuBtn{top:30px;left:20px;width:50px;height:50px;border:2px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;pointer-events:auto;background:rgba(0,255,255,.05)}
.menu{top:90px;left:20px;width:320px;max-height:70vh;overflow-y:auto;background:rgba(0,20,30,.95);border:2px solid var(--c);border-radius:15px;padding:15px;display:none;pointer-events:auto;backdrop-filter:blur(15px)}
.menu h3{color:var(--c2);margin:10px 0 5px;font-size:12px}
.menu button{width:100%;background:rgba(0,255,255,.05);border:1px solid #00333a;color:var(--c);padding:12px;margin:4px 0;border-radius:10px;text-align:left;cursor:pointer;font-size:13px;font-weight:700}

.mic{bottom:80px;left:50%;transform:translateX(-50%);width:90px;height:90px;border:3px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:35px;cursor:pointer;pointer-events:auto;transition:.3s;box-shadow:0 0 40px var(--c);background:rgba(0,255,255,.05)}
.mic:hover{transform:translateX(-50%) scale(1.1);box-shadow:0 0 70px var(--c)}
.mic.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 40px var(--c)}50%{box-shadow:0 0 90px var(--c2)}}

.chat{bottom:190px;left:50%;transform:translateX(-50%);width:90%;max-width:650px;background:rgba(0,0,0,.75);border:1px solid var(--c);border-radius:15px;padding:18px;max-height:220px;overflow-y:auto;backdrop-filter:blur(15px);pointer-events:auto}
.msg{margin:10px 0;font-size:15px;line-height:1.5}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}
.status{bottom:30px;left:50%;transform:translateX(-50%);font-size:14px;text-align:center}

.inputArea{display:flex;gap:8px;margin-top:10px}
.inputArea input{flex:1;background:#001a1f;border:2px solid var(--c);color:var(--c);padding:12px;border-radius:12px;outline:none;font-size:14px}
.inputArea button{width:45px;height:45px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:18px;font-weight:900}
.anexoBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}
.autoListen{bottom:120px;right:20px;font-size:11px;background:rgba(0,255,0,.15);padding:5px 10px;border-radius:10px;border:1px solid #0f0}

.vozConfig{margin-top:10px}
.vozConfig select{width:100%;background:#001a1f;border:1px solid var(--c);color:var(--c);padding:8px;border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<!-- TELA DE SELEÇÃO DE VERSÃO -->
<div class="ui telaSelecao" id="telaSelecao">
  <h1>K-AI</h1>
  <p>KORVIL ARTIFICIAL INTELLIGENCE</p>
  <button class="btnVersao" onclick="iniciarKAI('ADMIN')">
    MODO ADMINISTRADOR - ILIMITADO
    <small>Acesso total. 9 Gavetas + Memória + Tudo liberado. Só você.</small>
  </button>
  <button class="btnVersao" onclick="iniciarKAI('USER')">
    MODO USUÁRIO - LIMITADO  
    <small>Suporte KORVIL. Horas, música, app e status. Para clientes.</small>
  </button>
</div>

<div class="ui logo" style="display:none">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui modo" id="modoUsuario" style="display:none">MODO: VISITANTE</div>
<div class="ui menuBtn" onclick="toggleMenu()" style="display:none">☰</div>
<div class="ui autoListen" id="autoListen" style="display:none">Ouvindo...</div>

<div class="ui menu" id="menu">
  <h3>TROCAR VERSÃO</h3>
  <button onclick="reiniciarKAI('corvo')">Versão CORVO v3.0 - Robótico</button>
  <button onclick="reiniciarKAI('jarvis')">Versão JARVIS v2.0 - Clássico</button>

  <h3>INTERAÇÕES REAIS</h3>
  <button onclick="executar('abrir app')">Abrir APP KORVIL</button>
  <button onclick="executar('buscar marketing')">Pesquisar Google</button>
  <button onclick="executar('calcular 10% de 5000')">Calcular</button>

  <h3>IA + SISTEMA</h3>
  <button onclick="executar('cria post')">Criar Conteúdo</button>
  <button onclick="executar('copiar texto')">Copiar Texto</button>
  <button onclick="executar('status')">Status</button>
  <button onclick="executar('estatísticas')">Estatísticas</button>
  <button onclick="executar('limpar memória')">Limpar Memória</button>

  <h3>CONFIG VOZ</h3>
  <div class="vozConfig">
    <select id="vozGenero" onchange="trocarVoz()">
      <option value="masculino">Voz Masculina Robótica Corvo</option>
      <option value="feminino">Voz Feminina</option>
    </select>
  </div>
  <button onclick="voltarSelecao()" style="background:rgba(255,0,0,.1);border-color:red">Voltar Tela Inicial</button>
</div>

<div class="ui chat" id="chat" style="display:none"></div>
<div class="ui status" id="status" style="display:none">Carregando...</div>

<div class="ui" style="bottom:30px;left:50%;transform:translateX(-50%);width:90%;max-width:650px;display:none" id="inputAreaBox">
  <div class="inputArea">
    <button class="anexoBtn" onclick="anexarArquivo()">📎</button>
    <input type="text" id="userInput" placeholder="Digite ou fale com K-AI...">
    <button id="micBtn">🎙️</button>
    <button onclick="enviarTexto()">➤</button>
  </div>
</div>

<audio id="bgMusic" loop></audio>
<script>
// ===== 0. CONFIG GLOBAL =====
const KAI_CONFIG = {
  modo: 'USER',
  versao: 'corvo',
  autoOuvir: true,
  nomeUsuario: 'Chefe',
  senhaChefe: 'KORVIL2026',
  vozGenero: localStorage.getItem('kai_voz') || 'masculino'
}

let ultimoComando = "";
let cenaIniciada = false;

// ===== TELA DE SELEÇÃO =====
function iniciarKAI(tipo){
  KAI_CONFIG.modo = tipo;
  document.getElementById('telaSelecao').style.display = 'none';
  document.querySelectorAll('.ui').forEach(el => { if(el.id !== 'telaSelecao') el.style.display = 'block'; });
  
  if(tipo === 'ADMIN'){
    document.getElementById('modoUsuario').innerText = 'MODO: ADMINISTRADOR';
    document.getElementById('modoUsuario').classList.add('admin');
  } else {
    document.getElementById('modoUsuario').innerText = 'MODO: VISITANTE';
    document.getElementById('modoUsuario').classList.remove('admin');
  }
  if(!cenaIniciada) iniciarSistemas();
}

function voltarSelecao(){
  location.reload(); // Recarrega e volta pra tela de seleção
}

function reiniciarKAI(versao){
  KAI_CONFIG.versao = versao;
  toggleMenu();
  falar(`Carregando versão ${versao}...`);
  setTimeout(()=>{ 
    trocarVisual(versao);
    falar(`Versão ${versao.toUpperCase()} ativa Chefe`);
  }, 1000);
}

function trocarVisual(versao){
  if(versao === 'jarvis'){
    material.color.set(0x00d4ff);
    material.emissive.set(0x00d4ff);
  } else {
    material.color.set(0x00FFFF);
    material.emissive.set(0x00FFFF);
  }
}

// ===== 1. CENA 3D =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.IcosahedronGeometry(1.8, 2);
const material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6, shininess:120, transparent:true, opacity:0.9});
const nucleo = new THREE.Mesh(geometry, material);
scene.add(nucleo);

const ringGeo = new THREE.TorusGeometry(2.5, 0.1, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true});
const ring1 = new THREE.Mesh(ringGeo, ringMat);
const ring2 = new THREE.Mesh(ringGeo, ringMat); ring2.rotation.x = Math.PI/2;
scene.add(ring1, ring2);

const light1 = new THREE.PointLight(0x00FFFF, 2.5, 50); light1.position.set(5,5,5); scene.add(light1);
camera.position.z = 6;

const particles = new THREE.Points(
  new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(Array(4000).fill().map(()=> (Math.random()-0.5)*25), 3)),
  new THREE.PointsMaterial({color:0x00FFFF, size:0.025})
);
scene.add(particles);

function animate(){
  requestAnimationFrame(animate);
  nucleo.rotation.x += 0.008;
  nucleo.rotation.y += 0.015;
  ring1.rotation.y += 0.02;
  ring2.rotation.z += 0.015;
  particles.rotation.y += 0.0008;
  material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.003)*0.2;
  renderer.render(scene, camera);
}
animate();

// ===== 2. MEMÓRIA + 9 GAVETAS =====
const KAI_MEMORY = {
  dados: JSON.parse(localStorage.getItem('kai_memoria')) || {historico:[], memorias:[]},
  salvar(){ localStorage.setItem('kai_memoria', JSON.stringify(this.dados)); },
  adicionar(pergunta, resposta){ this.dados.historico.push({pergunta, resposta}); if(this.dados.historico.length>200) this.dados.historico.shift(); this.salvar(); },
  salvarMemoria(texto){ this.dados.memorias.push(texto); this.salvar(); return `Salvei: ${texto}`; },
  buscar(termo){ const res = this.dados.memorias.filter(m=>m.includes(termo)); return res.length? `Lembro: ${res[res.length-1]}` : "Não lembro disso"; }
}

const GAVETAS = {
  async cria(cmd){ return `Criando: ${cmd}. Sugestão KORVIL pronta Chefe.` },
  async copia(cmd){ navigator.clipboard.writeText('Texto copiado'); return 'Copiado para área de transferência' },
  async busca(cmd){ const termo = cmd.replace('buscar',''); window.open(`https://google.com/search?q=${termo}`,'_blank'); return `Pesquisando ${termo}` },
  async calculo(cmd){ const conta = cmd.replace('calcular',''); try{ return `Resultado: ${eval(conta)}` }catch{ return 'Erro no cálculo' } },
  async sistema(cmd){ return KAI_CONFIG.modo==='ADMIN'? 'Sistemas 100% Operacionais' : 'Sistema OK' },
  async social(cmd){ return 'Post criado: Arte KORVIL + Legenda + Hashtags' },
  async vendas(cmd){ return 'Lead salvo no CRM KORVIL' },
  async educacao(cmd){ return 'Aula gerada sobre o tema solicitado' },
  async navega(cmd){ window.open('https://korvilp-sudo.github.io/korvil-app/app.html','_blank'); return 'Abrindo APP KORVIL' }
}

// ===== 3. VOZ + CÉREBRO =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognition, isListening = false;

function iniciarSistemas(){
  cenaIniciada = true;
  iniciarReconhecimento();
  falar(`K-AI online. Modo ${KAI_CONFIG.modo==='ADMIN'?'Administrador':'Usuário'} ativo.`);
}

function iniciarReconhecimento(){
  if(!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.onstart = ()=>{ isListening = true; micBtn.classList.add('listening'); status.innerText = 'K-AI ouvindo...'; pulsarNucleo(); }
  recognition.onend = ()=>{ isListening = false; micBtn.classList.remove('listening'); if(KAI_CONFIG.autoOuvir) setTimeout(()=>recognition.start(), 500); }
  recognition.onresult = (e)=>{ const cmd = e.results[e.results.length-1][0].transcript; if(cmd.length>2) { addMsg('user', cmd); processarComando(cmd); }}
  if(KAI_CONFIG.autoOuvir) recognition.start();
}

function falar(texto){
  addMsg('kai', texto);
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR';
  
  // VOZ ROBÓTICA MASCULINA PRA CORVO
  if(KAI_CONFIG.vozGenero === 'masculino'){
    utter.rate = 0.9;
    utter.pitch = 0.5; // GRAVE ROBÓTICO
  } else {
    utter.rate = 1;
    utter.pitch = 1.2; // FEMININA
  }
  utter.onstart = pulsarNucleo;
  synth.speak(utter);
}

function trocarVoz(){
  KAI_CONFIG.vozGenero = document.getElementById('vozGenero').value;
  localStorage.setItem('kai_voz', KAI_CONFIG.vozGenero);
  falar('Voz alterada com sucesso');
}

function pulsarNucleo(){ material.emissiveIntensity = 1.5; setTimeout(()=>{ material.emissiveIntensity = 0.6 }, 300); }

async function processarComando(cmdOriginal){
  const cmd = cmdOriginal.toLowerCase();
  let resposta = "";

  // BLOQUEIO MODO USER
  const bloqueados = ['cria','copia','buscar','calcular','venda','postar','aula','lembre'];
  if(KAI_CONFIG.modo === 'USER' && bloqueados.some(b=>cmd.includes(b))){
    falar('Acesso negado. Função exclusiva do Administrador KORVIL.');
    return;
  }

  // 9 GAVETAS
  if(cmd.includes('cria')) resposta = await GAVETAS.cria(cmd);
  else if(cmd.includes('copia')) resposta = await GAVETAS.copia(cmd);
  else if(cmd.includes('buscar') || cmd.includes('pesquisar')) resposta = await GAVETAS.busca(cmd);
  else if(cmd.includes('calcular')) resposta = await GAVETAS.calculo(cmd);
  else if(cmd.includes('status') || cmd.includes('sistema')) resposta = await GAVETAS.sistema(cmd);
  else if(cmd.includes('postar') || cmd.includes('social')) resposta = await GAVETAS.social(cmd);
  else if(cmd.includes('venda') || cmd.includes('lead')) resposta = await GAVETAS.vendas(cmd);
  else if(cmd.includes('aula') || cmd.includes('curso')) resposta = await GAVETAS.educacao(cmd);
  else if(cmd.includes('abrir app') || cmd.includes('vai')) resposta = await GAVETAS.navega(cmd);

  // COMANDOS BÁSICOS
  else if(cmd.includes('olá') || cmd.includes('k-ai')) resposta = `Olá ${KAI_CONFIG.nomeUsuario}. K-AI online.`;
  else if(cmd.includes('hora')) resposta = 'Agora são ' + new Date().toLocaleTimeString('pt-BR');
  else if(cmd.includes('data')) resposta = 'Hoje é ' + new Date().toLocaleDateString('pt-BR');
  else if(cmd.includes('música')){ tocarMusica(); resposta = 'Tocando música KORVIL'; }
  else if(cmd.includes('parar música')){ pararMusica(); resposta = 'Música pausada'; }
  else if(cmd.includes('lembre')) resposta = KAI_MEMORY.salvarMemoria(cmd);
  else if(cmd.includes('o que você lembra')) resposta = KAI_MEMORY.buscar(cmd);
  else if(cmd.includes('estatísticas')) resposta = `Total de conversas: ${KAI_MEMORY.dados.historico.length}`;
  else if(cmd.includes('limpar memória')){ localStorage.removeItem('kai_memoria'); resposta = 'Memória limpa'; }
  else resposta = 'Comando não reconhecido';

  KAI_MEMORY.adicionar(cmdOriginal, resposta);
  falar(resposta);
}

// ===== 4. UI =====
const micBtn = document.getElementById('micBtn');
const chat = document.getElementById('chat');
const status = document.getElementById('status');

micBtn.onclick = ()=>{ if(!isListening) recognition.start(); else recognition.stop(); }

function addMsg(tipo, texto){
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function toggleMenu(){ const menu = document.getElementById('menu'); menu.style.display = menu.style.display==='block'?'none':'block'; }
function executar(cmd){ toggleMenu(); addMsg('user', cmd); processarComando(cmd); }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value.trim()) return; addMsg('user', input.value); processarComando(input.value); input.value = ""; }
function anexarArquivo(){ const input = document.createElement('input'); input.type = 'file'; input.onchange = (e)=>{ addMsg('user', `📎 ${e.target.files[0].name}`); falar('Arquivo recebido'); } input.click(); }
function tocarMusica(){ bgMusic.src = 'https://cdn.pixabay.com/download/audio/2023/01/03/audio_2b12e3e1c8.mp3'; bgMusic.volume = 0.25; bgMusic.play(); }
function pararMusica(){ bgMusic.pause(); }

document.getElementById('userInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') enviarTexto(); });
window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
