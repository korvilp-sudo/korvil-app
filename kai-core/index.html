<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE v-2026.38</title>

<!-- CSS REAL QUE JÁ EXISTE -->
<link rel="stylesheet" href="templates/hud-template.css">

<!-- JS REAIS QUE JÁ EXISTEM -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="kai-transformar/armaduras/v-2026/conectorkai.js"></script>
<script src="brain/kai-brain.js"></script>
<script src="brain/kai-parser.js"></script>
<script src="brain/kai-executor.js"></script>

<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#000;--top:#0d1a20;--chat:#0b141a;--balao:#132e36}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#e9edef;font-family:'Segoe UI',Roboto,sans-serif}
.phone{width:100%;height:100dvh;background:var(--chat);position:relative;display:flex;flex-direction:column}

/* SEU CSS ORIGINAL DO V-2026.6 */
.arrow{position:absolute;z-index:1000;pointer-events:auto;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:opacity.3s}
.arrow.hidden{opacity:0;pointer-events:none}
.arrow svg{width:80px;height:80px;stroke:var(--c);stroke-width:3.5;filter:drop-shadow(0 0 25px var(--c))}
.arrow-down{top:40px;left:50%;transform:translateX(-50%);width:100%;height:90px}
.arrow-down svg{animation:arrowDown 1.4s infinite}
@keyframes arrowDown{0%,100%{transform:translateY(-10px);opacity:.6}50%{transform:translateY(10px);opacity:1}}
.arrow-right{top:50%;right:0;transform:translateY(-50%);width:90px;height:100%}
.arrow-right svg{animation:arrowRight 1.4s infinite}
@keyframes arrowRight{0%,100%{transform:translateX(10px);opacity:.6}50%{transform:translateX(-10px);opacity:1}}
.arrow-left{top:50%;left:0;transform:translateY(-50%);width:90px;height:100%}
.arrow-left svg{animation:arrowLeft 1.4s infinite}
@keyframes arrowLeft{0%,100%{transform:translateX(-10px);opacity:.6}50%{transform:translateX(10px);opacity:1}}
.arrow-up{bottom:100px;left:50%;transform:translateX(-50%);width:100%;height:90px}
.arrow-up svg{animation:arrowUp 1.4s infinite}
@keyframes arrowUp{0%,100%{transform:translateY(10px);opacity:.6}50%{transform:translateY(-10px);opacity:1}}

.status{height:36px;background:#000;display:flex;justify-content:space-between;align-items:center;padding:0 18px;font-size:15px;font-weight:700;color:var(--c);flex-shrink:0;border-bottom:2px solid var(--c);box-shadow:0 0 15px var(--c)40;z-index:5}
.header{height:75px;background:linear-gradient(180deg,var(--top),#000);display:flex;align-items:center;padding:0 18px;gap:18px;border-bottom:2px solid var(--c);z-index:5}
.header.menuBtn{font-size:52px;color:var(--c);cursor:pointer;font-weight:900}
.header.titulo{flex:1;text-align:center;color:var(--c);font-weight:900;letter-spacing:3px;font-size:16px}
#chat{flex:1;display:flex;flex-direction:column-reverse;overflow-y:auto;padding:14px;background:var(--chat);position:relative}
#canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.12;pointer-events:none;z-index:0}
.bubble{max-width:82%;padding:14px 18px;border-radius:12px;margin-bottom:12px;font-size:16px;z-index:2;font-weight:500}
.bubble.me{background:linear-gradient(135deg,#005c4b,#004a3d);margin-left:auto;border:2px solid var(--c2)}
.bubble.kai{background:linear-gradient(135deg,var(--balao),#0f1f25);border:2px solid var(--c)}
.bubble.time{font-size:12px;color:var(--c2);text-align:right;margin-top:6px;font-weight:700}
.footer{height:95px;background:linear-gradient(0deg,var(--top),#000);display:flex;align-items:center;padding:0 16px;gap:14px;border-top:2px solid var(--c);z-index:5}
.footer input{flex:1;height:65px;background:linear-gradient(145deg,#132e36,#0a1419);border:2.5px solid var(--c);border-radius:32px;padding:0 24px;color:#fff;font-size:17px;font-weight:700;outline:none}
.footer.btn{width:65px;height:65px;border-radius:50%;background:linear-gradient(145deg,var(--c),var(--c2));color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;cursor:pointer;border:2.5px solid var(--c)}
.footer.btn.rec{background:linear-gradient(145deg,#ff3b30,#ff1a0a);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 25px #ff3b30}50%{box-shadow:0 0 40px #ff3b30}}

#armaduraOverlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:200}
#armaduraCanvas{width:100%;height:100%}
.btn-fechar-armor{position:absolute;top:90px;right:20px;background:#000;border:2px solid var(--c);color:var(--c);padding:10px 20px;border-radius:20px;font-weight:900;z-index:201;cursor:pointer}
.hud-armor{position:absolute;top:90px;left:50%;transform:translateX(-50%);color:#00FFFF;font-weight:900;font-size:15px;z-index:201}

#transformarOverlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;background:#000}
#cameraReal{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:200}
#visorCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:201}
.btn-fechar-trans{position:absolute;top:90px;left:20px;background:#000;border:2px solid var(--c);color:var(--c);padding:10px 20px;border-radius:20px;font-weight:900;z-index:202;cursor:pointer}
.hud-visor{position:absolute;top:90px;left:50%;transform:translateX(-50%);color:#00FFFF;font-weight:900;font-size:14px;z-index:202}

/* MENUS CARREGADOS VIA FETCH */
.menu-slot{position:absolute;z-index:100}
</style>
</head>
<body>
<div class="phone">

<!-- ÂNCORAS PARA PUXAR MENUS REAIS -->
<div id="menuSuperior" class="menu-slot"></div>
<div id="menuEsquerdo" class="menu-slot"></div>
<div id="menuDireito" class="menu-slot"></div>
<div id="menuInferior" class="menu-slot"></div>
<div id="miniMenu" class="menu-slot"></div>

<!-- SEUS 4 BOTÕES ORIGINAIS -->
 <div class="arrow arrow-down" onclick="openPanel()"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6"/></svg></div>
 <div class="arrow arrow-right" onclick="openMenuDireito()"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6"/></svg></div>
 <div class="arrow arrow-left" onclick="toggleMenu()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6"/></svg></div>
 <div class="arrow arrow-up" onclick="openComandos()"><svg viewBox="0 0 24 24" fill="none"><path d="M18 15l-6-6-6 6"/></svg></div>

 <div class="status"><div id="hora">00:00</div><span>KORVIL 5G 🔋 100%</span></div>

 <!-- HEADER ORIGINAL -->
 <div class="header"><div class="menuBtn" onclick="toggleMenu()">☰</div><div class="titulo">K-AI KORVIL ARTIFICIAL INTELLIGENCE</div></div>

 <!-- CHAT + HOLOGRAMA FUNDO -->
 <div id="chat"><canvas id="canvas3d"></canvas></div>

 <!-- OVERLAY ARMADURA -->
 <div id="armaduraOverlay"><canvas id="armaduraCanvas"></canvas><div class="hud-armor">K-AI ARMOR v-2026 | PROTOCOLO: SAY KORVIL</div><button class="btn-fechar-armor" onclick="fecharArmadura()">FECHAR</button></div>

 <!-- OVERLAY TRANSFORMAÇÃO -->
 <div id="transformarOverlay">
    <video id="cameraReal" autoplay playsinline></video>
    <canvas id="visorCanvas"></canvas>
    <div class="hud-visor">VISOR K-AI | CÂMERA ATIVA</div>
    <button class="btn-fechar-trans" onclick="fecharTransformacao()">FECHAR</button>
 </div>

 <!-- FOOTER CHAT REAL -->
 <div class="footer">
    <input type="text" id="input" placeholder="Mensagem para K-AI...">
    <div class="btn" id="mic">🎤</div>
    <div class="btn" id="btnSend">➤</div>
 </div>
</div>

<script>
let memoria = JSON.parse(localStorage.getItem('kai')) || {hist:[], mems:[]};
let recognition, isListening = false, streamCamera = null;

const PAGINAS = {
  'sistema k': 'https://korvilp-sudo.github.io/korvil-app/sections/sistemak/index.html',
  'ktp': 'https://korvilp-sudo.github.io/korvil-app/sections/ktp/index.html',
  'kafortunado': 'https://korvilp-sudo.github.io/korvil-app/sections/kafortunado/index.html',
  'kalma': 'https://korvilp-sudo.github.io/korvil-app/sections/kalma/index.html',
  'central': 'https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/index.html'
}

// FUNÇÃO PARA PUXAR ARQUIVOS REAIS
async function load(id, path){
  try{
    const res = await fetch(path);
    document.getElementById(id).innerHTML = await res.text();
  }catch(e){console.log('Arquivo não encontrado:', path)}
}

// CARREGA OS MENUS REAIS DO REPO AO INICIAR
load('menuSuperior', 'menus/menu-superior.html');
load('menuEsquerdo', 'menus/menu-esquerdo.html');
load('menuDireito', 'menus/menu-direito.html');
load('menuInferior', 'menus/menu-inferior.html');
load('miniMenu', 'menus/mini-menu/mini-menu.html');

// MICROFONE E ENTER
document.getElementById('mic').onclick = startVoice;
document.getElementById('btnSend').onclick = send;
document.getElementById('input').onkeydown = function(e){
  if(e.key === 'Enter'){ e.preventDefault(); e.stopPropagation(); send(); }
};

function startVoice(e){
  e.preventDefault(); e.stopPropagation();
  const btn = document.getElementById('mic');
  if(!isListening){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ falar('Microfone não suportado'); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.onresult = (event) => {
      const comando = event.results[0][0].transcript;
      document.getElementById('input').value = comando;
      executar(comando.toLowerCase());
    }
    recognition.onend = () => { btn.classList.remove('rec'); isListening = false; }
    recognition.start();
    isListening = true; btn.classList.add('rec');
    falar('Ouvindo');
  } else { recognition.stop(); }
}

setInterval(()=>{document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})},1000)

// SEU FUNDO 3D ORIGINAL
try{
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight-190);
  const geo = new THREE.IcosahedronGeometry(2.8, 2);
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6, wireframe:true});
  const nucleo = new THREE.Mesh(geo, mat);
  scene.add(nucleo, new THREE.PointLight(0x00FFFF,3));
  camera.position.z = 8;
  function loop(){ requestAnimationFrame(loop); nucleo.rotation.y += 0.01; renderer.render(scene,camera); }
  loop();
}catch(e){}

const chatEl = document.getElementById('chat');
function toggleMenu(){load('menuEsquerdo', 'menus/menu-esquerdo.html');} // recarrega se precisar
function openMenuDireito(){load('menuDireito', 'menus/menu-direito.html');}
function openComandos(){load('menuInferior', 'menus/menu-inferior.html');}

function addMsg(who, txt){const div = document.createElement('div'); div.className = 'bubble ' + who;div.innerHTML = txt + `<div class="time">${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>`;chatEl.prepend(div);}
function falar(txt){ addMsg('kai',txt); speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }
function goPage(p){if(PAGINAS[p]){ window.location.href = PAGINAS[p]; falar(`Abrindo ${p}`); }}
function limparMem(){ memoria={hist:[],mems:[]}; localStorage.setItem('kai',JSON.stringify(memoria));}
function send(){const input = document.getElementById('input');if(input.value.trim()){executar(input.value.toLowerCase());input.value = '';}}

function executar(cmd){
  memoria.hist.push(cmd); localStorage.setItem('kai',JSON.stringify(memoria));
  addMsg('me',cmd);
  if(cmd.includes('horas')) falar(`Agora são ${new Date().toLocaleTimeString('pt-BR')}`);
  else if(cmd.includes('sistema k')) goPage('sistema k');
  else if(cmd.includes('ktp')) goPage('ktp');
  else if(cmd.includes('armadura')) mostrarArmadura('v-2026');
  else if(cmd.includes('transformar')) abrirTransformacao();
  else if(cmd.includes('limpar')){ limparMem(); falar('Memória limpa');}
  else falar(`Executando: ${cmd}`);
}

function mostrarArmadura(v){document.getElementById('armaduraOverlay').style.display = 'block';falar(`Armadura ${v} ativada`);}
function fecharArmadura(){document.getElementById('armaduraOverlay').style.display = 'none';}

async function abrirTransformacao(){
  document.getElementById('transformarOverlay').style.display='block';
  try{ streamCamera = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}); document.getElementById('cameraReal').srcObject = streamCamera; }catch(e){}
  falar('Transformação ativa');
}
function fecharTransformacao(){document.getElementById('transformarOverlay').style.display='none';if(streamCamera){ streamCamera.getTracks().forEach(track => track.stop()); }}

window.onload = ()=>{
  falar('K-AI online Chefe');
  // Carrega o menu direito com K-AI TRANSFORMAR
  load('menuDireito', 'menus/menu-direito.html');
}
</script>
</body>
</html>
