<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000;overflow:hidden;color:var(--c)}
#canvas3d{position:fixed;inset:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.logo{top:30px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;letter-spacing:6px;text-shadow:0 0 25px var(--c)}
.logo span{color:var(--c2);font-size:14px;letter-spacing:2px;display:block;text-align:center;margin-top:5px}
.status{bottom:30px;left:50%;transform:translateX(-50%);font-size:14px;text-align:center}
.mic{bottom:80px;left:50%;transform:translateX(-50%);width:90px;height:90px;border:3px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:35px;cursor:pointer;pointer-events:auto;transition:.3s;box-shadow:0 0 40px var(--c);background:rgba(0,255,255,.05)}
.mic:hover{transform:translateX(-50%) scale(1.1)}
.mic.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 40px var(--c)}50%{box-shadow:0 0 90px var(--c2)}}
.chat{bottom:190px;left:50%;transform:translateX(-50%);width:90%;max-width:650px;background:rgba(0,0,0,.75);border:1px solid var(--c);border-radius:15px;padding:18px;max-height:220px;overflow-y:auto;backdrop-filter:blur(15px)}
.msg{margin:10px 0;font-size:15px;line-height:1.5}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}
.inputBox{bottom:140px;left:50%;transform:translateX(-50%);width:90%;max-width:650px;display:flex;gap:10px;pointer-events:auto}
.inputBox input{flex:1;background:rgba(0,255,255,.1);border:1px solid var(--c);color:var(--c);padding:12px;border-radius:10px;outline:none}
.inputBox button{background:var(--c);color:#000;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:900}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div class="ui logo">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui chat" id="chat"></div>
<div class="ui inputBox">
  <input type="text" id="userInput" placeholder="Digite ou fale com K-AI..." onkeydown="if(event.key==='Enter') enviarTexto()">
  <button onclick="anexarArquivo()">📎</button>
  <button onclick="enviarTexto()">➤</button>
</div>
<div class="ui mic" id="micBtn">🎙️</div>
<div class="ui status" id="status">Clique e diga "Olá K-AI"</div>

<!-- GAVETAS K-AI -->
<script src="actions/navega.js"></script>
<script src="actions/cria.js"></script>
<script src="actions/copia.js"></script>
<script src="actions/sistema.js"></script>

<script>
// ===== CONFIG K-AI =====
const KAI_CONFIG = { modo: "ilimitado", nomeUsuario: "Chefe" }

// ===== CENA 3D =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
const geometry = new THREE.IcosahedronGeometry(1.8, 2);
const material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6, shininess:120, transparent:true, opacity:0.9});
const nucleo = new THREE.Mesh(geometry, material); scene.add(nucleo);
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.1, 16, 100), new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true}));
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.1, 16, 100), new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true})); ring2.rotation.x = Math.PI/2;
scene.add(ring1, ring2); scene.add(new THREE.PointLight(0x00FFFF, 2.5, 50).position.set(5,5,5)); camera.position.z = 6;
function animate(){ requestAnimationFrame(animate); nucleo.rotation.x += 0.008; nucleo.rotation.y += 0.015; ring1.rotation.y += 0.02; ring2.rotation.z += 0.015; material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.003)*0.2; renderer.render(scene, camera); }
animate(); window.pulsarCore = () => { material.emissiveIntensity = 1.5; setTimeout(()=>material.emissiveIntensity=0.6,300) }

// ===== CÉREBRO =====
const chat = document.getElementById('chat'); const status = document.getElementById('status');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; let recognition, isListening = false;
if(SpeechRecognition){ recognition = new SpeechRecognition(); recognition.lang = 'pt-BR';
  recognition.onstart = ()=>{ isListening=true; micBtn.classList.add('listening'); status.innerText='K-AI ouvindo...'; }
  recognition.onend = ()=>{ isListening=false; micBtn.classList.remove('listening'); status.innerText='Clique para falar com K-AI'; }
  recognition.onresult = (e)=>{ const cmd=e.results[0][0].transcript; addMsg('user',cmd); processarComando(cmd); }
}
micBtn.onclick = ()=>{ if(!isListening && recognition) recognition.start(); }
function addMsg(tipo, texto){ const div = document.createElement('div'); div.className = 'msg ' + tipo; div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`; chat.appendChild(div); chat.scrollTop = chat.scrollHeight; }
function falar(texto){ addMsg('kai', texto); const utter = new SpeechSynthesisUtterance(texto); utter.lang = 'pt-BR'; utter.rate = 1.05; utter.onstart = pulsarCore; speechSynthesis.speak(utter); }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value) return; addMsg('user', input.value); processarComando(input.value); input.value = ""; }
async function processarComando(cmdOriginal){ const cmd = cmdOriginal.toLowerCase(); let resposta = "";
  if (cmd.includes("vai") || cmd.includes("abre")) { resposta = Navega.ir(cmd); }
  else if (cmd.includes("cria") || cmd.includes("gere")) { resposta = await Cria.executar(cmd); }
  else if (cmd.includes("copia") || cmd.includes("resuma")) { resposta = await Copia.executar(cmd); }
  else if (cmd.includes("lembrar") || cmd.includes("hora")) { resposta = await Sistema.executar(cmd); }
  else { resposta = `Modo Ilimitado: Sobre "${cmdOriginal}". Posso criar um plano de ação.`; }
  falar(resposta);
}
function anexarArquivo(){ const input = document.createElement('input'); input.type = 'file'; input.onchange = (e)=>{ Copia.lerArquivo(e.target.files[0]); } input.click(); }
setTimeout(()=>{ Sistema.carregar(); falar(`K-AI inicializado. Modo ${KAI_CONFIG.modo} ativo.`); }, 2000);
window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
