<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI JARVIS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00f5ff;--c2:#00d4ff;--bg:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:var(--bg);overflow:hidden;color:var(--c)}
#canvas3d{position:fixed;inset:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.logo{top:20px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:900;letter-spacing:4px;text-shadow:0 0 20px var(--c);text-align:center}
.logo span{color:var(--c2)}
.menuBtn{top:15px;left:15px;width:50px;height:50px;border:2px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;pointer-events:auto;background:rgba(0,245,255,.05)}
.menu{top:80px;left:15px;width:320px;max-height:70vh;overflow-y:auto;background:rgba(0,20,30,.95);border:2px solid var(--c);border-radius:15px;padding:15px;display:none;pointer-events:auto;backdrop-filter:blur(15px)}
.menu h3{color:var(--c2);margin:10px 0 5px;font-size:12px}
.menu button{width:100%;background:rgba(0,245,255,.05);border:1px solid #00333a;color:var(--c);padding:12px;margin:4px 0;border-radius:10px;text-align:left;cursor:pointer;font-size:13px;font-weight:700}
.chatBox{bottom:0;left:0;width:100%;background:linear-gradient(transparent, rgba(0,0,0,.9));border-top:2px solid var(--c);padding:15px;pointer-events:auto}
.chat{max-height:180px;overflow-y:auto;padding:10px}
.msg{margin:8px 0;font-size:15px}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}
.inputArea{display:flex;gap:8px;margin-top:8px}
.inputArea input{flex:1;background:#001a1f;border:2px solid var(--c);color:var(--c);padding:14px;border-radius:12px;outline:none;font-size:15px}
.inputArea button{width:50px;height:50px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:20px;font-weight:900}
.micBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}
.micBtn.listening{background:var(--c)!important; color:#000!important}
.badge{top:20px;right:20px;background:var(--c);color:#000;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:900}
.autoListen{bottom:120px;right:20px;font-size:11px;background:rgba(0,255,0,.15);padding:5px 10px;border-radius:10px;border:1px solid #0f0}
.anexoBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div class="ui badge">MODO CHEFE</div>
<div class="ui autoListen" id="autoListen">Ouvindo...</div>
<div class="ui logo">K-<span>AI</span></div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>

<div class="ui menu" id="menu">
  <h3>VERSÕES K-AI</h3>
  <button onclick="executar('carregar versao korvil')">Versão KORVIL v1.0</button>
  <button onclick="executar('carregar versao jarvis')">Versão JARVIS v2.0</button>
  <button onclick="executar('carregar versao corvo')">Versão CORVO v3.0</button>
  
  <h3>NAVEGAR</h3>
  <button onclick="executar('vai para 2')">K-TP</button>
  <button onclick="executar('vai para 8')">SERVIÇOS</button>
  
  <h3>IA</h3>
  <button onclick="executar('fale sobre os serviços')">Fale sobre</button>
  <button onclick="executar('estatísticas')">Estatísticas</button>
  <button onclick="executar('limpar memória')">Limpar Memória</button>
</div>

<div class="ui chatBox">
  <div class="chat" id="chat"></div>
  <div class="inputArea">
    <button class="anexoBtn" onclick="anexarArquivo()">📎</button>
    <input type="text" id="userInput" placeholder="Fale com K-AI...">
    <button id="micBtn" class="micBtn" onclick="toggleMic()">🎙️</button>
    <button onclick="enviarTexto()">➤</button>
  </div>
</div>

<!-- ORDEM CORRETA -->
<script src="actions/navega.js"></script>
<script src="actions/copia.js"></script>
<script src="actions/cria.js"></script>
<script src="actions/sistema.js"></script>
<script src="actions/busca.js"></script>
<script src="actions/calculo.js"></script>
<script src="actions/social.js"></script>
<script src="actions/vendas.js"></script>
<script src="actions/educacao.js"></script>
<script src="actions/kai-memory.js"></script>
<script src="actions/kai-ui.js"></script>

<script>
const KAI_CONFIG = { modo: "ilimitado", autoOuvir: true, nomeUsuario: "Chefe", versao: "corvo" }
function toggleMenu(){ KAI_UI.toggleMenu(); }
function toggleMic(){ KAI_UI.toggleMic(); }
function enviarTexto(){ KAI_UI.enviarTexto(); }
function executar(cmd){ KAI_UI.executar(cmd); }
function anexarArquivo(){ KAI_UI.anexarArquivo(); }
document.getElementById('userInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') enviarTexto(); });
async function iniciarKAI(){ await KAI_MEMORY.carregar(); Sistema.carregar(); KAI_UI.init(); }
setTimeout(iniciarKAI, 800);
</script>
</body>
</html>
