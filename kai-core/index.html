<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000;overflow:hidden;color:var(--c)}
#selectScreen{position:fixed;inset:0;z-index:1000;background:radial-gradient(circle at center, #001a33 0%, #000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
#selectScreen h1{font-size:3rem;color:var(--c);text-shadow:0 0 30px var(--c)}
.btnMode{background:rgba(0,255,255,.1);border:2px solid var(--c);color:var(--c);padding:20px 40px;margin:10px;border-radius:15px;font-size:1.1rem;cursor:pointer;width:300px}
#app{display:none}
#canvas3d{position:fixed;inset:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.logo{top:20px;left:50%;transform:translateX(-50%);font-size:28px;font-weight:900;letter-spacing:6px;text-shadow:0 0 25px var(--c);text-align:center}
.menuBtn{top:20px;left:20px;width:50px;height:50px;border:2px solid var(--c);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;pointer-events:auto;background:rgba(0,255,255,.1)}
.menu{top:80px;left:20px;width:340px;max-height:80vh;overflow-y:auto;background:rgba(0,0,0,.9);border:1px solid var(--c);border-radius:15px;padding:15px;display:none;pointer-events:auto;backdrop-filter:blur(10px)}
.menu button{width:100%;background:transparent;border:1px solid #003333;color:var(--c);padding:8px;margin:3px 0;border-radius:8px;text-align:left;cursor:pointer;font-size:12px}
.menu button.blocked{opacity:.3;cursor:not-allowed}
.chatBox{bottom:0;left:0;width:100%;background:rgba(0,0,0,.85);border-top:1px solid var(--c);padding:10px;pointer-events:auto}
.chat{max-height:200px;overflow-y:auto;padding:10px}
.msg{margin:8px 0;font-size:14px}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}
.inputArea{display:flex;gap:8px;margin-top:8px}
.inputArea input{flex:1;background:rgba(0,255,255,.08);border:1px solid var(--c);color:var(--c);padding:14px;border-radius:12px;outline:none}
.inputArea button{width:50px;height:50px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:20px;font-weight:900}
.micBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}
.micBtn.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.2)!important}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--c)}50%{box-shadow:0 0 40px var(--c2)}}
.badge{position:fixed;top:20px;right:20px;background:var(--c);color:#000;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:900}
.autoListen{position:fixed;bottom:125px;right:20px;font-size:10px;background:rgba(0,255,0,.2);padding:4px 8px;border-radius:10px}
</style>
</head>
<body>

<div id="selectScreen">
  <h1>K-AI</h1>
  <button class="btnMode" onclick="iniciarKAI('limitado')">MODO SUPORTE</button>
  <button class="btnMode" id="btnChefe" onclick="iniciarKAI('ilimitado')">MODO CHEFE</button>
</div>

<div id="app">
<canvas id="canvas3d"></canvas>
<div class="ui badge" id="badgeModo">MODO SUPORTE</div>
<div class="ui autoListen" id="autoListen">Ouvindo...</div>
<div class="ui logo">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>

<div class="ui menu" id="menu">
  <h3>CONFIGURAÇÃO DE VOZ</h3>
  <button onclick="trocarVoz('corvo-masculino')" id="v1">1. Corvo Cibernético M</button>
  <button onclick="trocarVoz('assistente-feminina')" id="v4">4. Assistente F</button>

  <h3>1. NAVEGAR</h3>
  <button onclick="executar('vai para sistema k')">1. Sistema K</button>
  <button onclick="executar('vai para k-tp')">2. K-TP</button>
  <button onclick="executar('vai para k-afortunado')">3. K-AFORTUNADO</button>
  <button onclick="executar('vai para k-alma')">4. K-ALMA</button>
  <button onclick="executar('vai para central')">5. Central</button>

  <h3>2. CRIAR</h3>
  <button id="btnCriarImg" onclick="executar('cria imagem')">Criar Imagem IA</button>
  <h3>5. SISTEMA</h3>
  <button id="btnMemoria" onclick="executar('salvar memória')">Salvar Memória</button>
</div>

<div class="ui chatBox">
  <div class="chat" id="chat"></div>
  <div class="inputArea">
    <input type="text" id="userInput" placeholder="Mensagem para K-AI..." onkeydown="if(event.key==='Enter') enviarTexto()">
    <button class="micBtn" id="micBtn" onclick="toggleMic()">🎙️</button>
    <button onclick="enviarTexto()">➤</button>
  </div>
</div>
</div>

<script src="actions/navega.js"></script>
<script src="actions/cria.js"></script>
<script src="actions/copia.js"></script>
<script src="actions/sistema.js"></script>

<script>
const KAI_CONFIG = { modo: "limitado", nomeUsuario: "Usuário", vozTipo: "corvo-masculino", autoOuvir: true }
let vozesDisponiveis = []; let vozSelecionada = null; let recognition;

// ===== INICIAR =====
function iniciarKAI(modo){
  KAI_CONFIG.modo = modo;
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if(modo === "ilimitado"){
    document.getElementById('badgeModo').innerText = "MODO CHEFE";
    KAI_CONFIG.nomeUsuario = "Chefe";
  } else {
    document.getElementById('btnCriarImg').classList.add('blocked');
    document.getElementById('btnMemoria').classList.add('blocked');
  }
  iniciarCena3D(); carregarVozes(); iniciarReconhecimento();
  falar(`K-AI online. Modo ${modo} ativo.`);
}

// ===== RECONHECIMENTO TEMPO REAL =====
function iniciarReconhecimento(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true; // TEMPO REAL
  recognition.interimResults = false;

  recognition.onresult = (e)=>{
    const cmd = e.results[e.results.length-1][0].transcript;
    if(cmd.length > 3){ // evita lixo
      addMsg('user',cmd);
      processarComando(cmd);
    }
  }
  recognition.onend = ()=>{ if(KAI_CONFIG.autoOuvir) recognition.start(); } // REINICIA SOZINHO
  recognition.start();
}

function toggleMic(){
  KAI_CONFIG.autoOuvir =!KAI_CONFIG.autoOuvir;
  document.getElementById('autoListen').style.display = KAI_CONFIG.autoOuvir? 'block':'none';
  if(!KAI_CONFIG.autoOuvir && recognition) recognition.stop();
  else if(KAI_CONFIG.autoOuvir && recognition) recognition.start();
}

// ===== CENA 3D =====
function iniciarCena3D(){ /*... mesma cena do corvo... */
const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true}); renderer.setSize(window.innerWidth, window.innerHeight);
const nucleo = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 2), new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6, transparent:true, opacity:0.9}));
scene.add(nucleo); const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.1, 16, 100), new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true}));
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.1, 16, 100), new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true})); ring2.rotation.x = Math.PI/2;
scene.add(ring1, ring2); scene.add(new THREE.PointLight(0x00FFFF, 2.5, 50).position.set(5,5,5)); camera.position.z = 6;
function animate(){ requestAnimationFrame(animate); nucleo.rotation.x += 0.008; nucleo.rotation.y += 0.015; ring1.rotation.y += 0.02; ring2.rotation.z += 0.015; renderer.render(scene, camera); }
animate(); window.pulsarCore = () => { nucleo.material.emissiveIntensity = 1.5; setTimeout(()=>nucleo.material.emissiveIntensity=0.6,300) }
}

// ===== VOZ =====
function carregarVozes(){ vozesDisponiveis = speechSynthesis.getVoices(); }
speechSynthesis.onvoiceschanged = carregarVozes;
function trocarVoz(tipo){ KAI_CONFIG.vozTipo = tipo; falar("Voz alterada"); }
function falar(texto){
  addMsg('kai', texto);
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR'; utter.pitch = 0.6; utter.rate = 0.95; // VOZ CORVO
  utter.onstart = pulsarCore; speechSynthesis.speak(utter);
}

// ===== CÉREBRO COM ATALHOS =====
const chat = document.getElementById('chat');
function addMsg(tipo, texto){ const div = document.createElement('div'); div.className = 'msg ' + tipo; div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`; chat.appendChild(div); chat.scrollTop = chat.scrollHeight; }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value) return; addMsg('user', input.value); processarComando(input.value); input.value = ""; }
function toggleMenu(){ document.getElementById('menu').style.display = document.getElementById('menu').style.display==='block'?'none':'block'; }

async function processarComando(cmdOriginal){
  const cmd = cmdOriginal.toLowerCase(); let resposta = "";

  // ATALHOS DE VOZ EM TEMPO REAL
  if(cmd.includes("abrir menu")) return toggleMenu();
  if(cmd.includes("parar de ouvir")) { KAI_CONFIG.autoOuvir=false; recognition.stop(); return falar("Modo manual ativado"); }
  if(cmd.includes("voltar a ouvir")) { KAI_CONFIG.autoOuvir=true; recognition.start(); return falar("Modo tempo real ativado"); }
  if(cmd.includes("modo chefe")) { KAI_CONFIG.modo="ilimitado"; return falar("Modo Chefe ativado"); }

  if (cmd.includes("vai") || cmd.includes("abrir")) { resposta = Navega.ir(cmd); }
  else if (cmd.includes("cria")) {
    if(KAI_CONFIG.modo==="limitado") resposta = "Função bloqueada no Modo Suporte";
    else resposta = "Iniciando criação...";
  }
  else if (cmd.includes("hora")) { resposta = 'Agora são ' + new Date().toLocaleTimeString('pt-BR'); }
  else { resposta = `Comando recebido: "${cmdOriginal}"`; }
  falar(resposta);
}
</script>
</body>
</html>
