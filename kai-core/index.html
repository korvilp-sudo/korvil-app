<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#0a0f14;--chat:#111b21;--balao:#1f2c33}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);overflow:hidden;height:100vh;width:100vw;color:#e9edef}

#canvas3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15;pointer-events:none} /* FUNDO 3D SUTIL */

/* TOPO IGUAL WHATSAPP */
.topbar{position:fixed;top:0;left:0;width:100%;height:60px;background:#202c33;z-index:10;display:flex;align-items:center;padding:0 12px;gap:12px}
.topbar img{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--c2));padding:2px}
.topbar .info{flex:1}
.topbar .nome{font-weight:600;font-size:16px;color:#e9edef}
.topbar .status-top{font-size:12px;color:#8696a0}
.topbar .icons{font-size:22px;color:#aebac1;cursor:pointer}

/* CHAT */
.chat{position:absolute;top:60px;bottom:70px;left:0;width:100%;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px;z-index:5}
.msg{max-width:75%;padding:8px 12px;border-radius:8px;font-size:15px;line-height:1.4;position:relative;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.msg.user{align-self:flex-end;background:#005c4b;color:#e9edef;border-radius:8px 0 8px 8px}
.msg.kai{align-self:flex-start;background:var(--balao);color:#e9edef;border-radius:0 8px 8px 8px}
.msg .hora{font-size:11px;color:#8696a0;text-align:right;margin-top:4px}

/* BARRA DE INPUT IGUAL WHATSAPP */
.inputBar{position:fixed;bottom:0;left:0;width:100%;height:70px;background:#202c33;z-index:10;display:flex;align-items:center;padding:0 8px;gap:8px}
.inputBar .icon{font-size:24px;color:#aebac1;cursor:pointer;padding:8px}
.inputBar input{flex:1;background:#2a3942;border:none;color:#e9edef;padding:12px 16px;border-radius:25px;outline:none;font-size:15px}
.inputBar .micBtn{width:50px;height:50px;background:#00a884;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#111b21;cursor:pointer;transition:.2s}
.inputBar .micBtn.listening{background:#ff3b30;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* MENU LATERAL */
.menu{position:fixed;top:60px;left:-320px;width:300px;height:calc(100% - 60px);background:#111b21;border-right:1px solid #2a3942;transition:.3s;z-index:20;padding:15px}
.menu.open{left:0}
.menu h3{color:var(--c2);font-size:12px;margin:15px 0 8px}
.menu button{width:100%;background:#2a3942;border:none;color:#e9edef;padding:12px;margin:4px 0;border-radius:8px;text-align:left;cursor:pointer;font-size:14px}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<!-- TOPO -->
<div class="topbar">
  <div class="icons" onclick="toggleMenu()">☰</div>
  <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%2300FFFF'/%3E%3C/svg%3E">
  <div class="info">
    <div class="nome">K-AI</div>
    <div class="status-top" id="statusTop">online</div>
  </div>
  <div class="icons">⋮</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <h3>⚡ AÇÕES RÁPIDAS</h3>
  <button onclick="executar('abrir app')">Abrir APP KORVIL</button>
  <button onclick="executar('buscar marketing')">Pesquisar Google</button>
  <button onclick="executar('cria post')">Criar Conteúdo</button>
  <h3>💾 MEMÓRIA</h3>
  <button onclick="executar('estatísticas')">Estatísticas</button>
  <button onclick="executar('limpar memória')">Limpar Memória</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- BARRA INPUT -->
<div class="inputBar">
  <div class="icon">😊</div>
  <input type="text" id="userInput" placeholder="Mensagem">
  <div class="icon">📎</div>
  <div class="icon">📷</div>
  <div class="micBtn" id="micBtn">🎤</div>
</div>

<audio id="bgMusic" loop></audio>
<script src="kai-core.js"></script>
<script>
const KAI_CONFIG = {MODO: 'USER', NOME_USER: 'Chefe', palavraAtivacao: 'k-ai'}
const KAI_MEMORY = {dados: JSON.parse(localStorage.getItem('kai_memoria')) || {historico:[], memorias:[]}, salvar(){localStorage.setItem('kai_memoria', JSON.stringify(this.dados));}, salvarMemoria(t){this.dados.memorias.push({t});this.salvar();return `Salvei: ${t}`;}, buscar(t){const r=this.dados.memorias.filter(m=>m.t.includes(t));return r.length?`Lembro: ${r[0].t}`:"Não lembro";}, estatisticas(){return `Conversas: ${this.dados.historico.length}`;}}

// 3D FUNDO SUTIL
try{
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  const material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.3, wireframe:true});
  const nucleo = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 1), material); 
  scene.add(nucleo); scene.add(new THREE.PointLight(0x00FFFF, 1, 50).position.set(5,5,5)); camera.position.z = 8;
  function animate(){ requestAnimationFrame(animate); nucleo.rotation.x += 0.005; nucleo.rotation.y += 0.008; renderer.render(scene, camera); }
  animate();
}catch(e){}

const chat = document.getElementById('chat');
const statusTop = document.getElementById('statusTop');

// VOZ
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
const micBtn = document.getElementById('micBtn');

micBtn.onclick = ()=>{
  if(!SpeechRecognition){ alert("Navegador não suporta voz"); return; }
  if(!recognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR'; recognition.continuous = false;
    recognition.onstart = ()=>{isListening=true; micBtn.classList.add('listening'); statusTop.innerText='gravando áudio...';}
    recognition.onend = ()=>{isListening=false; micBtn.classList.remove('listening'); statusTop.innerText='online';}
    recognition.onresult = (e)=>{ const cmd = e.results[0][0].transcript; addMsg('user', cmd); processarComando(cmd); }
  }
  if(!isListening) recognition.start(); else recognition.stop();
}

function addMsg(tipo, texto){
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `${texto}<div class="hora">${hora} ✓✓</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  KAI_MEMORY.dados.historico.push({tipo, texto}); KAI_MEMORY.salvar();
}

function falar(texto){
  addMsg('kai', texto);
  if(window.speechSynthesis){ speechSynthesis.cancel(); const utter = new SpeechSynthesisUtterance(texto); utter.lang = 'pt-BR'; utter.rate = 0.95; speechSynthesis.speak(utter); }
}

function processarComando(cmd){ 
  try{ const resposta = executarTodasActions(cmd); falar(resposta); }
  catch(e){ falar("Ok Chefe, processando: " + cmd); }
}

function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }
function executar(cmd){ toggleMenu(); addMsg('user', cmd); processarComando(cmd); }

document.getElementById('userInput').addEventListener('keydown', (e)=>{ 
  if(e.key==='Enter'){ 
    const val = e.target.value; 
    if(!val.trim()) return; 
    addMsg('user', val); 
    processarComando(val); 
    e.target.value = ""; 
  }
});

setTimeout(()=>{ falar(`Olá Chefe. K-AI online`); }, 1000);
</script>
</body>
</html>
