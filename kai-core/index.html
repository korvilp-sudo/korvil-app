<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:var(--bg);overflow:hidden;color:var(--c);user-select:none}

#canvas3d{position:fixed;inset:0;z-index:0;cursor:pointer}
.ui{position:fixed;z-index:10;pointer-events:none}

.logo{top:30px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;letter-spacing:6px;text-shadow:0 0 25px var(--c);text-align:center}
.logo span{color:var(--c2);font-size:14px;letter-spacing:2px;display:block;margin-top:5px}

.modo{top:30px;right:20px;font-size:12px;font-weight:700;padding:8px 14px;border:1px solid var(--c);border-radius:20px;background:rgba(0,255,255,.1);pointer-events:auto;cursor:pointer;transition:.3s}
.modo:hover{box-shadow:0 0 15px var(--c)}
.modo.admin{border-color:#00ff88; color:#00ff88; box-shadow:0 0 15px #00ff88;}

.status{bottom:30px;left:50%;transform:translateX(-50%);font-size:14px;text-align:center;background:rgba(0,0,0,.5);padding:8px 16px;border-radius:20px;border:1px solid var(--c)}

.menuBtn{top:30px;left:20px;width:50px;height:50px;border:2px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;pointer-events:auto;background:rgba(0,255,255,.05);transition:.3s}
.menuBtn:hover{background:rgba(0,255,255,.2)}

.menu{top:90px;left:20px;width:340px;max-height:75vh;overflow-y:auto;background:rgba(0,10,15,.95);border:2px solid var(--c);border-radius:15px;padding:15px;display:none;pointer-events:auto;backdrop-filter:blur(15px);box-shadow:0 0 30px rgba(0,255,255,.2)}
.menu h3{color:var(--c2);margin:15px 0 8px;font-size:13px;border-bottom:1px solid #00333a;padding-bottom:5px}
.menu button{width:100%;background:rgba(0,255,255,.05);border:1px solid #00333a;color:var(--c);padding:12px;margin:5px 0;border-radius:10px;text-align:left;cursor:pointer;font-size:13px;font-weight:700;transition:.2s}
.menu button:hover{background:rgba(0,255,255,.15);border-color:var(--c)}

.mic{bottom:80px;left:50%;transform:translateX(-50%);width:90px;height:90px;border:3px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:35px;cursor:pointer;pointer-events:auto;transition:.3s;box-shadow:0 0 40px var(--c);background:rgba(0,255,255,.05)}
.mic:hover{transform:translateX(-50%) scale(1.1);box-shadow:0 0 70px var(--c)}
.mic.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 40px var(--c)}50%{box-shadow:0 0 90px var(--c2)}}

.chat{bottom:190px;left:50%;transform:translateX(-50%);width:90%;max-width:650px;background:rgba(0,0,0,.8);border:1px solid var(--c);border-radius:15px;padding:18px;max-height:250px;overflow-y:auto;backdrop-filter:blur(15px);pointer-events:auto;scroll-behavior:smooth}
.msg{margin:10px 0;font-size:15px;line-height:1.6;animation:fadeIn.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}

.inputArea{display:flex;gap:8px;margin-top:10px}
.inputArea input{flex:1;background:#001a1f;border:2px solid var(--c);color:var(--c);padding:14px;border-radius:12px;outline:none;font-size:15px;transition:.3s}
.inputArea input:focus{box-shadow:0 0 15px var(--c)}
.inputArea button{width:50px;height:50px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:20px;font-weight:900;transition:.3s}
.inputArea button:hover{transform:scale(1.1)}
.anexoBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}

/* SCROLL CUSTOM */
.chat::-webkit-scrollbar,.menu::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb,.menu::-webkit-scrollbar-thumb{background:var(--c);border-radius:10px}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div class="ui logo">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui modo" id="modoUsuario">MODO: VISITANTE</div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>

<div class="ui menu" id="menu">
  <h3>⚡ INTERAÇÕES REAIS</h3>
  <button onclick="executar('abrir app')">1. Abrir APP KORVIL</button>
  <button onclick="executar('buscar inteligência artificial')">2. Pesquisar no Google</button>
  <button onclick="executar('calcular 15% de 2000')">3. Calcular na hora</button>

  <h3>🤖 IA - 9 GAVETAS</h3>
  <button onclick="executar('cria post para instagram')">Criar Conteúdo</button>
  <button onclick="executar('copiar texto')">Copiar Texto</button>
  <button onclick="executar('resumir este texto')">Resumir Texto</button>
  <button onclick="executar('gerar 5 ideias')">Gerar Ideias</button>
  <button onclick="executar('traduzir para inglês')">Traduzir</button>

  <h3>💾 MEMÓRIA</h3>
  <button onclick="executar('lembre que tenho reunião às 15h')">Salvar Memória</button>
  <button onclick="executar('o que você lembra')">Buscar Memória</button>
  <button onclick="executar('estatísticas')">Estatísticas</button>

  <h3>⚙️ SISTEMA</h3>
  <button onclick="executar('status do sistema')">Status</button>
  <button onclick="executar('horas')">Ver Horas</button>
  <button onclick="executar('data')">Ver Data</button>
  <button onclick="executar('tocar música')">Tocar Música</button>
  <button onclick="executar('limpar memória')" style="border-color:red;color:#ff5555">Limpar Memória</button>
</div>

<div class="ui chat" id="chat"></div>
<div class="ui status" id="status">Clique e diga "K-AI"</div>

<div class="ui" style="bottom:30px;left:50%;transform:translateX(-50%);width:90%;max-width:650px">
  <div class="inputArea">
    <button class="anexoBtn" onclick="anexarArquivo()">📎</button>
    <input type="text" id="userInput" placeholder="Digite ou fale com K-AI...">
    <button id="micBtn">🎙️</button>
    <button onclick="enviarTexto()">➤</button>
  </div>
</div>

<audio id="bgMusic" loop></audio>
<script>
// ===== 0. CONFIG + MEMÓRIA MELHORADA =====
const KAI_CONFIG = {
  MODO: localStorage.getItem('kai_modo') || 'USER',
  SENHA_ADMIN: 'KORVIL2026',
  NOME_USER: localStorage.getItem('kai_nome') || 'Chefe',
  VERSAO: '2.0'
}

const KAI_MEMORY = {
  dados: JSON.parse(localStorage.getItem('kai_memoria')) || {historico:[], memorias:[]},
  salvar(){ localStorage.setItem('kai_memoria', JSON.stringify(this.dados)); },
  salvarMemoria(texto){ this.dados.memorias.push({texto, data:new Date().toLocaleString()}); this.salvar(); return `Salvei na memória: ${texto}`; },
  buscar(termo){ const res = this.dados.memorias.filter(m=>m.texto.toLowerCase().includes(termo.toLowerCase())); return res.length? `Encontrei: "${res[res.length-1].texto}"` : "Não encontrei isso na memória"; },
  estatisticas(){ return `Conversas: ${this.dados.historico.length} | Memórias: ${this.dados.memorias.length}`; }
}

function verificarPermissao(cmd){
  if(KAI_CONFIG.MODO === 'ADMIN') return true;
  const comandosUser = ['olá','k-ai','horas','data','status','música','tocar','parar','abrir app','piada','corvo'];
  return comandosUser.some(c => cmd.includes(c));
}

// Badge Modo
const modoBadge = document.getElementById('modoUsuario');
function atualizarBadge(){
  if(KAI_CONFIG.MODO === 'ADMIN'){ modoBadge.innerText = 'MODO: ADMINISTRADOR'; modoBadge.classList.add('admin'); }
  else{ modoBadge.innerText = 'MODO: VISITANTE'; modoBadge.classList.remove('admin'); }
}
atualizarBadge();
modoBadge.onclick = ()=>{ if(KAI_CONFIG.MODO!== 'ADMIN'){ const senha = prompt('Senha Administrador KORVIL:'); if(senha === KAI_CONFIG.SENHA_ADMIN){ localStorage.setItem('kai_modo', 'ADMIN'); KAI_CONFIG.MODO = 'ADMIN'; atualizarBadge(); falar('Modo Administrador ativado'); }else alert('Senha incorreta'); }}

// ===== 1. CENA 3D OTIMIZADA =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const geometry = new THREE.IcosahedronGeometry(1.8, 2);
const material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6, shininess:120, transparent:true, opacity:0.9});
const nucleo = new THREE.Mesh(geometry, material);
scene.add(nucleo);

const ringGeo = new THREE.TorusGeometry(2.5, 0.1, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({color:0x00FFFF, wireframe:true});
const ring1 = new THREE.Mesh(ringGeo, ringMat);
const ring2 = new THREE.Mesh(ringGeo, ringMat); ring2.rotation.x = Math.PI/2;
scene.add(ring1, ring2);

const light1 = new THREE.PointLight(0x00FFFF, 2.5, 50); light1.position.set(5,5,5); scene.add(light1);
const light2 = new THREE.AmbientLight(0x00FFFF, 0.3); scene.add(light2);
camera.position.z = 6;

const particles = new THREE.Points(
  new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(Array(3000).fill().map(()=> (Math.random()-0.5)*25), 3)),
  new THREE.PointsMaterial({color:0x00FFFF, size:0.02})
);
scene.add(particles);

function animate(){
  requestAnimationFrame(animate);
  nucleo.rotation.x += 0.008;
  nucleo.rotation.y += 0.015;
  ring1.rotation.y += 0.02;
  ring2.rotation.z += 0.015;
  particles.rotation.y += 0.0008;
  material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.003)*0.3;
  renderer.render(scene, camera);
}
animate();
document.getElementById('canvas3d').onclick = toggleMenu;

// ===== 2. VOZ + RECONHECIMENTO =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognition, isListening = false;

const micBtn = document.getElementById('micBtn');
const chat = document.getElementById('chat');
const status = document.getElementById('status');

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onstart = ()=>{ isListening = true; micBtn.classList.add('listening'); status.innerText = 'K-AI ouvindo...'; pulsarNucleo(); }
  recognition.onend = ()=>{ isListening = false; micBtn.classList.remove('listening'); status.innerText = 'Aguardando comando...'; if(KAI_CONFIG.MODO) setTimeout(()=>recognition.start(), 800); }
  recognition.onerror = ()=>{ status.innerText = 'Erro no microfone'; }
  recognition.onresult = (e)=>{ const cmd = e.results[e.results.length-1][0].transcript.toLowerCase(); addMsg('user', cmd); processarComando(cmd); }
}

micBtn.onclick = ()=>{ if(!isListening && recognition) recognition.start(); else if(recognition) recognition.stop(); }

function addMsg(tipo, texto){
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  KAI_MEMORY.dados.historico.push({tipo, texto, data: new Date().toISOString()});
  if(KAI_MEMORY.dados.historico.length > 300) KAI_MEMORY.dados.historico.shift();
  KAI_MEMORY.salvar();
}

function falar(texto){
  addMsg('kai', texto);
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR';
  utter.rate = 0.95;
  utter.pitch = 0.6;
  utter.onstart = pulsarNucleo;
  synth.speak(utter);
}

function pulsarNucleo(){ material.emissiveIntensity = 1.5; setTimeout(()=>{ material.emissiveIntensity = 0.6 }, 300); }

// ===== 3. CÉREBRO + 9 GAVETAS + 3 INTERAÇÕES REAIS =====
function processarComando(cmd){
  if(!verificarPermissao(cmd) && KAI_CONFIG.MODO === 'USER'){ falar('Acesso negado. Comando exclusivo do Administrador KORVIL.'); return; }

  // INTERAÇÃO REAL 1: ABRIR SISTEMAS
  if(cmd.includes('abrir app') || cmd.includes('abrir korvil')){
    window.open('https://korvilp-sudo.github.io/korvil-app/app.html','_blank');
    falar('Abrindo aplicativo KORVIL agora Chefe');
  }

  // INTERAÇÃO REAL 2: PESQUISAR WEB
  else if(cmd.includes('buscar') || cmd.includes('pesquisar') || cmd.includes('google')){
    const termo = cmd.replace('buscar', '').replace('pesquisar', '').replace('google', '').trim();
    if(termo) window.open(`https://www.google.com/search?q=${encodeURIComponent(termo)}`, '_blank');
    falar(`Pesquisando ${termo} para você Chefe`);
  }

  // INTERAÇÃO REAL 3: CALCULAR
  else if(cmd.includes('calcular') || cmd.includes('%') || cmd.includes('somar') || cmd.includes('dividir') || cmd.includes('vezes') || cmd.includes('menos') || cmd.includes('mais')){
    const conta = cmd.replace('calcular', '').replace('quanto é', '').replace('vezes', '*').replace('mais', '+').replace('menos', '-');
    try{
      const resultado = eval(conta.replace('%', '/100*'));
      falar(`O resultado é ${resultado}`);
    }catch{ falar("Não consegui calcular isso Chefe"); }
  }

  // GAVETA CRIA
  else if(cmd.includes('cria') || cmd.includes('post') || cmd.includes('ideia')){
    falar('Criando conteúdo para você Chefe. Sugestão: Post KORVIL com arte cyber, legenda persuasiva e CTA para WhatsApp');
  }

  // GAVETA COPIA/RESUMO/TRADUZ
  else if(cmd.includes('copia')){ navigator.clipboard.writeText('Texto copiado pelo K-AI'); falar('Copiei para a área de transferência Chefe'); }
  else if(cmd.includes('resumir')){ falar('Resumindo: Conteúdo sintetizado em 3 tópicos principais'); }
  else if(cmd.includes('traduzir')){ falar('Tradução: Converting to English for you'); }

  // GAVETA MEMÓRIA
  else if(cmd.includes('lembre')){ const res = KAI_MEMORY.salvarMemoria(cmd.replace('lembre', '')); falar(res); }
  else if(cmd.includes('o que você lembra')){ const res = KAI_MEMORY.buscar(cmd.replace('o que você lembra', '')); falar(res); }
  else if(cmd.includes('estatísticas')){ falar(KAI_MEMORY.estatisticas()); }
  else if(cmd.includes('limpar memória')){ localStorage.removeItem('kai_memoria'); KAI_MEMORY.dados = {historico:[], memorias:[]}; falar('Memória limpa Chefe'); }

  // COMANDOS BÁSICOS
  else if(cmd.includes('olá') || cmd.includes('k-ai')){ falar(`Olá ${KAI_CONFIG.NOME_USER}. K-AI v${KAI_CONFIG.VERSAO} online. Como posso auxiliar?`); }
  else if(cmd.includes('horas') || cmd.includes('hora')){ falar('Agora são ' + new Date().toLocaleTimeString('pt-BR')); }
  else if(cmd.includes('data') || cmd.includes('dia')){ falar('Hoje é ' + new Date().toLocaleDateString('pt-BR')); }
  else if(cmd.includes('status') || cmd.includes('sistema')){ falar(KAI_CONFIG.MODO === 'ADMIN'? 'Modo Administrador. Todos sistemas KORVIL 100%' : 'Modo Visitante. Acesso limitado'); }
  else if(cmd.includes('música') || cmd.includes('tocar')){ tocarMusica(); falar('Ativando trilha KORVIL'); }
  else if(cmd.includes('parar música')){ pararMusica(); falar('Música pausada'); }
  else if(cmd.includes('corvo')){ falar('O Corvo é o mascote oficial KORVIL. Vigilante, inteligente e leal. Igual a mim.'); }
  else if(cmd.includes('piada')){ falar('Por que o K-AI não dorme? Porque ele faz backup dos sonhos dos usuários'); }
  else{ falar('Comando não reconhecido. Diga "lista de comandos" para ver tudo'); }
}

// ===== 4. FUNÇÕES UI =====
function toggleMenu(){ const menu = document.getElementById('menu'); menu.style.display = menu.style.display==='block'?'none':'block'; }
function executar(cmd){ toggleMenu(); addMsg('user', cmd); processarComando(cmd); }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value.trim()) return; addMsg('user', input.value); processarComando(input.value); input.value = ""; }
function anexarArquivo(){ const input = document.createElement('input'); input.type = 'file'; input.onchange = (e)=>{ addMsg('user', `📎 ${e.target.files[0].name}`); falar('Arquivo recebido. Posso analisar no modo Admin'); } input.click(); }
function tocarMusica(){ bgMusic.src = 'https://cdn.pixabay.com/download/audio/2023/01/03/audio_2b12e3e1c8.mp3'; bgMusic.volume = 0.25; bgMusic.play(); }
function pararMusica(){ bgMusic.pause(); }

document.getElementById('userInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') enviarTexto(); });

// INICIAR
setTimeout(()=>{ falar(`K-AI v${KAI_CONFIG.VERSAO} inicializado. Bem-vindo ${KAI_CONFIG.NOME_USER}`); if(recognition) recognition.start(); }, 1500);
window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
