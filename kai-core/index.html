<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00f5ff;--c2:#00d4ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;overflow:hidden;color:var(--c)}
#canvas3d{position:fixed;inset:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.logo{top:15px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:900;letter-spacing:3px;text-shadow:0 0 15px var(--c);text-align:center}
.menuBtn{top:15px;left:15px;width:45px;height:45px;border:2px solid var(--c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;pointer-events:auto;background:rgba(0,245,255,.1)}
.menu{top:70px;left:15px;width:300px;max-height:75vh;overflow-y:auto;background:rgba(0,0,0,.95);border:2px solid var(--c);border-radius:12px;padding:12px;display:none;pointer-events:auto;backdrop-filter:blur(10px)}
.menu h3{color:var(--c2);margin:8px 0 4px;font-size:13px}
.menu button{width:100%;background:transparent;border:1px solid #222;color:var(--c);padding:10px;margin:3px 0;border-radius:8px;text-align:left;cursor:pointer;font-size:13px;font-weight:700}
.menu button:active{background:var(--c);color:#000}
.chatBox{bottom:0;left:0;width:100%;background:rgba(0,0,0,.9);border-top:2px solid var(--c);padding:10px;pointer-events:auto}
.chat{max-height:160px;overflow-y:auto;padding:8px}
.msg{margin:6px 0;font-size:14px;line-height:1.4}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}
.inputArea{display:flex;gap:6px;margin-top:6px}
.inputArea input{flex:1;background:#111;border:2px solid var(--c);color:var(--c);padding:12px;border-radius:10px;outline:none;font-size:14px}
.inputArea button{width:48px;height:48px;background:var(--c);color:#000;border:none;border-radius:10px;cursor:pointer;font-size:18px;font-weight:900}
.micBtn{background:transparent!important; border:2px solid var(--c)!important; color:var(--c)!important}
.micBtn.listening{animation:pulse 0.8s infinite;background:rgba(0,245,255,.2)!important}
@keyframes pulse{0%,100%{box-shadow:0 0 15px var(--c)}50%{box-shadow:0 0 30px var(--c2)}}
.badge{top:15px;right:15px;background:var(--c);color:#000;padding:4px 10px;border-radius:15px;font-size:10px;font-weight:900}
.autoListen{bottom:110px;right:15px;font-size:10px;background:rgba(0,255,0,.2);padding:3px 8px;border-radius:8px}
.fecharBtn{top:15px;right:80px;width:45px;height:45px;border:2px solid #f00;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;pointer-events:auto;background:rgba(255,0,0,.1);color:#f00}
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div class="ui badge" id="badgeModo">MODO CHEFE</div>
<div class="ui autoListen" id="autoListen">Ouvindo...</div>
<div class="ui logo">K-AI</div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>
<div class="ui fecharBtn" onclick="window.parent.fecharKAI()">X</div>

<div class="ui menu" id="menu">
  <h3>NAVEGAR KORVIL</h3>
  <button onclick="executar('vai para 5')">5. CENTRAL</button>
  <button onclick="executar('vai para 1')">1. SISTEMA K</button>
  <button onclick="executar('vai para 2')">2. K-TP</button>
  <button onclick="executar('vai para 3')">3. K-AFORTUNADO</button>
  <button onclick="executar('vai para 4')">4. K-ALMA</button>
  <button onclick="executar('vai para 6')">6. DESENVOLVIMENTO HUMANO</button>
  <button onclick="executar('vai para 7')">7. NEGOCIOS</button>
  <button onclick="executar('vai para 8')">8. SERVICOS</button>

  <h3>CRIAR</h3>
  <button onclick="executar('criar post')">Criar Post</button>
  <button onclick="executar('criar roteiro')">Criar Roteiro</button>
  <button onclick="executar('criar imagem')">Criar Imagem</button>

  <h3>COPIAR</h3>
  <button onclick="executar('copiar tudo')">Copiar Tudo</button>
  <button onclick="executar('resumir isso')">Resumir</button>
  <button onclick="executar('copiar emails')">Copiar Emails</button>

  <h3>SISTEMA</h3>
  <button onclick="executar('que horas são')">Que horas são</button>
  <button onclick="executar('salvar memória')">Salvar Memória</button>
  <button onclick="executar('parar de ouvir')">Parar de ouvir</button>
  <button onclick="executar('voltar a ouvir')">Voltar a ouvir</button>
</div>

<div class="ui chatBox">
  <div class="chat" id="chat"></div>
  <div class="inputArea">
    <input type="text" id="userInput" placeholder="Fale com K-AI..." onkeydown="if(event.key==='Enter') enviarTexto()">
    <button id="btnAnexo" onclick="anexarArquivo()">📎</button>
    <button class="micBtn" id="micBtn" onclick="toggleMic()">🎙️</button>
    <button onclick="enviarTexto()">➤</button>
  </div>
</div>

<!-- CARREGA AS 3 GAVETAS -->
<script src="actions/navega.js"></script>
<script src="actions/copia.js"></script>
<script src="actions/cria.js"></script>
<script src="actions/sistema.js"></script>

<script>
const KAI_CONFIG = { modo: "ilimitado", autoOuvir: true, nomeUsuario: "Chefe" }
let recognition;

// ===== CENA 3D CORVO =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
const nucleo = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 2), new THREE.MeshPhongMaterial({color:0x00f5ff, emissive:0x00f5ff, emissiveIntensity:0.7, transparent:true, opacity:0.9}));
scene.add(nucleo);
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.08, 16, 100), new THREE.MeshBasicMaterial({color:0x00f5ff, wireframe:true}));
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.08, 16, 100), new THREE.MeshBasicMaterial({color:0x00f5ff, wireframe:true})); ring2.rotation.x = Math.PI/2;
scene.add(ring1, ring2); scene.add(new THREE.PointLight(0x00f5ff, 2, 50).position.set(5,5,5)); camera.position.z = 5;
function animate(){ requestAnimationFrame(animate); nucleo.rotation.x += 0.01; nucleo.rotation.y += 0.018; ring1.rotation.y += 0.025; ring2.rotation.z += 0.018; renderer.render(scene, camera); }
animate(); window.pulsarCore = () => { nucleo.material.emissiveIntensity = 1.5; setTimeout(()=>nucleo.material.emissiveIntensity=0.7,250) }

// ===== VOZ TEMPO REAL =====
const chat = document.getElementById('chat');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function iniciarReconhecimento(){
  if(!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onresult = (e)=>{
    const cmd = e.results[e.results.length-1][0].transcript;
    if(cmd.length > 2){ addMsg('user',cmd); processarComando(cmd); }
  }
  recognition.onend = ()=>{ if(KAI_CONFIG.autoOuvir) recognition.start(); }
  recognition.start();
}

function toggleMic(){
  KAI_CONFIG.autoOuvir =!KAI_CONFIG.autoOuvir;
  document.getElementById('autoListen').style.display = KAI_CONFIG.autoOuvir? 'block':'none';
  if(!KAI_CONFIG.autoOuvir && recognition) recognition.stop();
  else if(KAI_CONFIG.autoOuvir && recognition) recognition.start();
}

function toggleMenu(){ document.getElementById('menu').style.display = document.getElementById('menu').style.display==='block'?'none':'block'; }

function addMsg(tipo, texto){
  const div = document.createElement('div'); div.className = 'msg ' + tipo;
  div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

function falar(texto){
  addMsg('kai', texto);
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR'; utter.pitch = 0.6; utter.rate = 0.95; // VOZ CORVO GRAVE
  utter.onstart = pulsarCore; speechSynthesis.speak(utter);
}

function enviarTexto(){
  const input = document.getElementById('userInput');
  if(!input.value) return;
  addMsg('user', input.value);
  processarComando(input.value);
  input.value = "";
}

function executar(cmd){
  toggleMenu(); addMsg('user', cmd); processarComando(cmd);
}

function anexarArquivo(){
  const input = document.createElement('input'); input.type = 'file';
  input.onchange = async (e)=>{
    const file = e.target.files[0];
    addMsg('user', `Arquivo: ${file.name}`);
    const res = await Copia.lerArquivo(file);
    falar(res);
  }
  input.click();
}

// ===== CÉREBRO PRINCIPAL COM AS 4 GAVETAS =====
async function processarComando(cmdOriginal){
  const cmd = cmdOriginal.toLowerCase(); let resposta = "";

  // ATALHOS SISTEMA
  if(cmd.includes("parar de ouvir")) { KAI_CONFIG.autoOuvir=false; recognition.stop(); resposta="Modo manual ativado Chefe"; }
  else if(cmd.includes("voltar a ouvir")) { KAI_CONFIG.autoOuvir=true; recognition.start(); resposta="Voltando a ouvir"; }

  // CHAMADAS DAS GAVETAS - ORDEM IMPORTA
  else if (cmd.includes("vai") || cmd.includes("abrir")) { resposta = Navega.ir(cmd); }
  else if (cmd.includes("cria")) { resposta = await Cria.executar(cmd); }
  else if (cmd.includes("copia") || cmd.includes("resuma") || cmd.includes("analisa") || cmd.includes("traduz")) { resposta = await Copia.executar(cmd); }
  else if (cmd.includes("hora") || cmd.includes("salvar") || cmd.includes("memória") || cmd.includes("data") || cmd.includes("status")) { resposta = await Sistema.executar(cmd); }

  else { resposta = `Comando recebido: "${cmdOriginal}". Tente: criar post, copiar tudo, que horas são`; }

  falar(resposta);
}

// INICIAR
setTimeout(()=>{
  Sistema.carregar();
  iniciarReconhecimento();
  falar(`K-AI online. Modo Chefe ativo. Pronto para comandos.`);
}, 800);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
