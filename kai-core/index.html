<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000;overflow:hidden;color:var(--c)}

#canvas3d{position:fixed;inset:0;z-index:0;cursor:pointer;pointer-events:none} /* CORRIGIDO: Não pega clique */
.ui{position:fixed;z-index:10;pointer-events:none}
.logo{top:20px;left:50%;transform:translateX(-50%);font-size:clamp(20px, 6vw, 32px);font-weight:900;letter-spacing:4px;text-shadow:0 0 25px var(--c)}
.logo span{color:var(--c2);font-size:clamp(10px, 3vw, 14px);letter-spacing:2px;display:block;text-align:center;margin-top:5px}
.modo{top:20px;right:15px;font-size:11px;font-weight:700;padding:6px 12px;border:1px solid var(--c);border-radius:20px;background:rgba(0,255,255,.1);pointer-events:auto;cursor:pointer}
.modo.admin{border-color:#00ff88; color:#00ff88; box-shadow:0 0 15px #00ff88;}
.status{bottom:25px;left:50%;transform:translateX(-50%);font-size:13px;text-align:center;background:rgba(0,0,0,.8);padding:8px 16px;border-radius:20px;border:1px solid var(--c);max-width:90%}

.menuBtn{top:20px;left:15px;width:45px;height:45px;border:2px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;pointer-events:auto;background:rgba(0,255,255,.1)}
.menu{top:75px;left:15px;width:calc(100% - 30px);max-width:340px;max-height:70vh;overflow-y:auto;background:rgba(0,10,20,.98);border:2px solid var(--c);border-radius:15px;padding:15px;display:none;pointer-events:auto;backdrop-filter:blur(15px)}
.menu h3{color:var(--c2);margin:10px 0 5px;font-size:12px}
.menu button{width:100%;background:rgba(0,255,255,.05);border:1px solid #00333a;color:var(--c);padding:14px;margin:5px 0;border-radius:10px;text-align:left;cursor:pointer;font-size:14px;font-weight:700}

.mic{bottom:80px;left:50%;transform:translateX(-50%);width:80px;height:80px;border:3px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;pointer-events:auto;transition:.3s;box-shadow:0 0 40px var(--c);background:rgba(0,255,255,.1)}
.mic.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 40px var(--c)}50%{box-shadow:0 0 90px var(--c2)}}

.chat{bottom:170px;left:50%;transform:translateX(-50%);width:95%;max-width:650px;background:rgba(0,0,0,.85);border:1px solid var(--c);border-radius:15px;padding:15px;max-height:35vh;overflow-y:auto;backdrop-filter:blur(15px);pointer-events:auto}
.msg{margin:8px 0;font-size:14px;line-height:1.5}
.msg.user{color:var(--c2);text-align:right}
.msg.kai{color:var(--c)}

.inputArea{bottom:20px;left:50%;transform:translateX(-50%);width:95%;max-width:650px;display:flex;gap:8px;position:fixed;pointer-events:auto}
.inputArea input{flex:1;background:#001a1f;border:2px solid var(--c);color:var(--c);padding:12px;border-radius:12px;outline:none;font-size:15px}
.inputArea input:focus{box-shadow:0 0 0 2px var(--c);background:#001a1f} /* CORRIGIDO: Não fica azul */
.inputArea button{width:45px;height:45px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:18px;font-weight:900}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div class="ui logo">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui modo" id="modoUsuario">MODO: VISITANTE</div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>

<div class="ui menu" id="menu">
  <h3>INTERAÇÕES REAIS</h3>
  <button onclick="executar('abrir app')">Abrir APP KORVIL</button>
  <button onclick="executar('buscar marketing digital')">Pesquisar Google</button>
  <button onclick="executar('calcular 15% de 2000')">Calcular</button>
  <h3>SISTEMA</h3>
  <button onclick="executar('status')">Status</button>
  <button onclick="executar('limpar memória')">Limpar Memória</button>
</div>

<div class="ui chat" id="chat"></div>
<div class="ui status" id="status">Toque no mic e diga "K-AI"</div>

<div class="inputArea">
  <input type="text" id="userInput" placeholder="Digite ou fale com K-AI...">
  <button id="micBtn">🎙️</button>
  <button onclick="enviarTexto()">➤</button>
</div>

<audio id="bgMusic" loop></audio>
<script src="kai-core.js"></script>
<script>
// ===== CONFIG =====
const KAI_CONFIG = {
  MODO: localStorage.getItem('kai_modo') || 'USER',
  SENHA_ADMIN: 'KORVIL2026',
  NOME_USER: 'Chefe',
  palavraAtivacao: 'k-ai'
}

const KAI_MEMORY = {
  dados: JSON.parse(localStorage.getItem('kai_memoria')) || {historico:[], memorias:[]},
  salvar(){ localStorage.setItem('kai_memoria', JSON.stringify(this.dados)); },
  salvarMemoria(texto){ this.dados.memorias.push({texto}); this.salvar(); return `Salvei: ${texto}`; },
  buscar(termo){ const res = this.dados.memorias.filter(m=>m.texto.includes(termo)); return res.length? `Lembro: ${res[0].texto}` : "Não lembro"; }
}

const modoBadge = document.getElementById('modoUsuario');
if(KAI_CONFIG.MODO === 'ADMIN'){ modoBadge.innerText = 'MODO: ADMINISTRADOR'; modoBadge.classList.add('admin'); }

// ===== CENA 3D =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
const geometry = new THREE.IcosahedronGeometry(1.8, 2);
const material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6});
const nucleo = new THREE.Mesh(geometry, material); scene.add(nucleo);
const light1 = new THREE.PointLight(0x00FFFF, 2.5, 50); light1.position.set(5,5,5); scene.add(light1);
camera.position.z = 6;
function animate(){ requestAnimationFrame(animate); nucleo.rotation.y += 0.015; material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.003)*0.2; renderer.render(scene, camera); }
animate();
window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// ===== VOZ =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognition, isListening = false, manualStop = false, ultimaFala = 0;

const micBtn = document.getElementById('micBtn');
const chat = document.getElementById('chat');
const status = document.getElementById('status');

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;

  recognition.onstart = ()=>{ isListening = true; manualStop = false; micBtn.classList.add('listening'); status.innerText = '🔵 Ouvindo...'; pulsarNucleo(); }
  recognition.onend = ()=>{ isListening = false; micBtn.classList.remove('listening'); status.innerText = 'Toque no mic'; }
  recognition.onresult = (e)=>{ 
    const cmd = e.results[0][0].transcript.toLowerCase();
    const agora = Date.now();
    if(agora - ultimaFala < 2000) return;
    ultimaFala = agora;
    
    if(cmd.includes(KAI_CONFIG.palavraAtivacao)){
      const comandoLimpo = cmd.replace(KAI_CONFIG.palavraAtivacao, '').trim();
      addMsg('user', comandoLimpo);
      processarComando(comandoLimpo);
    } else { falar(`Diga "${KAI_CONFIG.palavraAtivacao}" antes`); }
  }
}

micBtn.onclick = ()=>{ if(!isListening && recognition) recognition.start(); else if(recognition){ manualStop = true; recognition.stop(); }

function addMsg(tipo, texto){
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  div.innerHTML = tipo==='user'? `<b>Você:</b> ${texto}` : `<b>K-AI:</b> ${texto}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  KAI_MEMORY.dados.historico.push({tipo, texto}); KAI_MEMORY.salvar();
}

function falar(texto){
  addMsg('kai', texto);
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR';
  utter.rate = 0.95;
  utter.pitch = 0.6;
  utter.onstart = pulsarNucleo;
  synth.speak(utter);
}

function pulsarNucleo(){ material.emissiveIntensity = 1.5; setTimeout(()=>{ material.emissiveIntensity = 0.6 }, 300); }

// ===== CÉREBRO =====
function processarComando(cmd){
  const resposta = executarTodasActions(cmd);
  falar(resposta);
}

function toggleMenu(){ const menu = document.getElementById('menu'); menu.style.display = menu.style.display==='block'?'none':'block'; }
function executar(cmd){ toggleMenu(); addMsg('user', cmd); processarComando(cmd); }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value.trim()) return; addMsg('user', input.value); processarComando(input.value); input.value = ""; }

document.getElementById('userInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') enviarTexto(); });

setTimeout(()=>{ falar(`K-AI v2.6 online. Bem-vindo ${KAI_CONFIG.NOME_USER}`); }, 1500);
</script>
</body>
</html>
