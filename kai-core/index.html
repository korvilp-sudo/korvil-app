<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K-AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;overflow:hidden;background:#000;color:#fff;font-family:Roboto,sans-serif}

/* TELA DE CELULAR REAL */
.phone{width:100%;height:100%;background:#0b141a;position:relative;display:flex;flex-direction:column}

/* BARRA DE STATUS */
.status{height:28px;background:#000;display:flex;justify-content:space-between;align-items:center;padding:0 12px;font-size:13px;font-weight:500}
.status span{display:flex;gap:4px}

/* PAINEL ARRASTAVEL ANDROID */
#notiPanel{position:absolute;top:-400px;left:0;width:100%;height:400px;background:#1f2c33;z-index:100;transition:top.3s;box-shadow:0 10px 20px rgba(0,0,0,.6)}
#notiPanel.open{top:28px}
#notiPanel.handle{width:40px;height:4px;background:#555;border-radius:2px;margin:8px auto}
.shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:20px}
.shortcut{text-align:center;font-size:11px}
.shortcut.btn{width:56px;height:56px;background:#2a3942;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:24px}
.shortcut.btn.active{background:#00FFFF;color:#000}
.notis{padding:0 15px;max-height:200px;overflow-y:auto}
.noti{background:#2a3942;padding:12px;border-radius:8px;margin-bottom:8px;font-size:14px}

/* TOPO DO CHAT */
.header{height:60px;background:#202c33;display:flex;align-items:center;padding:0 12px;gap:12px;border-bottom:1px solid #2a3942}
.header.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#00FFFF,#A8FFE6);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:18px}
.header.name{flex:1;font-size:16px;font-weight:500}
.header.name small{color:#8696a0;font-size:12px}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:15px;background:#0b141a;position:relative}
#canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.1;pointer-events:none}
.bubble{max-width:80%;padding:8px 12px;border-radius:7.5px;margin-bottom:8px;font-size:15px;line-height:1.4;position:relative;z-index:2}
.bubble.me{background:#005c4b;align-self:flex-end;margin-left:auto;border-radius:7.5px 0 7.5px 7.5px}
.bubble.kai{background:#1f2c33;align-self:flex-start;border-radius:0 7.5px 7.5px 7.5px}
.bubble.time{font-size:11px;color:#8696a0;text-align:right;margin-top:4px}

/* BARRA INPUT */
.footer{height:68px;background:#202c33;display:flex;align-items:center;padding:0 8px;gap:8px}
.footer input{flex:1;height:46px;background:#2a3942;border:none;border-radius:23px;padding:0 16px;color:#fff;font-size:15px;outline:none}
.footer.btn{width:48px;height:48px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}
.footer.btn.rec{background:#ff3b30}
</style>
</head>
<body>
<div class="phone">

  <!-- STATUS BAR -->
  <div class="status" id="statusBar">
    <div id="hora">16:10</div>
    <span>4G 🔋 90%</span>
  </div>

  <!-- PAINEL NOTIFICAÇÕES -->
  <div id="notiPanel">
    <div class="handle"></div>
    <div class="shortcuts">
      <div class="shortcut"><div class="btn" onclick="toggleBtn(this,'mic')">🎤</div>Voz</div>
      <div class="shortcut"><div class="btn" onclick="toggleBtn(this,'app')">🚀</div>App</div>
      <div class="shortcut"><div class="btn" onclick="toggleBtn(this,'google')">🔍</div>Google</div>
      <div class="shortcut"><div class="btn" onclick="limparMem()">🧠</div>Memória</div>
    </div>
    <div class="notis" id="notis"></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">K</div>
    <div class="name">K-AI<br><small id="status">online</small></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <canvas id="canvas3d"></canvas>
  </div>

  <!-- INPUT -->
  <div class="footer">
    <input type="text" id="input" placeholder="Mensagem">
    <div class="btn" id="mic">🎤</div>
    <div class="btn" onclick="send()">➤</div>
  </div>

</div>

<script>
// ===== ESTADO =====
let modo = 'USER';
let memoria = JSON.parse(localStorage.getItem('kai')) || {hist:[], mems:[]};

// ===== 3D FUNCIONANDO =====
try{
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight-128);
  const geo = new THREE.IcosahedronGeometry(2.5, 1);
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, wireframe:true});
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh); scene.add(new THREE.PointLight(0x00FFFF,2).position.set(3,3,3));
  camera.position.z = 6;
  function loop(){ requestAnimationFrame(loop); mesh.rotation.y += 0.01; renderer.render(scene,camera); }
  loop();
}catch(e){console.log("3D erro",e)}

// ===== ARRASTAR PAINEL =====
let startY = 0;
const panel = document.getElementById('notiPanel');
document.getElementById('statusBar').ontouchstart = e => startY = e.touches[0].clientY;
document.getElementById('statusBar').ontouchend = e => {
  if(e.changedTouches[0].clientY - startY > 50) panel.classList.add('open');
}
panel.ontouchend = e => {
  if(startY - e.changedTouches[0].clientY > 50) panel.classList.remove('open');
}
document.getElementById('statusBar').onclick = () => panel.classList.toggle('open');

// ===== FUNÇÕES QUE FUNCIONAM =====
function addNoti(txt){
  document.getElementById('notis').innerHTML = `<div class="noti">${txt}</div>` + document.getElementById('notis').innerHTML;
}
function addMsg(who, txt){
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  div.innerHTML = txt + `<div class="time">${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>`;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = 99999;
  memoria.hist.push({who,txt}); localStorage.setItem('kai',JSON.stringify(memoria));
}
function falar(txt){
  addMsg('kai',txt);
  speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
}
function processar(cmd){
  cmd = cmd.toLowerCase();
  if(cmd.includes('app')){ window.open('https://korvilp-sudo.github.io/korvil-app/app.html','_blank'); addNoti('🚀 App KORVIL aberto'); return 'Abrindo app KORVIL'; }
  if(cmd.includes('buscar')){ let q = cmd.replace('buscar',''); window.open('https://google.com/search?q='+q,'_blank'); addNoti('🔍 Pesquisando: '+q); return 'Pesquisando '+q; }
  if(cmd.includes('lembre')){ memoria.mems.push(cmd); localStorage.setItem('kai',JSON.stringify(memoria)); addNoti('🧠 Memória salva'); return 'Salvei na memória'; }
  if(cmd.includes('status')){ return `Tenho ${memoria.hist.length} conversas e ${memoria.mems.length} memórias`; }
  return 'Entendi: '+cmd;
}
function send(){
  const val = document.getElementById('input').value;
  if(!val) return;
  addMsg('me',val);
  falar(processar(val));
  document.getElementById('input').value='';
}
function toggleBtn(el, tipo){
  el.classList.toggle('active');
  if(tipo=='mic') document.getElementById('mic').click();
  if(tipo=='app') processar('abrir app');
  if(tipo=='google') processar('buscar korvil');
}
function limparMem(){
  localStorage.removeItem('kai'); memoria={hist:[],mems:[]}; 
  addNoti('🧠 Memória limpa'); falar('Memória limpa Chefe');
}

// ===== VOZ =====
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rec = new SR(); rec.lang='pt-BR';
  document.getElementById('mic').onclick = ()=>{
    document.getElementById('mic').classList.toggle('rec');
    document.getElementById('status').innerText = 'ouvindo...';
    rec.start();
    rec.onresult = e => {
      const txt = e.results[0][0].transcript;
      addMsg('me',txt); falar(processar(txt));
      document.getElementById('mic').classList.remove('rec');
      document.getElementById('status').innerText = 'online';
    }
  }
}

// ===== HORA REAL =====
setInterval(()=>{
  document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
},1000);

addMsg('kai','Olá Chefe. Arraste a barra de cima pra baixo');
addNoti('🔵 K-AI Iniciado');
</script>
</body>
</html>
