<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K-AI | KORVIL ARTIFICIAL INTELLIGENCE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body{background:#000;overflow:hidden;color:var(--c);height:100vh;width:100vw}

#canvas3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.ui{position:fixed;z-index:999;pointer-events:auto} /* FORÇEI PRA FICAR POR CIMA */

.logo{top:20px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:900;letter-spacing:4px;text-shadow:0 0 20px var(--c);text-align:center}
.logo span{color:var(--c2);font-size:11px;letter-spacing:2px;display:block;margin-top:3px}
.modo{top:20px;right:15px;font-size:10px;font-weight:700;padding:6px 10px;border:1px solid var(--c);border-radius:20px;background:rgba(0,255,255,.1);cursor:pointer}
.modo.admin{border-color:#00ff88; color:#00ff88;}

.menuBtn{top:15px;left:15px;width:40px;height:40px;border:2px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:rgba(0,0,0,.5)}
.menu{top:65px;left:15px;width:calc(100% - 30px);max-width:340px;max-height:60vh;overflow-y:auto;background:rgba(0,10,20,.98);border:2px solid var(--c);border-radius:15px;padding:12px;display:none;backdrop-filter:blur(10px)}
.menu h3{color:var(--c2);margin:10px 0 5px;font-size:12px}
.menu button{width:100%;background:rgba(0,255,255,.05);border:1px solid #00333a;color:var(--c);padding:12px;margin:4px 0;border-radius:10px;text-align:left;cursor:pointer;font-size:13px;font-weight:700}

.mic{bottom:90px;left:50%;transform:translateX(-50%);width:70px;height:70px;border:3px solid var(--c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;box-shadow:0 0 30px var(--c);background:rgba(0,255,255,.1)}
.mic.listening{animation:pulse 0.8s infinite;background:rgba(0,255,255,.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 30px var(--c)}50%{box-shadow:0 0 70px var(--c2)}}

.chat{display:none} /* ESCONDI CHAT NO MOBILE PRA NÃO TAMPA A TELA */

.inputArea{bottom:20px;left:50%;transform:translateX(-50%);width:95%;max-width:600px;display:flex;gap:6px}
.inputArea input{flex:1;background:#001a1f;border:2px solid var(--c);color:var(--c);padding:12px;border-radius:12px;outline:none;font-size:14px}
.inputArea input:focus{border-color:var(--c2);box-shadow:none;background:#001a1f} /* SEM AZUL */
.inputArea button{width:44px;height:44px;background:var(--c);color:#000;border:none;border-radius:12px;cursor:pointer;font-size:18px;font-weight:900}
.status{bottom:60px;left:50%;transform:translateX(-50%);font-size:12px;text-align:center;background:rgba(0,0,0,.8);padding:6px 12px;border-radius:20px;border:1px solid var(--c)}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div class="ui logo">K-AI<span>KORVIL ARTIFICIAL INTELLIGENCE</span></div>
<div class="ui modo" id="modoUsuario">MODO: VISITANTE</div>
<div class="ui menuBtn" onclick="toggleMenu()">☰</div>

<div class="ui menu" id="menu">
  <h3>INTERAÇÕES</h3>
  <button onclick="executar('abrir app')">Abrir APP KORVIL</button>
  <button onclick="executar('buscar marketing')">Pesquisar Google</button>
  <button onclick="executar('calcular 15% de 2000')">Calcular</button>
  <button onclick="executar('status')">Status</button>
  <button onclick="executar('limpar memória')">Limpar Memória</button>
</div>

<div class="ui status" id="status">Toque no mic</div>

<div class="ui inputArea">
  <input type="text" id="userInput" placeholder="Digite ou fale com K-AI...">
  <button id="micBtn">🎙️</button>
  <button onclick="enviarTexto()">➤</button>
</div>

<audio id="bgMusic" loop></audio>
<script src="kai-core.js"></script>
<script>
// ===== CONFIG =====
const KAI_CONFIG = {MODO: localStorage.getItem('kai_modo') || 'USER', SENHA_ADMIN: 'KORVIL2026', NOME_USER: 'Chefe', palavraAtivacao: 'k-ai'}
const KAI_MEMORY = {dados: JSON.parse(localStorage.getItem('kai_memoria')) || {historico:[], memorias:[]}, salvar(){localStorage.setItem('kai_memoria', JSON.stringify(this.dados));}, salvarMemoria(t){this.dados.memorias.push({t});this.salvar();return `Salvei: ${t}`;}, buscar(t){const r=this.dados.memorias.filter(m=>m.t.includes(t));return r.length?`Lembro: ${r[0].t}`:"Não lembro";}}

const modoBadge = document.getElementById('modoUsuario');
if(KAI_CONFIG.MODO === 'ADMIN'){ modoBadge.innerText = 'MODO: ADMIN'; modoBadge.classList.add('admin'); }

// ===== CENA 3D COM FALLBACK =====
let scene, camera, renderer, nucleo, material;
try{
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  material = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.6});
  nucleo = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 2), material); 
  scene.add(nucleo); scene.add(new THREE.PointLight(0x00FFFF, 2.5, 50).position.set(5,5,5)); camera.position.z = 6;
  function animate(){ requestAnimationFrame(animate); if(nucleo) nucleo.rotation.y += 0.015; renderer.render(scene, camera); }
  animate();
}catch(e){ console.log("3D falhou", e) }

window.addEventListener('resize', ()=>{ if(camera){camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);}});

// ===== VOZ =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognition, isListening = false;

const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR'; recognition.continuous = false;
  recognition.onstart = ()=>{isListening=true; micBtn.classList.add('listening'); status.innerText='🔵 Ouvindo...';}
  recognition.onend = ()=>{isListening=false; micBtn.classList.remove('listening'); status.innerText='Toque no mic';}
  recognition.onresult = (e)=>{ 
    const cmd = e.results[0][0].transcript.toLowerCase();
    if(cmd.includes(KAI_CONFIG.palavraAtivacao)){
      const comandoLimpo = cmd.replace(KAI_CONFIG.palavraAtivacao, '').trim();
      processarComando(comandoLimpo);
    } else { falar(`Diga "K-AI" antes`); }
  }
}

micBtn.onclick = ()=>{ if(!isListening && recognition) recognition.start(); else if(recognition) recognition.stop(); }

function falar(texto){
  if(synth.speaking) synth.cancel();
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR'; utter.rate = 0.95; utter.pitch = 0.6;
  utter.onstart = ()=>{ if(material) material.emissiveIntensity = 1.5; setTimeout(()=>{if(material)material.emissiveIntensity=0.6},300)}
  synth.speak(utter);
  status.innerText = 'K-AI: ' + texto;
}

// ===== CÉREBRO =====
function processarComando(cmd){ const resposta = executarTodasActions(cmd); falar(resposta); }
function toggleMenu(){ const menu = document.getElementById('menu'); menu.style.display = menu.style.display==='block'?'none':'block'; }
function executar(cmd){ toggleMenu(); processarComando(cmd); }
function enviarTexto(){ const input = document.getElementById('userInput'); if(!input.value.trim()) return; processarComando(input.value); input.value = ""; }
document.getElementById('userInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') enviarTexto(); });

setTimeout(()=>{ falar(`K-AI online Chefe`); }, 1000);
</script>
</body>
</html>
