<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-SOCIAL</title>
<style>
:root{--bg:#000;--bg2:#121212;--bg3:#262626;--c:#00f5ff;--text:#fff;--text2:#a8a8a8;--verde:#00a884;--roxo:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--bg);color:var(--text)}
.tela{display:none;height:100vh;flex-direction:column}
.tela.ativa{display:flex}

/* TOPO */
.topbar{padding:10px 16px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.topbar h1{color:var(--c);font-size:24px}

/* STORIES */
.stories{display:flex;gap:12px;padding:10px;overflow-x:auto;background:var(--bg2)}
.story{width:66px;text-align:center;cursor:pointer}
.story.ring{padding:2px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.story img{width:62px;height:62px;border-radius:50%;border:2px solid var(--bg2)}
.story p{font-size:11px;color:var(--text2);margin-top:4px}

/* FEED + REELS */
.feed{flex:1;overflow-y:auto}
.post{background:var(--bg2);margin-bottom:15px}
.post-header{display:flex;align-items:center;gap:10px;padding:10px}
.post-header img{width:32px;height:32px;border-radius:50%}
.post-header.btn-seguir{margin-left:auto;background:var(--c);color:#000;border:none;padding:5px 10px;border-radius:5px;font-weight:700;cursor:pointer}
.post-media{width:100%;max-height:600px;background:#000}
.post-media img,.post-media video{width:100%;object-fit:cover}
.post-actions{display:flex;gap:15px;padding:10px;font-size:24px}
.post-actions span{cursor:pointer}
.post-info{padding:0 10px 10px;font-size:14px}

/* REELS TIKTOK */
.reels{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory}
.reel{height:100vh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.reel video{height:100%;width:100%;object-fit:cover}
.reel-info{position:absolute;bottom:80px;left:10px}

/* CHAT */
.chat-lista{flex:1;overflow-y:auto}
.chat-item{display:flex;padding:12px;gap:12px;cursor:pointer}
.chat-item:hover{background:var(--bg2)}
.avatar{width:50px;height:50px;border-radius:50%}

/* PERFIL */
.perfil-topo{padding:20px}
.perfil-stats{display:flex;justify-content:space-around;text-align:center;margin:15px 0}
.perfil-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.perfil-grid img{width:100%;aspect-ratio:1;object-fit:cover}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid #333;position:sticky;bottom:0}
.nav-item{flex:1;text-align:center;padding:10px;font-size:24px;cursor:pointer}
.nav-item.ativo{color:var(--c)}

/* MODAL POSTAR */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;display:none;align-items:center;justify-content:center;z-index:99}
.modal.ativa{display:flex}
.modal-content{background:var(--bg2);padding:20px;border-radius:15px;width:90%;max-width:400px}
.modal input,.modal textarea{width:100%;padding:10px;margin:10px 0;background:var(--bg3);border:none;border-radius:8px;color:var(--text)}
</style>
</head>
<body>

<!-- TELA FEED -->
<div id="tela-feed" class="tela ativa">
  <div class="topbar"><h1>K-SOCIAL</h1><div>✈️ ❤️</div></div>
  <div class="stories" id="stories"></div>
  <div class="feed" id="feed"></div>
  <div class="bottom-nav">
    <div class="nav-item ativo" onclick="mudarTela('feed')">🏠</div>
    <div class="nav-item" onclick="mudarTela('reels')">🎬</div>
    <div class="nav-item" onclick="abrirModal()">➕</div>
    <div class="nav-item" onclick="mudarTela('chat')">💬</div>
    <div class="nav-item" onclick="mudarTela('perfil')">👤</div>
  </div>
</div>

<!-- TELA REELS -->
<div id="tela-reels" class="tela">
  <div class="reels" id="reels"></div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="mudarTela('feed')">🏠</div>
    <div class="nav-item ativo" onclick="mudarTela('reels')">🎬</div>
    <div class="nav-item" onclick="abrirModal()">➕</div>
    <div class="nav-item" onclick="mudarTela('chat')">💬</div>
    <div class="nav-item" onclick="mudarTela('perfil')">👤</div>
  </div>
</div>

<!-- TELA CHAT -->
<div id="tela-chat" class="tela">
  <div class="topbar"><h1>K-ONVERSA</h1></div>
  <div class="chat-lista" id="chat-lista"></div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="mudarTela('feed')">🏠</div>
    <div class="nav-item" onclick="mudarTela('reels')">🎬</div>
    <div class="nav-item" onclick="abrirModal()">➕</div>
    <div class="nav-item ativo" onclick="mudarTela('chat')">💬</div>
    <div class="nav-item" onclick="mudarTela('perfil')">👤</div>
  </div>
</div>

<!-- TELA PERFIL -->
<div id="tela-perfil" class="tela">
  <div class="topbar"><h1>korvil_oficial</h1></div>
  <div class="perfil-topo">
    <div style="display:flex;gap:20px;align-items:center">
      <img src="https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/logoprojetotransformacao.png" style="width:80px;height:80px;border-radius:50%">
      <div>
        <b>korvil_oficial</b><p style="color:var(--text2)">KORVIL - Projeto Transformação</p>
      </div>
    </div>
    <div class="perfil-stats">
      <div><b id="qtd-posts">3</b><br>Posts</div>
      <div><b id="qtd-seguidores">1.2k</b><br>Seguidores</div>
      <div><b id="qtd-seguindo">500</b><br>Seguindo</div>
    </div>
    <button onclick="alert('Editar Perfil')" style="width:100%;padding:8px;background:var(--bg3);border:none;color:var(--text);border-radius:8px">Editar Perfil</button>
  </div>
  <div class="perfil-grid" id="perfil-grid"></div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="mudarTela('feed')">🏠</div>
    <div class="nav-item" onclick="mudarTela('reels')">🎬</div>
    <div class="nav-item" onclick="abrirModal()">➕</div>
    <div class="nav-item" onclick="mudarTela('chat')">💬</div>
    <div class="nav-item ativo" onclick="mudarTela('perfil')">👤</div>
  </div>
</div>

<!-- MODAL POSTAR -->
<div id="modal-post" class="modal">
  <div class="modal-content">
    <h2>Novo Post / Reel</h2>
    <input type="text" id="post-url" placeholder="Cole URL da Imagem ou Vídeo MP4">
    <textarea id="post-legenda" placeholder="Escreva uma legenda..."></textarea>
    <button onclick="criarPost()" style="width:100%;padding:10px;background:var(--c);border:none;color:#000;border-radius:8px;font-weight:700">PUBLICAR</button>
    <button onclick="fecharModal()" style="width:100%;padding:10px;margin-top:10px;background:var(--bg3);border:none;color:var(--text);border-radius:8px">CANCELAR</button>
  </div>
</div>

<script>
let dados = JSON.parse(localStorage.getItem('k_social') || '{"posts":[],"seguidores":1200,"seguindo":500,"eu":"korvil_oficial"}');

if(dados.posts.length===0){
  dados.posts = [
    {tipo:'img', user:'korvil_oficial', url:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=500', legenda:'Treino finalizado 💪 #KTP', likes:124, comentarios:[]},
    {tipo:'video', user:'k_ai', url:'https://www.w3schools.com/html/mov_bbb.mp4', legenda:'K-AI criando app novo', likes:89, comentarios:[]},
    {tipo:'img', user:'amor', url:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500', legenda:'Dia lindo ❤️', likes:256, comentarios:[]}
  ];
  salvar();
}

function salvar(){localStorage.setItem('k_social', JSON.stringify(dados))}

function carregarFeed(){
  document.getElementById('feed').innerHTML = dados.posts.map((p,i)=>`
    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/100?u=${p.user}"><b>${p.user}</b>
        <button class="btn-seguir" onclick="seguir(this)">Seguir</button>
      </div>
      <div class="post-media">
        ${p.tipo==='img'?`<img src="${p.url}">`:`<video src="${p.url}" controls></video>`}
      </div>
      <div class="post-actions">
        <span onclick="curtir(this,${i})">❤️</span> <span>💬</span> <span>✈️</span>
      </div>
      <div class="post-info"><b>${p.likes} curtidas</b><br><b>${p.user}</b> ${p.legenda}</div>
    </div>
  `).join('');

  document.getElementById('perfil-grid').innerHTML = dados.posts.filter(p=>p.user===dados.eu).map(p=>`<img src="${p.url}">`).join('');
  document.getElementById('qtd-seguidores').innerText = dados.seguidores;
  document.getElementById('qtd-seguindo').innerText = dados.seguindo;
}

function carregarReels(){
  document.getElementById('reels').innerHTML = dados.posts.filter(p=>p.tipo==='video').map(p=>`
    <div class="reel">
      <video src="${p.url}" autoplay loop muted playsinline></video>
      <div class="reel-info"><b>@${p.user}</b><p>${p.legenda}</p></div>
    </div>
  `).join('');
}

function carregarChats(){
  document.getElementById('chat-lista').innerHTML = ['K-TP','K-AI','Amor ❤️'].map(n=>`
    <div class="chat-item" onclick="alert('Abrir chat com '+n)">
      <img src="https://i.pravatar.cc/100?u=${n}" class="avatar">
      <div><b>${n}</b><p style="color:var(--text2)">Última mensagem...</p></div>
    </div>
  `).join('');
}

function curtir(el,i){
  dados.posts[i].likes++;
  el.style.color='red';
  salvar(); carregarFeed();
}

function seguir(btn){
  if(btn.innerText==='Seguir'){
    btn.innerText='Seguindo'; btn.style.background='#333'; btn.style.color='#fff';
    dados.seguindo++;
  }else{
    btn.innerText='Seguir'; btn.style.background='var(--c)'; btn.style.color='#000';
    dados.seguindo--;
  }
  salvar();
}

function criarPost(){
  const url = document.getElementById('post-url').value;
  const legenda = document.getElementById('post-legenda').value;
  const tipo = url.includes('.mp4')? 'video' : 'img';
  dados.posts.unshift({tipo,user:dados.eu,url,legenda,likes:0,comentarios:[]});
  salvar(); fecharModal(); carregarFeed();
}

function abrirModal(){document.getElementById('modal-post').classList.add('ativa')}
function fecharModal(){document.getElementById('modal-post').classList.remove('ativa')}

function mudarTela(t){
  document.querySelectorAll('.tela').forEach(x=>x.classList.remove('ativa'));
  document.getElementById('tela-'+t).classList.add('ativa');
  if(t==='feed') carregarFeed();
  if(t==='reels') carregarReels();
  if(t==='chat') carregarChats();
}

carregarFeed();
</script>
</body>
</html>
