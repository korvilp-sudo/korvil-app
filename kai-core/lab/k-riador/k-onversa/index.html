<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-ONVERSA NEXUS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#000; --bg2:#050a14; --ciano:#00f5ff; --ciano2:#00d4ff;
  --azul:#0066ff; --text:#e0f7ff; --glow:0 0 20px #00f5ff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:radial-gradient(circle at 50% 50%, #001a33 0%, #000 100%);color:var(--text);overflow:hidden;height:100vh}

/* FUNDO PARTICULAS */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:var(--ciano);box-shadow:var(--glow);animation:float 10s infinite linear}

@keyframes float{
 0%{transform:translateY(100vh) scale(0)}
 50%{opacity:1}
 100%{transform:translateY(-100vh) scale(1);opacity:0}
}

/* GLOW PULSANTE */
.pulse{animation:pulse 2s infinite}
@keyframes pulse{
 0%,100%{box-shadow:0 0 10px var(--ciano)}
 50%{box-shadow:0 0 40px var(--ciano),0 0 60px var(--azul)}
}

/* TELA LOGIN */
#login{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.login-box{background:rgba(0,20,40,0.6);backdrop-filter:blur(20px);padding:50px;border:2px solid var(--ciano);border-radius:20px;text-align:center;box-shadow:var(--glow)}
.login-box h1{font-size:32px;color:var(--ciano);text-shadow:0 0 20px var(--ciano);margin-bottom:10px}
.login-box input{width:100%;padding:15px;margin:15px 0;background:#001a33;border:1px solid var(--ciano);border-radius:10px;color:var(--text);font-size:16px}
.login-box button{width:100%;padding:15px;background:linear-gradient(90deg,var(--azul),var(--ciano));border:none;border-radius:10px;color:#000;font-weight:900;font-size:18px;cursor:pointer;transition:.3s}
.login-box button:hover{transform:scale(1.05);box-shadow:0 0 30px var(--ciano)}

/* APP */
#app{display:none;height:100vh;flex-direction:column;position:relative;z-index:2}
.topbar{padding:15px 20px;background:rgba(0,10,20,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--ciano);display:flex;justify-content:space-between;align-items:center}
.topbar h1{color:var(--ciano);text-shadow:var(--glow);font-size:24px}

/* CUBO 3D K-AI */
.cubo-container{position:fixed;bottom:20px;right:20px;width:100px;height:100px;perspective:1000px;z-index:99;cursor:pointer}
.cubo{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:girar 10s infinite linear}
.cubo:hover{animation:girarRapido 2s infinite linear}
@keyframes girar{from{transform:rotateX(0) rotateY(0)} to{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes girarRapido{from{transform:rotateX(0) rotateY(0)} to{transform:rotateX(360deg) rotateY(360deg)}}
.face{position:absolute;width:100px;height:100px;background:rgba(0,245,255,0.1);border:2px solid var(--ciano);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:inset 0 0 20px var(--ciano)}
.frente{transform:translateZ(50px)}.tras{transform:rotateY(180deg) translateZ(50px)}
.direita{transform:rotateY(90deg) translateZ(50px)}.esquerda{transform:rotateY(-90deg) translateZ(50px)}
.cima{transform:rotateX(90deg) translateZ(50px)}.baixo{transform:rotateX(-90deg) translateZ(50px)}

/* CHAT 3D */
.chat-area{flex:1;display:flex;padding:20px;gap:20px}
.lista-chats{width:300px;background:rgba(0,20,40,0.6);backdrop-filter:blur(15px);border:1px solid var(--ciano);border-radius:15px;padding:15px;overflow-y:auto}
.chat-item{padding:12px;margin-bottom:10px;background:rgba(0,100,255,0.1);border:1px solid transparent;border-radius:10px;cursor:pointer;transition:.3s}
.chat-item:hover{border-color:var(--ciano);transform:translateX(5px);box-shadow:var(--glow)}
.chat-ativo{background:rgba(0,245,255,0.2);border-color:var(--ciano)}

.janela-chat{flex:1;background:rgba(0,20,40,0.6);backdrop-filter:blur(15px);border:1px solid var(--ciano);border-radius:15px;display:flex;flex-direction:column}
.chat-header{padding:15px;border-bottom:1px solid var(--ciano);display:flex;align-items:center;gap:10px}
.chat-msgs{flex:1;padding:20px;overflow-y:auto}
.msg{max-width:60%;padding:12px 18px;margin-bottom:10px;border-radius:15px;animation:aparecer.3s}
.msg.eu{background:linear-gradient(135deg,var(--azul),var(--ciano));margin-left:auto;color:#000}
.msg.outro{background:rgba(0,100,255,0.3);border:1px solid var(--ciano)}
@keyframes aparecer{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
.chat-input{display:flex;padding:15px;gap:10px;border-top:1px solid var(--ciano)}
.chat-input input{flex:1;padding:12px;background:#001a33;border:1px solid var(--ciano);border-radius:10px;color:var(--text)}
.chat-input button{padding:12px 25px;background:var(--ciano);border:none;border-radius:10px;color:#000;font-weight:700;cursor:pointer}

/* PAINEL K-AI */
.kai-painel{position:fixed;right:-400px;top:0;width:400px;height:100%;background:rgba(0,10,20,0.95);backdrop-filter:blur(30px);border-left:2px solid var(--ciano);transition:.5s;z-index:98;padding:20px}
.kai-painel.ativo{right:0;box-shadow:-10px 0 50px var(--ciano)}
.kai-titulo{color:var(--ciano);font-size:20px;text-shadow:var(--glow);margin-bottom:20px}
</style>
</head>
<body>
<div id="particles"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-box pulse">
    <h1>K-ONVERSA</h1>
    <p style="color:var(--ciano2)">NEXUS SYSTEM ONLINE</p>
    <input type="text" id="id-user" placeholder="ID K-TP">
    <button onclick="entrar()">ACESSAR NEXUS</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <h1>K-ONVERSA NEXUS</h1>
    <div style="color:var(--ciano)">ONLINE</div>
  </div>

  <div class="chat-area">
    <div class="lista-chats">
      <div class="chat-item chat-ativo" onclick="abrirChat('K-AI')"><b>K-AI</b><p style="font-size:12px;color:var(--ciano2)">Assistente Holográfico</p></div>
      <div class="chat-item" onclick="abrirChat('K-TP')"><b>K-TP</b><p style="font-size:12px;color:var(--ciano2)">Suporte</p></div>
      <div class="chat-item" onclick="abrirChat('Comunidade')"><b>Comunidade KORVIL</b><p style="font-size:12px;color:var(--ciano2)">500 online</p></div>
    </div>

    <div class="janela-chat">
      <div class="chat-header"><h2 id="nome-chat">K-AI</h2></div>
      <div class="chat-msgs" id="msgs"></div>
      <div class="chat-input">
        <input type="text" id="input" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviar()">
        <button onclick="enviar()">ENVIAR</button>
      </div>
    </div>
  </div>
</div>

<!-- CUBO 3D K-AI -->
<div class="cubo-container" onclick="toggleKai()">
  <div class="cubo">
    <div class="face frente">✨</div>
    <div class="face tras">AI</div>
    <div class="face direita">K</div>
    <div class="face esquerda">⚡</div>
    <div class="face cima">◊</div>
    <div class="face baixo">◆</div>
  </div>
</div>

<!-- PAINEL K-AI -->
<div class="kai-painel" id="kai">
  <div class="kai-titulo">K-AI HOLOGRAMA</div>
  <div id="kai-resposta" style="color:var(--text2)">Olá! Sou K-AI. Gire o cubo e me pergunte algo.</div>
</div>

<script>
// PARTICULAS
for(let i=0;i<50;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDelay=Math.random()*10+'s';
  document.getElementById('particles').appendChild(p);
}

let chatAtual='K-AI';
let msgs=JSON.parse(localStorage.getItem('k_msgs')||'{}');

function entrar(){
  if(!document.getElementById('id-user').value) return;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  abrirChat('K-AI');
}

function abrirChat(nome){
  chatAtual=nome;
  document.getElementById('nome-chat').innerText=nome;
  document.querySelectorAll('.chat-item').forEach(c=>c.classList.remove('chat-ativo'));
  event.target.closest('.chat-item').classList.add('chat-ativo');
  carregar();
}

function enviar(){
  let txt=document.getElementById('input').value;
  if(!txt) return;
  if(!msgs[chatAtual]) msgs[chatAtual]=[];
  msgs[chatAtual].push({de:'eu',txt});
  salvar(); document.getElementById('input').value='';

  if(chatAtual==='K-AI'){
    setTimeout(()=>{
      let resp="Analisando... ";
      if(txt.toLowerCase().includes('treino')) resp="Iniciando protocolo K-TP. Quer treino ABC ou Fullbody?";
      if(txt.toLowerCase().includes('código')) resp="Acessando K-RIADOR. Qual sistema vamos criar?";
      msgs[chatAtual].push({de:'K-AI',txt:resp});
      salvar(); carregar();
      document.getElementById('kai-resposta').innerText=resp;
    },800)
  }
}

function salvar(){localStorage.setItem('k_msgs',JSON.stringify(msgs))}
function carregar(){
  document.getElementById('msgs').innerHTML=(msgs[chatAtual]||[]).map(m=>`<div class="msg ${m.de==='eu'?'eu':'outro'}">${m.txt}</div>`).join('');
  document.getElementById('msgs').scrollTop=99999;
}

function toggleKai(){document.getElementById('kai').classList.toggle('ativo')}
</script>
</body>
</html>
