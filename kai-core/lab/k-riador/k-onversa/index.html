<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f5ff">
<title>K-ONVERSA</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
:root{--bg:#000;--c:#00f5ff;--bg2:#050a14}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:radial-gradient(circle at 50% 50%, #001a33 0%, #000 100%);color:#fff;height:100vh}
.status{position:fixed;top:10px;right:10px;padding:5px 15px;border-radius:20px;font-size:12px;background:#333}
.status.online{background:var(--c);color:#000}
.topo{padding:15px;background:rgba(0,10,20,0.8);border-bottom:1px solid var(--c);text-align:center}
.topo h1{color:var(--c);text-shadow:0 0 20px var(--c)}
.chat{height:calc(100vh - 160px);overflow-y:auto;padding:15px}
.msg{max-width:70%;padding:12px 18px;margin-bottom:10px;border-radius:15px;animation:aparecer .3s}
.eu{background:linear-gradient(90deg,#0066ff,#00f5ff);margin-left:auto;color:#000}
.outro{background:rgba(0,100,255,0.3);border:1px solid var(--c)}
.input-area{display:flex;padding:15px;gap:10px;position:fixed;bottom:0;width:100%;background:rgba(0,10,20,0.9)}
.input-area input{flex:1;padding:15px;background:#001a33;border:1px solid var(--c);border-radius:15px;color:#fff}
.input-area button{padding:15px 25px;background:var(--c);border:none;border-radius:15px;color:#000;font-weight:700}
.btn-instalar{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:15px 30px;background:var(--c);color:#000;border:none;border-radius:20px;font-weight:900}
@keyframes aparecer{from{opacity:0;transform:translateY(20px)}}
</style>
</head>
<body>
<div class="status" id="status">OFFLINE</div>
<button class="btn-instalar" id="btnInstalar">INSTALAR K-ONVERSA</button>

<div class="topo">
  <h1>K-ONVERSA NEXUS</h1>
  <p style="color:var(--c);font-size:12px">FUNCIONA OFFLINE</p>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Digite aqui..." onkeydown="if(event.key==='Enter')enviar()">
  <button onclick="enviar()">ENVIAR</button>
</div>

<script>
let msgs = JSON.parse(localStorage.getItem('kmsgs') || '[]');

// STATUS ONLINE/OFFLINE
function attStatus(){
  document.getElementById('status').innerText = navigator.onLine ? 'ONLINE' : 'OFFLINE';
  document.getElementById('status').className = navigator.onLine ? 'status online' : 'status';
}
window.addEventListener('online', attStatus);
window.addEventListener('offline', attStatus);
attStatus();

// CARREGAR MSGS
function carregar(){
  document.getElementById('chat').innerHTML = msgs.map(m=>`<div class="msg ${m.de}">${m.txt}</div>`).join('');
  document.getElementById('chat').scrollTop = 99999;
}

function enviar(){
  let txt = document.getElementById('input').value;
  if(!txt) return;
  msgs.push({de:'eu',txt});
  localStorage.setItem('kmsgs',JSON.stringify(msgs));
  document.getElementById('input').value='';
  carregar();

  // RESPOSTA K-AI OFFLINE
  setTimeout(()=>{
    msgs.push({de:'outro',txt:'K-AI: Recebi sua mensagem. Estou funcionando offline.'});
    localStorage.setItem('kmsgs',JSON.stringify(msgs));
    carregar();
  },800)
}

// INSTALAR APP
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstalar').style.display = 'block';
});
document.getElementById('btnInstalar').addEventListener('click', () => {
  deferredPrompt.prompt();
});

carregar();

// REGISTRAR SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
