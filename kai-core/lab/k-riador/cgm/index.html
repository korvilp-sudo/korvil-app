<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>K-CUBO RAPIDO</title>
<style>
body{margin:0;background:#000;overflow:hidden}
#video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#info{position:fixed;top:20px;width:100%;text-align:center;color:#00f5ff;font-size:22px;text-shadow:0 0 10px #00f5ff;font-family:Arial;z-index:10}
#cubo{position:absolute;top:50%;left:50%;width:250px;height:250px;border:5px solid #00f5ff;box-shadow:0 0 60px #00f5ff;transform:translate(-50%,-50%);z-index:5;transition:0.05s}
#ponto{position:absolute;width:30px;height:30px;background:#ff00ff;border-radius:50%;box-shadow:0 0 30px #ff00ff;z-index:6}
</style>
</head>
<body>
<div id="info">PONHA A MÃO NA FRENTE DA CÂMERA | MOVA = GIRA | APROXIMA = AUMENTA</div>
<video id="video" autoplay playsinline></video>
<div id="cubo"></div>
<div id="ponto"></div>

<script>
// MÉTODO RÁPIDO: SEGUE A COR DA PELE
const video = document.getElementById('video');
const cubo = document.getElementById('cubo');
const ponto = document.getElementById('ponto');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{video.srcObject=stream});

let ultimoX = window.innerWidth/2;
let ultimoY = window.innerHeight/2;

video.onplay = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  detectar();
}

function detectar(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dados = ctx.getImageData(0,0,canvas.width,canvas.height).data;

  let totalX=0, totalY=0, total=0;

  // PROCURA PIXEL CLARO = SUA MÃO
  for(let y=0; y<canvas.height; y+=10){
    for(let x=0; x<canvas.width; x+=10){
      let i = (y*canvas.width + x)*4;
      let r=dados[i], g=dados[i+1], b=dados[i+2];
      // Detecta tom de pele
      if(r>90 && g>40 && b>20 && r>g && r>b){
        totalX += x;
        totalY += y;
        total++;
      }
    }
  }

  if(total > 50){ // Se achou a mão
    let x = (canvas.width - totalX/total); // Inverte
    let y = totalY/total;

    x = x * window.innerWidth / canvas.width;
    y = y * window.innerHeight / canvas.height;

    ponto.style.left = x+'px';
    ponto.style.top = y+'px';

    // GESTO 1: GIRAR - Quanto mais longe do centro mais gira
    let rotY = (x - window.innerWidth/2) * 0.3;
    let rotX = (y - window.innerHeight/2) * 0.3;

    // GESTO 2: ZOOM - Quanto mais perto da câmera maior fica
    let dist = Math.hypot(x - ultimoX, y - ultimoY);
    let escala = 1 + dist * 0.01;
    if(escala > 2) escala = 2;

    cubo.style.transform = `translate(-50%,-50%) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${escala})`;

    ultimoX = x; ultimoY = y;
  }
  requestAnimationFrame(detectar);
}
</script>
</body>
</html>
