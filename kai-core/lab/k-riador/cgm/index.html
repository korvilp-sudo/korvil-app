<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>K-CUBO HOLOGRAMA REAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Orbitron'}

#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
#canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
#canvasMao{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none}

#info{position:fixed;top:20px;width:100%;text-align:center;color:#00f5ff;font-size:16px;text-shadow:0 0 20px #00f5ff;z-index:10}
#cursor{position:absolute;width:30px;height:30px;border:3px solid #00f5ff;border-radius:50%;box-shadow:0 0 20px #00f5ff;z-index:4;pointer-events:none;transform:translate(-50%,-50%)}
#cursor.click{background:#00f5ff;transform:translate(-50%,-50%) scale(1.5)}
</style>
</head>
<body>
<div id="info">CÂMERA ATIVA - MEXA A MÃO PRA GIRAR O CUBO - PINÇA PRA CLICAR</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas3d"></canvas>
<canvas id="canvasMao"></canvas>
<div id="cursor"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// 1. LIGA A CÂMERA NORMAL
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
  video.srcObject = stream;
});

// 2. CRIA O CUBO K-AI POR CIMA DA CÂMERA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 4;

const geometry = new THREE.BoxGeometry(1.5,1.5,1.5);
const material = new THREE.MeshPhongMaterial({color:0x00f5ff, transparent:true, opacity:0.8, wireframe:false});
const cubo = new THREE.Mesh(geometry, material);
scene.add(cubo);

const light = new THREE.PointLight(0x00f5ff, 2, 100);
light.position.set(2,2,2);
scene.add(light);
scene.add(new THREE.AmbientLight(0x00f5ff, 0.5));

// 3. DETECÇÃO DA MÃO PRA MEXER SEM TOCAR
const canvasMao = document.getElementById('canvasMao');
const ctx = canvasMao.getContext('2d');
const cursor = document.getElementById('cursor');
canvasMao.width = window.innerWidth;
canvasMao.height = window.innerHeight;

let maoX = window.innerWidth/2, maoY = window.innerHeight/2;
let distAnterior = 0;

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({maxNumHands: 1, modelComplexity: 1});
hands.onResults(onResults);

const cameraFeed = new Camera(video, {
  onFrame: async () => { await hands.send({image: video}); },
  width: 1280, height: 720
});
cameraFeed.start();

function onResults(results){
  ctx.clearRect(0, 0, canvasMao.width, canvasMao.height);

  if(results.multiHandLandmarks){
    const l = results.multiHandLandmarks[0];

    // PEGA POSIÇÃO DO DEDO INDICADOR
    maoX = (1 - l[8].x) * window.innerWidth; // Inverte pq câmera espelha
    maoY = l[8].y * window.innerHeight;
    cursor.style.left = maoX+'px';
    cursor.style.top = maoY+'px';

    // DESENHA A MÃO POR CIMA
    drawConnectors(ctx, l, HAND_CONNECTIONS, {color: '#00f5ff', lineWidth: 2});
    drawLandmarks(ctx, l, {color: '#00f5ff', lineWidth: 1});

    // OBJETIVO 1: GIRAR CUBO PRA QUALQUER LADO
    // Quanto mais você mexe a mão, mais o cubo gira
    cubo.rotation.y += (maoX - window.innerWidth/2) * 0.00005;
    cubo.rotation.x += (maoY - window.innerHeight/2) * 0.00005;

    // OBJETIVO 2: CLICAR = PINÇA
    const distPinca = Math.hypot(l[4].x - l[8].x, l[4].y - l[8].y);
    if(distPinca < 0.04){
      cursor.classList.add('click');
      cubo.material.color.set(0xff00ff); // Muda pra roxo ao clicar
      cubo.scale.set(1.1,1.1,1.1);
    }else{
      cursor.classList.remove('click');
      cubo.material.color.set(0x00f5ff);
      cubo.scale.set(1,1,1);
    }

    // OBJETIVO 3: ZOOM = ABRIR E FECHAR A MÃO
    const distMao = Math.hypot(l[5].x - l[17].x, l[5].y - l[17].y);
    if(distMao > distAnterior + 0.01){ camera.position.z -= 0.05 } // Abre = Zoom
    if(distMao < distAnterior - 0.01){ camera.position.z += 0.05 } // Fecha = Afasta
    distAnterior = distMao;
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  canvasMao.width = window.innerWidth;
  canvasMao.height = window.innerHeight;
})
</script>
</body>
</html>
