<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL OS LITE</title>
<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial}
#video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.7}
#menu{position:absolute;top:10px;left:10px;width:160px;background:#000;border:2px solid #00f5ff;padding:8px;color:#00f5ff;font-size:11px}
.btn{width:100%;padding:5px;margin:3px 0;background:#00f5ff22;border:1px solid #00f5ff;color:#00f5ff;font-size:10px}
#lixeira{position:absolute;bottom:10px;left:10px;font-size:35px;border:2px dashed red;padding:10px}
.cubo{position:absolute;width:100px;height:100px;border:3px solid #00f5ff;box-shadow:0 0 20px #00f5ff}
#ponto{position:absolute;width:25px;height:25px;background:#ff00ff;border-radius:50%;box-shadow:0 0 20px #ff00ff}
#info{position:absolute;bottom:10px;right:10px;color:#00f5ff;font-size:10px;width:180px;background:#000;padding:5px}
</style>
</head>
<body>
<div id="menu">
  <div>> KORVIL MENU</div>
  <button class="btn" onclick="criarCubo()">NOVO CUBO</button>
  <button class="btn" onclick="limpar()">LIMPAR</button>
  <button class="btn" id="btnLight">LANTERNA</button>
  <div id="status">STATUS: AGUARDANDO</div>
</div>
<div id="lixeira">🗑️</div>
<div id="info">1 DEDO = MOVER<br>2 DEDOS = NOVO<br>JUNTA MÃOS = LIXEIRA</div>
<video id="video" autoplay playsinline></video>
<div id="ponto"></div>
<div id="c1" class="cubo" style="top:50%;left:50%"></div>

<script>
const video = document.getElementById('video');
const ponto = document.getElementById('ponto');
const status = document.getElementById('status');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
let stream, cubos = [document.getElementById('c1')];

// LIGA CÂMERA FRONTAL
navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s=>{
  stream=s; video.srcObject=s;
  video.onloadeddata=()=>{
    canvas.width=320; canvas.height=240;
    loop();
  }
});

// DETECÇÃO SIMPLES POR COR
function loop(){
  ctx.drawImage(video,0,0,320,240);
  const data = ctx.getImageData(0,0,320,240).data;
  let x=0,y=0,total=0;

  for(let i=0;i<data.length;i+=40){ // Pula pixels pra ficar leve
    const r=data[i], g=data[i+1], b=data[i+2];
    if(r>80 && g>50 && b>30 && r>g){ // Pele
      x += (i/4)%320;
      y += Math.floor((i/4)/320);
      total++;
    }
  }

  if(total>100){
    x = (320 - x/total) * window.innerWidth/320;
    y = y/total * window.innerHeight/240;
    ponto.style.left=x+'px'; ponto.style.top=y+'px';

    // MOVER CUBO
    cubos[0].style.left = x-50+'px';
    cubos[0].style.top = y-50+'px';

    // SE TÁ NA LIXEIRA
    if(x<80 && y>window.innerHeight-80){
      document.getElementById('lixeira').style.background='red';
      cubos[0].style.opacity='0.3';
    }else{
      document.getElementById('lixeira').style.background='';
      cubos[0].style.opacity='1';
    }

    status.innerText = "MÃO DETECTADA";
  }else{
    status.innerText = "PROCURE LUZ BOA";
  }
  requestAnimationFrame(loop);
}

function criarCubo(){
  const c = document.createElement('div');
  c.className='cubo';
  c.style.top='50%'; c.style.left='50%';
  document.body.appendChild(c);
  cubos.push(c);
}
function limpar(){cubos.forEach(c=>c.remove()); cubos=[]; criarCubo()}

// LANTERNA
document.getElementById('btnLight').onclick=async()=>{
  const track = stream.getVideoTracks()[0];
  try{
    await track.applyConstraints({advanced:[{torch:true}]});
  }catch(e){alert("Lanterna não suportada")}
}
</script>
</body>
</html>
