<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KORVIL G15</title>
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:Arial}
#video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.3}
#menu{position:absolute;top:5px;left:5px;width:130px;background:#000c;border:2px solid #0ff;padding:5px;color:#0ff;font-size:10px}
.btn{width:100%;padding:5px;margin:2px 0;background:#0ff2;border:1px solid #0ff;color:#0ff;font-size:9px}
.btn.on{background:#0ff;color:#000}
.cubo{position:absolute;width:80px;height:80px;border:2px solid #0ff}
#lixeira{position:absolute;bottom:5px;left:5px;font-size:30px;border:2px dashed red;padding:5px}
#pino{position:absolute;width:15px;height:15px;background:magenta;border-radius:50%}
</style>
</head>
<body>
<div id="menu">
  <div>GESTO G15</div>
  <button class="btn" id="novo">NOVO</button>
  <button class="btn" id="limpar">LIMPAR</button>
</div>
<div id="lixeira">🗑️</div>
<video id="video" autoplay></video>
<div id="pino"></div>
<div id="c1" class="cubo" style="left:50%;top:50%"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const video = document.getElementById('video');
const pino = document.getElementById('pino');
let cubos = [document.getElementById('c1')];
let seguro = null;
let ultimoFrame = 0;

// 1. CÂMERA 240P
navigator.mediaDevices.getUserMedia({video:{facingMode:"user", width:240, height:180}}).then(s=>video.srcObject=s);

// 2. MEDIAPIPE NO MÍNIMO
const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.4});

hands.onResults(res=>{
  if(res.multiHandLandmarks.length > 0){
    const h = res.multiHandLandmarks[0];
    const x = (1-h[8].x)*window.innerWidth;
    const y = h[8].y*window.innerHeight;
    pino.style.left=x+'px'; pino.style.top=y+'px';

    const pinça = Math.hypot(x - (1-h[4].x)*window.innerWidth, y - h[4].y*window.innerHeight) < 45;

    // MOVE CUBO
    if(pinça &&!seguro){
      for(let c of cubos) if(Math.abs(x-c.offsetLeft-40)<50) seguro=c;
    }
    if(seguro && pinça){
      seguro.style.left=x-40+'px'; seguro.style.top=y-40+'px';
    }
    if(!pinça && seguro){
      if(x<70 && y>window.innerHeight-70) seguro.remove();
      seguro=null;
    }

    // CLIQUE MENU
    const menu = document.getElementById('menu').getBoundingClientRect();
    document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
    if(x<menu.right && y>menu.top && y<menu.bottom && pinça){
      const i = Math.floor((y-menu.top)/30);
      if(document.querySelectorAll('.btn')[i]) document.querySelectorAll('.btn')[i].click();
    }
  }
});

// 3. TRAVAR FPS EM 15 PRA NÃO TRAVAR O G15
const camera = new Camera(video, {
  onFrame: async () => {
    const agora = Date.now();
    if(agora - ultimoFrame > 66){ // 1000/15 = 66ms
      await hands.send({image: video});
      ultimoFrame = agora;
    }
  },
  width: 240,
  height: 180
});
camera.start();

// BOTOES
document.getElementById('novo').onclick=()=>{const c=document.createElement('div');c.className='cubo';c.style.left='50%';c.style.top='50%';document.body.appendChild(c);cubos.push(c)}
document.getElementById('limpar').onclick=()=>{cubos.forEach(c=>c.remove());cubos=[];document.getElementById('novo').click()}
</script>
</body>
</html>
