<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>K-AI | Assistente KORVIL</title>
<style>
  body{background:#000;color:#00f5ff;font-family:'Segoe UI',Arial,sans-serif;text-align:center;padding:40px;}
  h1{font-size:24px;text-shadow:0 0 10px #00f5ff;}
  p{color:#aaa;font-size:14px;margin-bottom:20px;}
  button{background:#00f5ff;color:#000;border:0;padding:14px 28px;border-radius:10px;font-weight:900;font-size:16px;cursor:pointer;transition:.2s;margin:5px;}
  button:hover{box-shadow:0 0 20px #00f5ff;}
  button.ouvindo{background:#00ff88; box-shadow:0 0 20px #00ff88;}
  #status{margin-top:20px;color:#00ff88;font-weight:700;min-height:20px;}
</style>
</head>
<body>

<h1>K-AI</h1>
<p>Assistente de Inteligência Artificial do Sistema KORVIL</p>

<button onclick="falar()">ATIVAR K-AI</button>
<button id="btnMic" onclick="ouvirComando()">🎤 FALAR COM K-AI</button>

<div id="status">Aguardando comando...</div>

<script>
let vozesDisponiveis = [];

// 1. CORREÇÃO: Esperar as vozes carregarem
function carregarVozes(){
  vozesDisponiveis = window.speechSynthesis.getVoices();
}
carregarVozes();
if (speechSynthesis.onvoiceschanged!== undefined) {
  speechSynthesis.onvoiceschanged = carregarVozes;
}

function falar() {
  document.getElementById('status').innerText = "K-AI falando...";

  const texto = `Olá. Eu sou o KAI. Sistema de Inteligência Artificial desenvolvido para o ecossistema KORVIL. Fui criado para gerenciar, organizar e otimizar todos os protocolos do sistema K, KORVIL. Meu chefe é o único inventor geral. SAI Corvil, chamado de CRIADOR. Ele é o dono e único fundador de todo o sistema geral K, KORVIL. Estou online e pronto para servir.`;

  const fala = new SpeechSynthesisUtterance(texto);
  fala.lang = 'pt-BR';
  fala.rate = 1.0;
  fala.pitch = 1.0;
  fala.volume = 1;

  // Pega voz BR depois que carregou
  const vozBR = vozesDisponiveis.find(v => v.lang.includes('pt-BR')) || vozesDisponiveis[0];
  if(vozBR) fala.voice = vozBR;

  fala.onend = () => {
    document.getElementById('status').innerText = "Aguardando comando...";
  }

  window.speechSynthesis.speak(fala);
}

// 2. CORREÇÃO: Adicionado comando de voz
function ouvirComando() {
  const btn = document.getElementById('btnMic');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    document.getElementById('status').innerText = "ERRO: Use Google Chrome para usar o microfone";
    return;
  }

  const reconhecimento = new SpeechRecognition();
  reconhecimento.lang = 'pt-BR';
  reconhecimento.continuous = false;

  btn.classList.add('ouvindo');
  document.getElementById('status').innerText = "Ouvindo... Fale agora";

  reconhecimento.start();

  reconhecimento.onresult = (event) => {
    const comando = event.results[0][0].transcript.toLowerCase();
    document.getElementById('status').innerText = `Você disse: "${comando}"`;
    btn.classList.remove('ouvindo');

    // Aceita K-AI, Cai, Kai
    if(comando.includes("k-ai") || comando.includes("cai") || comando.includes("kai")){
      if(comando.includes("resume")){
        falar(); // executa a mesma função do botão
      }
    } else {
      document.getElementById('status').innerText = 'Diga: "K-AI resume uma descrição"';
    }
  };

  reconhecimento.onerror = () => {
    document.getElementById('status').innerText = "Erro no microfone. Permita o acesso.";
    btn.classList.remove('ouvindo');
  };

  reconhecimento.onend = () => {
    btn.classList.remove('ouvindo');
  }
}
</script>

</body>
</html>
