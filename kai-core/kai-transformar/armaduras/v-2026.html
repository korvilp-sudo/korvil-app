
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI ARMOR v-2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
#armaduraCanvas{width:100%;height:100%;display:block}

/* HUD HOLOGRAFICO */
.hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.hud-text{position:absolute;color:#00FFFF;font-family:'Segoe UI',Arial;font-weight:900;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #00FFFF}
.hud-top{top:20px;left:50%;transform:translateX(-50%);font-size:16px}
.hud-left{top:50%;left:20px;transform:rotate(-90deg);transform-origin:left}
.hud-right{top:50%;right:20px;transform:rotate(90deg);transform-origin:right}
.scanline{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00FFFF,transparent);animation:scan 3s linear infinite;box-shadow:0 0 10px #00FFFF}
@keyframes scan{0%{top:0}100%{top:100%}}
.circles{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;border:2px solid #00FFFF;border-radius:50%;opacity:.3;box-shadow:0 0 30px #00FFFF}
.circles::before,.circles::after{content:'';position:absolute;border:1px solid #00FFFF;border-radius:50%}
.circles::before{top:20px;left:20px;right:20px;bottom:20px;opacity:.5}
.circles::after{top:40px;left:40px;right:40px;bottom:40px;opacity:.3}
</style>
</head>
<body>
<canvas id="armaduraCanvas"></canvas>

<div class="hud">
  <div class="hud-text hud-top">K-AI ARMOR v-2026 | PROTOCOLO: SAY KORVIL</div>
  <div class="hud-text hud-left">SISTEMA HOLOGRAFICO ATIVO</div>
  <div class="hud-text hud-right">CORVO CYBER MODE</div>
  <div class="scanline"></div>
  <div class="circles"></div>
</div>

<script>
let scene, camera, renderer, controls, armadura;
let asas, bico, olhos, garras;
let tempo = 0;

function init(){
  // CENA TRANSPARENTE
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 12);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('armaduraCanvas'),
    alpha: true,
    antialias: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000, 0); // fundo transparente

  // LUZ HOLOGRAFICA
  const luz1 = new THREE.PointLight(0x00FFFF, 2, 50); luz1.position.set(5,5,5);
  const luz2 = new THREE.PointLight(0x00FFFF, 1.5, 50); luz2.position.set(-5,-5,-5);
  const luzAmb = new THREE.AmbientLight(0x00FFFF, 0.3);
  scene.add(luz1, luz2, luzAmb);

  // CONTROLE PRA GIRAR 360° COM O DEDO
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;
  controls.minDistance = 8;
  controls.maxDistance = 20;

  criarArmadura();
  animate();
}

function criarArmadura(){
  armadura = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({
    color: 0x00FFFF,
    emissive: 0x00FFFF,
    emissiveIntensity: 0.5,
    shininess: 100,
    transparent: true,
    opacity: 0.9
  });
  const matWire = new THREE.MeshPhongMaterial({
    color: 0xA8FFE6,
    emissive: 0xA8FFE6,
    emissiveIntensity: 0.8,
    wireframe: true
  });

  // 1. CABEÇA - CAPACETE CORVO K-AI
  const cabeca = new THREE.Group();
  const cranio = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), mat);
  const bicoGeo = new THREE.ConeGeometry(0.4, 1.2, 4); bicoGeo.rotateX(Math.PI/2);
  bico = new THREE.Mesh(bicoGeo, matWire); bico.position.z = 1.2;
  const olhoL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), matWire); olhoL.position.set(-0.4,0.2,1);
  const olhoR = olhoL.clone(); olhoR.position.x = 0.4;
  olhos = new THREE.Group(); olhos.add(olhoL, olhoR);
  cabeca.add(cranio, bico, olhos);
  cabeca.position.y = 3.5;
  armadura.add(cabeca);

  // 2. TORSO - PEITO BLINDADO
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.2, 3, 8), mat);
  torso.position.y = 1;
  armadura.add(torso);

  // 3. ASAS - GRANDES SEMI ABERTAS BATENDO
  asas = new THREE.Group();
  const asaGeo = new THREE.BoxGeometry(4, 0.1, 2);
  const asaL = new THREE.Mesh(asaGeo, matWire); asaL.position.set(-2.5, 1.5, 0); asaL.rotation.z = -0.3;
  const asaR = asaL.clone(); asaR.position.x = 2.5; asaR.rotation.z = 0.3;
  asas.add(asaL, asaR);
  armadura.add(asas);

  // 4. BRAÇOS
  const bracoGeo = new THREE.CylinderGeometry(0.3, 0.25, 2.5, 8);
  const bracoL = new THREE.Mesh(bracoGeo, mat); bracoL.position.set(-1.8, 0.5, 0);
  const bracoR = bracoL.clone(); bracoR.position.x = 1.8;
  armadura.add(bracoL, bracoR);

  // 5. PERNAS
  const pernaGeo = new THREE.CylinderGeometry(0.4, 0.35, 3, 8);
  const pernaL = new THREE.Mesh(pernaGeo, mat); pernaL.position.set(-0.6, -2, 0);
  const pernaR = pernaL.clone(); pernaR.position.x = 0.6;
  armadura.add(pernaL, pernaR);

  // 6. GARRAS - BOTAS DE CORVO
  garras = new THREE.Group();
  for(let i=0; i<3; i++){
    const garra = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.6, 3), matWire);
    garra.rotation.x = Math.PI/2;
    garra.position.set(-0.2 + i*0.2, -3.6, 0.3);
    garras.add(garra);
    const garra2 = garra.clone(); garra2.position.x += 0.6;
    garras.add(garra2);
  }
  armadura.add(garras);

  scene.add(armadura);
}

function animate(){
  requestAnimationFrame(animate);
  tempo += 0.02;

  // ASAS BATENDO
  if(asas){
    asas.children[0].rotation.z = -0.3 + Math.sin(tempo*3)*0.2;
    asas.children[1].rotation.z = 0.3 - Math.sin(tempo*3)*0.2;
  }
  
  // OLHOS PISCANDO
  if(olhos){
    olhos.children.forEach(o => o.material.emissiveIntensity = 0.8 + Math.sin(tempo*5)*0.2);
  }

  // GARRAS BRILHANDO
  if(garras){
    garras.children.forEach(g => g.rotation.y += 0.01);
  }

  controls.update();
  renderer.render(scene, camera);
}

// FUNÇÃO PRA K-AI CHAMAR
function mostrarArmadura(){
  controls.autoRotate = true;
  document.querySelector('.hud-top').innerText = "ARMADURA K-AI v-2026 ATIVADA";
}

// GIRAR MANUAL
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();

// PARA USAR NO K-AI:
// quando o usuario falar "mostrar armadura" 
// você faz: document.getElementById('armaduraCanvas').style.display = 'block'
// e chama mostrarArmadura()
</script>
</body>
</html>
