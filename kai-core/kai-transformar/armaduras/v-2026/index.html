
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI ARMOR v-2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
#canvas{width:100%;height:100%}

.hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Segoe UI',Arial}
.grid{background:linear-gradient(transparent 98%,#00FFFF11 99%),linear-gradient(90deg,transparent 98%,#00FFFF11 99%);background-size:50px 50px}
.scan{position:absolute;top:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00FFFF,transparent);animation:scan 3s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.info{position:absolute;top:20px;left:20px;color:#00FFFF;font-size:12px;letter-spacing:2px}
.info div{margin-bottom:8px;text-shadow:0 0 10px #00FFFF}
.btn{position:absolute;bottom:30px;right:30px;background:#000;border:2px solid #00FFFF;color:#00FFFF;padding:12px 24px;border-radius:25px;font-weight:900;pointer-events:auto;cursor:pointer;box-shadow:0 0 20px #00FFFF}
.btn:hover{background:#00FFFF;color:#000}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hud grid">
  <div class="scan"></div>
  <div class="info">
    <div>K-AI ARMOR v-2026</div>
    <div>STATUS: ONLINE</div>
    <div>PROTOCOLO: SAY KORVIL</div>
    <div>ENERGIA: 100%</div>
  </div>
  <button class="btn" onclick="parent.fecharArmadura()">DESATIVAR</button>
</div>

<script>
let scene, camera, renderer, controls, group;
let asas, olhos, garras, tempo = 0;

init();

function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x00FFFF, 0.015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 14);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas'), alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000, 0);

  scene.add(new THREE.AmbientLight(0x00FFFF, 0.5));
  const luz1 = new THREE.PointLight(0x00FFFF, 3, 50); luz1.position.set(10,10,10);
  const luz2 = new THREE.PointLight(0xA8FFE6, 2, 50); luz2.position.set(-10,-10,-10);
  scene.add(luz1, luz2);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
  controls.minDistance = 8; controls.maxDistance = 20;

  criarArmadura();
  animate();
}

function criarArmadura(){
  group = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.8, shininess:120, transparent:true, opacity:0.95});
  const matWire = new THREE.MeshPhongMaterial({color:0xA8FFE6, emissive:0xA8FFE6, emissiveIntensity:1.2, wireframe:true});

  // CABEÇA CORVO CYBER
  const cabeca = new THREE.Group();
  const cranio = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), mat);
  const bicoGeo = new THREE.ConeGeometry(0.5, 1.4, 4); bicoGeo.rotateX(Math.PI/2);
  const bico = new THREE.Mesh(bicoGeo, matWire); bico.position.z = 1.3;
  const olhoL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matWire); olhoL.position.set(-0.45,0.25,1.1);
  const olhoR = olhoL.clone(); olhoR.position.x = 0.45;
  olhos = new THREE.Group(); olhos.add(olhoL, olhoR);
  cabeca.add(cranio, bico, olhos); cabeca.position.y = 3.8;
  group.add(cabeca);

  // TORSO COM DETALHES
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.3, 3.2, 8), mat);
  torso.position.y = 1; group.add(torso);

  // ASAS CYBER
  asas = new THREE.Group();
  const asaGeo = new THREE.BoxGeometry(4.5, 0.15, 2.5);
  const asaL = new THREE.Mesh(asaGeo, matWire); asaL.position.set(-2.8, 1.6, 0); asaL.rotation.z = -0.25;
  const asaR = asaL.clone(); asaR.position.x = 2.8; asaR.rotation.z = 0.25;
  asas.add(asaL, asaR); group.add(asas);

  // BRAÇOS E PERNAS
  const bracoGeo = new THREE.CylinderGeometry(0.35, 0.28, 2.8, 8);
  const bracoL = new THREE.Mesh(bracoGeo, mat); bracoL.position.set(-1.9, 0.5, 0);
  const bracoR = bracoL.clone(); bracoR.position.x = 1.9; group.add(bracoL, bracoR);

  const pernaGeo = new THREE.CylinderGeometry(0.45, 0.4, 3.2, 8);
  const pernaL = new THREE.Mesh(pernaGeo, mat); pernaL.position.set(-0.7, -2.2, 0);
  const pernaR = pernaL.clone(); pernaR.position.x = 0.7; group.add(pernaL, pernaR);

  // GARRAS
  garras = new THREE.Group();
  for(let i=0; i<3; i++){
    const garra = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 3), matWire);
    garra.rotation.x = Math.PI/2; garra.position.set(-0.25 + i*0.25, -3.9, 0.4);
    garras.add(garra); const garra2 = garra.clone(); garra2.position.x += 0.7; garras.add(garra2);
  }
  group.add(garras);

  // ANEL ORBITAL
  const anel = new THREE.Mesh(new THREE.TorusGeometry(3, 0.08, 16, 100), matWire);
  anel.position.y = 1; group.add(anel);
  group.userData.anel = anel;

  scene.add(group);
}

function animate(){
  requestAnimationFrame(animate);
  tempo += 0.02;

  if(asas){
    asas.children[0].rotation.z = -0.25 + Math.sin(tempo*2)*0.15;
    asas.children[1].rotation.z = 0.25 - Math.sin(tempo*2)*0.15;
  }
  if(olhos){
    olhos.children.forEach(o => o.material.emissiveIntensity = 1 + Math.sin(tempo*4)*0.5);
  }
  if(garras){
    garras.children.forEach((g,i) => g.rotation.y += 0.02 + i*0.005);
  }
  if(group.userData.anel){
    group.userData.anel.rotation.y += 0.01;
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
