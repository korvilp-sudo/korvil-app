<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI ARMOR v-2026 COMPLETO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
#canvas{width:100%;height:100%}

.hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Segoe UI',Arial}
.grid{background:linear-gradient(transparent 98%,#00FFFF11 99%),linear-gradient(90deg,transparent 98%,#00FFFF11 99%);background-size:50px 50px}
.scan{position:absolute;top:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00FFFF,transparent);animation:scan 3s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.info{position:absolute;top:20px;left:20px;color:#00FFFF;font-size:12px;letter-spacing:2px}
.info div{margin-bottom:8px;text-shadow:0 0 10px #00FFFF}
.btn{position:absolute;bottom:30px;right:30px;background:#000;border:2px solid #00FFFF;color:#00FFFF;padding:12px 24px;border-radius:25px;font-weight:900;pointer-events:auto;cursor:pointer;box-shadow:0 0 20px #00FFFF}
.btn:hover{background:#00FFFF;color:#000}
.status{position:absolute;top:20px;right:20px;color:#00FF88;font-size:10px;text-align:right}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hud grid">
  <div class="scan"></div>
  <div class="info">
    <div>K-AI ARMOR v-2026</div>
    <div>STATUS: ONLINE</div>
    <div>PROTOCOLO: SAY KORVIL</div>
    <div>ENERGIA: 100%</div>
    <div>PEÇAS: 19/19 ATIVAS</div>
  </div>
  <div class="status">
    <div>NÚCLEO K-AI: OK</div>
    <div>PENUGEM: 2048 SENSORES</div>
    <div>CORVONAS: 2/2</div>
  </div>
  <button class="btn" onclick="parent.fecharArmadura()">DESATIVAR</button>
</div>

<script>
let scene, camera, renderer, controls, group;
let asas, olhos, garras, garrasMao, corvonas, tempo = 0;

init();

function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x00FFFF, 0.015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 16);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas'), alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000, 0);

  scene.add(new THREE.AmbientLight(0x00FFFF, 0.5));
  const luz1 = new THREE.PointLight(0x00FFFF, 3, 50); luz1.position.set(10,10,10);
  const luz2 = new THREE.PointLight(0xA8FFE6, 2, 50); luz2.position.set(-10,-10,-10);
  scene.add(luz1, luz2);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.3;
  controls.minDistance = 8; controls.maxDistance = 25;

  criarArmaduraCompleta();
  animate();
}

function criarArmaduraCompleta(){
  group = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.8, shininess:120, transparent:true, opacity:0.95});
  const matWire = new THREE.MeshPhongMaterial({color:0xA8FFE6, emissive:0xA8FFE6, emissiveIntensity:1.2, wireframe:true});
  const matNucleo = new THREE.MeshPhongMaterial({color:0x00FF88, emissive:0x00FF88, emissiveIntensity:1.5});

  // 1. CABEÇA + CAPACETE + VISOR
  const cabeca = new THREE.Group();
  const cranio = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), mat);
  const visor = new THREE.Mesh(new THREE.SphereGeometry(1.31, 32, 32), matWire); visor.scale.set(1,0.6,1);
  const bicoGeo = new THREE.ConeGeometry(0.5, 1.4, 4); bicoGeo.rotateX(Math.PI/2);
  const bico = new THREE.Mesh(bicoGeo, matWire); bico.position.z = 1.3;
  const olhoL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matWire); olhoL.position.set(-0.45,0.25,1.1);
  const olhoR = olhoL.clone(); olhoR.position.x = 0.45;
  olhos = new THREE.Group(); olhos.add(olhoL, olhoR);
  cabeca.add(cranio, visor, bico, olhos); cabeca.position.y = 4.5;
  group.add(cabeca);

  // 2. PESCOÇO K-1
  const pescoco = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 0.8, 8), matWire);
  pescoco.position.y = 3.6; group.add(pescoco);

  // 3. TORSO: CORAX + NÚCLEO
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.4, 3.5, 8), mat);
  torso.position.y = 1.2; group.add(torso);

  const nucleo = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), matNucleo);
  nucleo.position.y = 1.2; group.add(nucleo);

  // 4. COSTAS + ASAS CORAX
  asas = new THREE.Group();
  const asaGeo = new THREE.BoxGeometry(5, 0.15, 3);
  const asaL = new THREE.Mesh(asaGeo, matWire); asaL.position.set(-3, 1.8, 0); asaL.rotation.z = -0.3;
  const asaR = asaL.clone(); asaR.position.x = 3; asaR.rotation.z = 0.3;
  asas.add(asaL, asaR); group.add(asas);

  // 5. CORVONAS MK-2 NOS OMBROS
  corvonas = new THREE.Group();
  const droneGeo = new THREE.SphereGeometry(0.25, 8, 8);
  const droneL = new THREE.Mesh(droneGeo, matNucleo); droneL.position.set(-2, 2.2, 0);
  const droneR = droneL.clone(); droneR.position.x = 2;
  corvonas.add(droneL, droneR); group.add(corvonas);

  // 6. BRAÇOS COMPLETOS: OMBRO + BICEPS + ANTEBRAÇO + LUVA
  const bracoGeo = new THREE.CylinderGeometry(0.4, 0.32, 2.2, 8);
  const anteGeo = new THREE.CylinderGeometry(0.32, 0.28, 2, 8);

  // BRAÇO ESQUERDO
  const ombroL = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), mat); ombroL.position.set(-2.1, 1.8, 0);
  const bicepsL = new THREE.Mesh(bracoGeo, mat); bicepsL.position.set(-2.1, 0.8, 0);
  const anteL = new THREE.Mesh(anteGeo, mat); anteL.position.set(-2.1, -0.8, 0);
  const luvaL = criarGarraMao(-2.1, -2.1, 0);
  group.add(ombroL, bicepsL, anteL, luvaL);

  // BRAÇO DIREITO
  const ombroR = ombroL.clone(); ombroR.position.x = 2.1;
  const bicepsR = bicepsL.clone(); bicepsR.position.x = 2.1;
  const anteR = anteL.clone(); anteR.position.x = 2.1;
  const luvaR = criarGarraMao(2.1, -2.1, 0);
  group.add(ombroR, bicepsR, anteR, luvaR);

  // 7. PELVIS + GLUTEOS
  const pelvis = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.6, 1, 8), mat);
  pelvis.position.y = -0.8; group.add(pelvis);

  // 8. PERNAS COMPLETAS: COXA + JOELHO + CANELA + BOTA
  const coxaGeo = new THREE.CylinderGeometry(0.5, 0.45, 2.5, 8);
  const canelaGeo = new THREE.CylinderGeometry(0.45, 0.4, 2.5, 8);

  // PERNA ESQUERDA
  const coxaL = new THREE.Mesh(coxaGeo, mat); coxaL.position.set(-0.8, -2.8, 0);
  const joelhoL = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), matWire); joelhoL.position.set(-0.8, -4.2, 0);
  const canelaL = new THREE.Mesh(canelaGeo, mat); canelaL.position.set(-0.8, -5.6, 0);
  const botaL = criarGarraPe(-0.8, -7, 0);
  group.add(coxaL, joelhoL, canelaL, botaL);

  // PERNA DIREITA
  const coxaR = coxaL.clone(); coxaR.position.x = 0.8;
  const joelhoR = joelhoL.clone(); joelhoR.position.x = 0.8;
  const canelaR = canelaL.clone(); canelaR.position.x = 0.8;
  const botaR = criarGarraPe(0.8, -7, 0);
  group.add(coxaR, joelhoR, canelaR, botaR);

  // 9. ANEL ORBITAL + PENUGEM
  const anel = new THREE.Mesh(new THREE.TorusGeometry(3.5, 0.08, 16, 100), matWire);
  anel.position.y = 1.2; group.add(anel);
  group.userData.anel = anel;

  scene.add(group);
}

function criarGarraMao(x,y,z){
  const mao = new THREE.Group();
  for(let i=0; i<5; i++){
    const dedo = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.5, 3), matWire);
    dedo.rotation.x = Math.PI/2; dedo.position.set(x + (i-2)*0.15, y, z + 0.3);
    mao.add(dedo);
  }
  return mao;
}

function criarGarraPe(x,y,z){
  const pe = new THREE.Group();
  for(let i=0; i<4; i++){
    const garra = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 3), matWire);
    garra.rotation.x = Math.PI/2;
    const ang = (i * Math.PI/2);
    garra.position.set(x + Math.cos(ang)*0.3, y, z + Math.sin(ang)*0.3);
    pe.add(garra);
  }
  return pe;
}

function animate(){
  requestAnimationFrame(animate);
  tempo += 0.02;

  // ANIMAÇÕES
  if(asas){
    asas.children[0].rotation.z = -0.3 + Math.sin(tempo*2)*0.1;
    asas.children[1].rotation.z = 0.3 - Math.sin(tempo*2)*0.1;
  }
  if(olhos){
    olhos.children.forEach(o => o.material.emissiveIntensity = 1 + Math.sin(tempo*4)*0.5);
  }
  if(corvonas){
    corvonas.children.forEach((d,i) => d.position.y = 2.2 + Math.sin(tempo*3 + i)*0.1);
  }
  if(group.userData.anel){
    group.userData.anel.rotation.y += 0.008;
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
