<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>BRACO KORVIL</title>
<style>
:root{--c:#00FFFF;--forca:#FFD60A}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.braco{display:flex;gap:5px}
.biceps{width:50px;height:100px;background:linear-gradient(var(--c),#111);border-radius:15px;border:2px solid var(--c)}
.triceps{width:50px;height:100px;background:linear-gradient(#111,var(--c));border-radius:15px;border:2px solid var(--c)}
@keyframes flex{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.2)}}
.flex{animation:flex .3s}
</style></head>
<body>
<h2>BÍCEPS + TRÍCEPS K-1</h2>
<div class="braco"><div class="biceps" id="bi"></div><div class="triceps" id="tri"></div></div>
<p>Força: <span id="forca">0</span> KG | Recuo: <span id="recuo">0</span>%</p>
<button onclick="socar()">SOCAR</button> <button onclick="levantar()">LEVANTAR</button>
<script>
function socar(){document.getElementById('tri').classList.add('flex'); document.getElementById('forca').innerText='300'; document.getElementById('recuo').innerText='80'; setTimeout(()=>document.getElementById('tri').classList.remove('flex'),300)}
function levantar(){document.getElementById('bi').classList.add('flex'); document.getElementById('forca').innerText='200'; setTimeout(()=>document.getElementById('bi').classList.remove('flex'),300)}
</script></body></html>
