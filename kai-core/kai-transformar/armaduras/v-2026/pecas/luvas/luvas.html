<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>LUVA KORVIL</title>
<style>
:root{--c:#00FFFF;--garra:#C0C0C0;--ima:#00FF88}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.luva{width:100px;height:80px;background:linear-gradient(#222,#000);border:3px solid var(--c);border-radius:15px;position:relative;display:flex;justify-content:space-around;padding-top:10px}
.dedo{width:12px;height:40px;background:var(--garra);border-radius:0 0 6px 6px;transition:.2s}
.dedo.ativa{background:var(--ima);height:50px;box-shadow:0 0 10px var(--ima)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:220px;margin:15px 0}
.card{background:rgba(0,255,255,.08);border:1px solid var(--c);border-radius:8px;padding:8px;font-size:10px;text-align:center}
</style></head>
<body>
<h2>LUVA K-1 - GARRAS DE CORVO</h2>
<div class="luva">
  <div class="dedo"></div><div class="dedo"></div><div class="dedo"></div><div class="dedo"></div><div class="dedo"></div>
</div>
<div class="grid">
  <div class="card"><div>TRAÇÃO</div><div id="tracao">100%</div></div>
  <div class="card"><div>IMÃ</div><div id="ima">OFF</div></div>
  <div class="card"><div>TÁTIL</div><div id="tatil">ATIVO</div></div>
  <div class="card"><div>FORÇA</div><div id="forca">50KG</div></div>
</div>
<div>
  <button onclick="garras()">ATIVAR GARRAS</button>
  <button onclick="ima()">MODO ÍMÃ</button>
  <button onclick="agarrar()">AGARRAR</button>
</div>
<script>
let ima=false;
function garras(){document.querySelectorAll('.dedo').forEach(d=>d.classList.add('ativa')); setTimeout(()=>document.querySelectorAll('.dedo').forEach(d=>d.classList.remove('ativa')),1500)}
function ima(){ima=!ima; document.getElementById('ima').innerText=ima?'ON':'OFF';}
function agarrar(){document.getElementById('forca').innerText='300KG'; setTimeout(()=>document.getElementById('forca').innerText='50KG',1000)}
</script></body></html>
