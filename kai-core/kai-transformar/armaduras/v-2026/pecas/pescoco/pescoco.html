<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>PESCOÇO KORVIL V-2026</title>
<style>
:root{--c:#00FFFF;--amort:#FFD60A;--giro:#00FF88}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px;display:flex;align-items:center;justify-content:center;flex-direction:column}
@keyframes girar{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
@keyframes amortecer{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.8)}}
h2{text-shadow:0 0 10px var(--c)}
.pescoco{width:80px;height:100px;background:linear-gradient(#111, var(--c), #111);border:3px solid var(--c);border-radius:20px;position:relative;box-shadow:0 0 20px var(--c)}
.vertebra{width:70px;height:8px;background:var(--c);margin:8px auto;border-radius:4px}
.cabos{position:absolute;width:4px;height:80px;background:var(--giro);left:20px;top:10px;box-shadow:0 0 5px var(--giro)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:280px;margin:15px 0}
.card{background:rgba(0,255,255,.08);border:1px solid var(--c);border-radius:8px;padding:8px;font-size:10px;text-align:center}
.btn{padding:6px 10px;background:#0d1a20;border:2px solid var(--c);color:var(--c);border-radius:6px;margin:3px;cursor:pointer;font-weight:900;font-size:10px}
.log{width:280px;height:60px;background:#001015;border:1px solid var(--c);padding:6px;font-size:9px;overflow-y:auto;border-radius:8px}
</style></head>
<body>
<h2>PESCOÇO K-1</h2>
<p>COLUNA CERVICAL + GIRO 360° + AMORTECEDOR</p>

<div class="pescoco" id="pescoco">
  <div class="vertebra"></div>
  <div class="vertebra"></div>
  <div class="vertebra"></div>
  <div class="vertebra"></div>
  <div class="cabos"></div>
</div>

<div class="grid">
  <div class="card"><div>ROTAÇÃO</div><div id="rot">0°</div></div>
  <div class="card"><div>IMPACTO</div><div id="impacto">0 G</div></div>
  <div class="card"><div>TRAVA</div><div id="trava">OFF</div></div>
  <div class="card"><div>CABOS</div><div id="cabos">100%</div></div>
  <div class="card"><div>ESTABILIDADE</div><div id="stab">100%</div></div>
  <div class="card"><div>TEMP</div><div id="temp">36°C</div></div>
</div>

<div>
  <button class="btn" onclick="olhar360()">OLHAR 360°</button>
  <button class="btn" onclick="travar()">TRAVAR PESCOÇO</button>
  <button class="btn" onclick="impacto()">TESTE IMPACTO</button>
</div>

<div class="log" id="log">> PESCOÇO: Conectando CAPACETE ao CORAX<br></div>

<script>
let rotacao=0, impactoG=0, trava=false, cabos=100;

// RECEBE DADOS DO NÚCLEO
window.addEventListener('message', e=>{
  if(e.data.tipo==='nucleo' && e.data.comando==='travar'){
    travar();
  }
});

function log(t){document.getElementById('log').innerHTML+=`> ${t}<br>`;}

function olhar360(){
  rotacao = (rotacao + 360) % 720;
  document.getElementById('pescoco').style.animation='girar 1s linear';
  log('PESCOÇO: Rotação 360° executada');
  // AVISA CAPACETE PRA COSTURAR IMAGEM
  if(window.parent.postMessage) window.parent.postMessage({tipo:'pescoco', acao:'giro', valor:rotacao},'*');
  setTimeout(()=>document.getElementById('pescoco').style.animation='none',1000);
  atualizar();
}

function travar(){
  trava = !trava;
  document.getElementById('trava').innerText = trava ? 'ON' : 'OFF';
  document.getElementById('pescoco').style.borderColor = trava ? 'var(--amort)' : 'var(--c)';
  log(`PESCOÇO: Trava cervical ${trava ? 'ativada' : 'desativada'}`);
  atualizar();
}

function impacto(){
  impactoG = Math.floor(Math.random()*15)+1;
  document.getElementById('pescoco').style.animation='amortecer .3s';
  document.getElementById('stab').innerText = (100 - impactoG*3) + '%';
  log(`PESCOÇO: Impacto de ${impactoG}G absorvido`);
  
  // SE IMPACTO ALTO, AVISA NÚCLEO
  if(impactoG > 8 && window.parent.postMessage){
    window.parent.postMessage({tipo:'pescoco', alerta:'impacto_alto'},'*');
  }
  setTimeout(()=>{document.getElementById('pescoco').style.animation='none'; impactoG=0;},1000);
  atualizar();
}

function atualizar(){
  document.getElementById('rot').innerText = rotacao + '°';
  document.getElementById('impacto').innerText = impactoG + ' G';
}

// MANUTENÇÃO AUTOMÁTICA
setInterval(()=>{
  if(cabos < 100) cabos += 0.1;
  document.getElementById('cabos').innerText = Math.round(cabos) + '%';
},1000);

log('PESCOÇO K-1: 4 VÉRTEBRAS ARTIFICIAIS ONLINE');
</script></body></html>
