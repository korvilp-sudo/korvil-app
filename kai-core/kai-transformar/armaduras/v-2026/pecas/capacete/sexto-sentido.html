<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>CAPACETE KORVIL - OLHOS DE MOSCA</title>
<style>
:root{--c:#00FFFF;--perigo:#FF3B30}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:10px}
@keyframes piscar{0%,100%{opacity:1}50%{opacity:0.3}}
h2{text-shadow:0 0 10px var(--c)}
.capacete{position:relative;width:320px;height:400px;background:radial-gradient(circle at 50% 30%, #111, #000);border-radius:50% 50% 40% 40%;border:3px solid var(--c);box-shadow:0 0 40px var(--c)}
.bico{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-top:100px solid #111;border-top-color:var(--c)}
/* 12 MICRO-CÂMERAS */
.lente{position:absolute;width:6px;height:6px;background:var(--c);border-radius:50%;box-shadow:0 0 8px var(--c);animation:piscar 3s infinite}
.lente.ativa{background:var(--perigo);box-shadow:0 0 15px var(--perigo)}
.grid360{position:absolute;bottom:20px;width:100%;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:10px}
.cam{font-size:8px;text-align:center;background:rgba(0,255,255,.1);border:1px solid var(--c);border-radius:4px;padding:2px}
.cam.ativa{background:var(--perigo);color:#000}
.log{width:100%;max-width:500px;height:80px;background:#001015;border:1px solid var(--c);padding:6px;font-size:10px;overflow-y:auto;border-radius:8px;margin-top:10px}
</style></head>
<body>
<h2>CAPACETE KORVIL - OLHOS DE MOSCA v-2026</h2>
<p>VISÃO 360° | 12 MICRO-CÂMERAS | ESTÉTICA CORVO</p>

<div class="capacete" id="capacete">
  <div class="bico"></div>
  <!-- LENTES ESPALHADAS -->
  <div class="lente" style="top:15%;left:50%"></div> <!-- TOPO -->
  <div class="lente" style="top:25%;left:25%"></div>
  <div class="lente" style="top:25%;right:25%"></div>
  <div class="lente" style="top:40%;left:10%"></div>
  <div class="lente" style="top:40%;right:10%"></div>
  <div class="lente" style="top:55%;left:5%"></div>
  <div class="lente" style="top:55%;right:5%"></div>
  <div class="lente" style="top:70%;left:20%"></div>
  <div class="lente" style="top:70%;right:20%"></div>
  <div class="lente" style="bottom:25%;left:35%"></div>
  <div class="lente" style="bottom:25%;right:35%"></div>
  <div class="lente" style="bottom:15%;left:50%"></div> <!-- NUCA -->
</div>

<div class="grid360" id="gridCams"></div>

<div class="log" id="logIA">> K-AI: 12 Lentes Online. Costurando imagem 360°<br></div>

<script>
const NOMES = ['TOPO','F-ESQ','F-DIR','L-ESQ','L-DIR','TRAS-ESQ','TRAS-DIR','BAIXO-ESQ','BAIXO-DIR','NUCA-ESQ','NUCA-DIR','BASE'];

function criarGrid(){
  const grid = document.getElementById('gridCams');
  NOMES.forEach((n,i)=>{
    const div = document.createElement('div');
    div.className='cam'; div.id='cam'+i; div.innerText=n;
    grid.appendChild(div);
  })
}

function ativarLente(i, ameaca=false){
  document.querySelectorAll('.lente')[i].classList.add('ativa');
  document.getElementById('cam'+i).classList.add('ativa');
  log(`Lente ${NOMES} detectou movimento`);

  if(ameaca){
    // AVISA O SEXTO SENTIDO
    let dir = i<4?'FRENTE': i<8?'LATERAL':'ATRÁS';
    if(window.parent.postMessage) window.parent.postMessage({tipo:'ameaca', dir:dir, tipo:'MOVIMENTO'},'*');
  }

  setTimeout(()=>{
    document.querySelectorAll('.lente')[i].classList.remove('ativa');
    document.getElementById('cam'+i).classList.remove('ativa');
  },1000);
}

function log(t){document.getElementById('logIA').innerHTML+=`> ${t}<br>`;}

// SIMULA DETECÇÃO 360
setInterval(()=>{
  let i = Math.floor(Math.random()*12);
  let ameaca = Math.random() > 0.7;
  ativarLente(i, ameaca);
}, 800);

// COSTURA AS IMAGENS - MANDA PRO VISOR
function costurar360(){
  // Aqui pegaria as 12 streams e juntava em 1 só pro canvas do visor
  if(window.parent.atualizarVisor360) window.parent.atualizarVisor360('imagem_costurada');
}

criarGrid();
</script>
</body></html>
