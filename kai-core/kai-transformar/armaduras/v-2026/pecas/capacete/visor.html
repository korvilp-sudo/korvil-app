
<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><style>body{margin:0;background:#000;overflow:hidden}video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}</style>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let modelObj, modelFace;
let stream = null;

async function abrirCamera() {
  stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }});
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }
}

async function iniciar(){
  modelObj = await cocoSsd.load();
  modelFace = await blazeface.load();
  abrirCamera();
  detectar();
}

async function detectar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let encontrou = false;
  const faces = await modelFace.estimateFaces(video, false);
  faces.forEach(face => {
    const [x,y] = face.topLeft; const [x2,y2] = face.bottomRight;
    const w = x2-x; const h = y2-y;
    ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 3;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#00FFFF'; ctx.font = 'bold 14px Segoe UI';
    ctx.fillText(`HUMANO 99%`, x, y-8);
    window.parent.atualizarTexto('ALVO: HUMANO');
    encontrou = true;
  });
  const objs = await modelObj.detect(video);
  window.parent.atualizarAlvos(objs.length + faces.length);
  objs.forEach(obj => {
    const [x,y,w,h] = obj.bbox;
    ctx.strokeStyle = '#A8FFE6'; ctx.lineWidth = 2;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#A8FFE6'; ctx.font = 'bold 12px Segoe UI';
    ctx.fillText(`${obj.class} ${(obj.score*100).toFixed(0)}%`, x, y-5);
    if(!encontrou) window.parent.atualizarTexto(obj.class.toUpperCase());
  });
  if(!encontrou) window.parent.atualizarTexto('SCANEANDO...');
  requestAnimationFrame(detectar);
}
iniciar();
</script>
</body>
</html>
