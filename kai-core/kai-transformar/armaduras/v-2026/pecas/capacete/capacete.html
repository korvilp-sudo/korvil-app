<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI CAPACETE V-2026</title>
<style>
:root{--kai:#00FFFF;--kai2:#A8FFE6;--alerta:#FF3B30;--bg:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif}
body{background:#000;overflow:hidden}
iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0}

/* HUD MESTRE */
.hud-mestre{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:100
}
.hud-corner{position:absolute;width:90px;height:90px;border:2px solid var(--kai);box-shadow:0 0 20px var(--kai)}
.tl{top:20px; left:20px; border-right:none; border-bottom:none}
.tr{top:20px; right:20px; border-left:none; border-bottom:none}
.bl{bottom:90px; left:20px; border-right:none; border-top:none}
.br{bottom:90px; right:20px; border-left:none; border-top:none}

.texto-central{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--kai);text-shadow:0 0 15px var(--kai);pointer-events:all
}
.texto1{font-size:24px;font-weight:900;letter-spacing:2px;animation:piscar 1.2s infinite}
.texto2{font-size:11px;margin-top:4px;opacity:0.7}
@keyframes piscar{0%,100%{opacity:1} 50%{opacity:0.3}}

.painel{
  position:absolute;bottom:20px;width:100%;display:flex;justify-content:space-around;
  color:var(--kai);font-size:11px;font-weight:800;pointer-events:all
}
.stat{text-align:center}
.stat span{font-size:20px;font-weight:900;text-shadow:0 0 10px var(--kai)}

.botoes{
  position:absolute;bottom:15px;right:15px;display:flex;gap:8px;pointer-events:all;z-index:101
}
.btn{
  padding:8px 14px;background:rgba(0,255,255,0.15);border:1.5px solid var(--kai);
  color:var(--kai);border-radius:6px;font-weight:800;cursor:pointer;font-size:12px
}
.btn.active{background:var(--kai);color:#000;box-shadow:0 0 15px var(--kai)}
</style>
</head>
<body>

<!-- CARREGA OS 3 SISTEMAS -->
<iframe id="visorFrame" src="visor.html"></iframe>
<iframe id="fonesFrame" src="fones.html" style="opacity:0"></iframe>
<iframe id="bicoFrame" src="bico-de-corvo.html" style="opacity:0"></iframe>

<div class="hud-mestre">
  <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div><div class="hud-corner br"></div>

  <div class="texto-central">
    <div class="texto1" id="texto">SCANEANDO...</div>
    <div class="texto2">K-AI CAPACETE V-2026 | PROTOCOLO SAY KORVIL</div>
  </div>

  <div class="painel">
    <div class="stat"><span id="alvos">0</span><br>ALVOS</div>
    <div class="stat"><span id="db">45dB</span><br>SOM</div>
    <div class="stat"><span id="o2">100%</span><br>O2</div>
  </div>

  <div class="botoes">
    <button class="btn active" id="btnVisor">VISOR</button>
    <button class="btn" id="btnFones">FONES</button>
    <button class="btn" id="btnBico">BICO</button>
    <button class="btn" onclick="window.parent.fecharArmadura()">SAIR</button>
  </div>
</div>

<script>
// Comunicação entre os iframes
window.atualizarTexto = (txt) => document.getElementById('texto').innerText = txt;
window.atualizarAlvos = (n) => document.getElementById('alvos').innerText = n;
window.atualizarDB = (n) => document.getElementById('db').innerText = n + 'dB';
window.atualizarO2 = (n) => document.getElementById('o2').innerText = n + '%';

function falar(texto){
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'pt-BR'; utter.rate = 1.1;
  speechSynthesis.speak(utter);
}

// Trocar abas
document.getElementById('btnVisor').onclick = () => {
  document.getElementById('visorFrame').style.opacity = 1;
  document.getElementById('fonesFrame').style.opacity = 0;
  document.getElementById('bicoFrame').style.opacity = 0;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnVisor').classList.add('active');
}

document.getElementById('btnFones').onclick = () => {
  document.getElementById('visorFrame').style.opacity = 0;
  document.getElementById('fonesFrame').style.opacity = 1;
  document.getElementById('bicoFrame').style.opacity = 0;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnFones').classList.add('active');
  document.getElementById('fonesFrame').contentWindow.iniciarFones();
}

document.getElementById('btnBico').onclick = () => {
  document.getElementById('visorFrame').style.opacity = 0;
  document.getElementById('fonesFrame').style.opacity = 0;
  document.getElementById('bicoFrame').style.opacity = 1;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnBico').classList.add('active');
}

falar("Capacete K-AI ativado. Protocolo Say Korvil");
</script>
</body>
</html>
