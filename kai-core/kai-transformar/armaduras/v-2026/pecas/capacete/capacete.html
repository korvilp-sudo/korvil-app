
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI CAPACETE V-2026</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
<style>
:root{--kai:#00FFFF;--kai2:#A8FFE6;--alerta:#FF3B30;--bg:#000}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif}
body{background:#000;overflow:hidden}

video, canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#octaCanvas{pointer-events:none;z-index:10}

/* LOADING */
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--kai);font-size:18px;text-shadow:0 0 20px var(--kai);z-index:100;text-align:center}

/* HUD CAPACETE */
.hud-corner{position:absolute;width:90px;height:90px;border:2px solid var(--kai);box-shadow:0 0 20px var(--kai)}
.tl{top:20px; left:20px; border-right:none; border-bottom:none}
.tr{top:20px; right:20px; border-left:none; border-bottom:none}
.bl{bottom:90px; left:20px; border-right:none; border-top:none}
.br{bottom:90px; right:20px; border-left:none; border-top:none}

.octa-grid{
  position:absolute;width:100%;height:100%;
  background-image:
    linear-gradient(rgba(0,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.06) 1px, transparent 1px);
  background-size:50px 50px;
  animation:gridKai 20s linear infinite;
}
@keyframes gridKai{100%{background-position:50px 50px}}

.texto-central{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--kai);text-shadow:0 0 15px var(--kai)
}
.texto1{font-size:22px;font-weight:900;letter-spacing:2px;animation:piscar 1.2s infinite}
.texto2{font-size:11px;margin-top:4px;opacity:0.7}
@keyframes piscar{0%,100%{opacity:1} 50%{opacity:0.3}}

/* PAINEL LATERAL SISTEMAS */
.painel-sistemas{
  position:absolute;right:10px;top:100px;width:140px;
  background:rgba(0,255,255,0.05);border:1px solid var(--kai);border-radius:8px;
  padding:10px;font-size:10px;color:var(--kai)
}
.sistema{margin-bottom:8px}
.sistema span{font-weight:900;font-size:14px}
.barra{width:100%;height:4px;background:#0d1a20;border-radius:2px;margin-top:3px}
.barra-fill{height:100%;background:var(--kai);box-shadow:0 0 8px var(--kai);border-radius:2px;transition:width 0.3s}

/* PAINEL INFERIOR */
.painel{
  position:absolute;bottom:20px;width:100%;display:flex;justify-content:space-around;
  color:var(--kai);font-size:11px;font-weight:800
}
.stat{text-align:center}
.stat span{font-size:20px;font-weight:900;text-shadow:0 0 10px var(--kai)}

/* BOTOES */
.botoes{
  position:absolute;bottom:15px;right:15px;display:flex;gap:8px;pointer-events:all;z-index:12
}
.btn{
  padding:8px 14px;background:rgba(0,255,255,0.15);border:1.5px solid var(--kai);
  color:var(--kai);border-radius:6px;font-weight:800;cursor:pointer;font-size:12px
}
.btn.active{background:var(--kai);color:#000;box-shadow:0 0 15px var(--kai)}
</style>
</head>
<body>

<div class="loading" id="loading">
  > INICIALIZANDO CAPACETE K-AI<br>
  <span style="font-size:12px" id="loadStatus">CARREGANDO NÚCLEO...</span>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="octaCanvas"></canvas>

<div class="hud">
  <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div><div class="hud-corner br"></div>
  <div class="octa-grid"></div>

  <div class="texto-central">
    <div class="texto1" id="texto">SCANEANDO...</div>
    <div class="texto2">K-AI CAPACETE V-2026 | SAY KORVIL</div>
  </div>

  <!-- 2. SISTEMA FONES -->
  <div class="painel-sistemas">
    <div class="sistema">
      <div>VISÃO</div>
      <span id="visaoStatus">ON</span>
    </div>
    <div class="sistema">
      <div>FONES AMPLI.</div>
      <div class="barra"><div class="barra-fill" id="audioBar" style="width:50%"></div></div>
    </div>
    <div class="sistema">
      <div>OXIGÊNIO</div>
      <div class="barra"><div class="barra-fill" id="oxBar" style="width:100%"></div></div>
    </div>
  </div>

  <div class="painel">
    <div class="stat"><span id="alvos">0</span><br>ALVOS</div>
    <div class="stat"><span id="db">45dB</span><br>SOM</div>
    <div class="stat"><span id="o2">100%</span><br>O2</div>
  </div>

  <div class="botoes">
    <button class="btn" id="btnAudio">FONES</button>
    <button class="btn" id="trocar">CAM</button>
    <button class="btn" onclick="window.close()">SAIR</button>
  </div>
</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let octaCanvas = document.getElementById('octaCanvas');
let octaCtx = octaCanvas.getContext('2d');
let modelObj, modelFace;
let usarFrontal = true;
let stream = null;
let angulo = 0;

// ===== 2. SISTEMA DE ÁUDIO FONES =====
let audioContext;
let micStream;
let audioAtivo = false;
function iniciarAudio(){
  if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  navigator.mediaDevices.getUserMedia({audio:true}).then(s => {
    micStream = s;
    const source = audioContext.createMediaStreamSource(s);
    
    // Noise Suppression + Gain
    const noiseSupressor = audioContext.createBiquadFilter();
    noiseSupressor.type = "highpass";
    noiseSupressor.frequency.value = 300;
    
    const gainNode = audioContext.createGain();
    gainNode.gain.value = 3.0; // Amplificar som distante
    
    source.connect(noiseSupressor).connect(gainNode).connect(audioContext.destination);
    
    // Medidor de dB
    const analyser = audioContext.createAnalyser();
    gainNode.connect(analyser);
    medirDB(analyser);
    
  }).catch(e=>console.log("Mic negado"));
}

function medirDB(analyser){
  const data = new Uint8Array(analyser.frequencyBinCount);
  function loop(){
    if(!audioAtivo) return;
    analyser.getByteFrequencyData(data);
    let avg = data.reduce((a,b)=>a+b)/data.length;
    let db = Math.round(avg/2.5);
    document.getElementById('db').innerText = db + 'dB';
    document.getElementById('audioBar').style.width = Math.min(db*2, 100) + '%';
    requestAnimationFrame(loop);
  }
  loop();
}

// ===== 1. VISOR COM CÂMERA =====
async function abrirCamera() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: usarFrontal? "user" : "environment" }
  });
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    octaCanvas.width = window.innerWidth;
    octaCanvas.height = window.innerHeight;
  }
}

async function iniciar(){
  document.getElementById('loadStatus').innerText = 'CARREGANDO IA OBJETOS...';
  modelObj = await cocoSsd.load();
  
  document.getElementById('loadStatus').innerText = 'CARREGANDO IA ROSTO...';
  modelFace = await blazeface.load();
  
  document.getElementById('loadStatus').innerText = 'SISTEMA ONLINE';
  setTimeout(()=>{document.getElementById('loading').style.display = 'none'}, 800);
  
  abrirCamera();
  detectar();
  desenharOctaedros();
  iniciarSimulacaoOxigenio();
}

async function detectar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let encontrou = false;

  const faces = await modelFace.estimateFaces(video, false);
  faces.forEach(face => {
    const [x,y] = face.topLeft; const [x2,y2] = face.bottomRight;
    const w = x2-x; const h = y2-y;
    ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 3;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#00FFFF'; ctx.font = 'bold 14px Segoe UI';
    ctx.fillText(`HUMANO 99%`, x, y-8);
    document.getElementById('texto').innerText = 'ALVO: HUMANO';
    encontrou = true;
  });

  const objs = await modelObj.detect(video);
  document.getElementById('alvos').innerText = objs.length + faces.length;
  objs.forEach(obj => {
    const [x,y,w,h] = obj.bbox;
    ctx.strokeStyle = '#A8FFE6'; ctx.lineWidth = 2;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#A8FFE6'; ctx.font = 'bold 12px Segoe UI';
    ctx.fillText(`${obj.class} ${(obj.score*100).toFixed(0)}%`, x, y-5);
    if(!encontrou) document.getElementById('texto').innerText = obj.class.toUpperCase();
  });

  if(!encontrou) document.getElementById('texto').innerText = 'SCANEANDO...';
  requestAnimationFrame(detectar);
}

// ===== 3. BICO DE CORVO - OXIGÊNIO =====
let o2 = 100;
function iniciarSimulacaoOxigenio(){
  setInterval(()=>{
    o2 -= 0.05; // Gasta oxigênio
    if(o2 < 0) o2 = 100; // Recarrega
    document.getElementById('o2').innerText = Math.round(o2) + '%';
    document.getElementById('oxBar').style.width = o2 + '%';
    
    if(o2 < 20){
      document.getElementById('oxBar').style.background = 'var(--alerta)';
      document.getElementById('texto').innerText = 'ALERTA: OXIGÊNIO BAIXO';
    }
  }, 1000);
}

// OCTAEDROS
function desenharOctaedros(){
  octaCtx.clearRect(0,0,octaCanvas.width,octaCanvas.height);
  angulo += 0.008;
  for(let i=0; i<3; i++){
    let x = octaCanvas.width/2 + Math.cos(angulo + i*2) * 120;
    let y = octaCanvas.height/2 + Math.sin(angulo + i*2) * 80;
    let size = 18 + i*8;
    octaCtx.strokeStyle = `rgba(0,255,255,${0.4 - i*0.1})`;
    octaCtx.lineWidth = 1.5;
    octaCtx.beginPath();
    for(let j=0; j<8; j++){
      let ang = (j/8) * Math.PI*2 + angulo;
      let px = x + Math.cos(ang) * size;
      let py = y + Math.sin(ang) * size;
      if(j===0) octaCtx.moveTo(px,py); else octaCtx.lineTo(px,py);
    }
    octaCtx.closePath(); octaCtx.stroke();
  }
  requestAnimationFrame(desenharOctaedros);
}

// BOTOES
document.getElementById('trocar').onclick = async () => {
  usarFrontal = !usarFrontal;
  await abrirCamera();
}

document.getElementById('btnAudio').onclick = () => {
  audioAtivo = !audioAtivo;
  document.getElementById('btnAudio').classList.toggle('active');
  if(audioAtivo){
    iniciarAudio();
    document.getElementById('visaoStatus').innerText = 'ON + AUDIO';
  } else {
    if(micStream) micStream.getTracks().forEach(t=>t.stop());
    document.getElementById('visaoStatus').innerText = 'ON';
  }
}

abrirCamera().then(iniciar);
</script>
</body>
</html>
