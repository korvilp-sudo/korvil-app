<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI VISOR v-2026</title>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
body{margin:0;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#hud3d{pointer-events:none;z-index:5}
.hud-top{position:absolute;top:20px;width:100%;text-align:center;color:var(--c);font-weight:900;font-size:14px;letter-spacing:3px;text-shadow:0 0 15px var(--c);z-index:10}
.hud-info{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:var(--c2);font-weight:700;font-size:16px;text-shadow:0 0 10px var(--c);z-index:10;background:rgba(0,0,0,.6);padding:8px 20px;border-radius:20px;border:1px solid var(--c)}
.hud-menu{position:absolute;background:rgba(0,20,30,.85);border:2px solid var(--c);border-radius:10px;padding:12px;color:var(--c2);font-size:13px;font-weight:700;box-shadow:0 0 20px var(--c)50;z-index:10;pointer-events:auto}
.hud-title{color:var(--c);margin-bottom:8px;font-size:12px;letter-spacing:1px}
.hud-menu div{padding:4px 0;cursor:pointer;transition:.2s}
.hud-menu div:hover{color:var(--c);padding-left:5px}
.hud-superior{top:60px;left:50%;transform:translateX(-50%)}
.hud-inferior{bottom:110px;left:50%;transform:translateX(-50%)}
.hud-esquerdo{top:50%;left:15px;transform:translateY(-50%)}
.hud-direito{top:50%;right:15px;transform:translateY(-50%)}
.btn-fechar{position:absolute;bottom:20px;right:20px;background:#000;border:2px solid var(--c);color:var(--c);padding:12px 24px;border-radius:25px;font-weight:900;cursor:pointer;box-shadow:0 0 20px var(--c);z-index:10}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="hud3d"></canvas>

<div class="hud-top">K-AI VISOR v-2026 | PROTOCOLO: SAY KORVIL</div>
<div class="hud-info" id="hudTexto">SCANEANDO...</div>

<div class="hud-menu hud-superior">
  <div class="hud-title">CAPACETE</div>
  <div onclick="mostrarPeca('visor')">1. Visor</div>
  <div onclick="mostrarPeca('fones')">2. Fones</div>
  <div onclick="mostrarPeca('bico')">3. Bico</div>
</div>
<div class="hud-menu hud-inferior">
  <div class="hud-title">INFERIOR</div>
  <div onclick="mostrarPeca('pernas')">1. Pernas</div>
  <div onclick="mostrarPeca('pes')">2. Pés</div>
  <div onclick="mostrarPeca('garras')">3. Garras</div>
</div>
<div class="hud-menu hud-esquerdo">
  <div class="hud-title">ESQUERDO</div>
  <div onclick="mostrarPeca('peitoral')">1. Peitoral</div>
  <div onclick="mostrarPeca('asas')">2. Asas</div>
  <div onclick="mostrarPeca('ombreiras')">3. Ombreiras</div>
</div>
<div class="hud-menu hud-direito">
  <div class="hud-title">DIREITO</div>
  <div onclick="mostrarPeca('bracos')">1. Braços</div>
  <div onclick="mostrarPeca('luvas')">2. Luvas</div>
</div>
<button class="btn-fechar" onclick="sairVisor()">SAIR VISOR</button>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let modelObj, modelFace;
let hudScene, hudCamera, hudRenderer, pecaAtual;
let stream = null;

async function abrirCamera() {
  stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }});
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    initHUD3D();
  }
}

async function iniciar(){
  modelObj = await cocoSsd.load();
  modelFace = await blazeface.load();
  abrirCamera();
  detectar();
}

async function detectar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let encontrou = false;

  // DETECÇÃO DE ROSTO
  const faces = await modelFace.estimateFaces(video, false);
  faces.forEach(face => {
    const [x,y] = face.topLeft; const [x2,y2] = face.bottomRight;
    const w = x2-x; const h = y2-y;
    ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 3;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#00FFFF'; ctx.font = 'bold 14px Segoe UI';
    ctx.fillText(`ALVO HUMANO 99%`, x, y-8);
    atualizarTexto('ALVO: HUMANO DETECTADO');
    encontrou = true;
  });

  // DETECÇÃO DE OBJETOS
  const objs = await modelObj.detect(video);
  atualizarAlvos(objs.length + faces.length);
  objs.forEach(obj => {
    const [x,y,w,h] = obj.bbox;
    ctx.strokeStyle = '#A8FFE6'; ctx.lineWidth = 2;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = '#A8FFE6'; ctx.font = 'bold 12px Segoe UI';
    ctx.fillText(`${obj.class} ${(obj.score*100).toFixed(0)}%`, x, y-5);
    if(!encontrou) atualizarTexto(obj.class.toUpperCase());
  });

  if(!encontrou) atualizarTexto('SCANEANDO...');
  requestAnimationFrame(detectar);
}

// FUNÇÕES HUD 3D
function initHUD3D(){
  hudScene = new THREE.Scene();
  hudCamera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  hudCamera.position.z = 5;
  hudRenderer = new THREE.WebGLRenderer({canvas:document.getElementById('hud3d'), alpha:true, antialias:true});
  hudRenderer.setSize(window.innerWidth, window.innerHeight);
  hudRenderer.setClearColor(0x000, 0);
  hudScene.add(new THREE.AmbientLight(0x00FFFF, 0.6));
  const luz = new THREE.PointLight(0x00FFFF, 2); luz.position.set(2,2,2);
  hudScene.add(luz);
  animateHUD();
}

function mostrarPeca(peca){
  if(pecaAtual) hudScene.remove(pecaAtual);
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.7, wireframe:true, transparent:true, opacity:0.85});
  const geometrias = {
    'visor': new THREE.SphereGeometry(0.9, 16, 16),
    'fones': new THREE.TorusGeometry(0.45, 0.1, 8, 16),
    'bico': new THREE.ConeGeometry(0.35, 0.9, 4),
    'peitoral': new THREE.CylinderGeometry(0.9, 0.8, 1.1, 8),
    'asas': new THREE.BoxGeometry(2.2, 0.1, 1.1),
    'ombreiras': new THREE.SphereGeometry(0.45, 8, 8),
    'bracos': new THREE.CylinderGeometry(0.22, 0.17, 1.3, 8),
    'luvas': new THREE.BoxGeometry(0.35, 0.35, 0.45),
    'pernas': new THREE.CylinderGeometry(0.32, 0.27, 1.6, 8),
    'pes': new THREE.BoxGeometry(0.45, 0.22, 0.65),
    'garras': new THREE.ConeGeometry(0.17, 0.55, 3)
  };
  pecaAtual = new THREE.Mesh(geometrias[peca] || geometrias['visor'], mat);
  pecaAtual.position.y = 0.3;
  hudScene.add(pecaAtual);
  atualizarTexto(`PEÇA CARREGADA: ${peca.toUpperCase()}`);
  if(window.parent.falar) window.parent.falar(`Carregando ${peca}`);
}

function animateHUD(){
  requestAnimationFrame(animateHUD);
  if(pecaAtual){ pecaAtual.rotation.y += 0.012; pecaAtual.rotation.x += 0.006; }
  hudRenderer.render(hudScene, hudCamera);
}
  function executarFuncao(id){
  document.querySelectorAll('.mini-btn').forEach(b => b.classList.remove('ativo'));
  document.getElementById(`btn-${id}`).classList.add('ativo');

  // CHAMA A FUNÇÃO QUE ESTÁ DENTRO DO ARQUIVO DA PEÇA
  dadosPecaAtual.executar(id, video); 
  
  atualizarTexto(`${dadosPecaAtual.nome} > ${id}`);
  document.querySelector('.mini-status').innerText = dadosPecaAtual.status;
  }

function atualizarTexto(txt){ document.getElementById('hudTexto').innerText = txt; }
function atualizarAlvos(qtd){ if(window.parent.atualizarAlvos) window.parent.atualizarAlvos(qtd); }
function sairVisor(){ if(stream) stream.getTracks().forEach(track => track.stop()); window.parent.fecharVisor(); }

iniciar();
</script>
</body>
</html>
