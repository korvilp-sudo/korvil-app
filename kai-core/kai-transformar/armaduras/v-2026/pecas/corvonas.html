<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>CORVONAS MK-2 K-AI</title>
<style>
:root{--c:#00FFFF;--nano:#A8FFE6;--drone:#00FF88;--suporte:#FFD60A;--defesa:#FF3B30}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px;display:flex;align-items:center;justify-content:center;flex-direction:column}
@keyframes nano{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
@keyframes voar{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
h2{color:var(--c);text-shadow:0 0 10px var(--c)}
.logo{font-size:18px;font-weight:900;letter-spacing:2px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:550px}
.card{background:rgba(0,255,255,.08);border:2px solid var(--c);border-radius:10px;padding:10px;text-align:center;font-size:11px}
.card.nano{border-color:var(--nano)} .card.drone{border-color:var(--drone)} .card.suporte{border-color:var(--suporte)}
.barra{width:100%;height:12px;background:#0d1a20;border:2px solid var(--c);border-radius:10px;margin:5px 0}
.barra-fill{height:100%;background:var(--energia);border-radius:8px;transition:width .3s}
.btn{padding:7px 10px;background:#0d1a20;border:2px solid var(--c);color:var(--c);border-radius:8px;margin:3px;cursor:pointer;font-weight:900;font-size:10px}
.btn:hover{background:var(--c);color:#000}
.modelo{width:320px;height:180px;margin:15px;position:relative}
.corvona{position:absolute;width:140px;height:90px;background:linear-gradient(135deg,#111,var(--c));border-radius:60% 40% 20% 80%;border:3px solid var(--c)}
.corvona.esq{left:0;top:45px} .corvona.dir{right:0;top:45px}
.nano-part{position:absolute;width:4px;height:4px;background:var(--nano);border-radius:50%;animation:nano 2s infinite}
.drone-bay{position:absolute;width:12px;height:12px;background:var(--drone);border-radius:3px;top:15px}
.log{width:100%;max-width:550px;height:90px;background:#001015;border:1px solid var(--c);padding:8px;font-size:10px;overflow-y:auto;border-radius:8px}
.tag{background:var(--c);color:#000;padding:2px 6px;border-radius:4px;font-size:9px;margin:2px;display:inline-block}
</style></head>
<body>
<h2 class="logo">CORVONAS MK-2 K-AI</h2>
<p>SISTEMA UTILITÁRIO NANO + DRONES + SUPORTE</p>

<div class="modelo">
  <div class="corvona esq">
    <div class="drone-bay" style="left:20px"></div><div class="drone-bay" style="left:40px"></div><div class="drone-bay" style="left:60px"></div>
    <div class="nano-part" style="left:30px;top:50px"></div><div class="nano-part" style="left:50px;top:60px"></div>
  </div>
  <div class="corvona dir">
    <div class="drone-bay" style="right:20px"></div><div class="drone-bay" style="right:40px"></div><div class="drone-bay" style="right:60px"></div>
    <div class="nano-part" style="right:30px;top:50px"></div><div class="nano-part" style="right:50px;top:60px"></div>
  </div>
</div>

<div class="grid">
  <div class="card nano"><div>NANOBOTS</div><div id="nano">100%</div></div>
  <div class="card drone"><div>DRONES</div><div id="drones">4/4</div></div>
  <div class="card suporte"><div>ENERGIA</div><div id="energia">100%</div></div>
  <div class="card"><div>ESCUDO</div><div id="escudo">ATIVO</div></div>
  <div class="card"><div>MEDKIT</div><div id="medkit">PRONTO</div></div>
  <div class="card"><div>GANCHO</div><div id="gancho">OK</div></div>
</div>

<div class="barra"><div class="barra-fill" id="energiaBar" style="width:100%;background:var(--suporte)"></div></div>

<div>
  <span class="tag" onclick="lancarDrone()">LANÇAR DRONE</span>
  <span class="tag" onclick="nanoReparo()">NANO REPARO</span>
  <span class="tag" onclick="escudoEnergia()">ESCUDO</span>
  <span class="tag" onclick="ganchoGarra()">GANCHO</span>
  <span class="tag" onclick="medkit()">MEDKIT</span>
  <span class="tag" onclick="luzCega()">LUZ</span>
  <span class="tag" onclick="fumaca()">FUMAÇA</span>
  <span class="tag" onclick="sinalizador()">SOS</span>
</div>

<div class="log" id="logIA">> CORVONAS MK-2: Sistema Utilitário Online<br></div>

<script>
let energia=100, nano=100, drones=4;

// 8 FUNÇÕES UTILITÁRIAS ESTILO IRON MAN
function lancarDrone(){
  if(drones<=0) return log('Sem drones');
  drones--; energia-=3;
  log('CORVONAS: Drone de reconhecimento lançado. Transmitindo 360°');
  // CONJUGA: Manda imagem pro Visor
  if(window.parent.postMessage) window.parent.postMessage({tipo:'drone', status:'voando'},'*');
  setTimeout(()=>{drones++; log('Drone retornou e recarregou')},10000);
}

function nanoReparo(){
  if(nano<10) return log('Nanobots insuficientes');
  nano-=10; energia-=5;
  log('CORVONAS: Nanobots reparando armadura. Risco de dano -80%');
  // Animação de reparo
  document.querySelectorAll('.corvona').forEach(c=>c.style.boxShadow='0 0 30px var(--nano)');
  setTimeout(()=>document.querySelectorAll('.corvona').forEach(c=>c.style.boxShadow=''),2000);
}

function escudoEnergia(){
  energia-=8;
  log('CORVONAS: Campo de força ativado. Duração 10s');
  document.querySelectorAll('.corvona').forEach(c=>c.style.animation='escudo 0.5s infinite');
  // AVISA CAPACETE
  if(window.parent.vibrar) window.parent.vibrar(150);
  setTimeout(()=>document.querySelectorAll('.corvona').forEach(c=>c.style.animation=''),10000);
}

function ganchoGarra(){
  energia-=4;
  log('CORVONAS: Gancho de escalada disparado. Alcance 20m');
  if(window.parent.falar) window.parent.falar('Gancho ativado');
}

function medkit(){
  energia-=6;
  log('CORVONAS: Medkit de emergência aplicado. Analgésico + atadura');
  if(window.parent.falar) window.parent.falar('Primeiros socorros aplicados');
}

function luzCega(){
  energia-=2;
  log('CORVONAS: Flash de LED 2000 lumens. Desorientação não-letal');
  // CONJUGA: Visor entra modo filtro
  if(window.parent.postMessage) window.parent.postMessage({tipo:'flash'},'*');
}

function fumaca(){
  energia-=3;
  log('CORVONAS: Cortina de fumaça liberada. Fuga tática');
}

function sinalizador(){
  energia-=1;
  log('CORVONAS: Sinalizador SOS + GPS ativado. Enviando localização');
  if(window.parent.postMessage) window.parent.postMessage({tipo:'sos'},'*');
}

function atualizarHUD(){
  document.getElementById('energiaBar').style.width=energia+'%';
  document.getElementById('energia').innerText=Math.round(energia)+'%';
  document.getElementById('nano').innerText=Math.round(nano)+'%';
  document.getElementById('drones').innerText=drones+'/4';
}

function log(t){document.getElementById('logIA').innerHTML+=`> ${t}<br>`;}

// RECARGA + PREVENÇÃO FUTURA
setInterval(()=>{
  if(energia<100) energia+=0.4;
  if(nano<100) nano+=0.1;
  
  // PREVENÇÃO AUTOMÁTICA
  if(window.parent.dbBoca > 80){ escudoEnergia(); }
  if(window.parent.queda === true){ ganchoGarra(); }
  
  atualizarHUD();
},300);

// SISTEMA DE EXPANSÃO: Adicione novas funções aqui
const MODULOS_FUTUROS = {
  'emp': 'Pulso EMP não-letal',
  'scanner': 'Scanner biométrico',
  'hack': 'Hackeador de fechadura',
  'extintor': 'Extintor de incêndio'
}

log('CORVONAS MK-2: 8 Módulos ativos. Pronto pra expansão');
</script>
</body></html>
