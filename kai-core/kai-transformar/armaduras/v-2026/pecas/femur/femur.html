<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>FÊMUR KORVIL</title>
<style>
:root{--c:#00FFFF}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px}
.femur{width:60px;height:140px;background:linear-gradient(#111,var(--c));border-radius:15px;border:2px solid var(--c)}
</style></head>
<body>
<h2>FÊMUR K-1</h2>
<div class="femur"></div>
<p>Força: <span id="forca">0</span> KG | Bateria: <span id="bat">100</span>%</p>
<button onclick="flexionar()">FLEXIONAR</button>
<script>
let forca=0, bat=100;
function flexionar(){forca=100; bat-=2; atualizar();}
function atualizar(){document.getElementById('forca').innerText=forca;document.getElementById('bat').innerText=bat;}
</script></body></html>
