<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>TÍBIA KORVIL</title>
<style>
:root{--c:#00FFFF;--prop:#00FF88}
body{margin:0;background:#000;color:var(--c);font-family:Segoe UI;padding:15px}
.tibia{width:50px;height:140px;background:linear-gradient(var(--c),#111);border-radius:15px;border:2px solid var(--c)}
</style></head>
<body>
<h2>TÍBIA K-1</h2>
<div class="tibia"></div>
<p>Velocidade: <span id="vel">0</span> km/h | Giro: <span id="giro">100</span>%</p>
<button onclick="correr()">CORRER</button>
<script>
let vel=0;
function correr(){vel=60; setTimeout(()=>vel=0,2000); atualizar();}
function atualizar(){document.getElementById('vel').innerText=vel;}
</script></body></html>
