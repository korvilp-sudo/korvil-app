
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI TRANSFORMATION</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent}
#canvas{width:100%;height:100%;display:block}

/* HUD CYBER */
.hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.scanline{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00FFFF,transparent);animation:scan 2s linear infinite;box-shadow:0 0 15px #00FFFF}
@keyframes scan{0%{top:0}100%{top:100%}}

.status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#00FFFF;font-family:'Segoe UI',Arial;font-weight:900}
.status h1{font-size:28px;letter-spacing:4px;text-shadow:0 0 20px #00FFFF;margin-bottom:10px}
.status p{font-size:14px;letter-spacing:2px;opacity:.8}
.progress{width:300px;height:4px;background:#001a1a;border:1px solid #00FFFF;margin:20px auto;position:relative;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00FFFF,#A8FFE6);box-shadow:0 0 15px #00FFFF;transition:width 0.1s linear}
.timer{font-size:20px;margin-top:10px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud">
  <div class="scanline"></div>
  <div class="status">
    <h1>PROTOCOLO SAY KORVIL</h1>
    <p id="fase">INICIALIZANDO SISTEMA K-AI...</p>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="timer" id="timer">15.0s</div>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const armaduraVersao = urlParams.get('armadura') || 'v-2026';

let scene, camera, renderer;
let pecas = [], tempo = 0, duracao = 15; // 15 segundos
let fase = 0;

const fases = [
  "INICIALIZANDO SISTEMA K-AI...",
  "SINCRONIZANDO COM SAY KORVIL...",
  "MONTANDO CAPACETE CORVO...",
  "ATIVANDO ASAS CYBER...",
  "BLINDAGEM TORSO E BRAÇOS...",
  "GARRAS E BOTAS ATIVADAS...",
  "ARMADURA v-2026 COMPLETA"
];

function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 15);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas'), alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000, 0);

  // LUZES HOLOGRAFICAS
  scene.add(new THREE.AmbientLight(0x00FFFF, 0.5));
  const luz1 = new THREE.PointLight(0x00FFFF, 3, 50); luz1.position.set(5,5,10);
  const luz2 = new THREE.PointLight(0x00FFFF, 2, 50); luz2.position.set(-5,-5,-10);
  scene.add(luz1, luz2);

  criarPecas();
  animate();
}

function criarPecas(){
  const materiais = [
    new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:1, transparent:true, opacity:0.9}),
    new THREE.MeshPhongMaterial({color:0xA8FFE6, emissive:0xA8FFE6, emissiveIntensity:0.8, wireframe:true})
  ];

  // 30 PEÇAS VOANDO
  for(let i=0; i<30; i++){
    let geo;
    if(i < 5) geo = new THREE.SphereGeometry(0.4, 16, 16); // cabeça
    else if(i < 10) geo = new THREE.BoxGeometry(0.8, 0.1, 0.4); // asas
    else if(i < 15) geo = new THREE.CylinderGeometry(0.3, 0.2, 1, 8); // braços
    else if(i < 20) geo = new THREE.CylinderGeometry(0.4, 0.3, 1.5, 8); // pernas
    else geo = new THREE.ConeGeometry(0.2, 0.6, 3); // garras

    const peca = new THREE.Mesh(geo, materiais[i%2]);

    // POSIÇÃO INICIAL ALEATÓRIA
    peca.position.set(
      Math.random()*20 - 10,
      Math.random()*20 - 10,
      Math.random()*20 - 10
    );

    // POSIÇÃO FINAL - ONDE VAI MONTAR
    peca.userData.target = getTargetPosition(i);
    peca.userData.speed = 0.01 + Math.random()*0.02;
    peca.userData.rotSpeed = (Math.random()-0.5)*0.2;

    pecas.push(peca);
    scene.add(peca);
  }
}

function getTargetPosition(index){
  // DEFINE ONDE CADA PEÇA VAI PARAR NA ARMADURA
  if(index < 5) return {x:0, y:3.5, z:0}; // cabeça
  if(index < 10) return {x: index%2? -2.5 : 2.5, y:1.5, z:0}; // asas
  if(index < 15) return {x: index%2? -1.8 : 1.8, y:0.5, z:0}; // braços
  if(index < 20) return {x: index%2? -0.6 : 0.6, y:-2, z:0}; // pernas
  return {x: (index%3-1)*0.3, y:-3.6, z:0.3}; // garras
}

function animate(){
  requestAnimationFrame(animate);
  tempo += 0.016; // ~60fps

  let progresso = tempo / duracao;
  document.getElementById('bar').style.width = (progresso * 100) + '%';
  document.getElementById('timer').innerText = (duracao - tempo).toFixed(1) + 's';

  // MUDA A FASE A CADA 2 SEGUNDOS
  let novaFase = Math.floor(progresso * fases.length);
  if(novaFase!== fase && novaFase < fases.length){
    fase = novaFase;
    document.getElementById('fase').innerText = fases[fase];
  }

  // ANIMAÇÃO DAS PEÇAS SE MONTANDO
  pecas.forEach((peca, i) => {
    // Lerp até a posição final
    peca.position.lerp(new THREE.Vector3(
      peca.userData.target.x,
      peca.userData.target.y,
      peca.userData.target.z
    ), peca.userData.speed * (1 + progresso*2));

    // Rotação
    peca.rotation.x += peca.userData.rotSpeed;
    peca.rotation.y += peca.userData.rotSpeed;

    // BRILHO AUMENTA NO FINAL
    peca.material.emissiveIntensity = 0.5 + progresso * 1.5;
  });

  // CAMERA DA VOLTA LENTA
  camera.position.x = Math.sin(tempo * 0.3) * 2;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);

  // TERMINOU
  if(tempo >= duracao){
    document.getElementById('fase').innerText = "TRANSFORMAÇÃO COMPLETA";
    setTimeout(()=>{ window.close(); }, 500);
  }
}

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
