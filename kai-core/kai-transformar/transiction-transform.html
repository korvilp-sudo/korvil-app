<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K-AI TRANSFORMAR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Roboto,sans-serif}
.transform-container{display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;height:100%;background:radial-gradient(circle at center, #0d1a20 0%, #000 100%)}
.hud{color:var(--c);font-size:18px;font-weight:900;letter-spacing:3px;text-shadow:0 0 20px var(--c);margin-bottom:30px;text-align:center}
.hud small{display:block;font-size:12px;color:var(--c2);margin-top:8px;letter-spacing:1px}
.canvas3d{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.progress-bar{width:80%;max-width:400px;height:10px;background:#132e36;border-radius:5px;overflow:hidden;border:2px solid var(--c);box-shadow:0 0 20px var(--c);z-index:2}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--c),var(--c2));box-shadow:0 0 20px var(--c);transition:width 0.1s linear}
.loading-text{color:var(--c2);font-size:14px;margin-top:20px;font-weight:700;letter-spacing:1px;z-index:2}
.etapa{color:var(--c);font-size:16px;font-weight:900;margin-bottom:10px;z-index:2}
</style>
</head>
<body>
<canvas id="canvas3d" class="canvas3d"></canvas>
<div class="transform-container">
  <div class="hud">K-AI TRANSFORMAR
    <small>PROTOCOLO: SAY KORVIL</small>
  </div>
  <div class="etapa" id="etapa">MONTANDO ESTRUTURA</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>
  <div class="loading-text" id="loadingText">INICIALIZANDO... 0%</div>
</div>

<script>
let progresso = 0;
const tempoTotal = 4500; // 4.5 segundos
const intervalo = 50;
const incremento = 100 / (tempoTotal / intervalo);

const progressBar = document.getElementById('progress');
const loadingText = document.getElementById('loadingText');
const etapaText = document.getElementById('etapa');

// Cena 3D da montagem
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'), alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 10;

const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:0.7, wireframe:true, transparent:true, opacity:0.6});
scene.add(new THREE.AmbientLight(0x00FFFF, 0.4));
const luz = new THREE.PointLight(0x00FFFF, 2); luz.position.set(5,5,5); scene.add(luz);

let pecas = [];
// Gera peças flutuantes que vão se juntar
for(let i=0; i<20; i++){
  const geo = new THREE.IcosahedronGeometry(0.3 + Math.random()*0.2, 0);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
  mesh.userData.target = {x:(Math.random()-0.5)*3, y:(Math.random()-0.5)*3, z:0};
  pecas.push(mesh); scene.add(mesh);
}

function animate(){
  requestAnimationFrame(animate);
  pecas.forEach(p => {
    p.rotation.x += 0.02; p.rotation.y += 0.02;
    p.position.lerp(new THREE.Vector3(p.userData.target.x, p.userData.target.y, p.userData.target.z), 0.02);
  });
  renderer.render(scene,camera);
}
animate();

const etapas = [
  {pct:0, txt:"MONTANDO ESTRUTURA"},
  {pct:25, txt:"CONECTANDO NÚCLEO ENERGÉTICO"},
  {pct:50, txt:"SINCRONIZANDO SISTEMAS"},
  {pct:75, txt:"EQUIPANDO ARMADURA"}
];

const timer = setInterval(() => {
  progresso += incremento;
  if(progresso >= 100){
    progresso = 100;
    clearInterval(timer);
    loadingText.innerText = 'TRANSFORMAÇÃO CONCLUÍDA';
    etapaText.innerText = 'PROTOCOLO SAY KORVIL ATIVO';
    
    // Volta e abre a armadura atual
    setTimeout(() => {
      localStorage.setItem('abrirArmadura', 'atual'); // sempre "atual"
      window.location.href = 'index.html';
    }, 1000);
  }
  
  // Atualiza etapa
  etapas.forEach(e => { if(progresso >= e.pct) etapaText.innerText = e.txt; });
  
  progressBar.style.width = progresso + '%';
  loadingText.innerText = `MONTAGEM... ${Math.floor(progresso)}%`;
}, intervalo);
</script>
</body>
</html>
