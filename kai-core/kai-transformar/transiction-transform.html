<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K-AI TRANSFORMATION v-2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#canvas{width:100%;height:100%;display:block}

/* HUD CYBERPUNK KORVIL */
.hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;font-family:'Segoe UI',Arial}
.grid{position:absolute;width:100%;height:100%;background:linear-gradient(transparent 48%,#00FFFF22 49%,#00FFFF22 51%,transparent 52%),linear-gradient(90deg,transparent 48%,#00FFFF22 49%,#00FFFF22 51%,transparent 52%);background-size:40px 40px;animation:gridMove 4s linear infinite}
@keyframes gridMove{0%{transform:translateY(0)}100%{transform:translateY(40px)}}

.scanline{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00FFFF,#A8FFE6,#00FFFF,transparent);animation:scan 2s linear infinite;box-shadow:0 0 20px #00FFFF}
@keyframes scan{0%{top:0}100%{top:100%}}

.status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#00FFFF}
.status h1{font-size:32px;letter-spacing:6px;text-shadow:0 0 30px #00FFFF,0 0 60px #00FFFF;margin-bottom:15px;animation:pulse 1s infinite}
.status.versao{font-size:14px;letter-spacing:3px;color:#A8FFE6;margin-bottom:20px}
.status p{font-size:16px;letter-spacing:2px;margin-bottom:25px}

.progress{width:400px;height:6px;background:#001a1a;border:2px solid #00FFFF;margin:0 auto;position:relative;overflow:hidden;box-shadow:0 0 15px #00FFFF}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00FFFF,#A8FFE6,#00FFFF);box-shadow:0 0 20px #00FFFF;transition:width 0.1s linear}
.timer{font-size:24px;margin-top:15px;font-weight:900}
.fase{font-size:12px;color:#A8FFE6;letter-spacing:2px}

.corners{position:absolute;width:100%;height:100%}
.corner{position:absolute;width:60px;height:60px;border:3px solid #00FFFF}
.corner.tl{top:40px;left:40px;border-right:0;border-bottom:0}
.corner.tr{top:40px;right:40px;border-left:0;border-bottom:0}
.corner.bl{bottom:40px;left:40px;border-right:0;border-top:0}
.corner.br{bottom:40px;right:40px;border-left:0;border-top:0}

.etapa{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);color:#00FFFF;font-size:18px;font-weight:900;letter-spacing:3px;text-shadow:0 0 15px #00FFFF}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="hud">
  <div class="grid"></div>
  <div class="scanline"></div>
  <div class="corners">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="status">
    <h1 id="titulo">PROTOCOLO SAY KORVIL</h1>
    <div class="versao" id="versaoText">ARMADURA v-2026</div>
    <p id="fase">CORVO APROXIMANDO...</p>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="timer" id="timer">21.0s</div>
    <div class="fase" id="faseDetail">INICIANDO SEQUÊNCIA DE MONTAGEM</div>
  </div>
  <div class="etapa" id="etapa">ETAPA 1/3</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const armaduraVersao = urlParams.get('armadura') || 'v-2026';
document.getElementById('versaoText').innerText = `ARMADURA ${armaduraVersao.toUpperCase()}`;

let scene, camera, renderer, clock;
let corvoGroup, pecas = [], particulas;
let tempo = 0, duracao = 21; // 21s = 3x7s
let etapaAtual = 1;

function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x00FFFF, 0.025);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 20);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas'), alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000, 1);

  clock = new THREE.Clock();

  // LUZES CYBERPUNK
  scene.add(new THREE.AmbientLight(0x00FFFF, 0.3));
  const luz1 = new THREE.PointLight(0x00FFFF, 4, 50); luz1.position.set(10,10,10);
  const luz2 = new THREE.PointLight(0xA8FFE6, 3, 50); luz2.position.set(-10,-10,-10);
  scene.add(luz1, luz2);

  criarParticulas();
  criarCorvo();
  animate();
}

function criarParticulas(){
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(1500 * 3);
  for(let i=0; i<1500*3; i++) positions[i] = (Math.random()-0.5)*120;
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particulas = new THREE.Points(geo, new THREE.PointsMaterial({color:0x00FFFF, size:0.06}));
  scene.add(particulas);
}

function criarCorvo(){
  corvoGroup = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({color:0x00FFFF, emissive:0x00FFFF, emissiveIntensity:1.2, transparent:true, opacity:0.95});
  const matWire = new THREE.MeshPhongMaterial({color:0xA8FFE6, emissive:0xA8FFE6, emissiveIntensity:1.5, wireframe:true, transparent:true, opacity:0.9});

  // 1. CABEÇA E SUPERIORES
  const cabeca = new THREE.Group(); cabeca.name = 'cabeca';
  const cranio = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), mat);
  const bico = new THREE.Mesh(new THREE.ConeGeometry(0.35, 1.1, 4), matWire); bico.position.z = 1.1; bico.rotation.x = Math.PI/2;
  const olhoL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), matWire); olhoL.position.set(-0.38,0.25,1);
  const olhoR = olhoL.clone(); olhoR.position.x = 0.38;
  cabeca.add(cranio, bico, olhoL, olhoR);
  cabeca.position.set(0, 5, -15);

  // ASAS
  const asaL = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.12, 2.2), matWire); asaL.position.set(-2.8, 2, -15); asaL.rotation.z = -0.35; asaL.name = 'asaL';
  const asaR = asaL.clone(); asaR.position.x = 2.8; asaR.rotation.z = 0.35; asaR.name = 'asaR';

  // 2. CORE E NÚCLEO 💠
  const core = new THREE.Group(); core.name = 'core';
  const nucleo = new THREE.Mesh(new THREE.IcosahedronGeometry(0.9, 2), matWire); // símbolo 💠
  const aura = new THREE.Mesh(new THREE.SphereGeometry(1.3, 16, 16), new THREE.MeshBasicMaterial({color:0x00FFFF, transparent:true, opacity:0.2}));
  core.add(nucleo, aura);
  core.position.set(0, 0, -15);

  // 3. INFERIORES
  const pernaL = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.3, 2.8, 8), mat); pernaL.position.set(-0.5, -2.5, -15); pernaL.name = 'pernaL';
  const pernaR = pernaL.clone(); pernaR.position.x = 0.5; pernaR.name = 'pernaR';

  const garraL = new THREE.Group(); garraL.name = 'garraL';
  for(let i=0; i<3; i++){ const g = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.6, 3), matWire); g.rotation.x = Math.PI/2; g.position.set(-0.2 + i*0.2, -4, 0.4); garraL.add(g); }
  const garraR = garraL.clone(); garraR.position.x = 0.6;

  corvoGroup.add(cabeca, asaL, asaR, core, pernaL, pernaR, garraL, garraR);
  scene.add(corvoGroup);
  pecas = {cabeca, asaL, asaR, core, pernaL, pernaR, garraL, garraR};
}

function animate(){
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  tempo += delta;

  let progresso = Math.min(tempo / duracao, 1);
  document.getElementById('bar').style.width = (progresso * 100) + '%';
  document.getElementById('timer').innerText = (duracao - tempo).toFixed(1) + 's';

  particulas.rotation.y += 0.0008;

  // ===== ETAPA 1: 0-7s CABEÇA E SUPERIORES =====
  if(tempo <= 7){
    document.getElementById('etapa').innerText = 'ETAPA 1/3: CABEÇA E SUPERIORES';
    document.getElementById('fase').innerText = 'CORVO APROXIMANDO EM ALTA VELOCIDADE';
    document.getElementById('faseDetail').innerText = 'CAPACETE ALINHANDO COM NEURAL LINK';

    // Corvo voa pra frente
    corvoGroup.position.z += delta * 2.2;
    corvoGroup.rotation.y = Math.sin(tempo*2)*0.1;

    // Cabeça desce na sua cabeça
    pecas.cabeca.position.y -= delta * 0.7;
    pecas.cabeca.rotation.x = -0.2 + Math.sin(tempo*3)*0.1;

    // Olhos brilham e viram visor
    pecas.cabeca.children[2].material.emissiveIntensity = 1.5 + Math.sin(tempo*10);
    pecas.cabeca.children[3].material.emissiveIntensity = 1.5 + Math.sin(tempo*10);

    // Asas batendo
    pecas.asaL.rotation.z = -0.35 + Math.sin(tempo*8)*0.3;
    pecas.asaR.rotation.z = 0.35 - Math.sin(tempo*8)*0.3;

    if(tempo > 6.5){
      document.getElementById('fase').innerText = 'CAPACETE ENCAIXADO. VISOR HUD ATIVO';
      pecas.cabeca.scale.multiplyScalar(0.98);
    }
  }

  // ===== ETAPA 2: 7-14s CORE E NÚCLEO =====
  else if(tempo <= 14){
    if(etapaAtual === 1){ etapaAtual = 2; }
    document.getElementById('etapa').innerText = 'ETAPA 2/3: CORE E NÚCLEO';
    document.getElementById('fase').innerText = 'AS E NÚCLEO KORVIL SINCRONIZANDO';
    document.getElementById('faseDetail').innerText = 'SISTEMA K 💠 ATIVANDO';

    const t = tempo - 7;

    // Asas vão pras costas
    pecas.asaL.position.x += delta * 0.5;
    pecas.asaR.position.x -= delta * 0.5;
    pecas.asaL.position.y = 1.2 + Math.sin(t*6)*0.3;
    pecas.asaR.position.y = 1.2 + Math.sin(t*6)*0.3;
    pecas.asaL.rotation.z = -0.35 + Math.sin(t*8)*0.4;
    pecas.asaR.rotation.z = 0.35 - Math.sin(t*8)*0.4;

    // Core gira e brilha tipo Homem de Ferro
    pecas.core.position.z += delta * 2.3;
    pecas.core.rotation.y += delta * 4;
    pecas.core.children[0].material.emissiveIntensity = 1.5 + Math.sin(t*12)*0.8;
    pecas.core.children[1].scale.set(1 + Math.sin(t*5)*0.3, 1 + Math.sin(t*5)*0.3, 1 + Math.sin(t*5)*0.3);

    if(t > 6.5){
      document.getElementById('fase').innerText = 'COLETE KORVIL ENCAIXADO. NÚCLEO ONLINE';
      pecas.core.scale.multiplyScalar(0.98);
    }
  }

  // ===== ETAPA 3: 14-21s INFERIORES =====
  else if(tempo <= 21){
    if(etapaAtual === 2){ etapaAtual = 3; }
    document.getElementById('etapa').innerText = 'ETAPA 3/3: INFERIORES';
    document.getElementById('fase').innerText = 'BOTAS E GARRAS ATIVANDO';
    document.getElementById('faseDetail').innerText = 'SISTEMA DE PROPULSÃO FINALIZANDO';

    const t = tempo - 14;

    // Pernas e garras sobem e encaixam
    pecas.pernaL.position.z += delta * 2.3;
    pecas.pernaR.position.z += delta * 2.3;
    pecas.garraL.position.z += delta * 2.3;
    pecas.garraR.position.z += delta * 2.3;

    pecas.pernaL.position.y += delta * 1.8;
    pecas.pernaR.position.y += delta * 1.8;
    pecas.garraL.position.y += delta * 1.8;
    pecas.garraR.position.y += delta * 1.8;

    // Rotação final
    pecas.pernaL.rotation.x = -0.3 + t * 0.15;
    pecas.pernaR.rotation.x = -0.3 + t * 0.15;

    // Flash final
    if(t > 6){
      corvoGroup.children.forEach(obj => {
        if(obj.material) obj.material.opacity = Math.max(0, 1 - (t-6)*2.5);
      });
      scene.background = new THREE.Color(0x00FFFF);
      setTimeout(()=>{ scene.background = new THREE.Color(0x000); }, 150);
    }

    if(t > 6.5){
      document.getElementById('titulo').innerText = 'MONTAGEM COMPLETA';
      document.getElementById('fase').innerText = 'ARMADURA K-AI v-2026 OPERACIONAL';
      document.getElementById('faseDetail').innerText = 'PROTOCOLO SAY KORVIL ATIVO';
    }
  }

  // CAMERA SE APROXIMA
  camera.position.z = 20 - tempo * 0.7;
  camera.position.y = 2 + Math.sin(tempo*0.5)*0.5;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);

  if(tempo >= duracao){
    setTimeout(()=>{
      if(window.parent && window.parent.document.getElementById("transicaoFrame")){
        window.parent.document.body.removeChild(window.parent.document.getElementById("transicaoFrame"));
      }
    }, 500);
  }
}

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
