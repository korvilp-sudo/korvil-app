<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#000}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;padding:16px}
canvas#particles{position:fixed;inset:0;z-index:0}
.words-bg{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.28);font-size:17px;font-weight:900;letter-spacing:2px;white-space:nowrap;text-shadow:0 0 25px rgba(0,255,255,.6);animation-fill-mode:forwards}
.type1{animation:fadeInOut 5s}@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
.type2{animation:pulseWord 5s}@keyframes pulseWord{0%{opacity:0;transform:scale(.8)}10%{opacity:1;transform:scale(1)}50%{transform:scale(1.15)}90%{opacity:1}100%{opacity:0;transform:scale(.9)}}
.card{background:rgba(0,0,0,.65);backdrop-filter:blur(30px);border-radius:24px;padding:35px;width:90%;max-width:460px;position:relative;z-index:10;box-shadow:0 0 60px rgba(0,255,255,.3)}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}
.logo-img{max-width:300px;width:100%;filter:drop-shadow(0 0 35px var(--c))}
.tabs{display:flex;gap:12px;margin-bottom:25px}
.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000;border-color:var(--c)}
.form{display:none;flex-direction:column;gap:16px}
.form.active{display:flex}
.input-wrap{position:relative}
input{width:100%;padding:16px 50px 16px 18px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.85);color:#fff;border-radius:12px;font-size:16px;font-weight:600}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer}
.error{color:#ff3366;text-align:center;font-weight:700}
.ok{color:#00ff88;text-align:center;font-weight:700}
.loader{border:3px solid #000;border-top:3px solid #000;border-radius:50%;width:18px;height:18px;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="words-bg" id="wordsBg"></div>

<div class="card">
  <div class="logo-area">
    <img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-site/main/assets/images/logo-korvil.png" alt="Logo KORVIL" class="logo-img">
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">ENTRAR</button>
    <button class="tab" onclick="showTab('cadastro')">NOVO USUÁRIO</button>
  </div>

  <form id="login" class="form active">
    <div class="input-wrap"><input type="email" id="loginEmail" placeholder="Digite seu E-mail" required></div>
    <div class="input-wrap"><input type="password" id="loginPass" placeholder="Digite sua Senha" required></div>
    <button class="btn" type="submit" id="btnLogin">ACESSAR</button><div id="msgLogin"></div>
  </form>

  <form id="cadastro" class="form">
    <div class="input-wrap"><input type="text" id="nome" placeholder="Nome completo" required></div>
    <div class="input-wrap"><input type="email" id="email" placeholder="E-mail" required></div>
    <div class="input-wrap"><input type="text" id="cpf" placeholder="CPF 000.000.000-00" maxlength="14" required></div>
    <div class="row"><div class="input-wrap" style="flex:2"><input type="text" id="cep" placeholder="CEP 00000-000" maxlength="9" required></div><button type="button" class="btn btn-small" onclick="buscarCep()">BUSCAR</button></div>
    <div class="input-wrap"><input type="text" id="rua" placeholder="Rua" readonly></div>
    <div class="input-wrap"><input type="text" id="bairro" placeholder="Bairro" readonly></div>
    <div class="input-wrap"><input type="text" id="whatsapp" placeholder="Whatsapp (00) 00000-0000" maxlength="15" required></div>
    <div class="input-wrap"><input type="password" id="pass" placeholder="Crie uma Senha" required></div>
    <div class="input-wrap"><input type="password" id="pass2" placeholder="Repita a Senha" required></div>
    <button class="btn" type="submit" id="btnCadastro">CRIAR ACESSO</button><div id="msgCadastro"></div>
  </form>
</div>

<script>
// 1. COLA SUAS CHAVES DO SUPABASE AQUI
const SUPABASE_URL = 'https://XXXXX.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzIXXXXXXXXXXXXXXXXXXXX'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const palavras = ['DESENVOLVIMENTO HUMANO','NEGÓCIOS','SERVIÇOS','CURSOS','ECOMMERCE','LOJAS','PRODUTOS','SISTEMA K','TECNOLOGIA','K-TP','K-AFORTUNADO','EMPREENDEDORISMO','FINANÇAS','K-ALMA','SAÚDE','BELEZA'];
const wordsBg = document.getElementById('wordsBg');const animacoes = ['type1','type2'];
function spawnWordBlock(){for(let i=0; i<15; i++){const w = document.createElement('div');w.className = 'word ' + animacoes[Math.floor(Math.random()*2)];w.innerText = palavras[Math.floor(Math.random()*palavras.length)];w.style.left = Math.random()*85 + '%';w.style.top = Math.random()*85 + '%';wordsBg.appendChild(w);setTimeout(()=>w.remove(), 5000);}}
setInterval(spawnWordBlock, 1500);spawnWordBlock();
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let pts=[];
for(let i=0;i<20;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.15,dy:(Math.random()-.5)*.15});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}draw();

function showTab(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.form').forEach(x=>x.classList.remove('active'));event.target.classList.add('active');document.getElementById(t).classList.add('active');}
function msg(t,cls,id){document.getElementById(id).innerHTML=`<p class="${cls}">${t}</p>`}
function loading(btn,on){btn.disabled=on;btn.innerHTML=on?'<span class="loader"></span>PROCESSANDO':btn.id==='btnLogin'?'ACESSAR':'CRIAR ACESSO'}

cpf.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
cep.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{5})(\d)/,'$1-$2');
whatsapp.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');

// CADASTRO SUPABASE
cadastro.onsubmit=async e=>{
  e.preventDefault();
  if(pass.value!==pass2.value)return msg('Senhas diferentes','error','msgCadastro');
  loading(btnCadastro,true);
  const { error } = await supabase.auth.signUp({email: email.value,password: pass.value,options: { data: {full_name:nome.value, cpf:cpf.value, cep:cep.value, rua:rua.value, bairro:bairro.value, whatsapp:whatsapp.value}}});
  if(error){msg(error.message,'error','msgCadastro')} else{msg('Cadastro realizado! Confirma no e-mail.','ok','msgCadastro'); cadastro.reset();}
  loading(btnCadastro,false);
}

// LOGIN SUPABASE + REDIRECIONA PRO APP.HTML DO GITHUB
login.onsubmit=async e=>{
  e.preventDefault();loading(btnLogin,true);
  const { data, error } = await supabase.auth.signInWithPassword({email: loginEmail.value, password: loginPass.value});
  if(error){msg('E-mail ou senha inválidos','error','msgLogin')} 
  else{
    // AQUI REDIRECIONA PRA PAGINA DO APP
    window.location.href="https://korvilp-sudo.github.io/korvil-app/app.html";
  }
  loading(btnLogin,false);
}

// BUSCAR CEP
async function buscarCep(){
  const cepVal=cep.value.replace(/\D/g,'');
  if(cepVal.length!==8)return msg('CEP inválido','error','msgCadastro');
  const res=await fetch(`https://viacep.com.br/ws/${cepVal}/json/`).then(r=>r.json());
  if(res.erro)return msg('CEP não encontrado','error','msgCadastro');
  rua.value=res.logradouro;bairro.value=res.bairro;
}
</script>
</body>
</html>
