<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos | KORVIL</title>
<style>
:root{--c:#00f5ff;--bg:#000;--card:#0a0a0a;--text:#fff;--text2:#aaa;--borda:#1f1f1f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:20px;max-width:700px;margin:auto;}
.logo{max-width:180px;margin:0 auto 16px;display:block;border:2px solid var(--c);border-radius:12px;padding:8px;background:#000;}
h1{text-align:center;color:var(--c);font-size:18px;margin-bottom:8px;}
.sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:20px;}

.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.card h2{font-size:15px;color:var(--c);margin-bottom:8px;}
.card ul{list-style:none;padding:0;}
.card li{font-size:12px;color:var(--text2);padding:4px 0;}

.btn{background:var(--c);color:#000;text-align:center;padding:14px;border-radius:10px;text-decoration:none;font-weight:800;display:block;margin-top:12px;}
.btn:active{transform:scale(.97);}

.btn-voltar{display:block;background:#222;color:#fff;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:800;margin-top:8px;}
</style>
</head>
<body>
<img src="https://korvilp-sudo.github.io/korvil-app/assets/images/korvil-logo.png" class="logo">
<h1>CURSOS</h1>
<div class="sub">Escolha a área que deseja se profissionalizar</div>

<div class="card">
  <h2>🎯 ÁREAS DISPONÍVEIS:</h2>
  <ul>
    <li>• 📱 Serviços Profissionais</li>
    <li>• 💪 Treinamento Personalizado</li>
    <li>• 🚀 Empreendedorismo</li>
    <li>• 🏥 Saúde</li>
    <li>• ✂️ Beleza</li>
  </ul>
</div>

<a href="areas/index.html" class="btn">ACESSAR ÁREAS</a>
<a href="../index.html" class="btn-voltar">Voltar</a>
</body>
</html>
