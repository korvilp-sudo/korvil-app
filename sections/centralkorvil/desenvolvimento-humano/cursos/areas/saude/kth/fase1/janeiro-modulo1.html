  body{background:var(--bg);color:var(--text);font:13px/1.6 Arial}
  
  header{position:sticky;top:0;background:#000;padding:12px 16px;border-bottom:2px solid var(--neon);z-index:999}

  .botao{padding:8px 12px;background:#262626;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid #333}
  .botao.ativo{background:var(--neon);color:#000;border-color:var(--neon)}
  
  .conteudo{padding:16px}
  .info-topo{font-size:11px;color:var(--muted);margin-bottom:12px}

  /* DISPLAY YOUTUBE */
  .video-box{background:var(--card2);padding:12px;border-radius:12px;margin-bottom:16px}
  .video-titulo{font-size:12px;font-weight:800;color:var(--neon);margin-bottom:8px}
  .video{position:relative;padding-top:56.25%;background:#000;border-radius:10px;overflow:hidden}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  
  /* CONTEUDO TEXTO */
  .texto-box{background:var(--card2);padding:16px;border-radius:12px}
  .texto-titulo{font-size:14px;color:var(--neon);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .texto-titulo::before{content:"📄"}
  .pagina ul{list-style:none}
  .pagina li{padding:5px 0;font-size:12px}
  .pagina li:before{content:"✓ ";color:var(--neon);font-weight:900}
  
  .navegacao{display:flex;gap:8px;margin-top:14px}
  .nav{flex:1;padding:12px;background:var(--neon);color:#000;border-radius:10px;font-weight:800;text-align:center;cursor:pointer;font-size:12px}
  .nav.sec{background:#262626;color:var(--text)}
  
  .avaliacao{display:none;margin-top:24px;background:#111;border:2px solid var(--neon);padding:20px;border-radius:14px}
  .avaliacao.show{display:block}
  .avaliacao h2{color:var(--neon);font-size:15px;margin-bottom:10px}
  .questao{background:#1f1f1f;padding:12px;border-radius:10px;margin:10px 0}
  .questao h4{font-size:12px;margin-bottom:6px}
  .questao label{display:block;padding:6px;font-size:11px;background:#262626;margin:4px 0;border-radius:6px}
  .btn-final{width:100%;padding:14px;margin-top:12px;background:var(--neon);color:#000;border:0;border-radius:10px;font-weight:900;cursor:pointer}

let estado = {tema:1, aula:1, pagina:1};

function render(){
  $('#navTemas').innerHTML = ''; Object.keys(CURSO).forEach(t=>{$('#navTemas').innerHTML += `<div class="botao ${t==estado.tema?'ativo':''}" data-tema="${t}">TEMA ${t}</div>`});
  $('#navAulas').innerHTML = ''; Object.keys(CURSO[estado.tema].aulas).forEach(a=>{$('#navAulas').innerHTML += `<div class="botao ${a==estado.aula?'ativo':''}" data-aula="${a}">AULA ${a}</div>`});
  $('#navPaginas').innerHTML = ''; CURSO[estado.tema].aulas[estado.aula].paginas.forEach((p,i)=>{$('#navPaginas').innerHTML += `<div class="botao ${i+1==estado.pagina?'ativo':''}" data-pagina="${i+1}">${i+1}</div>`});
  
  const dados = CURSO[estado.tema].aulas[estado.aula].paginas[estado.pagina-1];
  $('#video').src = `https://www.youtube.com/embed/${CURSO[estado.tema].video}`;
  $('#infoTopo').innerHTML = `FASE 1 > JANEIRO > MÓDULO 1 > TEMA ${estado.tema}: <b>${CURSO[estado.tema].nome}</b> > AULA ${estado.aula}: <b>${CURSO[estado.tema].aulas[estado.aula].nome}</b> > PÁGINA ${estado.pagina}`;
  $('#paginaConteudo').innerHTML = `<ul>${dados.map(x=>`<li>${x}</li>`).join('')}</ul>`;
  
  let total = 125; let atual = ((estado.tema-1)*25) + ((estado.aula-1)*5) + estado.pagina; $('#barra').style.width = (atual/total*100)+'%';
  if(estado.tema==5 && estado.aula==5 && estado.pagina==5){$('#avaliacao').classList.add('show');gerarQuestoes()}else{$('#avaliacao').classList.remove('show')}
  addEventos();
}

function addEventos(){
  $$('#navTemas .botao').forEach(b=>b.onclick=()=>{estado.tema=+b.dataset.tema;estado.aula=1;estado.pagina=1;render()});
  $$('#navAulas .botao').forEach(b=>b.onclick=()=>{estado.aula=+b.dataset.aula;estado.pagina=1;render()});
  $$('#navPaginas .botao').forEach(b=>b.onclick=()=>{estado.pagina=+b.dataset.pagina;render()});
  $('#btnAnt').onclick=()=>{nav(-1)}; $('#btnProx').onclick=()=>{nav(1)};
}

function nav(dir){
  if(dir==1){if(estado.pagina<5)estado.pagina++;else if(estado.aula<5){estado.aula++;estado.pagina=1}else if(estado.tema<5){estado.tema++;estado.aula=1;estado.pagina=1}}
  else{if(estado.pagina>1)estado.pagina--;else if(estado.aula>1){estado.aula--;estado.pagina=5}else if(estado.tema>1){estado.tema--;estado.aula=5;estado.pagina=5}}
  render();
}

function gerarQuestoes(){$('#questoes').innerHTML = `<div class="questao"><h4>1. Abordagem 360° trata:</h4><label><input type="radio" name="q1"> A) Só o corpo</label><label><input type="radio" name="q1"> B) Corpo, Mente, Emoção e Energia</label></div>`}
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s); render();
</script>
