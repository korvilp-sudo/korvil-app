<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-TH | KORVIL-Terapia Holística </title>
<style>
  :root{--bg:#06070b;--panel:#0d1017;--card:#11141d;--text:#eaf6ff;--muted:#7d8aa1;--neon:#00ffff;--ok:#00ff88;--err:#ff3366;--border:#1a2030;--glow:0 0 12px rgba(0,255,255,.35)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.6 Inter,Arial}
  header{position:sticky;top:0;z-index:999;background:rgba(6,7,11,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 12px}
.logo{font-weight:900;font-size:18px;color:var(--neon)}
.wrap{display:grid;grid-template-columns:340px 1fr;align-items:start}
  @media(max-width:1100px){.wrap{grid-template-columns:1fr} aside{position:fixed;inset:52px 0 auto 0;transform:translateX(-100%);transition:.3s;z-index:998;background:var(--panel);width:88%;border-right:1px solid var(--border);max-height:calc(100vh - 52px)}}
  aside{position:sticky;top:52px;overflow:auto;padding:12px}
  main{padding:0;margin:0}
.menu-btn{display:none;padding:8px;border:1px solid var(--border);border-radius:8px;background:#0a0d14;color:var(--neon)}
  @media(max-width:1100px){.menu-btn{display:block}}
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:997}
.overlay.show{display:block}
.tabs{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel)}
.tab{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:#0b0e15;color:var(--muted);font-weight:700;cursor:pointer;font-size:13px}
.tab.active{border-color:var(--neon);color:var(--neon);box-shadow:var(--glow)}
.timeline{padding:12px}
.ano-title{font-size:18px;color:var(--neon);margin:0 0 12px}
.course-title{padding:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.course-title h1{font-size:16px;margin:0;color:var(--neon)}
.stat{font-size:12px;color:var(--muted);margin-top:4px}
.modulo{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#0b0e15}
.modulo-head{padding:12px 14px;font-weight:600;font-size:14px}
.aulas{padding:6px 8px;background:#0a0d14}
.aula{padding:10px 12px;border-radius:6px;margin:6px 0;background:#0d111a;font-size:13px;cursor:pointer;border:1px solid transparent;color:var(--muted)}
.aula:hover{border-color:var(--neon);color:var(--text)}
.aula.active{border-color:var(--neon);background:#0f1622;color:var(--neon)}
.aula.locked{opacity:.35;pointer-events:none}
.aula.completed{border-color:var(--ok);color:var(--ok)}
.topicos{padding:0 12px 8px 12px;font-size:11px;color:var(--neon)}
.topicos b{color:var(--muted)}
.player{margin:0;border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden}
.video-wrap{position:relative;padding-top:56.25%;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.content{padding:14px}
.breadcrumb{font-size:11px;color:var(--muted);margin-bottom:8px}
.breadcrumb b{color:var(--neon)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.chip{font-size:11px;padding:6px 10px;border:1px solid var(--neon);border-radius:999px;color:var(--neon);background:#0b0e15}
.content h2{font-size:18px;color:var(--neon);margin:0 0 10px}
.pagina-nav{display:flex;gap:6px;margin:10px 0}
.p-btn{padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:#0a0d14;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer}
.p-btn.active{border-color:var(--neon);color:var(--neon)}
.pagina{margin-top:12px;padding:14px;border:1px solid var(--border);border-radius:10px;background:#0b0e15}
.pagina h4{font-size:15px;color:var(--neon);margin:0 0 8px}
.pagina ul{list-style:none;padding:0}
.pagina li{padding:5px 0;font-size:13px;color:var(--muted)}
.pagina li:before{content:"✓ ";color:var(--neon);font-weight:900}
.avaliacao{margin-top:16px;padding:16px;border:2px solid var(--neon);border-radius:12px;background:#0a0f14}
.avaliacao h3{font-size:15px;color:var(--neon);margin:0 0 8px}
.questao{margin:12px 0;padding:12px;border:1px solid var(--border);border-radius:8px;background:#0b0e15}
.opcao{display:block;margin:6px 0;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:#0a0d14;cursor:pointer;font-size:13px}
.opcao.selecionada{border-color:var(--neon)}
.opcao.correta{border-color:var(--ok);background:#0a1a14}
.opcao.errada{border-color:var(--err);background:#1a0a0f}
.resultado{margin-top:10px;padding:10px;border-radius:8px;font-weight:700;text-align:center}
.resultado.aprovado{background:#0a1a14;color:var(--ok);border:1px solid var(--ok)}
.resultado.reprovado{background:#1a0a0f;color:var(--err);border:1px solid var(--err)}
.navfooter{display:flex;gap:8px;justify-content:space-between;padding:12px;border-top:1px solid var(--border);background:#0b0e15;position:sticky;bottom:0}
.btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:#0a0d14;color:var(--text);font-weight:700;font-size:13px;cursor:pointer}
.btn.primary{background:var(--neon);color:#001012;border:0}
.btn:disabled{opacity:.3;cursor:not-allowed}
</style>
</head>
<body>
<header><div class="topbar"><button class="menu-btn" id="btnMenu">☰</button><div class="logo">KORVIL</div><div style="color:var(--muted);font-size:12px">Cursos > Saúde > K-TH</div></div></header>
<div class="overlay" id="overlay"></div>
<div class="wrap">
  <aside id="sidebar"><div class="course-title"><h1>Módulo 1: Massoterapia</h1><div class="stat">Janeiro | 5 Aulas</div></div><div id="menuModulos"></div></aside>
  <main>
    <div class="tabs"><div class="tab active" id="tabCron">Cronograma</div><div class="tab" id="tabAula">Área de Aula</div></div>
    <div id="tab-cronograma" class="timeline"><h2 class="ano-title">FASE 1: JANEIRO | MÓDULO 1</h2><div style="padding:12px;background:var(--card);border-radius:10px"><p>5 Aulas. Cada aula tem 1 Vídeo + 5 Tópicos + 5 Páginas de ensino. Aula 5 Página 5 = Avaliação 70%</p></div></div>
    <div id="tab-aula" style="display:none"><div class="player"><div class="video-wrap" id="videoWrap">[Selecione uma aula no menu lateral]</div><div class="content" id="conteudoAula"></div><div class="navfooter"><button class="btn" id="btnAnt" disabled>← Aula Anterior</button><button class="btn primary" id="btnConcluir" disabled>✓ Concluir Aula</button><button class="btn primary" id="btnProx" disabled>Próxima Aula →</button></div></div></div>
  </main>
</div>

<script>
const DADOS={
 1:{nome:"Módulo 1: Massoterapia Profissional",aulas:[
    {nome:"Aula 1: História da Massoterapia",video:"2kB1uWn5V0U",temas:["Origens na China e Egito","Grécia e Roma","Idade Média ao Século 19","Massoterapia no Brasil","Tendências 2026"]},
    {nome:"Aula 2: Anatomia Básica",video:"CwkxKXS1gYQ",temas:["Sistema Muscular","Sistema Esquelético","Sistema Circulatório","Sistema Nervoso","Pele e Tecidos"]},
    {nome:"Aula 3: Biossegurança",video:"bN_p5B-V5XU",temas:["Normas de Higiene","EPIs e Proteção","Desinfecção","Descarte de Resíduos","Prevenção de Riscos"]},
    {nome:"Aula 4: Anamnese",video:"_wJ8G3XvH9E",temas:["Entrevista Inicial","Histórico de Saúde","Contraindicações","Ficha do Cliente","Conduta Ética"]},
    {nome:"Aula 5: Massagem Relaxante",video:"QkE8B3QZ8kM",temas:["Técnicas Básicas","Manobras de Deslizamento","Amassamento","Percussão","Finalização + Avaliação"]},
  ]}
};

const CONTEUDOS={
 "M1-A1":["P1-OBJ: Compreender a origem da massoterapia. 3000 a.C China e Egito. Papiros. Huangdi Neijing. Uso medicinal e religioso nos templos","P2-CON: Grécia: Hipócrates prescrevia fricção. Roma: banhos e termas. Galeno. Atletas usavam antes das olimpíadas","P3-PRAT: Linha do tempo: 3000 a.C Egito > 400 a.C Hipócrates > 150 d.C Galeno > Século 19 Ling","P4-EX: Idade média igreja proibiu. Século 19 Per Henrik Ling cria ginástica sueca. Ressurgimento da massagem","P5-FIN: Brasil: Lei 13.352/2016. CBO. Tendências 2026: Spa, domicílio, corporativo. Resumo: Massagem é milenar"],
 "M1-A2":["P1-OBJ: Estudar sistema muscular. 640 músculos. Fibras tipo I e II. Origem, inserção e ação. Principais das costas: trapézio, dorsal","P2-CON: Sistema esquelético: 206 ossos. Coluna 33 vértebras. Articulações. Pontos de apoio da maca. Palpar C7","P3-PRAT: Sistema circulatório: Artérias levam, veias trazem. Sentido massagem: distal > proximal. Sempre para coração","P4-EX: Sistema nervoso: SNC e SNP. Nervo ciático. Receptores de dor. Reflexo. Pontos gatilho","P5-FIN: Pele: 3 camadas. Epiderme, derme, hipoderme. Teste turgor. Celulite. Resumo: Anatomia é base da massagem"],
 "M1-A3":["P1-OBJ: Normas de higiene ANVISA. Lavagem mãos 20s. Toalhas descartáveis. Lençol. Checklist limpeza antes e depois","P2-CON: EPIs obrigatórios: Luva procedimento, máscara, avental. Quando usar. Colocar e descartar luva corretamente","P3-PRAT: Desinfecção: Álcool 70%. Quaternário de amônio. Tempo contato 10min. Desinfetar maca passo a passo","P4-EX: Descarte: Comum, infectante, perfurocortante. Coleta. Separar lixo da sessão. Agulha de acupuntura","P5-FIN: Prevenção LER: Postura, peso, alongamento. 5 alongamentos para terapeuta. Resumo: Biossegurança protege você e cliente"],
 "M1-A4":["P1-OBJ: Fazer anamnese completa. 7 perguntas: Dor, tempo, intensidade, piora, melhora, histórico, objetivo. Simular 5min","P2-CON: Investigar histórico: Diabetes, pressão, cirurgia, remédio, alergia. Perguntar sobre anticoagulante","P3-PRAT: Contraindicações: Absoluta: trombose, febre. Relativa: gravidez. Lista de 10. Negar atendimento com ética","P4-EX: Preencher ficha e LGPD: Dados, assinatura, termo, arquivo 5 anos. Preencher ficha completa","P5-FIN: Conduta ética: Limites, sigilo, não prometer cura, encaminhar. Roleplay situação difícil. Resumo: Anamnese é 50% do resultado"],
 "M1-A5":["P1-OBJ: Técnicas básicas relaxante: Effleurage, Petrissage. Óleo, ritmo, respiração. Treinar effleurage nas costas 10min","P2-CON: Manobras de deslizamento: Direção, pressão, velocidade. Mão cheia. Deslizamento longo nas pernas","P3-PRAT: Amassamento e rolamento: Petrissage, levantar músculo, soltar. Amassar ombro e panturrilha","P4-EX: Percussão e vibração: Tapotement, hackeamento, vibração. Quando usar. Percussão em coxa. Contraindicado coluna","P5-FIN: Finalizar sessão: Fechamento, água, orientações, próxima sessão. Feedback. AVALIAÇÃO FINAL 20 QUESTÕES"]
};

const BANCO_QUESTOES=[{q:"1. Pai da massoterapia moderna:",o:["Per Henrik Ling","Hipócrates","Galeno","Avicena"],r:0},{q:"2. Nº músculos:",o:["100","300","640","1000"],r:2},{q:"3. Sentido massagem:",o:["Para fora","Para coração","Aleatório","Baixo"],r:1},{q:"4. Biossegurança:",o:["Massagear forte","Prevenir riscos","Usar óleo caro","Atender mais"],r:1},{q:"5. Contraindicação:",o:["Estresse","Trombose","Cansaço","Dor"],r:1},{q:"6. Effleurage:",o:["Percussão","Deslizamento","Amassamento","Vibração"],r:1},{q:"7. 206:",o:["Músculos","Ossos","Nervos","Órgãos"],r:1},{q:"8. EPI:",o:["Perfume","Luva","Brinco","Tênis"],r:1},{q:"9. Anamnese:",o:["Massagem","Entrevista","Óleo","Equipamento"],r:1},{q:"10. LGPD:",o:["Massagem","Dados cliente","Preço","Hora"],r:1},{q:"11. Petrissage:",o:["Deslizamento","Amassamento","Percussão","Vibração"],r:1},{q:"12. Febre:",o:["Pode","Não pode","Depende","Sempre"],r:1},{q:"13. Tapotement:",o:["Deslizamento","Percussão","Fricção","Vibração"],r:1},{q:"14. Sessão:",o:["10min","50min","3h","1min"],r:1},{q:"15. Varizes:",o:["Massagear","Não massagear","Forte","Rápido"],r:1},{q:"16. Ficha:",o:["Inútil","Protege","Atraso","Multa"],r:1},{q:"17. Óleo:",o:["Água","Amêndoas","Álcool","Vinagre"],r:1},{q:"18. Sigilo:",o:["Contar","Não falar","Postar","Falar"],r:1},{q:"19. Finalização:",o:["Sair","Feedback","Cobrar","Sumir"],r:1},{q:"20. Lei:",o:["13.352","10.000","9.999","1.000"],r:0}];

let estado={aula:null,pagina:1,respostas:{},concluidas:JSON.parse(localStorage.getItem('kth_v11')||'[]'),questoesSorteadas:[]};
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);

function montarMenu(){
  const wrap=$('#menuModulos');wrap.innerHTML='';
  Object.keys(DADOS).forEach(m=>{
    const mod=DADOS[m];let html='';
    mod.aulas.forEach((aulaObj,i)=>{
      const id=`M${m}-A${i+1}`;
      const ok=estado.concluidas.includes(id);
      html+=`<div class="aula ${ok?'completed':''}" data-id="${id}">${i+1}. ${aulaObj.nome}</div>`;
      html+=`<div class="topicos"><b>Tópicos:</b> ${aulaObj.temas.join(' | ')}</div>`;
    });
    wrap.innerHTML+=`<div class="modulo" id="mod${m}"><div class="modulo-head">${mod.nome}<span>0/5</span></div><div class="aulas">${html}</div></div>`;
  });
  $$('.aula').forEach(el=>el.onclick=()=>carregarAula(el.dataset.id));
  $(`[data-id="M1-A1"]`).classList.remove('locked');
}

function carregarAula(id){
  estado.aula=id;estado.pagina=1;estado.respostas={};$('#tabAula').click();
  const [m,a]=id.replace('M','').split('-A').map(Number);
  const mod=DADOS[m];const aulaObj=mod.aulas[a-1];
  $('#videoWrap').innerHTML=`<iframe src="https://www.youtube.com/embed/${aulaObj.video}" allowfullscreen></iframe>`;
  const tit=['Objetivo','Conteúdo','Prática','Exemplo','Finalização'];
  let btns='<div class="pagina-nav">';for(let p=1;p<=5;p++){btns+=`<button class="p-btn ${p===1?'active':''}" data-p="${p}">${p}. ${tit[p-1]}</button>`}btns+='</div>';
  $('#conteudoAula').innerHTML=`<div class="breadcrumb">Localização: <b>${mod.nome}</b> > <b>${aulaObj.nome}</b> > <b id="bcPag">Página 1: Objetivo</b></div><div class="chips"><span class="chip">1 VÍDEO + 5 PÁGINAS</span></div><h2>${aulaObj.nome}</h2>${btns}<div id="paginaArea"></div>`;
  $$('.p-btn').forEach(b=>b.onclick=()=>trocarPagina(+b.dataset.p));renderPagina();
  $$('.aula').forEach(x=>x.classList.remove('active'));$(`[data-id="${id}"]`).classList.add('active');
  $('#btnAnt').disabled=a===1;$('#btnProx').disabled=true;$('#btnConcluir').disabled=true;if(window.innerWidth<1100)toggleMenu();
}

function trocarPagina(p){estado.pagina=p;$$('.p-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));const tit=['Objetivo','Conteúdo','Prática','Exemplo','Finalização'];$('#bcPag').innerText=`Página ${p}: ${tit[p-1]}`;renderPagina()}

function renderPagina(){
  const[m,a]=estado.aula.replace('M','').split('-A').map(Number);
  const mod=DADOS[m];const aulaObj=mod.aulas[a-1];
  const tit=['Objetivo','Conteúdo','Prática','Exemplo','Finalização'];
  const key=`M${m}-A${a}`;
  const conteudo=CONTEUDOS[key];
  let html='';
  for(let p=1;p<=5;p++){
    let extra='';
    if(a==5&&p==5){extra=`<div class="avaliacao"><h3>📝 AVALIAÇÃO FINAL MÓDULO 1</h3><p>20 Questões. Acerte 14 = 70%. Libera Módulo 2.</p><div id="q"></div><button class="btn primary" id="env">Enviar</button><div id="res"></div></div>`}
    html+=`<div class="pagina" style="display:${p===estado.pagina?'block':'none'}"><h4>Página ${p} – ${tit[p-1]}</h4><ul>${conteudo[p-1].split('.').filter(x=>x.trim()).map(x=>`<li>${x}</li>`).join('')}</ul>${extra}</div>`;
  }
  $('#paginaArea').innerHTML=html;
  if($('#env')){carregarAvaliacao()}
}

function carregarAvaliacao(){if(estado.questoesSorteadas.length==0){estado.questoesSorteadas=BANCO_QUESTOES.sort(()=>0.5-Math.random()).slice(0,20)}const qs=estado.questoesSorteadas;let h='';qs.forEach((q,i)=>{h+=`<div class="questao"><p>${q.q}</p>`;q.o.forEach((op,j)=>h+=`<div class="opcao" data-q="${i}" data-o="${j}">${String.fromCharCode(65+j)}) ${op}</div>`);h+='</div>'});$('#q').innerHTML=h;$$('.opcao').forEach(o=>o.onclick=()=>{const qi=+o.dataset.q,oi=+o.dataset.o;estado.respostas[qi]=oi;$$('.opcao[data-q="'+qi+'"]').forEach(x=>x.classList.remove('selecionada'));o.classList.add('selecionada')});$('#env').onclick=corrigir;}

function corrigir(){const qs=estado.questoesSorteadas;let ac=0;qs.forEach((q,i)=>{const r=estado.respostas[i];if(r===q.r)ac++;$$('.opcao[data-q="'+i+'"]').forEach((o,j)=>{o.classList.remove('correta','errada');if(j===q.r)o.classList.add('correta');else if(j===r&&r!==q.r)o.classList.add('errada')})});const pct=Math.round(ac/qs.length*100);const ok=pct>=70;$('#res').innerHTML=`<div class="resultado ${ok?'aprovado':'reprovado'}">${ok?'APROVADO ✅':'REPROVADO ❌'}: ${ac}/20 = ${pct}%</div>${ok?'<p>Módulo 1 Concluído!</p>':'<button class="btn primary" id="ref">Refazer</button>'}`;if(ok){if(!estado.concluidas.includes(estado.aula))estado.concluidas.push(estado.aula);localStorage.setItem('kth_v11',JSON.stringify(estado.concluidas));$('#btnProx').disabled=false;$('#btnConcluir').disabled=false}else{$('#ref').onclick=()=>{estado.respostas={};estado.questoesSorteadas=[];$('#res').innerHTML='';carregarAvaliacao()}}}

function concluirAula(){if(!estado.aula)return;montarMenu();$('#btnConcluir').disabled=true;const[m,a]=estado.aula.replace('M','').split('-A').map(Number);if(a<5)$(`[data-id="M1-A${a+1}"]`).classList.remove('locked')}

function proximaAula(){const[m,a]=estado.aula.replace('M','').split('-A').map(Number);if(a<5)carregarAula(`M1-A${a+1}`)}
function anteriorAula(){const[m,a]=estado.aula.replace('M','').split('-A').map(Number);if(a>1)carregarAula(`M1-A${a-1}`)}
function abrirTab(n){$$('.tab').forEach(t=>t.classList.remove('active'));$('#tab'+n).classList.add('active');$('#tab-cronograma').style.display=n==='Cron'?'block':'none';$('#tab-aula').style.display=n==='Aula'?'block':'none'}
function toggleMenu(){const s=$('#sidebar'),o=$('#overlay');const open=s.style.transform==='translateX(0px)';s.style.transform=open?'translateX(-100%)':'translateX(0px)';o.classList.toggle('show',!open)}
$('#btnMenu').onclick=toggleMenu;$('#overlay').onclick=toggleMenu;$('#tabCron').onclick=()=>abrirTab('Cron');$('#tabAula').onclick=()=>abrirTab('Aula');$('#btnAnt').onclick=anteriorAula;$('#btnProx').onclick=proximaAula;$('#btnConcluir').onclick=concluirAula;montarMenu();
</script>
</body>
</html>
