    wrap.innerHTML+=`<div class="modulo open" id="mod${m}"><div class="modulo-head">${mod.nome}<span>0/25</span></div><div class="aulas">${aulas}</div></div>`;
  });
  $$('.aula').forEach(el=>el.onclick=()=>!el.classList.contains('locked')&&carregarAula(el.dataset.id));
  $(`[data-id="M1-A1-T1"]`).classList.remove('locked');
}

function carregarAula(id){
  estado.aula=id;estado.tema=1;estado.pagina=1;estado.respostas={};$('#tabAula').click();
  const [m,a,t]=id.replace('M','').split('-A').join('-').split('-T').map(Number);
  const mod=DADOS[m];const aulaObj=mod.aulas[a-1];const temaNome=aulaObj.temas[t-1];
  $('#videoWrap').innerHTML=`<iframe src="https://www.youtube.com/embed/${aulaObj.video}" allowfullscreen></iframe>`;
  let nav='';aulaObj.temas.forEach((tema,i)=>{const ok=estado.temasOK[id]?.includes(i+1);nav+=`<button class="tema-btn ${i===0?'active':''} ${ok?'completed':''}" data-t="${i+1}">${tema}</button>`});
  $('#conteudoAula').innerHTML=`<div class="breadcrumb">Localização: <b>${mod.nome}</b> > <b>${aulaObj.nome}</b> > <b id="bcTema">${temaNome}</b> > <b id="bcPag">Página 1: Objetivo</b></div><div class="chips"><span class="chip">VÍDEO + TEXTO</span><span class="chip gray">${aulaObj.nome}</span></div><h2>${temaNome}</h2><div class="tema-nav">${nav}</div><div id="paginaArea"></div>`;
  $$('.tema-btn').forEach(b=>b.onclick=()=>trocarTema(+b.dataset.t));renderPagina();
  $$('.aula').forEach(x=>x.classList.remove('active'));$(`[data-id="${id}"]`).classList.add('active');
  const idx=(a-1)*5+(t-1);$('#btnAnt').disabled=idx===0;$('#btnProx').disabled=true;$('#btnConcluir').disabled=true;if(window.innerWidth<1100)toggleMenu();
}

function trocarTema(t){estado.tema=t;estado.pagina=1;estado.respostas={};$$('.tema-btn').forEach((b,i)=>b.classList.toggle('active',i+1===t));const[m,a]=estado.aula.replace('M','').split('-A').map(Number);$('#bcTema').innerText=DADOS[m].aulas[a-1].temas[t-1];renderPagina()}
function trocarPagina(p){estado.pagina=p;$$('.p-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));const tit=['Objetivo','Conteúdo','Prática','Exemplo','Finalização'];$('#bcPag').innerText=`Página ${p}: ${tit[p-1]}`;renderPagina()}

function renderPagina(){
  const[m,a,t]=estado.aula.replace('M','').split('-A').join('-').split('-T').map(Number);
  const mod=DADOS[m];const aulaObj=mod.aulas[a-1];const temaNome=aulaObj.temas[t-1];
  const tit=['Objetivo','Conteúdo','Prática','Exemplo','Finalização'];
  const key=`M${m}-A${a}-T${t}`;
  const conteudo=CONTEUDOS[key];
  let html='';
  for(let p=1;p<=5;p++){
    let extra='';
    if(a==5&&t==5&&p==5){
      extra=`<div class="avaliacao"><h3>📝 AVALIAÇÃO FINAL MÓDULO 1</h3><p>20 Questões. Acerte 70% = 14 acertos. Libera Módulo 2.</p><div id="q"></div><button class="btn primary" id="env">Enviar Avaliação</button><div id="res"></div></div>`;
    }
    html+=`<div class="pagina" style="display:${p===estado.pagina?'block':'none'}"><h4>Página ${p} – ${tit[p-1]}</h4><ul>${conteudo[p-1].split(':')[1].split('.').filter(x=>x.trim()).map(x=>`<li>${x}</li>`).join('')}</ul>${extra}</div>`;
  }
  let btns='<div class="pagina-nav">';for(let p=1;p<=5;p++){btns+=`<button class="p-btn ${p===estado.pagina?'active':''}" data-p="${p}">${p}</button>`}btns+='</div>';
  $('#paginaArea').innerHTML=btns+html;
  $$('.p-btn').forEach(b=>b.onclick=()=>trocarPagina(+b.dataset.p));
  if($('#env')){carregarAvaliacao()}
}

function carregarAvaliacao(){if(estado.questoesSorteadas.length==0){estado.questoesSorteadas=BANCO_QUESTOES_M1.sort(()=>0.5-Math.random()).slice(0,20)}const qs=estado.questoesSorteadas;let h='';qs.forEach((q,i)=>{h+=`<div class="questao"><p>${q.q}</p>`;q.o.forEach((op,j)=>h+=`<div class="opcao" data-q="${i}" data-o="${j}">${String.fromCharCode(65+j)}) ${op}</div>`);h+='</div>'});$('#q').innerHTML=h;$$('.opcao').forEach(o=>o.onclick=()=>{const qi=+o.dataset.q,oi=+o.dataset.o;estado.respostas[qi]=oi;$$('.opcao[data-q="'+qi+'"]').forEach(x=>x.classList.remove('selecionada'));o.classList.add('selecionada')});$('#env').onclick=corrigir;}

function corrigir(){
  const qs=estado.questoesSorteadas;let ac=0;
  qs.forEach((q,i)=>{const r=estado.respostas[i];if(r===q.r)ac++;$$('.opcao[data-q="'+i+'"]').forEach((o,j)=>{o.classList.remove('correta','errada');if(j===q.r)o.classList.add('correta');else if(j===r&&r!==q.r)o.classList.add('errada')})});
  const pct=Math.round(ac/qs.length*100);const ok=pct>=70;
  $('#res').innerHTML=`<div class="resultado ${ok?'aprovado':'reprovado'}">${ok?'APROVADO ✅':'REPROVADO ❌'}: ${ac}/20 = ${pct}%</div>${ok?'<p>Módulo 1 Concluído! Módulo 2 libera em Fevereiro.</p>':'<button class="btn primary" id="ref">Refazer com questões novas</button>'}`;
  if(ok){estado.temasOK[estado.aula]=[5];localStorage.setItem('kth_temas_v11',JSON.stringify(estado.temasOK));$('#btnProx').disabled=true;$('#btnConcluir').disabled=true}else{$('#ref').onclick=()=>{estado.respostas={};estado.questoesSorteadas=[];$('#res').innerHTML='';carregarAvaliacao()}}
}

function concluirAula(){if(!estado.aula)return;if(!estado.concluidas.includes(estado.aula))estado.concluidas.push(estado.aula);localStorage.setItem('kth_v11',JSON.stringify(estado.concluidas));montarMenu();$('#btnConcluir').disabled=true;const[m,a,t]=estado.aula.replace('M','').split('-A').join('-').split('-T').map(Number);const proxT=t+1;if(proxT<=5){$('#btnProx').disabled=false}else if(a<5){$(`[data-id="M1-A${a+1}-T1"]`).classList.remove('locked')}}

function proximaAula(){
  const[m,a,t]=estado.aula.replace('M','').split('-A').join('-').split('-T').map(Number);
  const idx=(a-1)*5+(t-1);
  if(idx<24){
    const prox=idx+1;
    const proxA=Math.floor(prox/5)+1;
    const proxT=prox%5+1;
    carregarAula(`M1-A${proxA}-T${proxT}`);
    $(`[data-id="M1-A${proxA}-T${proxT}"]`).classList.remove('locked')
  }
}

function anteriorAula(){
  const[m,a,t]=estado.aula.replace('M','').split('-A').join('-').split('-T').map(Number);
  const idx=(a-1)*5+(t-1);
  if(idx>0){
    const ant=idx-1;
    const antA=Math.floor(ant/5)+1;
    const antT=ant%5+1;
    carregarAula(`M1-A${antA}-T${antT}`)
  }
}

function abrirTab(n){
  $$('.tab').forEach(t=>t.classList.remove('active'));
  $('#tab'+n).classList.add('active');
  $('#tab-cronograma').style.display=n==='Cron'?'block':'none';
  $('#tab-aula').style.display=n==='Aula'?'block':'none'
}

function toggleMenu(){
  const s=$('#sidebar'),o=$('#overlay');
  const open=s.style.transform==='translateX(0px)';
  s.style.transform=open?'translateX(-100%)':'translateX(0px)';
  o.classList.toggle('show',!open)
}

// EVENTOS
$('#btnMenu').onclick=toggleMenu;
$('#overlay').onclick=toggleMenu;
$('#tabCron').onclick=()=>abrirTab('Cron');
$('#tabAula').onclick=()=>abrirTab('Aula');
$('#btnAnt').onclick=anteriorAula;
$('#btnProx').onclick=proximaAula;
$('#btnConcluir').onclick=concluirAula;

// INICIAR
montarMenu();
</script>
</body>
</html>
