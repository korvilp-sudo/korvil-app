<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desenvolvimento Humano | KORVIL</title>
<style>
:root{--c:#00f5ff;--bg:#000;--card:#0a0a0a;--text:#fff;--text2:#aaa;--borda:#1f1f1f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:20px;max-width:700px;margin:auto;}
.logo{max-width:200px;margin:0 auto 16px;display:block;border:2px solid var(--c);border-radius:12px;padding:8px;background:#000;}
h1{text-align:center;color:var(--c);font-size:20px;margin-bottom:8px;}
.sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:20px;}
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.card h2{font-size:15px;color:var(--c);margin-bottom:8px;}
.card p{font-size:12px;color:var(--text2);line-height:1.8;}
.btn{background:var(--c);color:#000;text-align:center;padding:14px;border-radius:10px;text-decoration:none;font-weight:800;display:block;margin-top:12px;}
.btn:active{transform:scale(.97);}
.btn-voltar{display:block;background:#222;color:#fff;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:800;margin-top:8px;}
</style>
</head>
<body>
<img src="https://korvilp-sudo.github.io/korvil-app/assets/images/korvil-logo.png" class="logo">
<h1>DESENVOLVIMENTO HUMANO</h1>
<div class="sub">Cursos Profissionalizantes KORVIL</div>

<div class="card">
  <h2>🎯 ÁREAS DE CURSOS:</h2>
  <p>• 📱 Serviços Profissionais</p>
  <p>• 💪 Treinamento Personalizado</p>
  <p>• 🚀 Empreendedorismo</p>
  <p>• 🏥 Saúde</p>
  <p>• ✂️ Beleza</p>
</div>

<a href="cursos/areas/index.html" class="btn">ABRIR ÁREAS</a>
<a href="../index.html" class="btn-voltar">Voltar para Central</a>
</body>
</html>
