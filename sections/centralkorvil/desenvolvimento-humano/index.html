<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desenvolvimento Humano | KORVIL</title>
<style>
:root{--c:#00f5ff;--bg:#000;--card:#0a0a0a;--text:#fff;--text2:#aaa;--borda:#1f1f1f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:20px;max-width:700px;margin:auto;}
.logo{max-width:200px;margin:0 auto 16px;display:block;border:2px solid var(--c);border-radius:12px;padding:8px;background:#000;cursor:pointer;}
h1{text-align:center;color:var(--c);font-size:20px;margin-bottom:8px;}
.sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:20px;}
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.2s;}
.card:active{border-color:var(--c);box-shadow:0 0 15px var(--c)30;transform:scale(.98);}
.card h2{font-size:15px;color:var(--c);margin-bottom:6px;}
.card p{font-size:12px;color:var(--text2);}
.btn-voltar{display:block;background:#222;color:#fff;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:800;margin-top:8px;}
</style>
</head>
<body>
<img src="https://korvilp-sudo.github.io/korvil-app/assets/images/korvil-logo.png" class="logo" onclick="voltarCentral()">
<h1>DESENVOLVIMENTO HUMANO</h1>
<div class="sub">Cursos Profissionalizantes KORVIL</div>

<div class="card" onclick="irParaCursos()">
  <h2>1. CURSOS</h2>
  <p>Áreas Profissionalizantes KORVIL</p>
</div>

<a href="https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/index.html" class="btn-voltar">Voltar para Central</a>

<script>
function irParaCursos(){
  window.location.href = "https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/desenvolvimento-humano/cursos/index.html";
}
function voltarCentral(){
  window.location.href = "https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/index.html";
}
</script>
</body>
</html>
