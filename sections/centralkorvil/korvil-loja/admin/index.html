<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SISTEMA K - ADMIN</title>
</head>
<body>
  <script>
    window.CMS_CONFIG = {
      config: {
        backend: {
          name: "github",
          repo: "korvilp-sudo/korvil-app",
          branch: "main"
        },
        media_folder: "sections/centralkorvil/korvil-loja/uploads",
        public_folder: "/uploads",
        collections: [
          {
            name: "produtos",
            label: "📦 SISTEMA K - PRODUTOS",
            folder: "sections/centralkorvil/korvil-loja",
            create: true,
            slug: "{{sistema}}/{{area}}/marcas/{{marca}}/produtos/{{produto}}",
            extension: "html",
            fields: [
              {label: "1. SISTEMA", name: "sistema", widget: "select", options: ["K", "K-TP", "K-AFORTUNADO", "K-ALMA"]},
              {label: "2. ÁREA", name: "area", widget: "select", options: ["Profissionais", "Tecnologias", "Suplementos", "Acessorios", "Alimentos", "Livros", "Financas", "Empreendedorismo", "Saude", "Beleza", "Terapias"]},
              {label: "3. MARCA/PROFISSIONAL", name: "marca", widget: "string"},
              {label: "4. PASTA DO PRODUTO", name: "produto", widget: "string"},
              {label: "5. TÍTULO", name: "titulo", widget: "string"},
              {label: "6. PREÇO", name: "preco", widget: "number"},
              {label: "7. SABOR", name: "sabor", widget: "string", required: false},
              {label: "8. PESO", name: "peso", widget: "string", required: false},
              {label: "9. IMAGEM", name: "imagem", widget: "image", required: false},
              {label: "10. DESCRIÇÃO", name: "descricao", widget: "markdown"}
            ]
          }
        ]
      }
    }
  </script>
  <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
</body>
</html>
