<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suplementos | K-TP FITNESS | KORVIL</title>
<style>
:root{--c:#00ff88; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--bg);color:var(--text);padding-bottom:70px}

/* TOPO */
.topo{background:linear-gradient(90deg,var(--c),#00d4ff);padding:12px 4%;color:#000;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px}
.topo a{color:#000;font-size:24px;text-decoration:none}
.topo h1{font-size:18px;font-weight:900}

/* CUPOM */
.cupom{background:#000;color:var(--c);padding:10px;margin:12px 4%;border-radius:8px;text-align:center;border:2px dashed var(--c);font-weight:800;cursor:pointer}

/* FILTROS */
.filtros{display:flex;gap:8px;padding:0 4% 12px;overflow-x:auto}
.filtro{padding:8px 14px;background:var(--card);border:1px solid var(--borda);border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer}
.filtro.ativo{background:var(--c);color:#000;border-color:var(--c);font-weight:800}

/* GRID PRODUTOS */
.titulo{padding:10px 4% 5px;font-size:18px;font-weight:800}
.grid{padding:0 4% 20px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{background:var(--card);border-radius:12px;padding:10px;border:1px solid var(--borda)}
.card img{width:100%;height:150px;object-fit:cover;border-radius:8px;background:#111}
.tag-vendas{font-size:10px;color:#00ff88;font-weight:700}
.preco-old{text-decoration:line-through;color:var(--text2);font-size:12px}
.preco{color:var(--c);font-size:18px;font-weight:900}
.off{background:#00ff88;color:#000;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:800;display:inline-block;margin-top:2px}
.btn{width:100%;background:var(--c);color:#000;border:0;padding:10px;border-radius:8px;margin-top:8px;font-weight:900;cursor:pointer}

/* MENU INFERIOR */
.menu-inf{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid var(--borda);display:flex;justify-content:space-around;padding:8px 0}
.item-menu{text-align:center;font-size:10px;color:var(--text2);text-decoration:none}
.item-menu.ativo{color:var(--c)}
</style>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <div class="topo">
    <a href="../index.html"><ion-icon name="arrow-back"></ion-icon></a>
    <h1>SUPLEMENTOS</h1>
  </div>

  <div class="cupom" onclick="navigator.clipboard.writeText('KTP15'); alert('Cupom KTP15 copiado!')">
    CUPOM: KTP15 = 15% OFF em TODOS OS SUPLEMENTOS 🔥
  </div>

  <!-- FILTROS RÁPIDOS -->
  <div class="filtros">
    <div class="filtro ativo" onclick="filtrar('todos', this)">Todos</div>
    <div class="filtro" onclick="filtrar('whey', this)">Whey Protein</div>
    <div class="filtro" onclick="filtrar('creatina', this)">Creatina</div>
    <div class="filtro" onclick="filtrar('pre', this)">Pré-Treino</div>
    <div class="filtro" onclick="filtrar('bcaa', this)">BCAA</div>
    <div class="filtro" onclick="filtrar('vitamina', this)">Vitaminas</div>
  </div>

  <h3 class="titulo">Mais Vendidos</h3>
  <div class="grid" id="gridSuplementos"></div>

  <div class="menu-inf">
    <a href="../../../index.html" class="item-menu"><ion-icon name="home"></ion-icon><div>Inicio</div></a>
    <a href="../index.html" class="item-menu"><ion-icon name="fitness"></ion-icon><div>K-TP</div></a>
    <a href="#" class="item-menu ativo"><ion-icon name="cart"></ion-icon><div>Carrinho</div></a>
    <a href="#" class="item-menu"><ion-icon name="menu"></ion-icon><div>Mais</div></a>
  </div>

<script>
const produtos = [
  {nome:"Whey Protein KORVIL 2kg Chocolate", preco:129.90, precoOld:189.90, img:"https://placehold.co/400/00ff88/000?text=WHEY+2KG", vendas:"1.2k vendidos", off:31, cat:"whey"},
  {nome:"Whey Protein Isolado 900g", preco:149.90, precoOld:219.90, img:"https://placehold.co/400/00d4ff/000?text=ISO", vendas:"890 vendidos", off:32, cat:"whey"},
  {nome:"Creatina KORVIL 300g", preco:59.90, precoOld:89.90, img:"https://placehold.co/400/00ff88/000?text=CREATINA", vendas:"2.5k vendidos", off:33, cat:"creatina"},
  {nome:"Creatina Monohidratada 1kg", preco:99.90, precoOld:149.90, img:"https://placehold.co/400/00d4ff/000?text=CREA+1KG", vendas:"1.1k vendidos", off:33, cat:"creatina"},
  {nome:"Pré-Treino KORVIL Pump", preco:79.90, precoOld:119.90, img:"https://placehold.co/400/00ff88/000?text=PRE+TREINO", vendas:"2k vendidos", off:33, cat:"pre"},
  {nome:"Pré-Treino Hornet 300g", preco:89.90, precoOld:129.90, img:"https://placehold.co/400/00d4ff/000?text=HORNET", vendas:"750 vendidos", off:30, cat:"pre"},
  {nome:"BCAA 2:1:1 200 caps", preco:69.90, precoOld:99.90, img:"https://placehold.co/400/00ff88/000?text=BCAA", vendas:"650 vendidos", off:30, cat:"bcaa"},
  {nome:"BCAA 4:1:1 120 caps", preco:59.90, precoOld:89.90, img:"https://placehold.co/400/00d4ff/000?text=BCAA+4", vendas:"420 vendidos", off:33, cat:"bcaa"},
  {nome:"Albumina 1kg", preco:49.90, precoOld:79.90, img:"https://placehold.co/400/00ff88/000?text=ALBUMINA", vendas:"980 vendidos", off:37, cat:"whey"},
  {nome:"Multivitamínico 120 caps", preco:39.90, precoOld:59.90, img:"https://placehold.co/400/00d4ff/000?text=MULTI", vendas:"1.5k vendidos", off:33, cat:"vitamina"},
  {nome:"Ômega 3 1000mg 120 caps", preco:44.90, precoOld:69.90, img:"https://placehold.co/400/00ff88/000?text=OMEGA", vendas:"800 vendidos", off:35, cat:"vitamina"},
  {nome:"Glutamina 300g", preco:54.90, precoOld:79.90, img:"https://placehold.co/400/00d4ff/000?text=GLUTAMINA", vendas:"600 vendidos", off:31, cat:"bcaa"}
];

function renderizar(lista){
  document.getElementById('gridSuplementos').innerHTML = lista.map(p=>`
    <div class="card">
      <img src="${p.img}">
      <div class="tag-vendas">${p.vendas}</div>
      <div style="font-size:14px;margin:4px 0;height:38px">${p.nome}</div>
      <div class="preco-old">R$ ${p.precoOld.toFixed(2)}</div>
      <div class="preco">R$ ${p.preco.toFixed(2)}</div>
      <div class="off">${p.off}% OFF</div>
      <button class="btn">COMPRAR AGORA</button>
    </div>
  `).join('');
}

function filtrar(categoria, el){
  document.querySelectorAll('.filtro').forEach(f=>f.classList.remove('ativo'));
  el.classList.add('ativo');
  const filtrados = categoria === 'todos' ? produtos : produtos.filter(p => p.cat === categoria);
  renderizar(filtrados);
}

// Carrega todos ao iniciar
renderizar(produtos);
</script>
</body>
</html>
