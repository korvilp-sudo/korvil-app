
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>MÓDULO 8: AGOSTO</title>
<style>
:root{--c:#00f5ff; --bg:#080808; --text:#fff; --text2:#aaa; --ok:#00ff88; --err:#ff3366; --borda:#1a1a1a;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text)}
header{padding:14px 16px;border-bottom:2px solid var(--c);background:#050505;display:flex;justify-content:space-between;align-items:center}
.logo{color:var(--c);font-weight:900;font-size:14px}
.btn{padding:8px 14px;border-radius:8px;border:0;background:var(--c);color:#001012;font-weight:900;cursor:pointer;font-size:10px}
.prof-card{padding:10px;margin:10px 0;border:1px solid var(--c);border-radius:8px;background:#0a0a0a;font-size:10px}
.prof-card h4{color:var(--c);margin-bottom:4px}
.aulas{padding:10px}
.aula{padding:12px;margin:8px 0;background:#111;border-radius:8px;border:1px solid var(--borda);cursor:pointer}
.aula h3{font-size:12px;color:var(--c)}
.aula p{font-size:10px;color:var(--text2)}
.aula.completed{border-left:4px solid var(--ok)}
#tela-aula{display:none;padding:16px}
.video-wrap{position:relative;padding-top:56.25%;background:#000;border-radius:8px;margin-bottom:12px}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.tema-nav{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.tema-btn{padding:6px 10px;border:1px solid var(--borda);background:#0a0a0a;color:var(--text2);font-size:9px;border-radius:6px;cursor:pointer}
.tema-btn.active{border-color:var(--c);color:var(--c)}
.pagina-nav{display:flex;gap:6px;margin:10px 0}
.p-btn{padding:5px 8px;border:1px solid var(--borda);background:#0a0a0a;color:var(--text2);font-size:9px;border-radius:6px;cursor:pointer}
.p-btn.active{border-color:var(--c);color:var(--c)}
.pagina{padding:12px;border:1px solid var(--borda);border-radius:8px;background:#0a0a0a;margin-top:10px;font-size:11px;line-height:1.6}
.pagina h4{color:var(--c);margin-bottom:8px;font-size:12px}
.avaliacao{margin-top:16px;padding:16px;border:2px solid var(--c);border-radius:8px}
.questao{margin:12px 0;padding:10px;border:1px solid var(--borda);border-radius:6px;background:#0a0a0a;font-size:10px}
.opcao{padding:6px;margin:4px 0;border:1px solid var(--borda);border-radius:4px;cursor:pointer;font-size:10px}
.opcao.selecionada{border-color:var(--c)}
.resultado{padding:10px;border-radius:6px;text-align:center;font-weight:800;font-size:11px;margin-top:10px}
.resultado.aprovado{background:#00220f;color:var(--ok)}
.resultado.reprovado{background:#220005;color:var(--err)}
</style>
</head>
<body>

<header>
  <div class="logo">MÓDULO 8: AGOSTO - CUTTING 1</div>
  <button class="btn" onclick="location='index.html'">← MENU</button>
</header>

<div id="tela-aulas" class="aulas"></div>

<div id="tela-aula" style="display:none">
  <div class="video-wrap"><iframe id="video" src="https://www.youtube.com/embed/j3PdVh1j7e0" allowfullscreen></iframe></div>
  <div id="conteudo"></div>
  <button class="btn" onclick="voltarAulas()" style="margin-top:20px">← VOLTAR AULAS</button>
</div>

<script>
const MODULO = {
  id:8, nome:"AGOSTO - CUTTING 1", fase:4,
  objetivo:"Perder gordura | Preservar massa | Definição inicial",
  profissionais:[
    {semana:"Manutenção", prof:"Terapeuta Holístico", area:"Corpo+Mente+Energia", funcao:"Controlar cortisol, sono, ansiedade do déficit"},
    {semana:"Resistência", prof:"Médico do Esporte", area:"Cardio+Exames+Saúde", funcao:"Acompanhar queima, cardio seguro, suplementos"},
    {semana:"Força", prof:"Ortopedista", area:"Estrutura+Articulação", funcao:"Manter força com menos caloria, prevenir lesão"},
    {semana:"Hipertrofia", prof:"Nutricionista", area:"Anabolismo+Dieta", funcao:"Déficit -300kcal, alta proteína, preservar músculo"}
  ],
  aulas:[]
};

// GERA 20 AULAS
for(let a=1;a<=20;a++){
  const semana = Math.ceil(a/5);
  const dia = ["Segunda","Terça","Quarta","Quinta","Sexta"][(a-1)%5];
  const tipo = ["MANUTENÇÃO","RESISTÊNCIA","FORÇA","HIPERTROFIA"][(a-1)%4];

  MODULO.aulas.push({
    id:a, nome:`Aula ${a}: Semana ${semana} - ${dia} | ${tipo}`,
    temas:[
      {nome:`Tema 1: Manutenção`, paginas:[
        `OBJETIVO: Segurar ansiedade e cortisol. PROFISSIONAL: Terapeuta Holístico.`,
        `MATERIAIS: Chá, meditação, respiração, óleo essencial.`,
        `EXECUÇÃO: 4x10-12. Pausa 90s. Carga média. Sem falha.`,
        `TREINO: 4x semana. Volume baixo pra não catabolizar.`,
        `MENTAL: Diário, sono 8h, evitar estresse. Déficit já bate.`
      ]},
      {nome:`Tema 2: Resistência`, paginas:[
        `OBJETIVO: Acelerar queima de gordura. PROFISSIONAL: Médico do Esporte.`,
        `MATERIAIS: Frequencímetro, L-Carnitina, Cafeína, água.`,
        `EXECUÇÃO: 4x15-20. Pausa 30s. Circuitos. FC 140-160.`,
        `TREINO: 4x cardio. 2x LISS 45min + 2x HIIT 15min.`,
        `SAÚDE: Checar pressão. Não zerar carbo. Evitar tontura.`
      ]},
      {nome:`Tema 3: Força`, paginas:[
        `OBJETIVO: Preservar força e músculo. PROFISSIONAL: Ortopedista.`,
        `MATERIAIS: Cinto, creatina, aquecimento longo.`,
        `EXECUÇÃO: 5x4-6. Pausa 2min. 80% 1RM. Manter carga.`,
        `TREINO: 3x básicos. Não aumentar volume. Priorizar técnica.`,
        `PREVENÇÃO: Articulação sofre no déficit. Alongar + liberar.`
      ]},
      {nome:`Tema 4: Hipertrofia`, paginas:[
        `OBJETIVO: Preservar massa magra. PROFISSIONAL: Nutricionista.`,
        `MATERIAIS: Balança, whey, BCAA, 5 refeições.`,
        `EXECUÇÃO: 4x8-12. 1-2 reps da falha. Pump pra segurar músculo.`,
        `TREINO: Volume moderado. Foco em partes fracas.`,
        `DIETA: Déficit -300kcal. 2.4g proteína/kg. Carbo só peri-treino.`
      ]},
      {nome:`Tema 5: Revisão`, paginas:[
        `OBJETIVO: Checar se está perdendo gordura sem perder força.`,
        `MATERIAIS: Foto, fita, balança, bioimpedância.`,
        `EXECUÇÃO: Peso -1kg/semana. Cintura -1cm. Força igual.`,
        `TREINO: Se fadiga alta, reduzir 1 série de cada exercício.`,
        `PRÓXIMO: CUTTING 2 em Setembro. Acelerar déficit.`
      ]}
    ]
  })
}

const QUESTOES = [];
for(let q=1;q<=20;q++)QUESTOES.push({q:`${q}. No CUTTING 1 quem cuida da dieta pra preservar músculo?`,o:["Terapeuta Holístico","Médico do Esporte","Ortopedista","Nutricionista"],r:3});

let estado={aula:null,tema:1,pagina:1,respostas:{},concluidas:JSON.parse(localStorage.getItem('m8')||'[]')};

function renderAulas(){
  let profHTML = '<div class="prof-card"><h4>TIME DO MÓDULO 8</h4>';
  MODULO.profissionais.forEach(p=>profHTML+=`<p><b>${p.semana}:</b> ${p.prof} - ${p.funcao}</p>`);
  profHTML += '</div>';

  let html = profHTML;
  MODULO.aulas.forEach(a=>{
    const ok=estado.concluidas.includes(a.id);
    html+=`<div class="aula ${ok?'completed':''}" onclick="abrirAula(${a.id})"><h3>${a.nome}</h3><p>5 Temas • 25 Páginas ${ok?'✓ Concluída':''}</p></div>`;
  });
  document.getElementById('tela-aulas').innerHTML=html;
}

function abrirAula(id){
  estado.aula=id;estado.tema=1;estado.pagina=1;estado.respostas={};
  document.getElementById('tela-aulas').style.display='none';
  document.getElementById('tela-aula').style.display='block';
  const aula=MODULO.aulas.find(x=>x.id===id);
  let nav='';aula.temas.forEach((t,i)=>nav+=`<button class="tema-btn ${i===0?'active':''}" onclick="trocarTema(${i+1})">${t.nome}</button>`);
  document.getElementById('conteudo').innerHTML=`<div style="font-size:10px;color:var(--text2)">MÓDULO 8 > ${aula.nome}</div><h2 style="color:var(--c);font-size:14px;margin:8px 0">${aula.nome}</h2><div style="font-size:10px;color:var(--c);margin-bottom:10px">OBJETIVO: ${MODULO.objetivo}</div><div class="tema-nav">${nav}</div><div id="paginaArea"></div>`;
  renderPagina();
}

function trocarTema(t){estado.tema=t;estado.pagina=1;document.querySelectorAll('.tema-btn').forEach((b,i)=>b.classList.toggle('active',i+1===t));renderPagina()}
function trocarPagina(p){estado.pagina=p;document.querySelectorAll('.p-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));renderPagina()}

function renderPagina(){
  const aula=MODULO.aulas.find(x=>x.id===estado.aula);
  const tema=aula.temas[estado.tema-1];
  let html=`<div class="pagina"><h4>Página ${estado.pagina} – ${['Objetivo','Materiais','Execução','Treino','Alimentação'][estado.pagina-1]}</h4><p>${tema.paginas[estado.pagina-1]}</p>`;
  if(estado.pagina===5)html+=`<div class="avaliacao"><h3>📝 AVALIAÇÃO MÓDULO 8 - 20 QUESTÕES</h3><p>Precisa 70% = 14 acertos</p><div id="q"></div><button class="btn" id="env">Enviar</button><div id="res"></div></div>`;
  html+=`</div>`;
  let btns='<div class="pagina-nav">';for(let p=1;p<=5;p++)btns+=`<button class="p-btn ${p===estado.pagina?'active':''}" onclick="trocarPagina(${p})">${p}</button>`;btns+='</div>';
  document.getElementById('paginaArea').innerHTML=btns+html;
  if(document.getElementById('env'))carregarQuestoes();
}

function carregarQuestoes(){
  let h='';QUESTOES.forEach((q,i)=>{h+=`<div class="questao"><p>${q.q}</p>`;q.o.forEach((op,j)=>h+=`<div class="opcao" data-q="${i}" data-o="${j}">${String.fromCharCode(65+j)}) ${op}</div>`);h+='</div>'});
  document.getElementById('q').innerHTML=h;
  document.querySelectorAll('.opcao').forEach(o=>o.onclick=()=>{estado.respostas[+o.dataset.q]=+o.dataset.o;document.querySelectorAll('.opcao[data-q="'+o.dataset.q+'"]').forEach(x=>x.classList.remove('selecionada'));o.classList.add('selecionada')});
  document.getElementById('env').onclick=corrigir;
}

function corrigir(){
  let ac=0;QUESTOES.forEach((q,i)=>{if(estado.respostas[i]===q.r)ac++});
  const pct=Math.round(ac/QUESTOES.length*100);const ok=pct>=70;
  document.getElementById('res').innerHTML=`<div class="resultado ${ok?'aprovado':'reprovado'}">${ok?'APROVADO':'REPROVADO'}: ${ac}/20 = ${pct}%</div>${ok?'<button class="btn" onclick="concluir()">Concluir Módulo</button>':'<button class="btn" onclick="location.reload()">Refazer</button>'}`;
  if(ok){if(!estado.concluidas.includes(estado.aula))estado.concluidas.push(estado.aula);localStorage.setItem('m8',JSON.stringify(estado.concluidas));}
}

function concluir(){alert('MÓDULO 8 CONCLUÍDO! Próximo: MÓDULO 9 CUTTING 2');voltarAulas()}
function voltarAulas(){document.getElementById('tela-aulas').style.display='block';document.getElementById('tela-aula').style.display='none';renderAulas()}
renderAulas();
</script>
</body>
</html>
