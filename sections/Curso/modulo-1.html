<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-TP | KORVIL Treinamento 2026</title>
<style>
:root{--c:#00f5ff; --bg:#080808; --text:#fff; --text2:#aaa; --ok:#00ff88; --borda:#1a1a1a;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding-bottom:40px}
header{padding:16px;border-bottom:2px solid var(--c);background:#050505;text-align:center;position:sticky;top:0;z-index:10}
.logo{color:var(--c);font-weight:900;font-size:18px;letter-spacing:1px}
.sub{font-size:10px;color:var(--text2);margin-top:4px}
.fase{margin:12px;border:1px solid var(--borda);border-radius:10px;background:#0a0a0a;overflow:hidden}
.fase-head{padding:14px;background:#050505;border-bottom:1px solid var(--borda)}
.meses{font-size:10px;color:var(--c);font-weight:800;letter-spacing:1px}
.titulo{font-size:14px;margin-top:4px;color:var(--text)}
.desc{font-size:10px;color:var(--text2);margin-top:6px;line-height:1.4}
.modulos{padding:8px}
.modulo{padding:12px;margin:6px 0;background:#111;border-radius:8px;border:1px solid var(--borda);cursor:pointer;transition:.2s}
.modulo:hover{background:#151515}
.modulo h3{font-size:12px;color:var(--c)}
.modulo p{font-size:10px;color:var(--text2);margin-top:4px}
.modulo.locked{opacity:.3;pointer-events:none}
.modulo.completed{border-left:4px solid var(--ok)}
</style>
</head>
<body>

<header>
  <div class="logo">K-TP 2026</div>
  <div class="sub">PROJETO TRANSFORMAÇÃO 11° ANO | 11 MÓDULOS | JAN A NOV</div>
</header>

<div id="fases"></div>

<script>
const FASES = [
  {
    id:1, nome:"FASE 1: OFF SEASON - ADAPTAÇÃO GERAL",
    meses:"JANEIRO A FEVEREIRO",
    desc:"Fase de adaptação total de corpo e mente. Aumentar ingestão calórica de forma estratégica para elevar energia, disposição e preparar o metabolismo para o bulking.",
    modulos:[
      {id:1, nome:"MÓDULO 1: JANEIRO", aulas:20},
      {id:2, nome:"MÓDULO 2: FEVEREIRO", aulas:20}
    ]
  },
  {
    id:2, nome:"FASE 2: BULKING - HIPERTROFIA MÁXIMA",
    meses:"MARÇO A MAIO",
    desc:"Fase prioritária de construção. Objetivo: hipertrofia muscular, ganho de força. Regra básica: comer mais do que gasta. Dieta limpa e protocolar.",
    modulos:[
      {id:3, nome:"MÓDULO 3: MARÇO", aulas:20},
      {id:4, nome:"MÓDULO 4: ABRIL", aulas:20},
      {id:5, nome:"MÓDULO 5: MAIO", aulas:20}
    ]
  },
  {
    id:3, nome:"FASE 3: MAINTENANCE - CONSOLIDAÇÃO",
    meses:"JUNHO A AGOSTO",
    desc:"Fase de manutenção e consolidação dos ganhos. Manter massa magra, reduzir gordura e densificar musculatura. Preparação para o cutting.",
    modulos:[
      {id:6, nome:"MÓDULO 6: JUNHO", aulas:20},
      {id:7, nome:"MÓDULO 7: JULHO", aulas:20},
      {id:8, nome:"MÓDULO 8: AGOSTO", aulas:20}
    ]
  },
  {
    id:4, nome:"FASE 4: CUTTING - DEFINIÇÃO TOTAL",
    meses:"SETEMBRO A NOVEMBRO",
    desc:"Fase de finalização. Eliminar máximo de gordura preservando 100% da massa muscular. Dieta rigorosa com déficit calórico. Resultado aparece aqui.",
    modulos:[
      {id:9, nome:"MÓDULO 9: SETEMBRO", aulas:20},
      {id:10, nome:"MÓDULO 10: OUTUBRO", aulas:20},
      {id:11, nome:"MÓDULO 11: NOVEMBRO", aulas:20}
    ]
  }
];

const concluidas = JSON.parse(localStorage.getItem('ktp_modulos')||'[]');

function getMesLibera(m){
  if(m<=2)return 1; if(m<=5)return 3; if(m<=8)return 6; return 9;
}

let html='';
FASES.forEach(f=>{
  html+=`<div class="fase"><div class="fase-head"><div class="meses">${f.meses}</div><div class="titulo">${f.nome}</div><div class="desc">${f.desc}</div></div><div class="modulos">`;

  f.modulos.forEach(m=>{
    const mesLibera = getMesLibera(m.id);
    const mesAtual = new Date().getMonth()+1;
    const locked = mesAtual < mesLibera;
    const ok = concluidas.includes(m.id);
    html+=`<div class="modulo ${locked?'locked':''} ${ok?'completed':''}" onclick="abrirModulo(${m.id})">
      <h3>${m.nome}</h3>
      <p>${m.aulas} Aulas • 5 Temas • 5 Páginas por Tema ${ok?'✓ Concluído':''} ${locked?'🔒 Libera em '+mesLibera+'/2026':''}</p>
    </div>`;
  });

  html+=`</div></div>`;
});

document.getElementById('fases').innerHTML=html;

function abrirModulo(m){
  window.location=`modulo-${m}.html`;
}
</script>
</body>
</html>
