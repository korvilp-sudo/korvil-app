<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-OMFOME - Delivery de Comida</title>
<style>
:root{
  --vermelho:#EA1D2C;
  --laranja:#FF6B00;
  --amarelo:#FFC107;
  --bg:#F5F5F5;
  --card:#fff;
  --text:#3F3E3E;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif}
body{background:var(--bg);color:var(--text)}

/* HEADER ESTILO IFOOD */
header{background:var(--vermelho);padding:12px 5%;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.top{display:flex;justify-content:space-between;align-items:center;color:#fff}
.logo{font-size:28px;font-weight:900}
.logo span{color:var(--amarelo)}
.search{background:#fff;border-radius:8px;display:flex;flex:1;margin:0 20px;overflow:hidden}
.search input{flex:1;border:0;padding:12px;font-size:14px;outline:none}
.search button{background:var(--laranja);border:0;padding:0 20px;color:#fff;font-weight:800;cursor:pointer}
.icons{display:flex;gap:20px;font-weight:700;cursor:pointer}

/* ENDERECO */
.endereco{background:#fff;padding:12px 5%;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ddd;font-size:14px}
.endereco b{color:var(--vermelho)}

/* BANNER */
.banner{margin:20px 5%;border-radius:12px;overflow:hidden;background:linear-gradient(90deg,var(--vermelho),var(--laranja));color:#fff;padding:30px;text-align:center}
.banner h1{font-size:28px}

/* CATEGORIAS ESTILO IFOOD */
.categorias{padding:10px 5%;display:flex;gap:15px;overflow-x:auto}
.cat{background:var(--card);min-width:100px;text-align:center;padding:15px 10px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,.05);cursor:pointer;border:2px solid transparent}
.cat:hover{border-color:var(--laranja)}
.cat img{width:50px;height:50px;background:#eee;border-radius:50%;margin-bottom:8px}

/* RESTAURANTES/PRODUTOS */
.section{padding:20px 5%}
.section-title{font-size:20px;font-weight:800;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer}
.card:hover{transform:translateY(-3px)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:15px}
.card-title{font-weight:800;font-size:16px}
.card-info{font-size:13px;color:#777;margin:5px 0}
.price{color:var(--vermelho);font-weight:900;font-size:18px}
.tag{background:var(--amarelo);color:#000;font-size:11px;padding:3px 8px;border-radius:4px;font-weight:800}

/* CARRINHO LATERAL */
.cart{position:fixed;right:-400px;top:0;width:380px;height:100%;background:#fff;box-shadow:-5px 0 20px rgba(0,0,0,.2);transition:0.4s;padding:20px;z-index:200}
.cart.open{right:0}
.cart h2{color:var(--vermelho);border-bottom:2px solid #eee;padding-bottom:10px}
.btn{width:100%;padding:16px;background:var(--vermelho);color:#fff;border:0;border-radius:8px;font-weight:800;font-size:16px;cursor:pointer;margin-top:10px}
.btn:hover{background:#c41722}
.btn.laranja{background:var(--laranja)}

footer{background:#fff;text-align:center;padding:30px;margin-top:40px;border-top:1px solid #ddd}
@media(max-width:700px){.grid{grid-template-columns:1fr 1fr} .cart{width:100%} .search{margin:0 10px}}
</style>
</head>
<body>

<header>
  <div class="top">
    <div class="logo">K-<span>OMFOME</span></div>
    <div class="search">
      <input id="search" placeholder="Buscar restaurante, prato ou cozinha">
      <button onclick="buscar()">Buscar</button>
    </div>
    <div class="icons" onclick="toggleCart()">🛒 Carrinho (<span id="cartCount">0</span>)</div>
  </div>
</header>

<div class="endereco">
  📍 Entregar em: <b>Rua Principal, 123 - Bertioga</b> | Trocar
</div>

<div class="banner">
  <h1>PRONTO PRA MATAR SUA FOME?</h1>
  <p>Até 50% OFF nos restaurantes parceiros</p>
</div>

<div class="categorias" id="categorias"></div>

<section class="section">
  <h2 class="section-title">Restaurantes Próximos</h2>
  <div class="grid" id="produtos"></div>
</section>

<div class="cart" id="cart">
  <h2>Seu Pedido</h2>
  <div id="cartItems" style="margin:20px 0"></div>
  <div style="border-top:1px solid #eee;padding-top:15px">
    <div>Subtotal: R$ <span id="subtotal">0.00</span></div>
    <div>Taxa de entrega: R$ 5.99</div>
    <h3 style="margin:10px 0">Total: R$ <span id="total">0.00</span></h3>
  </div>
  <button class="btn" onclick="openCheckout()">IR PARA PAGAMENTO</button>
</div>

<script>
const categorias = [
  {nome:'Hambúrguer',emoji:'🍔'}, {nome:'Pizza',emoji:'🍕'}, {nome:'Pastel',emoji:'🥟'},
  {nome:'Açaí',emoji:'🍧'}, {nome:'Marmita',emoji:'🍱'}, {nome:'Japonesa',emoji:'🍣'},
  {nome:'Bebidas',emoji:'🥤'}, {nome:'Sobremesa',emoji:'🍰'}
];

const produtos = [
  {id:1,nome:"KORVIL BURGUER",desc:"X-Burguer, X-Salada, X-Tudo",tempo:"30-45 min",nota:4.8,preco:29.90,tag:"Entrega Grátis",img:"https://placehold.co/400x300/EA1D2C/fff?text=KORVIL+BURGUER"},
  {id:2,nome:"Pizza do Chef",desc:"Calabresa, Marguerita, Portuguesa",tempo:"40-50 min",nota:4.6,preco:49.90,tag:"20% OFF",img:"https://placehold.co/400x300/FF6B00/fff?text=PIZZA"},
  {id:3,nome:"Pastelaria K",desc:"Carne, Queijo, Frango",tempo:"20-30 min",nota:4.9,preco:12.90,tag:"",img:"https://placehold.co/400x300/FFC107/000?text=PASTEL"},
  {id:4,nome:"Açaí Premium",desc:"500ml, 700ml, 1L",tempo:"25-35 min",nota:4.7,preco:24.90,tag:"Novo",img:"https://placehold.co/400x300/8E44AD/fff?text=ACAI"},
  {id:5,nome:"Marmita Fit",desc:"Frango, Peixe, Vegana",tempo:"35-45 min",nota:4.5,preco:22.90,tag:"",img:"https://placehold.co/400x300/27AE60/fff?text=MARMITA"},
  {id:6,nome:"Sushi House",desc:"Combinados e Sashimi",tempo:"50-60 min",nota:4.8,preco:69.90,tag:"30% OFF",img:"https://placehold.co/400x300/3498DB/fff?text=SUSHI"},
];

let carrinho = [];

// RENDER CATEGORIAS
document.getElementById('categorias').innerHTML = categorias.map(c=>`
  <div class="cat">
    <div style="font-size:30px">${c.emoji}</div>
    <div style="font-size:12px;font-weight:700">${c.nome}</div>
  </div>
`).join('');

// RENDER PRODUTOS
function render(lista=produtos){
  document.getElementById('produtos').innerHTML = lista.map(p=>`
    <div class="card" onclick="addCarrinho(${p.id})">
      <img src="${p.img}">
      <div class="card-body">
        <div class="card-title">${p.nome} ${p.tag?`<span class="tag">${p.tag}</span>`:''}</div>
        <div class="card-info">⭐ ${p.nota} • ${p.tempo} • R$ 5,99 entrega</div>
        <div class="card-info">${p.desc}</div>
        <div class="price">A partir de R$ ${p.preco.toFixed(2)}</div>
      </div>
    </div>
  `).join('');
}

function addCarrinho(id){
  const prod = produtos.find(p=>p.id==id);
  const item = carrinho.find(i=>i.id==id);
  if(item) item.qtd++; else carrinho.push({...prod,qtd:1});
  updateCart(); toggleCart();
}

function updateCart(){
  document.getElementById('cartCount').innerText = carrinho.reduce((a,b)=>a+b.qtd,0);
  document.getElementById('cartItems').innerHTML = carrinho.map(i=>`
    <div style="display:flex;justify-content:space-between;margin-bottom:15px">
      <div>${i.qtd}x ${i.nome}</div>
      <div>R$ ${(i.preco*i.qtd).toFixed(2)}</div>
    </div>
  `).join('');
  const sub = carrinho.reduce((a,b)=>a+b.preco*b.qtd,0);
  document.getElementById('subtotal').innerText = sub.toFixed(2);
  document.getElementById('total').innerText = (sub + 5.99).toFixed(2);
}

function toggleCart(){document.getElementById('cart').classList.toggle('open')}

function buscar(){
  const t = document.getElementById('search').value.toLowerCase();
  render(produtos.filter(p=>p.nome.toLowerCase().includes(t) || p.desc.toLowerCase().includes(t)))
}

function openCheckout(){
  if(carrinho.length==0) return alert('Carrinho vazio');
  let msg = "*PEDIDO K-OMFOME*%0A%0A";
  carrinho.forEach(i=> msg += `${i.qtd}x ${i.nome} = R$ ${(i.preco*i.qtd).toFixed(2)}%0A`);
  msg += `%0ATotal: R$ ${document.getElementById('total').innerText}`;
  window.open(`https://wa.me/55SEUNUMERO?text=${msg}`,'_blank');
}

render();
</script>
</body>
</html>
