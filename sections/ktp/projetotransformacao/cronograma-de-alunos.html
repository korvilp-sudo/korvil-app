<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>K-TP PROJETO TRANSFORMAÇÃO 2026</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00; --erro:#ff0044;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:16px 16px 16px 60px;text-align:center;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:16px;font-weight:900;color:var(--c);letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.menu-btn{position:fixed;top:14px;left:16px;z-index:101;background:var(--c);color:#000;border:0;border-radius:8px;padding:8px 10px;font-weight:900;font-size:18px;cursor:pointer;}
.btn-projeto{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-projeto:hover{box-shadow:0 0 15px var(--c);}

.container{display:flex;max-width:1200px;margin:auto;}

/* MENU LATERAL */
#menu-lateral{position:fixed;left:-320px;top:0;width:300px;height:100%;background:#0a0a0a;border-right:2px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:70px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.abas-fases{display:flex;flex-direction:column;}
.aba-fase{padding:12px 16px;background:#111;border-bottom:1px solid var(--borda);cursor:pointer;font-weight:900;font-size:12px;color:var(--c);display:flex;justify-content:space-between;align-items:center;}
.aba-fase.ativa{background:rgba(0,245,255,.1);border-left:3px solid var(--c);}
.seta{transition:.3s;}
.aba-fase.ativa.seta{transform:rotate(90deg);}
.semanas-da-fase{display:none;padding:8px;background:#050505;}
.semanas-da-fase.ativa{display:block;}
.semana-item{padding:8px 10px;margin:4px 0;background:#1a1a1a;border-radius:6px;font-size:11px;cursor:pointer;transition:.2s;border-left:2px solid transparent;}
.semana-item:hover{background:#222;border-left:2px solid var(--c);}
.semana-item.ativa{background:rgba(0,255,136,.2);border-left:2px solid var(--ok);color:var(--ok);font-weight:800;}
.semana-item.passada{opacity:0.5;}

.conteudo{flex:1;padding:16px;padding-bottom:100px;}

/* MODAL ALUNO */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:14px;padding:20px;max-width:400px;width:100%;box-shadow:0 0 40px var(--c)40;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-titulo{font-size:16px;font-weight:900;color:var(--c);}
.btn-fechar{background:var(--erro);color:#fff;border:0;border-radius:6px;padding:6px 10px;font-weight:900;cursor:pointer;}
.busca-id{display:flex;gap:6px;margin-bottom:12px;}
.busca-id input{flex:1;padding:10px;background:#000;border:1.5px solid var(--borda);border-radius:6px;color:#fff;font-size:12px;}
.busca-id button{padding:10px 12px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;cursor:pointer;}
.dado-aluno{padding:8px 0;border-bottom:1px solid var(--borda);font-size:12px;}
.dado-aluno b{color:var(--c);}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}

/* CARD DO ALUNO */
.card-aluno{background:linear-gradient(135deg,#0a0a0a,#111);border:2px solid var(--c);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 0 20px var(--c)20;}
.card-aluno.titulo{font-size:14px;font-weight:900;color:var(--c);margin-bottom:10px;text-align:center;}
.grid-aluno{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;}
.grid-aluno.item{background:#0a0a0a;padding:8px;border-radius:6px;border:1px solid var(--borda);}
.grid-aluno.item b{color:var(--c);display:block;font-size:10px;margin-bottom:2px;}

/* CARDS */
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}

.semana-atual{padding:20px;background:linear-gradient(180deg,#000,#0a0a0a);border:2px solid var(--c);border-radius:14px;margin-bottom:16px;box-shadow:0 0 30px var(--c)30;}
.semana-titulo{font-weight:900;color:var(--c);font-size:18px;margin-bottom:4px;text-align:center;}
.semana-tipo{font-size:12px;color:var(--aviso);font-weight:800;margin-bottom:12px;text-align:center;}
.img-metodo{width:100%;border-radius:10px;border:2px solid var(--c);margin-bottom:12px;object-fit:contain;height:auto;max-height:500px;background:#000;}
.protocolo{padding:16px;background:#0a0a0a;border:1px solid var(--c);border-radius:8px;font-size:13px;white-space:pre-wrap;line-height:1.7;}
.badge{padding:5px 12px;background:var(--ok);color:#000;border-radius:20px;font-size:10px;font-weight:900;}
.data-grande{font-size:15px;color:var(--c);font-weight:800;text-align:center;margin-bottom:8px;}
.grid-metodos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.grid-metodos img{width:100%;height:80px;object-fit:contain;border-radius:6px;border:1.5px solid var(--borda);opacity:0.3;background:#000;}
.grid-metodos img.ativa{border:2px solid var(--c);opacity:1;box-shadow:0 0 10px var(--c)40;}

/* K-AI */
#k-ai-cubo{position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:linear-gradient(135deg,var(--c),#0088ff);border-radius:12px;box-shadow:0 0 20px var(--c);cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;animation:flutuar 2s infinite;border:2px solid var(--c);}
@keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#k-ai-balao{position:fixed;bottom:30px;right:90px;background:#0a0a0a;border:2px solid var(--c);padding:10px 14px;border-radius:12px;font-size:11px;color:var(--c);max-width:200px;z-index:998;box-shadow:0 0 15px var(--c)30;display:block;}
#k-ai-balao:after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);border-left:8px solid var(--c);border-top:6px solid transparent;border-bottom:6px solid transparent;}
#k-ai-chat{position:fixed;bottom:90px;right:20px;width:320px;height:450px;background:#0a0a0a;border:2px solid var(--c);border-radius:14px;display:none;flex-direction:column;z-index:999;box-shadow:0 0 30px var(--c)40;}
#k-ai-header{padding:10px;background:var(--c);color:#000;font-weight:900;border-radius:12px 12px 0 0;text-align:center;font-size:13px;}
#k-ai-msgs{flex:1;overflow-y:auto;padding:10px;font-size:12px;}
.msg{margin-bottom:8px;padding:8px;border-radius:8px;line-height:1.4;}
.msg.ai{background:#111;color:var(--c);border-left:2px solid var(--c);}
.msg.user{background:var(--c);color:#000;text-align:right;}
#k-ai-input{display:flex;border-top:1px solid var(--borda);}
#k-ai-input input{flex:1;padding:10px;background:#000;border:0;color:#fff;outline:0;font-size:12px;}
#k-ai-input button{padding:10px 12px;background:var(--c);border:0;color:#000;font-weight:900;cursor:pointer;}

@media(min-width:768px){
  #menu-lateral{position:relative;left:0;width:320px;border-right:1px solid var(--borda);}
 .menu-btn{display:none;}
  #overlay{display:none!important;}
 .header{padding-left:16px;}
}
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="header">
  <h1>K-TP PROJETO TRANSFORMAÇÃO 2026</h1>
  <button class="btn-projeto" onclick="abrirBuscaAluno()">👤 SEU PROJETO: ID</button>
</div>

<div id="overlay" onclick="toggleMenu()"></div>
<div id="menu-lateral"></div>

<div class="container">
  <div class="conteudo">
    <div id="cardAluno"></div>

    <div class="card">
      <img src="https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/logoprojetotransformacao.png" class="logo">
      <div class="sub-titulo">Link oficial da semana. Atualiza automaticamente toda segunda-feira 00:01</div>
    </div>
    <div id="semanaAtualContainer"></div>
  </div>
</div>

<!-- MODAL BUSCA ALUNO -->
<div id="modal-aluno">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-titulo">CONSULTAR ALUNO</div>
      <button class="btn-fechar" onclick="fecharBuscaAluno()">X</button>
    </div>
    <div class="busca-id">
      <input type="text" id="input-id-aluno" placeholder="Ex: carla38, gon19, dani36">
      <button onclick="buscarAluno()">BUSCAR</button>
    </div>
    <div id="resultado-aluno"></div>
  </div>
</div>

<!-- K-AI -->
<div id="k-ai-balao"></div>
<div id="k-ai-cubo" onclick="toggleChat()">K-AI</div>
<div id="k-ai-chat">
  <div id="k-ai-header">K-AI ASSISTENTE K-TP</div>
  <div id="k-ai-msgs"></div>
  <div id="k-ai-input">
    <input type="text" id="k-ai-text" placeholder="Digite sua dúvida..." onkeypress="if(event.key==='Enter')enviarKAI()">
    <button onclick="enviarKAI()">➤</button>
  </div>
</div>

<script>
const PASTA_IMG = 'images/imagens/2026/imagens-dos-metodos/';

// BASE COMPLETA DE ALUNOS
const ALUNOS_DB = {
  "carla38": {nome:"Maria Carla", plano:"PRESENCIAL", horario:"08h00 🐢", dias:"Ter • Qui • Sex", freq:"3x", objetivo:"Definição muscular", valor:100, venc:"06/08/26", status:"Ativo"},
  "vhellem39": {nome:"Hellem Vitoria", plano:"PRESENCIAL", horario:"08h00 🐢", dias:"Ter • Qui • Sex", freq:"3x", objetivo:"Definição muscular", valor:100, venc:"06/08/26", status:"Ativo"},
  "gon19": {nome:"José Gonzaga", plano:"PRESENCIAL", horario:"19h00 🌑", dias:"Seg • Qua • Sex", freq:"3x", objetivo:"Hipertrofia", valor:100, venc:"08/10/25", status:"Ativo"},
  "dani36": {nome:"Daniele Vieira Leite", plano:"ONLINE", horario:"14h00", dias:"Seg a Sex", freq:"5x", objetivo:"Definição", valor:60, venc:"13/05/26", status:"Desativado"}
};

// LINHA DO TEMPO COMPLETA 2026
const CALENDARIO_KTP = {
  "2026-01-05": {fase:"FASE 1: OFF SEASON", tipo:"semana-de-manutencao", nome:"SEMANA DE MANUTENÇÃO", objetivo:"Regeneração | Adaptações | Aprendizados", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE MANUTENÇÃO\nEssa é uma semana única dentro do processo — uma pausa estratégica para ajustar, aprender e evoluir com mais consciência.`},
  "2026-01-12": {fase:"FASE 1: OFF SEASON", tipo:"semana-de-resistencia", nome:"SEMANA DE RESISTÊNCIA", objetivo:"Regeneração | Adaptações | Aprendizados", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE RESISTÊNCIA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nEssa é uma semana fundamental dentro do processo — onde você constrói a base que sustenta toda evolução física. Aqui você desenvolve resistência muscular, condicionamento e disciplina para suportar as próximas fases.`},
  "2026-01-19": {fase:"FASE 1: OFF SEASON", tipo:"semana-de-forca", nome:"SEMANA DE FORÇA", objetivo:"Regeneração | Adaptações | Aprendizados", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE FORÇA\nFoco da semana: ficar mais forte de verdade\nAqui trabalhamos cargas mais altas, menos repetições e técnica perfeita. Essa é a base para o crescimento.`},
  "2026-01-26": {fase:"FASE 1: OFF SEASON", tipo:"semana-de-hipertrofia", nome:"SEMANA DE HIPERTROFIA", objetivo:"Regeneração | Adaptações | Aprendizados", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE HIPERTROFIA\nFoco: Desenvolvimento e crescimento do físico\nSemana para colocar volume no treino e estimular o crescimento muscular. Alimentação e descanso em dia.`},
  "2026-02-02": {fase:"FASE 2: DEFINIÇÃO", tipo:"semana-de-resistencia", nome:"SEMANA DE RESISTÊNCIA", objetivo:"Queima de Gordura", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 2: DEFINIÇÃO\nSEMANA DE RESISTÊNCIA\nFoco: Aumentar gasto calórico e resistência`},
  "2026-12-28": {fase:"DEZEMBRO: FÉRIAS", tipo:"semana-de-hipertrofia", nome:"SEMANA DE HIPERTROFIA", objetivo:"Mostrar os resultados", texto:`K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - DEZEMBRO: FÉRIAS\nSEMANA DE HIPERTROFIA\nÚltimo treino do ano. Celebração. Resultado e descanso merecido 💪\nVocê chegou até aqui. Mostre sua evolução!`}
};

let semanaSelecionada = null;

function formatarData(dataString) {
  const data = new Date(dataString);
  const dia = String(data.getDate()).padStart(2, '0');
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const ano = data.getFullYear();
  return `${dia}/${mes}/${ano}`;
}

function getSegundaSemana(data){
  const d = new Date(data);
  const dia = d.getDay();
  const diff = d.getDate() - dia + (dia === 0? -6 : 1);
  return new Date(d.setDate(diff));
}

function abrirBuscaAluno(){
  document.getElementById('modal-aluno').classList.add('ativo');
  document.getElementById('input-id-aluno').focus();
}
function fecharBuscaAluno(){
  document.getElementById('modal-aluno').classList.remove('ativo');
  document.getElementById('resultado-aluno').innerHTML = '';
  document.getElementById('input-id-aluno').value = '';
}
function buscarAluno(){
  const id = document.getElementById('input-id-aluno').value.toLowerCase().trim();
  const aluno = ALUNOS_DB[id];
  const div = document.getElementById('resultado-aluno');
  if(!aluno){
    div.innerHTML = `<div style="color:var(--erro);text-align:center;padding:10px;">Aluno com ID "${id}" não encontrado</div>`;
    return;
  }
  div.innerHTML = `
    <div class="card-aluno">
      <div class="titulo">👤 DADOS DO ALUNO</div>
      <div class="grid-aluno">
        <div class="item"><b>NOME</b>${aluno.nome}</div>
        <div class="item"><b>PLANO</b>${aluno.plano}</div>
        <div class="item"><b>HORÁRIO</b>${aluno.horario}</div>
        <div class="item"><b>DIAS</b>${aluno.dias}</div>
        <div class="item"><b>FREQUÊNCIA</b>${aluno.freq}</div>
        <div class="item"><b>OBJETIVO</b>${aluno.objetivo}</div>
        <div class="item"><b>MENSALIDADE</b>R$ ${aluno.valor}</div>
        <div class="item"><b>VENCIMENTO</b>${aluno.venc}</div>
        <div class="item" style="grid-column:span 2"><b>STATUS</b><span class="${aluno.status==='Ativo'?'status-ativo':'status-desativado'}">${aluno.status}</span></div>
      </div>
    </div>
  `;
}

function toggleMenu(){
  document.getElementById('menu-lateral').classList.toggle('ativo');
  document.getElementById('overlay').classList.toggle('ativo');
}

function toggleAba(faseId){
  document.querySelectorAll('.semanas-da-fase').forEach(el=>el.classList.remove('ativa'));
  document.querySelectorAll('.aba-fase').forEach(el=>el.classList.remove('ativa'));
  document.getElementById(faseId).classList.add('ativa');
  document.querySelector(`[onclick="toggleAba('${faseId}')"]`).classList.add('ativa');
}

function carregarMenu(){
  const hoje = new Date();
  const chaveHoje = getSegundaSemana(hoje).toISOString().split('T')[0];
  const fases = {};

  // Agrupa por fase
  Object.keys(CALENDARIO_KTP).sort().forEach(data => {
    const s = CALENDARIO_KTP[data];
    if(!fases[s.fase]) fases[s.fase] = [];
    fases[s.fase].push({data,...s});
  });

  let html = '<div class="abas-fases">';

  Object.keys(fases).forEach((fase, index)=>{
    const faseId = `fase-${index}`;
    html += `<div class="aba-fase" onclick="toggleAba('${faseId}')">${fase} <span class="seta">›</span></div>`;
    html += `<div class="semanas-da-fase" id="${faseId}">`;

    // CORREÇÃO AQUI: era fases.forEach, agora é fases[fase].forEach
    fases[fase].forEach(s => {
      let classe = '';
      if(s.data === chaveHoje) classe = 'ativa';
      else if(s.data < chaveHoje) classe = 'passada';
      html += `<div class="semana-item ${classe}" onclick="mostrarSemana('${s.data}')">${formatarData(s.data)} - ${s.nome}</div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  document.getElementById('menu-lateral').innerHTML = html;
  toggleAba('fase-0'); // Abre primeira fase automaticamente
}

function mostrarSemana(chaveData){
  semanaSelecionada = chaveData;
  const semana = CALENDARIO_KTP[chaveData];
  const dataFormatada = formatarData(chaveData);
  const caminhoImg = `${PASTA_IMG}${semana.tipo}/${semana.tipo}.png`;
  const metodos = ['semana-de-manutencao','semana-de-resistencia','semana-de-forca','semana-de-hipertrofia'];
  let grid = '<div class="grid-metodos">';
  metodos.forEach(m=>{ grid += `<img src="${PASTA_IMG}${m}/${m}.png" class="${m===semana.tipo?'ativa':''}">`; });
  grid += '</div>';

  document.getElementById('semanaAtualContainer').innerHTML = `
  <div class="semana-atual">
    <div class="titulo-secao">| SEMANA <span class="badge">${chaveData === getSegundaSemana(new Date()).toISOString().split('T')[0]? 'ATUAL' : 'SELECIONADA'}</span></div>
    <div class="data-grande">Data: ${dataFormatada}</div>
    <img src="${caminhoImg}" class="img-metodo" alt="${semana.nome}">
    ${grid}
    <div class="semana-titulo">${semana.fase} - ${semana.nome}</div>
    <div class="semana-tipo">OBJETIVO: ${semana.objetivo}</div>
    <div class="protocolo">${semana.texto}</div>
  </div>`;
  if(window.innerWidth < 768) toggleMenu();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function carregarSemanaAtual(){
  const hoje = new Date();
  const segunda = getSegundaSemana(hoje);
  const chaveSegunda = segunda.toISOString().split('T')[0];

  let chave = chaveSegunda;
  if(!CALENDARIO_KTP[chave]){
    chave = Object.keys(CALENDARIO_KTP).sort().find(d => d >= chaveSegunda) || Object.keys(CALENDARIO_KTP).sort().pop();
  }

  mostrarSemana(chave);
  const dataFormatada = formatarData(chave);
  document.getElementById('k-ai-balao').innerHTML = `Participantes e Alunos! <br><b>${CALENDARIO_KTP[chave].nome}</b><br>${dataFormatada}`;
}

// K-AI
let chatAberto = false;
function toggleChat(){
  chatAberto =!chatAberto;
  document.getElementById('k-ai-chat').style.display = chatAberto? 'flex' : 'none';
  if(chatAberto && document.getElementById('k-ai-msgs').innerHTML === ''){
    const chave = semanaSelecionada || getSegundaSemana(new Date()).toISOString().split('T')[0];
    document.getElementById('k-ai-msgs').innerHTML = `<div class="msg ai">Olá Participantes e Alunos! 👋\n\nSemana atual: **${CALENDARIO_KTP[chave].nome}**\nPergunte sobre FASE, SEMANA ou PROTOCOLO.</div>`;
  }
}
function addMsgAI(texto){document.getElementById('k-ai-msgs').innerHTML += `<div class="msg ai">${texto.replace(/\n/g,'<br>')}</div>`;}
function addMsgUser(texto){document.getElementById('k-ai-msgs').innerHTML += `<div class="msg user">${texto}</div>`;}
function enviarKAI(){
  const input = document.getElementById('k-ai-text');
  if(!input.value.trim()) return;
  addMsgUser(input.value); input.value = '';
  const chave = semanaSelecionada || getSegundaSemana(new Date()).toISOString().split('T')[0];
  const semana = CALENDARIO_KTP[chave];
  setTimeout(()=>addMsgAI(`${semana.texto}`), 500);
}

window.onload = function(){
  carregarMenu();
  carregarSemanaAtual();
};
</script>
</body>
</html>
