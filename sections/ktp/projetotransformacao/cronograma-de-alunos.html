<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>Dados do Cronograma do aluno</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00; --erro:#ff0044;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:16px;text-align:center;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:16px;font-weight:900;color:var(--c);letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.btn-aluno{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;}

.container{max-width:1200px;margin:auto;padding:16px;padding-bottom:100px;}

.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}

/* MODAL ALUNO */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:14px;padding:20px;max-width:1000px;width:100%;box-shadow:0 0 40px var(--c)40;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-titulo{font-size:16px;font-weight:900;color:var(--c);}
.btn-fechar{background:var(--erro);color:#fff;border:0;border-radius:6px;padding:6px 10px;font-weight:900;cursor:pointer;}
.dado-aluno{padding:8px 0;border-bottom:1px solid var(--borda);font-size:12px;}
.dado-aluno b{color:var(--c);}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}

/* ABAS PLANO */
.abas-plano{display:flex;gap:8px;margin-bottom:12px;border-bottom:2px solid var(--borda);}
.aba-plano{padding:10px 16px;background:#111;border:0;color:var(--text2);font-weight:800;font-size:12px;cursor:pointer;border-radius:6px 6px 0 0;}
.aba-plano.ativa{background:var(--c);color:#000;}

/* TABELA CRONOGRAMA */
.tabela-wrapper{overflow-x:auto;margin-bottom:20px;border:1px solid var(--borda);border-radius:8px;}
.tabela-crono{width:100%;border-collapse:collapse;font-size:11px;}
.tabela-crono th{background:#111;color:var(--c);padding:12px 8px;text-align:left;font-size:10px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--c);}
.tabela-crono td{padding:12px 8px;border-bottom:1px solid #1a1a1a;}
.tabela-crono tbody tr:hover{background:#0f0f0f;}
.tabela-crono.col-id{font-weight:900;color:var(--c);min-width:100px;}
.tabela-crono.col-nome{font-weight:800;color:#fff;min-width:140px;}

.grupo-horario{margin-top:20px;margin-bottom:8px;color:var(--c);font-weight:900;font-size:13px;padding:8px;background:#0a0a0a;border-left:3px solid var(--c);}
.grupo-status{margin:8px 0;color:var(--aviso);font-weight:800;font-size:11px;padding-left:8px;}
.obs-pix{padding:14px;background:#0a0a0a;border:1px dashed var(--c);border-radius:8px;font-size:11px;color:var(--text2);margin:15px 0;text-align:center;line-height:1.6;}

/* BUSCA ID */
.busca-id{display:flex;gap:6px;margin-top:10px;}
.busca-id input{flex:1;padding:10px;background:#000;border:1.5px solid var(--borda);border-radius:6px;color:#fff;font-size:12px;}
.busca-id button{padding:10px 14px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <h1>K-TP PROJETO TRANSFORMAÇÃO 2026</h1>
  <button class="btn-aluno" onclick="abrirBuscaAluno()">👤 SEU PROJETO: COLAR ID</button>
</div>

<div class="container">
  <div class="card">
    <img src="https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/logoprojetotransformacao.png" class="logo">
    <div class="sub-titulo">Link oficial da semana. Atualiza automaticamente toda segunda-feira 00:01</div>
  </div>
  <div id="semanaAtualContainer"></div>
</div>

<!-- MODAL BUSCA ALUNO -->
<div id="modal-aluno">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-titulo">BUSCAR ALUNO PELO ID</div>
      <button class="btn-fechar" onclick="fecharBuscaAluno()">X</button>
    </div>
    <div class="busca-id">
      <input type="text" id="input-id-aluno" placeholder="COLAR ID" onkeypress="if(event.key==='Enter') buscarAluno()">
      <button onclick="buscarAluno()">BUSCAR</button>
    </div>
    <div id="resultado-aluno" style="margin-top:12px;"></div>
  </div>
</div>

<script>
// LISTA COMPLETA
const ALUNOS_DB = {
  "carla38": {nome:"Maria Carla", plano:"PRESENCIAL", horario:"08h00 🐢", dias:"Seg • Qua • Sex", freq:"3x", objetivo:"Definição muscular", valor:100, venc:"06/08/26", status:"Ativo"},
  "vhellem39": {nome:"Hellem Vitoria", plano:"PRESENCIAL", horario:"08h00 🐢", dias:"Seg • Qua • Sex", freq:"3x", objetivo:"Definição muscular", valor:100, venc:"06/08/26", status:"Ativo"},
  "gon19": {nome:"José Gonzaga", plano:"PRESENCIAL", horario:"19h00 🌑", dias:"Seg • Qua • Sex", freq:"3x", objetivo:"Hipertrofia", valor:100, venc:"13/05/26", status:"Ativo"},
  "dani36": {nome:"Daniele Vieira Leite", plano:"ONLINE", horario:"14h00", dias:"Seg a Sex", freq:"5x", objetivo:"Definição", valor:60, venc:"13/05/26", status:"Ativo"},
  "ktp1": {nome:"SAY KORVIL", plano:"ADMIN", horario:"--", dias:"--", freq:"--", objetivo:"ADMIN", valor:"--", venc:"--", status:"Ativo"}
};

let planoAtivo = 'PRESENCIAL';

function abrirBuscaAluno(){
  document.getElementById('modal-aluno').classList.add('ativo');
  document.getElementById('input-id-aluno').focus();
  document.getElementById('resultado-aluno').innerHTML = mostrarCronogramaCompleto();
}
function fecharBuscaAluno(){
  document.getElementById('modal-aluno').classList.remove('ativo');
  document.getElementById('resultado-aluno').innerHTML = '';
  document.getElementById('input-id-aluno').value = '';
}

function trocarAba(plano){
  planoAtivo = plano;
  document.querySelectorAll('.aba-plano').forEach(b=>b.classList.remove('ativa'));
  event.target.classList.add('ativa');
  document.getElementById('resultado-aluno').innerHTML = mostrarCronogramaCompleto();
}

function mostrarCronogramaCompleto(){
  const alunos = Object.entries(ALUNOS_DB)
   .map(([id, data]) => ({id,...data}))
   .filter(a => a.plano === planoAtivo);

  alunos.sort((a,b)=>{
    if(a.horario!== b.horario) return a.horario.localeCompare(b.horario);
    if(a.status!== b.status) return a.status === 'Ativo'? -1 : 1;
    return a.nome.localeCompare(b.nome);
  });

  let html = `<div class="abas-plano">
    <button class="aba-plano ${planoAtivo==='PRESENCIAL'?'ativa':''}" onclick="trocarAba('PRESENCIAL')">🏋️ PRESENCIAL</button>
    <button class="aba-plano ${planoAtivo==='ONLINE'?'ativa':''}" onclick="trocarAba('ONLINE')">💻 ONLINE</button>
  </div>`;

  html += `<div class="titulo-secao">📋 CRONOGRAMA ${planoAtivo}</div>`;
  html += `<div class="obs-pix">Olá, sua mensalidade está prestes a vencer.<br>Esteja com o pagamento corretamente em dia para continuar participando.<br><b>Pix: korvilloja@gmail.com</b></div>`;

  let horarioAtual = '';
  let statusAtual = '';
  let contador = 1;

  alunos.forEach(a=>{
    if(a.horario!== horarioAtual){
      horarioAtual = a.horario;
      html += `<div class="grupo-horario">🕒 ${horarioAtual}</div>`;
      statusAtual = '';
    }
    if(a.status!== statusAtual){
      statusAtual = a.status;
      html += `<div class="grupo-status">${statusAtual === 'Ativo'? '✅ ATIVOS' : '❌ DESATIVADOS'}</div>`;
      html += `<div class="tabela-wrapper"><table class="tabela-crono">
        <thead><tr>
          <th>ID</th><th>Nº</th><th>ALUNO</th><th>DIAS</th><th>FREQ</th><th>OBJETIVO</th><th>VALOR</th><th>VENC</th><th>STATUS</th>
        </tr></thead><tbody>`;
    }
    html += `<tr>
      <td class="col-id">${a.id}</td>
      <td>${contador++}</td>
      <td class="col-nome">${a.nome}</td>
      <td>${a.dias}</td>
      <td>${a.freq}</td>
      <td>${a.objetivo}</td>
      <td>R$ ${a.valor}</td>
      <td>${a.venc}</td>
      <td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function buscarAluno(){
  const id = document.getElementById('input-id-aluno').value.toLowerCase().trim();
  const div = document.getElementById('resultado-aluno');

  if(id === ''){
    div.innerHTML = `<div style="color:var(--aviso);text-align:center;padding:10px;">Digite um ID</div>`;
    return;
  }

  // SE FOR KTP1 MOSTRA TUDO
  if(id === 'ktp1'){
    div.innerHTML = mostrarCronogramaCompleto();
    return;
  }

  const aluno = ALUNOS_DB[id];
  if(!aluno){
    div.innerHTML = `<div style="color:var(--erro);text-align:center;padding:10px;">ID não encontrado</div>`;
    return;
  }

  div.innerHTML = `
    <div class="card">
      <div class="titulo-secao">DADOS DO ALUNO</div>
      <div class="dado-aluno"><b>ID:</b> ${id}</div>
      <div class="dado-aluno"><b>Nome:</b> ${aluno.nome}</div>
      <div class="dado-aluno"><b>Plano:</b> ${aluno.plano}</div>
      <div class="dado-aluno"><b>Horário:</b> ${aluno.horario}</div>
      <div class="dado-aluno"><b>Dias:</b> ${aluno.dias}</div>
      <div class="dado-aluno"><b>Frequência:</b> ${aluno.freq}</div>
      <div class="dado-aluno"><b>Objetivo:</b> ${aluno.objetivo}</div>
      <div class="dado-aluno"><b>Mensalidade:</b> R$ ${aluno.valor}</div>
      <div class="dado-aluno"><b>Vencimento:</b> ${aluno.venc}</div>
      <div class="dado-aluno"><b>Status:</b> <span class="${aluno.status==='Ativo'?'status-ativo':'status-desativado'}">${aluno.status}</span></div>
    </div>
  `;
}

window.onload = function(){};
</script>
</body>
</html>
