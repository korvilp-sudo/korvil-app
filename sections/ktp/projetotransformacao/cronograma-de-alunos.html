<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8">
<title>Cronograma Alunos - KTP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
body{background:#000;color:#00f5ff;font-family:'Orbitron',sans-serif;padding:20px}
h1{text-align:center;text-shadow:0 0 10px #00f5ff}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #00f5ff;padding:10px;text-align:left;font-size:12px}
th{background:#001a33}
tr:hover{background:#001a33}
.status-ativo{color:#00ff88} .status-desativado{color:#ff0066}
#loading{text-align:center;padding:20px}
</style>
</head>
<body>

<h1>CRONOGRAMA ALUNOS - PROJETO TRANSFORMAÇÃO 2026</h1>
<div id="loading">CARREGANDO DADOS...</div>
<table id="tabela" style="display:none">
  <thead>
    <tr>
      <th>ID</th><th>NOME</th><th>PLANO</th><th>HORARIO</th><th>DIAS</th>
      <th>FREQ</th><th>OBJETIVO</th><th>VALOR</th><th>VENC</th><th>STATUS</th>
    </tr>
  </thead>
  <tbody id="corpoTabela"></tbody>
</table>

<script>
const REPO = "korvilp-sudo/korvil-app";
const ARQ = "sections/ktp/projetotransformacao/projetos/2026/cronograma.json";

async function carregarCronograma(){
  try{
    const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${ARQ}?t=${Date.now()}`);
    const ALUNOS_DB = await res.json();
    
    const corpo = document.getElementById('corpoTabela');
    corpo.innerHTML = '';
    
    // Ordena pelo número do ID
    const ids = Object.keys(ALUNOS_DB).sort((a,b)=>{
      return parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,''))
    });
    
    ids.forEach(id=>{
      const a = ALUNOS_DB[id];
      const statusClass = a.status === 'Ativo' ? 'status-ativo' : 'status-desativado';
      corpo.innerHTML += `
        <tr>
          <td>${id}</td>
          <td>${a.nome || '-'}</td>
          <td>${a.plano || '-'}</td>
          <td>${a.horario || '-'}</td>
          <td>${a.dias || '-'}</td>
          <td>${a.freq || '-'}</td>
          <td>${a.objetivo || '-'}</td>
          <td>R$ ${a.valor || '-'}</td>
          <td>${a.venc || '-'}</td>
          <td class="${statusClass}">${a.status || '-'}</td>
        </tr>
      `;
    });
    
    document.getElementById('loading').style.display='none';
    document.getElementById('tabela').style.display='table';
    
  }catch(e){
    document.getElementById('loading').innerText = 'ERRO: Crie o arquivo cronograma.json primeiro';
  }
}

carregarCronograma();
// Atualiza sozinho a cada 10 segundos
setInterval(carregarCronograma, 10000);
</script>
</body>
</html>
