<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>CRONOGRAMA DE ALUNOS</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00; --erro:#ff0044;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:16px;text-align:center;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:16px;font-weight:900;color:var(--c);letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.btn-aluno{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;}

.container{max-width:1200px;margin:auto;padding:16px;padding-bottom:100px;}

.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}

/* TELA DO CRONOGRAMA */
#tela-cronograma{display:none;}
#tela-cronograma.ativo{display:block;}

/* TELA DADOS DO ALUNO */
#tela-aluno{display:none;}
#tela-aluno.ativo{display:block;}

.dado-aluno{padding:8px 0;border-bottom:1px solid var(--borda);font-size:12px;}
.dado-aluno b{color:var(--c);}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}
.btn-fechar{position:absolute;top:10px;right:10px;background:var(--erro);color:#fff;border:0;border-radius:50%;width:24px;height:24px;font-weight:900;font-size:14px;cursor:pointer;line-height:24px;text-align:center;}

/* TOTAIS */
.card-totais{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;}
.total-item{background:#0a0a0a;border:1px solid var(--borda);border-radius:8px;padding:10px;text-align:center;}
.total-item.num{font-size:18px;font-weight:900;color:var(--c);}
.total-item.label{font-size:9px;color:var(--text2);margin-top:2px;}

/* ABAS PLANO */
.abas-plano{display:flex;gap:8px;margin-bottom:12px;border-bottom:2px solid var(--borda);}
.aba-plano{padding:10px 16px;background:#111;border:0;color:var(--text2);font-weight:800;font-size:12px;cursor:pointer;border-radius:6px 6px 0 0;}
.aba-plano.ativa{background:var(--c);color:#000;}

/* TABELA CRONOGRAMA */
.tabela-wrapper{overflow-x:auto;margin-bottom:20px;border:1px solid var(--borda);border-radius:8px;}
.tabela-crono{width:100%;border-collapse:collapse;font-size:11px;}
.tabela-crono th{background:#111;color:var(--c);padding:12px 8px;text-align:left;font-size:10px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--c);}
.tabela-crono td{padding:12px 8px;border-bottom:1px solid #1a1a1a;}
.tabela-crono tbody tr:hover{background:#0f0f0f;}
.tabela-crono tbody tr.destaque{background:#001a1a;box-shadow:0 0 0 2px var(--c) inset;}
.tabela-crono.col-id{font-weight:900;color:var(--c);min-width:100px;}
.tabela-crono.col-nome{font-weight:800;color:#fff;min-width:140px;}

.grupo-horario{margin-top:20px;margin-bottom:8px;color:var(--c);font-weight:900;font-size:13px;padding:8px;background:#0a0a0a;border-left:3px solid var(--c);}
.grupo-status{margin:8px 0;color:var(--aviso);font-weight:800;font-size:11px;padding-left:8px;}
.sem-alunos{padding:12px;text-align:center;color:var(--text2);font-size:10px;background:#050505;border-radius:6px;margin-bottom:10px;}
.obs-pix{padding:14px;background:#0a0a0a;border:1px dashed var(--c);border-radius:8px;font-size:11px;color:var(--text2);margin:15px 0;text-align:center;line-height:1.6;}

/* BUSCA ID */
.busca-id{display:flex;gap:6px;margin-bottom:16px;}
.busca-id input{flex:1;padding:10px;background:#000;border:1.5px solid var(--borda);border-radius:6px;color:#fff;font-size:12px;}
.busca-id button{padding:10px 14px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

let planoAtivo = 'PRESENCIAL';
let idLogado = '';

const HORARIOS_ORDEM = ["06h00 🐦","07h00 🌙","08h00 🐢","09h00","10h00 🐙","16h00 🕊️","17h00 🐼","18h00 🐸","19h00 🌑","20h00","21h00","22h00","23h00","00h00","01h00","02h00","03h00","04h00","05h00","14h00"];

function mostrarBusca(){
  document.getElementById('tela-aluno').classList.remove('ativo');
  document.getElementById('tela-cronograma').classList.remove('ativo');
  document.getElementById('tela-aluno').innerHTML = '';
  document.getElementById('tela-cronograma').innerHTML = '';
  document.getElementById('barra-busca').style.display = 'block';
  document.getElementById('input-id-aluno').focus();
}

function trocarAba(plano){
  planoAtivo = plano;
  document.querySelectorAll('.aba-plano').forEach(b=>b.classList.remove('ativa'));
  event.target.classList.add('ativa');
  mostrarTelaCronograma();
}

function calcularTotais(){
  let totalAtivos = 0, totalDesativados = 0, somaValores = 0;
  Object.entries(ALUNOS_DB).forEach(([id, a])=>{
    if(id === 'ktp1') return;
    if(a.status.toLowerCase() === 'ativo'){totalAtivos++; somaValores += Number(a.valor) || 0;}
    else {totalDesativados++;}
  });
  return {totalAtivos, totalDesativados, somaValores};
}

function mostrarTelaCronograma(){
  const totais = calcularTotais();
  const alunos = Object.entries(ALUNOS_DB).map(([id, data]) => ({id,...data}));

  let html = `<button class="btn-fechar" onclick="mostrarBusca()">X</button>`;

  html += `<div class="card-totais">
    <div class="total-item"><div class="num">${totais.totalAtivos}</div><div class="label">ATIVOS</div></div>
    <div class="total-item"><div class="num">${totais.totalDesativados}</div><div class="label">DESATIVADOS</div></div>
    <div class="total-item"><div class="num">R$ ${totais.somaValores}</div><div class="label">TOTAL MENSAL ATIVOS</div></div>
  </div>`;

  html += `<div class="abas-plano">
    <button class="aba-plano ${planoAtivo==='PRESENCIAL'?'ativa':''}" onclick="trocarAba('PRESENCIAL')">🏋️ PRESENCIAL</button>
    <button class="aba-plano ${planoAtivo==='ONLINE'?'ativa':''}" onclick="trocarAba('ONLINE')">💻 ONLINE</button>
  </div>`;

  html += `<div class="titulo-secao">📋 CRONOGRAMA ${planoAtivo}</div>`;
  html += `<div class="obs-pix">Olá, sua mensalidade está prestes a vencer.<br>Esteja com o pagamento corretamente em dia para continuar participando.<br><b>Pix: korvilloja@gmail.com</b></div>`;
// SE FOR KTP1 MOSTRA OS 2 PLANOS. SE NÃO MOSTRA SÓ 1 ALUNO
  const planosParaMostrar = idLogado === 'ktp1'? ['PRESENCIAL', 'ONLINE'] : [planoAtivo];

  planosParaMostrar.forEach(plano=>{
    if(idLogado === 'ktp1') html += `<div style="font-size:14px;font-weight:900;color:var(--c);text-align:center;margin:20px 0;border-bottom:1px solid var(--borda);padding-bottom:8px">🌐 ${plano} 🌐</div>`;

    HORARIOS_ORDEM.forEach(horario=>{
      if(plano === 'ONLINE' &&!horario.includes('14h00')) return;
      if(plano === 'PRESENCIAL' && horario.includes('14h00')) return;

      // FILTRO: ktp1 = todos do plano. Aluno = só ele
      const alunosDoHorario = idLogado === 'ktp1'
   ? alunos.filter(a => a.plano === plano && a.horario === horario)
        : alunos.filter(a => a.plano === plano && a.horario === horario && a.id === idLogado);

      if(alunosDoHorario.length === 0) return;

      html += `<div class="grupo-horario">🕒 ${horario}</div>`;

      const ativos = alunosDoHorario.filter(a=>a.status.toLowerCase()==='ativo');
      const desativados = alunosDoHorario.filter(a=>a.status.toLowerCase()==='desativado');

      if(ativos.length > 0){
        html += `<div class="grupo-status">✅ ATIVOS</div>`;
        html += gerarTabela(ativos, idLogado);
      }
      if(desativados.length > 0){
        html += `<div class="grupo-status">❌ DESATIVADOS</div>`;
        html += gerarTabela(desativados, idLogado);
      }
    });
  });

  document.getElementById('tela-cronograma').innerHTML = html;

function gerarTabela(lista, idDestaque){
  let html = `<div class="tabela-wrapper"><table class="tabela-crono">
    <thead><tr>
      <th>Nº</th><th>ALUNO</th><th>DIAS</th><th>FREQ</th><th>OBJETIVO</th><th>VALOR</th><th>VENC</th><th>STATUS</th><th>ID</th>
    </tr></thead><tbody>`;

  lista.forEach((a, i)=>{
    // SÓ DESTACA SE FOR ALUNO INDIVIDUAL. KTP1 FICA NORMAL
    let classe = (a.id === idDestaque && idDestaque!== 'ktp1')? 'destaque' : '';
    html += `<tr class="${classe}">
      <td>${i+1}</td>
      <td class="col-nome">${a.nome}</td>
      <td>${a.dias}</td>
      <td>${a.freq}</td>
      <td>${a.objetivo}</td>
      <td>R$ ${a.valor}</td>
      <td>${a.venc}</td>
      <td class="${a.status.toLowerCase()==='ativo'?'status-ativo':'status-desativado'}">${a.status}</td>
      <td class="col-id">${a.id}</td>
    </tr>`;
  });
  
  html += `</tbody></table></div>`;
  return html;
}

function buscarAluno(){
  const id = document.getElementById('input-id-aluno').value.toLowerCase().trim();
  idLogado = id;

  if(id === ''){
    alert('Digite um ID');
    return;
  }

  if(id === 'ktp1'){
    planoAtivo = 'PRESENCIAL';
    mostrarTelaCronograma();
    return;
  }

  const aluno = ALUNOS_DB[id];
  if(!aluno){
    alert('ID não encontrado');
    return;
  }

  planoAtivo = aluno.plano;
  mostrarTelaCronograma();

  document.getElementById('tela-aluno').innerHTML = `
    <div class="card">
      <button class="btn-fechar" onclick="mostrarBusca()">X</button>
      <div class="titulo-secao">MEUS DADOS</div>
      <div class="dado-aluno"><b>ID:</b> ${id}</div>
      <div class="dado-aluno"><b>Nome:</b> ${aluno.nome}</div>
      <div class="dado-aluno"><b>Plano:</b> ${aluno.plano}</div>
      <div class="dado-aluno"><b>Horário:</b> ${aluno.horario}</div>
      <div class="dado-aluno"><b>Dias:</b> ${aluno.dias}</div>
      <div class="dado-aluno"><b>Frequência:</b> ${aluno.freq}</div>
      <div class="dado-aluno"><b>Objetivo:</b> ${aluno.objetivo}</div>
      <div class="dado-aluno"><b>Mensalidade:</b> R$ ${aluno.valor}</div>
      <div class="dado-aluno"><b>Vencimento:</b> ${aluno.venc}</div>
      <div class="dado-aluno"><b>Status:</b> <span class="${aluno.status.toLowerCase()==='ativo'?'status-ativo':'status-desativado'}">${aluno.status}</span></div>
    </div>
  `;
  document.getElementById('tela-aluno').classList.add('ativo');
}

window.onload = function(){
  mostrarBusca();
};
  
</script>
