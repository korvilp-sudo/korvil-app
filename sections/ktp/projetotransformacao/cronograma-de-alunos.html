<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00; --erro:#ff0044;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:16px 16px 16px 60px;text-align:center;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:16px;font-weight:900;color:var(--c);letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.menu-btn{position:fixed;top:14px;left:16px;z-index:101;background:var(--c);color:#000;border:0;border-radius:8px;padding:8px 10px;font-weight:900;font-size:18px;cursor:pointer;}

.btn-aluno{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-aluno:hover{box-shadow:0 0 15px var(--c);}

.container{display:flex;max-width:1200px;margin:auto;}

/* MENU LATERAL COM ABAS */
#menu-lateral{position:fixed;left:-320px;top:0;width:300px;height:100%;background:#0a0a0a;border-right:2px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:70px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.abas-fases{display:flex;flex-direction:column;}
.aba-fase{padding:12px 16px;background:#111;border-bottom:1px solid var(--borda);cursor:pointer;font-weight:900;font-size:12px;color:var(--c);display:flex;justify-content:space-between;align-items:center;}
.aba-fase.ativa{background:rgba(0,245,255,.1);border-left:3px solid var(--c);}
.seta{transition:.3s;}
.aba-fase.ativa.seta{transform:rotate(90deg);}
.semanas-da-fase{display:none;padding:8px;background:#050505;}
.semanas-da-fase.ativa{display:block;}
.semana-item{padding:8px 10px;margin:4px 0;background:#1a1a1a;border-radius:6px;font-size:11px;cursor:pointer;transition:.2s;border-left:2px solid transparent;}
.semana-item:hover{background:#222;border-left:2px solid var(--c);}
.semana-item.ativa{background:rgba(0,255,136,.2);border-left:2px solid var(--ok);color:var(--ok);font-weight:800;}
.semana-item.passada{opacity:0.5;}

.conteudo{flex:1;padding:16px;padding-bottom:100px;}

/* CARDS */
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}

.semana-atual{padding:20px;background:linear-gradient(180deg,#000,#0a0a0a);border:2px solid var(--c);border-radius:14px;margin-bottom:16px;box-shadow:0 0 30px var(--c)30;}
.semana-titulo{font-weight:900;color:var(--c);font-size:18px;margin-bottom:4px;text-align:center;}
.semana-tipo{font-size:12px;color:var(--aviso);font-weight:800;margin-bottom:12px;text-align:center;}
.img-metodo{width:100%;border-radius:10px;border:2px solid var(--c);margin-bottom:12px;object-fit:contain;height:auto;max-height:500px;background:#000;}
.protocolo{padding:16px;background:#0a0a0a;border:1px solid var(--c);border-radius:8px;font-size:13px;white-space:pre-wrap;line-height:1.7;}
.badge{padding:5px 12px;background:var(--ok);color:#000;border-radius:20px;font-size:10px;font-weight:900;}
.data-grande{font-size:15px;color:var(--c);font-weight:800;text-align:center;margin-bottom:8px;}
.grid-metodos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.grid-metodos img{width:100%;height:80px;object-fit:contain;border-radius:6px;border:1.5px solid var(--borda);opacity:0.3;background:#000;}
.grid-metodos img.ativa{border:2px solid var(--c);opacity:1;box-shadow:0 0 10px var(--c)40;}

/* MODAL ALUNO */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:14px;padding:20px;max-width:1000px;width:100%;box-shadow:0 0 40px var(--c)40;max-height:90vh;overflow-y:auto;}

.modal-titulo{font-size:16px;font-weight:900;color:var(--c);}

.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}

.tabela-crono td{padding:6px;border-bottom:1px solid #111;}
.grupo-horario{margin-top:15px;margin-bottom:5px;color:var(--c);font-weight:900;font-size:13px;border-bottom:2px solid var(--c);padding-bottom:4px;}
.grupo-plano{margin-top:8px;margin-bottom:4px;color:var(--aviso);font-weight:800;font-size:11px;}

.busca-id input{flex:1;padding:8px;background:#000;border:1.5px solid var(--borda);border-radius:6px;color:#fff;font-size:12px;}
.busca-id button{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;cursor:pointer;}

@keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#k-ai-balao{position:fixed;bottom:30px;right:90px;background:#0a0a0a;border:2px solid var(--c);padding:10px 14px;border-radius:12px;font-size:11px;color:var(--c);max-width:200px;z-index:998;box-shadow:0 0 15px var(--c)30;display:block;}

#k-ai-chat{position:fixed;bottom:90px;right:20px;width:320px;height:450px;background:#0a0a0a;border:2px solid var(--c);border-radius:14px;display:none;flex-direction:column;z-index:999;box-shadow:0 0 30px var(--c)40;}

  #overlay{display:none!important;}

let semanaSelecionada = null;

function formatarData(dataString) {
  const data = new Date(dataString);
  const dia = String(data.getDate()).padStart(2, '0');
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const ano = data.getFullYear();
  return `${dia}/${mes}/${ano}`;
}

function getSegundaSemana(data){
  const d = new Date(data);
  const dia = d.getDay();
  const diff = d.getDate() - dia + (dia === 0? -6 : 1);
  return new Date(d.setDate(diff));
}

function fecharBuscaAluno(){

function mostrarCronogramaCompleto(){
  const alunos = Object.entries(ALUNOS_DB).map(([id, data]) => ({id, ...data}));

  // Ordenar por Horario > Status > Plano
  alunos.sort((a,b)=>{
    if(a.horario !== b.horario) return a.horario.localeCompare(b.horario);
    if(a.status !== b.status) return a.status === 'Ativo' ? -1 : 1;
    return a.plano.localeCompare(b.plano);
  });

  let statusAtual = '';

      html += `<div class="grupo-horario">🕒 ${horarioAtual}</div>`;
      statusAtual = '';
    }
    if(a.status !== statusAtual){
      statusAtual = a.status;
      html += `<div class="grupo-plano">${statusAtual === 'Ativo' ? '✅ ATIVOS' : '❌ DESATIVADOS'}</div>`;
      html += `<table class="tabela-crono"><thead><tr><th>Nº</th><th>Aluno</th><th>Plano</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>R$</th><th>Venc</th><th>Status</th><th>ID</th></tr></thead><tbody>`;
    }
    html += `<tr>
      <td>${contador++}</td>
      <td><b>${a.nome}</b></td>
      <td>${a.plano}</td>
      <td>${a.dias}</td>
      <td>${a.freq}</td>
      <td>${a.objetivo}</td>
      <td>${a.valor}</td>
      <td>${a.venc}</td>
      <td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td>
      <td>${a.id}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function buscarAluno(){
  const id = document.getElementById('input-id-aluno').value.toLowerCase().trim();
  const div = document.getElementById('resultado-aluno');

  if(id === 'ktp1'){
    div.innerHTML = mostrarCronogramaCompleto();
    return;
  }

  const aluno = ALUNOS_DB[id];
  if(!aluno){
    div.innerHTML = `<div style="color:var(--erro);text-align:center;padding:10px;">ID não encontrado</div>`;
    return;
  }

  // SEM MOSTRAR ID NA BUSCA NORMAL
  div.innerHTML = `
    <div class="dado-aluno"><b>Nome:</b> ${aluno.nome}</div>
    <div class="dado-aluno"><b>Plano:</b> ${aluno.plano}</div>
    <div class="dado-aluno"><b>Horário:</b> ${aluno.horario}</div>
    <div class="dado-aluno"><b>Dias:</b> ${aluno.dias}</div>
    <div class="dado-aluno"><b>Frequência:</b> ${aluno.freq}</div>
    <div class="dado-aluno"><b>Objetivo:</b> ${aluno.objetivo}</div>
    <div class="dado-aluno"><b>Mensalidade:</b> R$ ${aluno.valor}</div>
    <div class="dado-aluno"><b>Vencimento:</b> ${aluno.venc}</div>
    <div class="dado-aluno"><b>Status:</b> <span class="${aluno.status==='Ativo'?'status-ativo':'status-desativado'}">${aluno.status}</span></div>
  `;
}

// K-AI
let chatAberto = false;
function toggleChat(){
  chatAberto =!chatAberto;
  document.getElementById('k-ai-chat').style.display = chatAberto? 'flex' : 'none';
  if(chatAberto && document.getElementById('k-ai-msgs').innerHTML === ''){
    document.getElementById('k-ai-msgs').innerHTML = `<div class="msg ai">Olá Participantes e Alunos! 👋\n\nSou o K-AI. Pergunte sobre FASE, SEMANA ou PROTOCOLO.</div>`;
  }
}
function addMsgAI(texto){document.getElementById('k-ai-msgs').innerHTML += `<div class="msg ai">${texto.replace(/\n/g,'<br>')}</div>`;}
function addMsgUser(texto){document.getElementById('k-ai-msgs').innerHTML += `<div class="msg user">${texto}</div>`;}
function enviarKAI(){
  const input = document.getElementById('k-ai-text');
  if(!input.value.trim()) return;
  addMsgUser(input.value); input.value = '';
  setTimeout(()=>addMsgAI(`Semana atual: ${new Date().toLocaleDateString('pt-BR')}`), 500);
}
