/* ABAS PRINCIPAIS */

.aba.ativa{background:var(--c);color:#000;}
.conteudo-aba{display:none;}
.conteudo-aba.ativa{display:block;}

/* FILTROS */
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filtros button{flex:1;padding:8px;border:1.5px solid var(--borda);background:#111;color:var(--text);border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;}
.filtros button.ativo{background:var(--c);color:#000;border-color:var(--c);}

/* BLOCO HORARIO */
.horario-bloco{margin-bottom:16px;border:1.5px solid var(--borda);border-radius:12px;background:var(--card);overflow:hidden;}
.horario-header{padding:14px;background:linear-gradient(90deg,#0a0a0a,#111);border-bottom:1.5px solid var(--borda);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.horario-titulo{font-size:16px;font-weight:900;color:var(--c);}
.badges{display:flex;gap:6px;}
.badge{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:900;}
.badge.ativos{background:var(--ok);color:#000;}
.badge.desativos{background:#555;color:#fff;}

/* TABELA */
.tabela-wrapper{overflow-x:auto;}
.tabela{width:100%;border-collapse:collapse;font-size:11px;min-width:700px;}
.tabela th{padding:10px 8px;background:#0a0a0a;color:var(--c);font-size:10px;text-align:left;border-bottom:2px solid var(--borda);text-transform:uppercase;}
.tabela td{padding:10px 8px;border-bottom:1px solid #111;vertical-align:top;}
.tabela tr:hover{background:#0a0a0a;}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}
.vencer{color:var(--aviso);font-weight:900;}
.id-peq{font-size:9px;color:var(--text2);}

.sem-aluno{text-align:center;padding:30px;color:var(--text2);font-size:12px;}

@media(max-width:768px){
.tabela{font-size:10px;min-width:600px;}
.tabela th:nth-child(5),.tabela td:nth-child(5){display:none;} /* Valor */

function formatarVenc(data){
  if(data === "–") return "–";
  const [dia,mes,ano] = data.split('/');
  const venc = new Date(`20${ano}-${mes}-${dia}`);
  const hoje = new Date();
  const diff = (venc - hoje) / (1000*60*60*24);
  if(diff <= 15 && diff >= 0) return `<span class="vencer">${data}</span>`;
  return data;
}

function montarTabela(lista, comNumero=true){
  if(lista.length === 0) return `<tr><td colspan="8" class="sem-aluno">Nenhum aluno neste status</td></tr>`;

  return lista.map(a=>`
    <tr>
      ${comNumero? `<td>${a.n || '-'}</td>` : ''}
      <td><b>${a.nome}</b><br><span class="id-peq">ID: ${a.id}</span></td>
      <td>${a.dias}</td>
      ${a.freq? `<td>${a.freq}</td>` : `<td>-</td>`}
      <td>${a.objetivo}</td>
      <td>R$ ${a.valor}</td>
      <td>${formatarVenc(a.venc)}</td>
      <td class="${a.status === 'Ativo'? 'status-ativo' : 'status-desativado'}">${a.status}</td>
    </tr>
  `).join('');
}

  Object.keys(dados).forEach(horario=>{
    const bloco = dados[horario];
    const totalAtivos = bloco.ativos.length;
    const totalDes = bloco.desativados.length;

    html += `<div class="horario-bloco">`;
    html += `<div class="horario-header">
      <div class="horario-titulo">🕒 ${horario}</div>
      <div class="badges"><span class="badge ativos">${totalAtivos} Ativos</span> <span class="badge desativos">${totalDes} Desativados</span></div>
    </div>`;

    html += `<div class="tabela-wrapper">`;
    html += `<table class="tabela dados-ativos-${tipo}"><thead><tr><th>Nº</th><th>Aluno</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>Mensalidade</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>`;
    html += montarTabela(bloco.ativos);
    html += `</tbody></table>`;

    html += `<table class="tabela dados-desativados-${tipo}"><thead><tr><th>Nº</th><th>Aluno</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>Mensalidade</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>`;
    html += montarTabela(bloco.desativados);
    html += `</tbody></table>`;
    html += `</div></div>`;
  });

  document.getElementById(`conteudo-${tipo}`).innerHTML = html;
  filtrar(tipo, 'todos', document.querySelector(`#${tipo}.filtros button`));
}

function trocarAba(aba, btn){
  document.querySelectorAll('.aba').forEach(b=>b.classList.remove('ativa'));
  document.querySelectorAll('.conteudo-aba').forEach(c=>c.classList.remove('ativa'));
  btn.classList.add('ativa');
  document.getElementById(aba).classList.add('ativa');
}

function filtrar(tipo, status, btn){
  document.querySelectorAll(`#${tipo}.filtros button`).forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');

  document.querySelectorAll(`.dados-ativos-${tipo}`).forEach(t=>t.style.display = status==='desativados'? 'none' : 'table');
  document.querySelectorAll(`.dados-desativados-${tipo}`).forEach(t=>t.style.display = status==='ativos'? 'none' : 'table');
}
