*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:12px 16px 12px 56px;text-align:left;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:14px;font-weight:900;color:var(--c);}

.btn-aluno{padding:6px 10px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;font-size:10px;cursor:pointer;}

#menu-lateral{position:fixed;left:-280px;top:0;width:260px;height:100%;background:#0a0a0a;border-right:1px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:60px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.menu-titulo{padding:14px 16px;font-size:11px;color:var(--c);font-weight:900;letter-spacing:1px;border-bottom:2px solid var(--c);margin-top:8px;}
.semanas-da-fase{background:#050505;}
.semana-item{padding:10px 16px 10px 24px;font-size:10px;cursor:pointer;border-bottom:1px solid var(--borda);color:var(--text2);line-height:1.4;text-decoration:none;display:block;transition:.2s;}
.semana-item:hover{background:#111;color:#fff;}
.semana-item.ativa{background:#001a1a;color:var(--ok);font-weight:800;}

.container{padding:12px;max-width:1200px;margin:auto;}

/* CARD ALUNO LOGADO */
.card-aluno{background:#001a1a;border:2px solid var(--c);border-radius:10px;padding:12px;margin-bottom:12px;}
.card-aluno h2{font-size:12px;color:var(--c);margin-bottom:6px;}
.card-aluno p{font-size:11px;color:var(--text2);line-height:1.6;}

/* AVISO PIX */
.obs-pix{padding:14px;background:#0a0a0a;border:1px dashed var(--c);border-radius:8px;font-size:11px;color:var(--text2);margin:15px 0;text-align:center;line-height:1.6;}
.titulo-crono{font-size:16px;font-weight:900;text-align:center;color:var(--c);margin-bottom:10px;}

/* ABAS PLANO */
.abas-plano{display:flex;gap:8px;margin-bottom:12px;border-bottom:2px solid var(--borda);}
.aba-plano{padding:10px 16px;background:#111;border:0;color:var(--text2);font-weight:800;font-size:12px;cursor:pointer;border-radius:6px 6px 0 0;}
.aba-plano.ativa{background:var(--c);color:#000;}

/* TABELA CRONOGRAMA */
.tabela-wrapper{overflow-x:auto;margin-bottom:20px;border:1px solid var(--borda);border-radius:8px;}
.tabela-crono{width:100%;border-collapse:collapse;font-size:10px;}
.tabela-crono th{background:#111;color:var(--c);padding:8px 6px;text-align:left;font-size:9px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--c);}
.tabela-crono td{padding:8px 6px;border-bottom:1px solid #1a1a1a;}
.tabela-crono tbody tr:hover{background:#0f0f0f;}

.grupo-horario{margin-top:20px;margin-bottom:8px;color:var(--c);font-weight:900;font-size:13px;padding:8px;background:#0a0a0a;border-left:3px solid var(--c);}
.grupo-status{margin:8px 0;color:var(--aviso);font-weight:800;font-size:11px;padding-left:8px;}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}

/* MODAL */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:10px;padding:16px;width:100%;max-width:400px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.btn-fechar{background:var(--erro);color:#fff;border:0;border-radius:4px;padding:4px 8px;font-weight:900;cursor:pointer;}
.busca-id{display:flex;gap:6px;}
.busca-id input{flex:1;padding:8px;background:#000;border:1px solid var(--borda);border-radius:4px;color:#fff;font-size:12px;}
.busca-id button{padding:8px 10px;background:var(--c);color:#000;border:0;border-radius:4px;font-weight:900;cursor:pointer;}

  "dani36": {nome:"Daniele Vieira Leite", plano:"ONLINE", horario:"14h00", dias:"Seg a Sex", objetivo:"Definição"},
  "ktp1": {nome:"SAY KORVIL", plano:"ADMIN", horario:"--", dias:"--", objetivo:"ADMIN"}
};

let planoAtivo = 'PRESENCIAL';
let idLogado = '';

function toggleMenu(){document.getElementById('menu-lateral').classList.toggle('ativo');document.getElementById('overlay').classList.toggle('ativo');}
function abrirBuscaAluno(){document.getElementById('modal-aluno').classList.add('ativo');}
function fecharBuscaAluno(){document.getElementById('modal-aluno').classList.remove('ativo');}

function formatarData(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR');}

function carregarMenu(){
  let html='';
  for(let fase in FASES_MENU){
    html+=`<div class="menu-titulo">${fase}</div>`;
    html+=`<div class="semanas-da-fase">`;
    FASES_MENU[fase].forEach(data=>{
      const segundaLinha = MENSAGENS_2026_MENU[data].split('\n')[1] || 'SEMANA';
      html+=`<div class="semana-item" onclick="mostrarInfoSemana('${data}')">${formatarData(data)} - ${segundaLinha}</div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('menu-lateral').innerHTML=html;
}

function mostrarInfoSemana(data){
  const info = MENSAGENS_2026_MENU[data].replace('\n','<br>');
  alert(info); // Por enquanto só alerta. Depois podemos mostrar abaixo do cronograma
  if(window.innerWidth<768)toggleMenu();
}

function trocarAba(plano){
  planoAtivo = plano;
  document.querySelectorAll('.aba-plano').forEach(b=>b.classList.remove('ativa'));
  event.target.classList.add('ativa');
  mostrarCronograma();
}

function mostrarDadosAluno(id){
  const aluno = ALUNOS_DB[id];
  const container = document.getElementById('info-aluno-container');
  if(id === 'ktp1'){
    container.innerHTML = `<div class="card-aluno"><h2>👑 MODO ADMIN</h2><p><b>Usuário:</b> ${aluno.nome}<br><b>Acesso:</b> Cronograma completo PRESENCIAL + ONLINE</p></div>`;
  } else {
    container.innerHTML = `<div class="card-aluno"><h2>👤 MEUS DADOS</h2><p><b>Nome:</b> ${aluno.nome}<br><b>Plano:</b> ${aluno.plano}<br><b>Horário:</b> ${aluno.horario}<br><b>Dias:</b> ${aluno.dias}<br><b>Objetivo:</b> ${aluno.objetivo}</p></div>`;
  }
}

function mostrarCronograma(){
  const container = document.getElementById('cronograma-container');
  let html = `<div class="titulo-crono">📋 CRONOGRAMA K-TP — PROJETO TRANSFORMAÇÃO</div>`;
  html += `<div class="obs-pix">Olá, sua mensalidade está prestes a vencer.<br>Esteja com o pagamento corretamente em dia para continuar participando.<br><b>Pix: korvilloja@gmail.com</b></div>`;

  html += `<div class="abas-plano">
    <button class="aba-plano ${planoAtivo==='PRESENCIAL'?'ativa':''}" onclick="trocarAba('PRESENCIAL')">🌐 PRESENCIAL</button>
    <button class="aba-plano ${planoAtivo==='ONLINE'?'ativa':''}" onclick="trocarAba('ONLINE')">💻 ONLINE</button>
  </div>`;

  const planosParaMostrar = idLogado === 'ktp1'? ['PRESENCIAL', 'ONLINE'] : [planoAtivo];

  planosParaMostrar.forEach(plano=>{
    html += `<div style="font-size:14px;font-weight:900;color:var(--c);text-align:center;margin:20px 0">🌐 ${plano} 🌐</div>`;

    CRONOGRAMA_DB[plano].forEach(bloco=>{
      if(bloco.hora) html += `<div class="grupo-horario">🕒 ${bloco.hora}</div>`;
      html += `<div class="grupo-status">${bloco.status==='ATIVOS'?'✅ ATIVOS':'❌ DESATIVADOS'}</div>`;

      html += `<div class="tabela-wrapper"><table class="tabela-crono"><thead><tr>`;
      if(bloco.alunos[0].n) html += `<th>Nº</th>`;
      html += `<th>Aluno</th><th>Dias</th>`;
      if(bloco.alunos[0].freq) html += `<th>Freq</th>`;
      html += `<th>Objetivo</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>ID</th></tr></thead><tbody>`;

      bloco.alunos.forEach(a=>{
        html += `<tr>`;
        if(a.n) html += `<td>${a.n}</td>`;
        html += `<td>${a.aluno}</td><td>${a.dias}</td>`;
        if(a.freq) html += `<td>${a.freq}</td>`;
        html += `<td>${a.objetivo}</td><td>R$ ${a.valor}</td><td>${a.venc}</td><td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td><td style="font-weight:900;color:var(--c)">${a.id}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  });

  container.innerHTML = html;
}

function buscarAluno(){
  const id=document.getElementById('input-id-aluno').value.toLowerCase().trim();
  if(!id){document.getElementById('resultado-aluno').innerHTML='<div style="color:var(--aviso)">Digite um ID</div>';return;}
  if(ALUNOS_DB[id]){
    idLogado = id;
    localStorage.setItem('idLogado', id);
    if(id!== 'ktp1') planoAtivo = ALUNOS_DB[id].plano;
    fecharBuscaAluno();
    mostrarDadosAluno(id);
    mostrarCronograma();
    document.getElementById('resultado-aluno').innerHTML='';
    document.getElementById('input-id-aluno').value='';
  } else {
    document.getElementById('resultado-aluno').innerHTML='<div style="color:var(--erro)">ID não encontrado</div>';
  }
}

window.onload=function(){
  carregarMenu();
  const idSalvo = localStorage.getItem('idLogado');
  if(idSalvo && ALUNOS_DB[idSalvo]){
    idLogado = idSalvo;
    if(idSalvo!== 'ktp1') planoAtivo = ALUNOS_DB[idSalvo].plano;
    mostrarDadosAluno(idSalvo);
  }
  mostrarCronograma();
};
</script>
</body>
</html>
