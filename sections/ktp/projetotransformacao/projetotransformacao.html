<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00; --erro:#ff0044;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:16px;max-width:700px;margin:auto;padding-bottom:100px;}
h1{text-align:center;font-size:18px;font-weight:900;color:var(--c);margin:0 0 16px;letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.fase-box{padding:12px;background:#111;border-left:3px solid var(--borda);border-radius:8px;margin-bottom:10px;font-size:12px;transition:.3s;}
.fase-box.ativa{background:rgba(0,255,136,.15);border-left:3px solid var(--ok);box-shadow:0 0 20px var(--ok)20;}
.fase-box.passada{opacity:0.4;}
.semana-atual{padding:18px;background:linear-gradient(180deg,#000,#0a0a0a);border:2px solid var(--c);border-radius:14px;margin-bottom:16px;box-shadow:0 0 30px var(--c)30;}
.semana-titulo{font-weight:900;color:var(--c);font-size:17px;margin-bottom:4px;text-align:center;}
.semana-tipo{font-size:12px;color:var(--aviso);font-weight:800;margin-bottom:10px;text-align:center;}
.img-metodo{width:100%;border-radius:10px;border:2px solid var(--c);margin-bottom:12px;object-fit:cover;height:180px;}
.protocolo{padding:14px;background:#0a0a0a;border:1px solid var(--c);border-radius:8px;font-size:13px;white-space:pre-wrap;line-height:1.7;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}
.badge{padding:5px 12px;background:var(--ok);color:#000;border-radius:20px;font-size:10px;font-weight:900;}
.data-grande{font-size:14px;color:var(--c);font-weight:800;text-align:center;margin-bottom:8px;}
.grid-metodos{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.grid-metodos img{width:100%;height:70px;object-fit:cover;border-radius:6px;border:1.5px solid var(--borda);opacity:0.4;}
.grid-metodos img.ativa{border:2px solid var(--c);opacity:1;box-shadow:0 0 10px var(--c)40;}

/* K-AI CUBO + BALAO */
#k-ai-cubo{position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:linear-gradient(135deg,var(--c),#0088ff);border-radius:12px;box-shadow:0 0 20px var(--c);cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;animation:flutuar 2s infinite;border:2px solid var(--c);}
@keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#k-ai-balao{position:fixed;bottom:30px;right:90px;background:#0a0a0a;border:2px solid var(--c);padding:10px 14px;border-radius:12px;font-size:11px;color:var(--c);max-width:200px;z-index:998;box-shadow:0 0 15px var(--c)30;display:block;animation:fadeIn .5s;}
#k-ai-balao:after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);border-left:8px solid var(--c);border-top:6px solid transparent;border-bottom:6px solid transparent;}
@keyframes fadeIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

#k-ai-chat{position:fixed;bottom:90px;right:20px;width:320px;height:450px;background:#0a0a0a;border:2px solid var(--c);border-radius:14px;display:none;flex-direction:column;z-index:999;box-shadow:0 0 30px var(--c)40;}
#k-ai-header{padding:10px;background:var(--c);color:#000;font-weight:900;border-radius:12px 12px 0 0;text-align:center;font-size:13px;}
#k-ai-msgs{flex:1;overflow-y:auto;padding:10px;font-size:12px;}
.msg{margin-bottom:8px;padding:8px;border-radius:8px;line-height:1.4;}
.msg.ai{background:#111;color:var(--c);border-left:2px solid var(--c);}
.msg.user{background:var(--c);color:#000;text-align:right;}
#k-ai-input{display:flex;border-top:1px solid var(--borda);}
#k-ai-input input{flex:1;padding:10px;background:#000;border:0;color:#fff;outline:0;font-size:12px;}
#k-ai-input button{padding:10px 12px;background:var(--c);border:0;color:#000;font-weight:900;cursor:pointer;}
#k-ai-voz{background:#111 !important;}
#k-ai-voz.gravando{background:var(--erro) !important;color:#fff;animation:piscar 1s infinite;}
@keyframes piscar{0%,100%{opacity:1}50%{opacity:0.5}}
</style>

function formatarData(dataString) {
  const data = new Date(dataString);
  const dia = String(data.getDate()).padStart(2, '0');
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const ano = data.getFullYear();
  return `${dia}/${mes}/${ano}`;
}

function getSegundaSemana(data){
  const d = new Date(data);
  const dia = d.getDay();
  const diff = d.getDate() - dia + (dia === 0? -6 : 1);
  return new Date(d.setDate(diff));
}

function carregarSemanaAtual(){
  const hoje = new Date();
  const segunda = getSegundaSemana(hoje);
  const chaveSegunda = segunda.toISOString().split('T')[0];
  const semana = CALENDARIO_KTP[chaveSegunda];
  const dataHojeFormatada = formatarData(hoje);
  const dataSegundaFormatada = formatarData(segunda);

  if(semana){
    const caminhoImg = `${PASTA_IMG}${semana.tipo}/${semana.tipo}.png`;
    const metodos = ['semana-de-manutencao','semana-de-resistencia','semana-de-forca','semana-de-hipertrofia'];
    let grid = '<div class="grid-metodos">';
    metodos.forEach(m=>{
      grid += `<img src="${PASTA_IMG}${m}/${m}.png" class="${m===semana.tipo?'ativa':''}">`;
    });
    grid += '</div>';

    document.getElementById('semanaAtualContainer').innerHTML = `
    <div class="semana-atual">
      <div class="titulo-secao">| SEMANA ATUAL <span class="badge">HOJE</span></div>
      <div class="data-grande">Hoje: ${dataHojeFormatada}</div>
      <div style="font-size:11px;color:var(--text2);text-align:center;margin-bottom:8px;">Protocolo Válido: ${dataSegundaFormatada}</div>
      <img src="${caminhoImg}" class="img-metodo" alt="${semana.nome}">
      ${grid}
      <div class="semana-titulo">${semana.fase} - ${semana.nome}</div>
      <div class="semana-tipo">OBJETIVO: ${semana.objetivo}</div>
      <div class="protocolo">${semana.texto}</div>
    </div>`;

    document.getElementById('k-ai-balao').innerHTML = `Participantes e Alunos! <br><b>${semana.nome}</b><br>${dataSegundaFormatada}`;
    document.getElementById('k-ai-balao').style.display = 'block';
  } else {
    document.getElementById('semanaAtualContainer').innerHTML = `<div class="titulo-secao">| SEMANA NÃO CADASTRADA</div><div class="sub-titulo">Hoje é ${dataHojeFormatada}. Aguarde a atualização do calendário</div></div>`;
  }
}

function carregarLinhaTempo(){
  const hoje = new Date();
  const chaveHoje = getSegundaSemana(hoje).toISOString().split('T')[0];
  let html = '';

  Object.keys(CALENDARIO_KTP).sort().forEach(data => {
    const s = CALENDARIO_KTP[data];
    let classe = '';
    if(data === chaveHoje) classe = 'ativa';
    else if(data < chaveHoje) classe = 'passada';

    const caminhoImg = `${PASTA_IMG}${s.tipo}/${s.tipo}.png`;
    const dataFormatada = formatarData(data);

    html += `
    <div class="fase-box ${classe}">
      <div class="data-grande">${dataFormatada}</div>
      <img src="${caminhoImg}" class="img-metodo" alt="${s.nome}" style="height:120px;">
      <b style="color:var(--c)">${s.fase}</b> - ${s.nome}<br>
      <span style="font-size:10px;">${s.objetivo}</span>
    </div>`;
  });

  document.getElementById('linhaTempoCompleta').innerHTML = html;
}

function addMsgAI(texto){
  document.getElementById('k-ai-msgs').innerHTML += `<div class="msg ai">${texto.replace(/\n/g,'<br>')}</div>`;

  document.getElementById('k-ai-msgs').innerHTML += `<div class="msg user">${texto}</div>`;

function enviarKAI(){
  const input = document.getElementById('k-ai-text');
  const pergunta = input.value.toLowerCase().trim();
  if(!pergunta) return;
  addMsgUser(input.value);
  input.value = '';

  const hoje = new Date();
  const chave = getSegundaSemana(hoje).toISOString().split('T')[0];
  const semana = CALENDARIO_KTP[chave];
  const dataSegundaFormatada = formatarData(chave);

  setTimeout(()=>{
    if(pergunta.includes('fase') || pergunta.includes('qual fase')){
      addMsgAI(`Participantes e Alunos, hoje estamos na:\n\n**${semana.fase}**\nObjetivo: ${semana.objetivo}\n\nProtocolo válido desde: ${dataSegundaFormatada}`);
    }
    else if(pergunta.includes('semana') || pergunta.includes('o que fazer')){
      addMsgAI(`Participantes e Alunos, essa semana é:\n\n**${semana.nome}**\nVálida em: ${dataSegundaFormatada}\n\n${semana.texto.substring(0,300)}...`);
    }
    else if(pergunta.includes('metodo') || pergunta.includes('manutencao') || pergunta.includes('resistencia') || pergunta.includes('forca') || pergunta.includes('hipertrofia')){
      addMsgAI(`Participantes e Alunos, os 4 métodos do K-TP são:\n\n**MANUTENÇÃO**: Regeneração e qualidade\n**RESISTÊNCIA**: Mais reps, menos peso. Base\n**FORÇA**: 3 a 6 reps. Carga alta\n**HIPERTROFIA**: 10 a 12 reps. Crescimento\nEssa semana estamos em: **${semana.nome}**`);
    }
    else if(pergunta.includes('calendario') || pergunta.includes('datas')){
      addMsgAI(`Participantes e Alunos, o calendário 2026 tem 4 fases:\n\nFASE 1: OFF SEASON - Jan/Fev\nFASE 2: BULKING - Mar/Mai\nFASE 3: MAINTENANCE - Jun/Ago\nFASE 4: CUTTING - Set/Nov\nDEZEMBRO: FÉRIAS\nRole a página para ver todas as 52 semanas com datas.`);
    }
    else if(pergunta.includes('treino') || pergunta.includes('protocolo')){
      addMsgAI(`Participantes e Alunos, protocolo dessa semana ${dataSegundaFormatada}:\n\n${semana.texto}`);
    }
    else {
      addMsgAI(`Participantes e Alunos, eu sou focado 100% no K-TP Projeto Transformação 2026. \n\nPara outros assuntos como suplementos, loja, outras turmas ou suporte geral, acessem as outras páginas e setores do KORVIL.\n\nPosso ajudar com algo sobre FASE, SEMANA ou PROTOCOLO?`);
    }
  }, 600);
}

function falarKAI(){
  if(!('webkitSpeechRecognition' in window)){
    addMsgAI('Participantes e Alunos, seu navegador não suporta comando de voz. Use o texto.');
    return;
  }

  const btn = document.getElementById('k-ai-voz');
  if(reconhecimento){
    reconhecimento.stop();
    reconhecimento = null;
    btn.classList.remove('gravando');
    return;
  }

  reconhecimento = new webkitSpeechRecognition();
  reconhecimento.lang = 'pt-BR';
  reconhecimento.continuous = false;
  btn.classList.add('gravando');

  reconhecimento.onresult = function(event){
    const texto = event.results[0][0].transcript;
    document.getElementById('k-ai-text').value = texto;
    enviarKAI();
  };
  reconhecimento.onend = function(){btn.classList.remove('gravando'); reconhecimento=null;};
  reconhecimento.start();
}

  carregarSemanaAtual();

};
