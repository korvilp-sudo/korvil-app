<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --aviso:#ffaa00;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);padding:16px;max-width:700px;margin:auto;}
h1{text-align:center;font-size:18px;font-weight:900;color:var(--c);margin:0 0 16px;letter-spacing:1px;text-shadow:0 0 10px var(--c);}
.card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:16px;margin-bottom:12px;}
.titulo-secao{font-size:14px;font-weight:800;color:var(--c);margin-bottom:8px;border-left:3px solid var(--c);padding-left:8px;}
.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}
.fase-box{padding:10px;background:#111;border-left:3px solid var(--borda);border-radius:6px;margin-bottom:8px;font-size:12px;}
.fase-box.ativa{background:rgba(0,255,136,.15);border-left:3px solid var(--ok);}
.fase-box.passada{opacity:0.35;}
.semana-atual{padding:16px;background:#000;border:2px solid var(--c);border-radius:12px;margin-bottom:16px;box-shadow:0 0 25px var(--c)30;}
.semana-titulo{font-weight:900;color:var(--c);font-size:16px;margin-bottom:4px;text-align:center;}
.semana-tipo{font-size:12px;color:var(--aviso);font-weight:800;margin-bottom:10px;text-align:center;}
.img-metodo{width:100%;border-radius:10px;border:2px solid var(--c);margin-bottom:12px;}
.protocolo{padding:14px;background:#0a0a0a;border:1px solid var(--c);border-radius:8px;font-size:13px;white-space:pre-wrap;line-height:1.7;}
.logo{display:block;margin:0 auto 12px;max-width:140px;border:2px solid var(--c);border-radius:12px;padding:6px;background:#111;}
.badge{padding:5px 12px;background:var(--ok);color:#000;border-radius:20px;font-size:10px;font-weight:900;}
.data-grande{font-size:14px;color:var(--c);font-weight:800;text-align:center;margin-bottom:8px;}
</style>
</head>

  // MARÇO - DEZEMBRO: COLE AQUI TODO O RESTO DO SEU OBJETO COM AS 48 SEMANAS RESTANTES

function getSegundaSemana(data){
  const d = new Date(data);
  const dia = d.getDay();
  const diff = d.getDate() - dia + (dia === 0? -6 : 1);
  return new Date(d.setDate(diff));
}

function carregarSemanaAtual(){
  const hoje = new Date();
  const segunda = getSegundaSemana(hoje);
  const chave = segunda.toISOString().split('T')[0];
  const semana = CALENDARIO_KTP[chave];

  if(semana){
    const caminhoImg = `${PASTA_IMG}${semana.tipo}/${semana.tipo}.png`;
    document.getElementById('semanaAtualContainer').innerHTML = `
    <div class="semana-atual">
      <div class="titulo-secao">| SEMANA ATUAL <span class="badge">HOJE</span></div>
      <div class="data-grande">${chave}</div>
      <img src="${caminhoImg}" class="img-metodo" alt="${semana.nome}">
      <div class="semana-titulo">${semana.fase} - ${semana.nome}</div>
      <div class="semana-tipo">OBJETIVO: ${semana.objetivo}</div>
      <div class="protocolo">${semana.texto}</div>
    </div>`;
  } else {
    document.getElementById('semanaAtualContainer').innerHTML = `<div class="card"><div class="titulo-secao">| SEMANA NÃO CADASTRADA</div></div>`;
  }
}

function carregarLinhaTempo(){
  const hoje = new Date();
  const chaveHoje = getSegundaSemana(hoje).toISOString().split('T')[0];
  let html = '';

  Object.keys(CALENDARIO_KTP).sort().forEach(data => {
    const s = CALENDARIO_KTP[data];
    let classe = '';
    if(data === chaveHoje) classe = 'ativa';
    else if(data < chaveHoje) classe = 'passada';

    const caminhoImg = `${PASTA_IMG}${s.tipo}/${s.tipo}.png`;

    html += `
    <div class="fase-box ${classe}">
      <div class="data-grande">${data}</div>
      <img src="${caminhoImg}" class="img-metodo" alt="${s.nome}" style="height:100px;object-fit:cover;margin-bottom:6px;">
      <b style="color:var(--c)">${s.fase}</b> - ${s.nome}<br>
      <span style="font-size:10px;">${s.objetivo}</span>
    </div>`;
  });

  document.getElementById('linhaTempoCompleta').innerHTML = html;
}

carregarSemanaAtual();
carregarLinhaTempo();
</script>
