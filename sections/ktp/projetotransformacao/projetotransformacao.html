const MENSAGENS_SEMANA = {
  "2026-01-05": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE MANUTENÇÃO\n\nEssa é uma semana única dentro do processo — uma pausa estratégica para ajustar, aprender e evoluir com mais consciência.\n\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nAqui, a intensidade diminui, mas a atenção aumenta. É o momento de aprender mais sobre os exercícios, melhorar a execução dos movimentos e corrigir detalhes que fazem toda a diferença lá na frente.\n\nO foco está na regeneração muscular, na mobilidade e na qualidade de cada exercício. Um corpo bem recuperado responde melhor, ganha mais eficiência e reduz o risco de lesões.\n\nMenos carga, mais controle. Menos pressa, mais precisão.\n\nSemana mais leve. É ela que sustenta sua evolução e prepara você para voltar ainda mais forte.`,
  "2026-01-12": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE RESISTÊNCIA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\n\nEssa é uma semana fundamental dentro do processo — onde você constrói a base que sustenta toda evolução física.\n\nAqui, o foco não está no peso, mas na capacidade do músculo trabalhar por mais tempo, suportar esforço e melhorar a recuperação entre exercícios.\n\nA intensidade vem do volume e da continuidade, não da carga. É o momento de fortalecer o fôlego, a mente e a disciplina física.\n\nMais repetições, menos peso.\nMais constância, menos pausa.\nMais resistência, mais preparação.\n\nSemana de construção da base. É ela que aumenta sua capacidade e prepara seu corpo para níveis mais altos de força, hipertrofia e performance.`,
  "2026-01-19": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE FORÇA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nFoco da semana: ficar mais forte de verdade\nNão é estética — é força, resistência e controle\nSer musculoso ≠ ser forte\nDefinição é aparência\nForça é desempenho real\nTREINO: Poucas repetições 3 a 6 | Carga mais alta ~70% | Execução controlada | Mais descanso\nAprenda o movimento. Ative o sistema nervoso. Preparação para o Bulking que vem em Março.`,

  "2026-02-02": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE MANUTENÇÃO\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nEssa é uma semana única dentro do processo — uma pausa estratégica para ajustar, aprender e evoluir com mais consciência.\nMenos carga, mais controle. Foco em regeneração muscular e qualidade.`,
  "2026-02-09": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE RESISTÊNCIA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nConstrua a base. Mais repetições, menos peso. Foco em fôlego, mente e disciplina.`,
  "2026-02-16": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE FORÇA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nFoco: ficar mais forte de verdade. 3 a 6 reps. Preparação para o Bulking.`,
  "2026-02-23": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE HIPERTROFIA\nOBJETIVO DA FASE: Regeneração | Adaptações | Aprendizados\nFoco: Desenvolvimento do físico. 10 a 12 reps. Controle total.`,
  "2026-03-02": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 2: BULKING\n\nSEMANA DE MANUTENÇÃO\nOBJETIVO DA FASE: Ganhar massa muscular | Cumprir metas | Melhorar performance | Evolução\nRecuperação estratégica para suportar as cargas altas que virão. É o momento de preparar o corpo para crescer — com inteligência.\n\nSemana leve para absorver o treino anterior e estar 100% para o volume que vem.`,

  "2026-03-23": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 2: BULKING\n\nSEMANA DE HIPERTROFIA\n\nOBJETIVO DA FASE: Ganhar massa muscular | Cumprir metas | Melhorar performance | Evolução\n\nFoco principal: CRESCER\n\nESTRUTURA: 10 a 12 repetições até a falha\nMistura de força + resistência\nEstímulo máximo para crescimento muscular\n\nALIMENTAÇÃO: Proteína ALTA | Carboidrato ALTO | Gordura moderada\nVocê está transformando o corpo em etapas, com inteligência, disciplina e controle total.`,

  "2026-04-13": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 2: BULKING\nSEMANA DE RESISTÊNCIA\nOBJETIVO DA FASE: Ganhar massa muscular | Cumprir metas | Melhorar performance | Evolução\nAumentar a capacidade de treino. Mais volume, mais trabalho.`,

function toggleMenu(){document.getElementById('menu-lateral').classList.toggle('ativo');document.getElementById('overlay').classList.toggle('ativo');}
function abrirBuscaAluno(){document.getElementById('modal-aluno').classList.add('ativo');}
function fecharBuscaAluno(){document.getElementById('modal-aluno').classList.remove('ativo');}
function fecharResultado(){document.getElementById('cronograma-container').innerHTML='<div class="msg-inicial">Clique em "COLAR ID" e digite seu ID para ver seu cronograma</div>'; document.getElementById('info-aluno-container').innerHTML=''; idLogado=''; localStorage.removeItem('idLogado');}
function formatarData(d){ 
const [ano, mes, dia] = d.split('-');
return `${dia}/${mes}/${ano}`; // Evita bug de fuso horario
}
  
function carregarMenu(){
  let html='';
  for(let fase in FASES_MENU){
    html+=`<div class="menu-titulo">${fase}</div><div class="semanas-da-fase">`;
    FASES_MENU[fase].forEach(data=>{
      const segundaLinha = MENU[data].split('\n')[1] || 'SEMANA';
      html+=`<div class="semana-item" onclick="mostrarInfoSemana('${data}')">${formatarData(data)} - ${segundaLinha}</div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('menu-lateral').innerHTML=html;
}

function mostrarInfoSemana(data){
  const container = document.getElementById('cronograma-container');
  const infoCompleta = MENU[data];
  if(!infoCompleta) return;
  
  const linhas = infoCompleta.split('\n');
  const titulo = linhas[0];
  const subtitulo = linhas[1];
  const mensagem = MENSAGENS_SEMANA[data] || "Mensagem da semana não cadastrada.";

  // PEGA A IMAGEM CERTA PELA PALAVRA DA SEMANA - IGUAL DA IMAGEM
  const imagens = {
    'MANUTENÇÃO': 'semana-de-manutencao',
    'RESISTÊNCIA': 'semana-de-resistencia',
    'FORÇA': 'semana-de-forca',
    'HIPERTROFIA': 'semana-de-hipertrofia'
  };
  let pastaImagem = 'semana-de-manutencao';
  for(let key in imagens){
    if(subtitulo.includes(key)){ pastaImagem = imagens[key]; break; }
  }

  const baseURL = `https://korvilp-sudo.github.io/korvil-app/sections/ktp/projetotransformacao/images/imagens/2026/imagens-dos-metodos`;
  const caminhoImagem = `${baseURL}/${pastaImagem}/${pastaImagem}.png`;

  let html = `
    <div class="card-semana">
      <h3>${titulo}</h3>
      <img src="${caminhoImagem}" alt="${subtitulo}" onerror="this.style.display='none'">
      <p style="color:var(--c);font-weight:900;margin-bottom:10px">${subtitulo}</p>
      <div class="mensagem-semana">${mensagem}</div>
      <p style="margin-top:10px;font-size:11px;color:var(--aviso)">Semana inicia em: ${formatarData(data)}</p>
    </div>
  `;
  
  // SE JA TIVER CRONOGRAMA, ADICIONA EM CIMA. SE NAO, SUBSTITUI
  if(container.querySelector('.titulo-crono')){
    container.insertAdjacentHTML('afterbegin', html);
  } else {
    container.innerHTML = html;
  }
  
  if(window.innerWidth<768)toggleMenu();
}

window.onload=function(){
  carregarMenu();
  // SE JA TIVER CRONOGRAMA, ADICIONA EM CIMA. SE NAO, SUBSTITUI
  if(container.querySelector('.titulo-crono')){
    container.insertAdjacentHTML('afterbegin', html);
  } else {
    container.innerHTML = html;
  }

  if(window.innerWidth<768)toggleMenu();
}

// FUNÇÃO NOVA: PEGA A SEGUNDA DA SEMANA E RESPEITA 01:00
function getSegundaDaSemana(){
  const agora = new Date();
  let dataBase = new Date(agora);

  // Se for segunda e antes de 01:00, volta 1 semana
  if(agora.getDay() === 1 && agora.getHours() < 1){
    dataBase.setDate(agora.getDate() - 7);
  }

  // Pega a segunda da semana da dataBase
  const diaSemana = dataBase.getDay(); // 0=Dom
  const diff = dataBase.getDate() - diaSemana + (diaSemana === 0? -6 : 1);
  const segunda = new Date(dataBase.setDate(diff));

  const ano = segunda.getFullYear();
  const mes = String(segunda.getMonth() + 1).padStart(2, '0');
  const dia = String(segunda.getDate()).padStart(2, '0');
  return `${ano}-${mes}-${dia}`;
}

window.onload=function(){
  carregarMenu();

  const dataISO = getSegundaDaSemana(); // Hoje 19/07/2026 vai retornar 2026-07-13

  // SE EXISTIR MENSAGEM PRA ESSA DATA, JÁ MOSTRA
  if(MENSAGENS_SEMANA[dataISO]){
    mostrarInfoSemana(dataISO); // Vai mostrar SEMANA DE FORÇA
  } else {
    mostrarInfoSemana("2026-01-05"); // Fallback
  }

  if(idLogado && ALUNOS_DB[idLogado]){
    mostrarDadosAluno(idLogado);
    mostrarCronograma();
  }
};

function trocarAba(plano, el){
  planoAtivo = plano;
  document.querySelectorAll('.aba-plano').forEach(b=>b.classList.remove('ativa'));
  el.classList.add('ativa');
  mostrarCronograma();
}

function mostrarDadosAluno(id){
  const aluno = ALUNOS_DB[id];
  const container = document.getElementById('info-aluno-container');
  if(!aluno) return;
  if(aluno.tipo === 'ADMIN'){
    container.innerHTML = `<div class="card-aluno"><button class="btn-fechar-resultado" onclick="fecharResultado()">X</button><h2>👑 MODO ADMIN</h2><p><b>Usuário:</b> ${aluno.nome}<br><b>Acesso:</b> Cronograma completo</p></div>`;
  } else {
    container.innerHTML = `<div class="card-aluno"><button class="btn-fechar-resultado" onclick="fecharResultado()">X</button><h2>👤 MEUS DADOS</h2><p><b>Nome:</b> ${aluno.nome}<br><b>ID:</b> ${id}</p></div>`;
  }
}

function mostrarCronograma(){
  const container = document.getElementById('cronograma-container');
  if(!idLogado){ container.innerHTML = '<div class="msg-inicial">Clique em "COLAR ID" e digite seu ID para ver seu cronograma</div>'; return; }
  let html = `<div class="titulo-crono">📋 CRONOGRAMA K-TP — PROJETO TRANSFORMAÇÃO</div>`;
  html += `<div class="obs-pix">Olá ${ALUNOS_DB[idLogado].nome}, mensalidade em dia.<br><b>Pix: korvilloja@gmail.com</b></div>`;

  const ehAdmin = ALUNOS_DB[idLogado]?.tipo === 'ADMIN';
  if(ehAdmin){
    html += `<div class="abas-plano"><button class="aba-plano ${planoAtivo==='PRESENCIAL'?'ativa':''}" onclick="trocarAba('PRESENCIAL', this)">🌐 PRESENCIAL</button><button class="aba-plano ${planoAtivo==='ONLINE'?'ativa':''}" onclick="trocarAba('ONLINE', this)">💻 ONLINE</button></div>`;
  }

  const planosParaMostrar = ehAdmin? ['PRESENCIAL', 'ONLINE'] : [planoAtivo];
  planosParaMostrar.forEach(plano=>{
    if(ehAdmin) html += `<div style="font-size:14px;font-weight:900;color:var(--c);text-align:center;margin:20px 0">🌐 ${plano} 🌐</div>`;
    CRONOGRAMA_DB[plano].forEach(bloco=>{
      let alunosDoBloco = ehAdmin? bloco.alunos : bloco.alunos.filter(a => a.id === idLogado);
      if(alunosDoBloco.length === 0) return;
      if(bloco.hora) html += `<div class="grupo-horario">🕒 ${bloco.hora}</div>`;
      html += `<div class="grupo-status">${bloco.status==='ATIVOS'?'✅ ATIVOS':'❌ DESATIVADOS'}</div>`;
      html += `<div class="tabela-wrapper"><table class="tabela-crono"><thead><tr><th>Nº</th><th>Aluno</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>ID</th></tr></thead><tbody>`;
      alunosDoBloco.sort((a,b)=>a.n-b.n).forEach(a=>{
        html += `<tr class="destaque"><td>${a.n}</td><td>${a.aluno}</td><td>${a.dias}</td><td>${a.freq}</td><td>${a.objetivo}</td><td>${a.valor}</td><td>${a.venc}</td><td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td><td style="font-weight:900;color:var(--c)">${a.id}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  });
  container.innerHTML = html;
}

function abrirBuscaAluno(){
  document.getElementById('modal-aluno').classList.add('ativo');
  carregarListaIds(); // CHAMA A LISTA QUANDO ABRIR
}

function carregarListaIds(){
  let html = '';
  Object.keys(ALUNOS_DB).sort().forEach(id=>{
    html += `<div onclick="selecionarId('${id}')" style="padding:8px; border-bottom:1px solid #1f1f1f; cursor:pointer; font-size:11px;">${id} - ${ALUNOS_DB[id].nome}</div>`;
  });
  document.getElementById('lista-ids').innerHTML = html;
}

function selecionarId(id){
  document.getElementById('input-id-aluno').value = id;
  buscarAluno();
}
