<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>K-TP PROJETO TRANSFORMAÇÃO 2026</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:12px 16px 12px 56px;text-align:left;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:14px;font-weight:900;color:var(--c);}
.menu-btn{position:fixed;top:10px;left:12px;z-index:101;background:var(--c);color:#000;border:0;border-radius:6px;padding:6px 8px;font-weight:900;font-size:16px;cursor:pointer;}
.btn-aluno{padding:6px 10px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;font-size:10px;cursor:pointer;}

/* MENU LATERAL IGUAL 2ª IMAGEM */
#menu-lateral{position:fixed;left:-280px;top:0;width:260px;height:100%;background:#0a0a0a;border-right:1px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:60px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.aba-fase{padding:10px 14px;background:#0f0f0f;border-bottom:1px solid var(--borda);cursor:pointer;font-weight:900;font-size:11px;color:var(--c);display:flex;justify-content:space-between;align-items:center;}
.aba-fase.ativa{background:#111;border-left:3px solid var(--c);}
.seta{transition:.3s;font-size:10px;}
.aba-fase.ativa.seta{transform:rotate(90deg);}
.semanas-da-fase{display:none;background:#050505;}
.semanas-da-fase.ativa{display:block;}
.semana-item{padding:8px 14px 8px 24px;margin:0;font-size:10px;cursor:pointer;border-bottom:1px solid #111;color:var(--text2);}
.semana-item:hover{background:#111;color:#fff;}
.semana-item.ativa{background:#001a1a;color:var(--ok);font-weight:800;}

.container{padding:12px;max-width:700px;margin:auto;}

/* CARD LOGO */
.card-logo{background:var(--card);border:1.5px solid var(--borda);border-radius:10px;padding:12px;margin-bottom:12px;}
.logo{display:block;margin:0 auto 8px;max-width:100%;border:2px solid var(--c);border-radius:10px;padding:4px;background:#000;}
.sub-titulo{font-size:10px;color:var(--text2);text-align:center;}

/* CARD SEMANA IGUAL 2ª IMAGEM */
.card-semana{background:#0a0a0a;border:2px solid var(--c);border-radius:12px;padding:12px;margin-bottom:16px;}
.topo-semana{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.badge-semana{padding:3px 8px;background:var(--ok);color:#000;border-radius:12px;font-size:9px;font-weight:900;}
.data-semana{font-size:12px;color:var(--c);font-weight:800;text-align:center;margin-bottom:10px;}
.titulo-crono{font-size:16px;font-weight:900;text-align:center;margin-bottom:10px;}

/* GRID 4 IMAGENS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.item-metodo{background:#111;border-radius:8px;padding:6px;text-align:center;border:2px solid transparent;}
.item-metodo.ativa{border:2px solid var(--c);box-shadow:0 0 10px var(--c)40;}
.item-metodo img{width:100%;border-radius:6px;margin-bottom:4px;}
.item-metodo.nome{font-size:9px;font-weight:900;margin-bottom:2px;}
.item-metodo.foco{font-size:8px;color:var(--text2);line-height:1.2;}

.titulo-fase{font-size:14px;font-weight:900;color:var(--c);text-align:center;margin-bottom:2px;}
.sub-objetivo{font-size:10px;color:var(--aviso);text-align:center;margin-bottom:8px;}
.box-texto{background:#000;border:1px solid var(--borda);border-radius:6px;padding:10px;font-size:11px;line-height:1.5;}

/* MODAL */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:10px;padding:16px;width:100%;max-width:400px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.btn-fechar{background:#ff4444;color:#fff;border:0;border-radius:4px;padding:4px 8px;font-weight:900;cursor:pointer;}
.busca-id{display:flex;gap:6px;}
.busca-id input{flex:1;padding:8px;background:#000;border:1px solid var(--borda);border-radius:4px;color:#fff;font-size:12px;}
.busca-id button{padding:8px 10px;background:var(--c);color:#000;border:0;border-radius:4px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="header">
  <h1>K-TP PROJETO TRANSFORMAÇÃO 2026</h1>
  <button class="btn-aluno" onclick="abrirBuscaAluno()">👤 SEU PROJETO: COLAR ID</button>
</div>

<div id="overlay" onclick="toggleMenu()"></div>
<div id="menu-lateral"></div>

<div class="container">
  <div class="card-logo">
    <img src="https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/logoprojetotransformacao.png" class="logo">
    <div class="sub-titulo">Link oficial da semana. Atualiza automaticamente toda segunda-feira 00:01</div>
  </div>
  <div id="semanaAtualContainer"></div>
</div>

<!-- MODAL BUSCA ALUNO -->
<div id="modal-aluno">
  <div class="modal-card">
    <div class="modal-header">
      <div style="font-weight:900;color:var(--c)">BUSCAR ALUNO</div>
      <button class="btn-fechar" onclick="fecharBuscaAluno()">X</button>
    </div>
    <div class="busca-id">
      <input type="text" id="input-id-aluno" placeholder="COLAR ID" onkeypress="if(event.key==='Enter') buscarAluno()">
      <button onclick="buscarAluno()">BUSCAR</button>
    </div>
    <div id="resultado-aluno" style="margin-top:10px;font-size:11px;"></div>
  </div>
</div>

<script>
const PASTA_IMG = 'https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/imagens/2026/imagens-dos-metodos/';

// LISTA DE IDS PERMITIDOS
const ALUNOS_DB = {
  "carla38": {nome:"Maria Carla"},
  "vhellem39": {nome:"Hellem Vitoria"},
  "gon19": {nome:"José Gonzaga"},
  "dani36": {nome:"Daniele Vieira Leite"},
  "ktp1": {nome:"SAY KORVIL"}
};

// LINHA DO TEMPO COMPLETA 2026
const CALENDARIO_KTP = {
  "2026-01-05": {fase:"FASE 1: OFF SEASON", tipo:"manutencao", nome:"SEMANA DE MANUTENÇÃO", objetivo:"Regeneração | Adaptações", texto:"Essa é uma semana única dentro do processo — uma pausa estratégica para ajustar, aprender e evoluir com mais consciência."},
  "2026-01-12": {fase:"FASE 1: OFF SEASON", tipo:"resistencia", nome:"SEMANA DE RESISTÊNCIA", objetivo:"Base física", texto:"Semana fundamental — onde você constrói a base que sustenta toda evolução física."},
  "2026-01-19": {fase:"FASE 1: OFF SEASON", tipo:"forca", nome:"SEMANA DE FORÇA", objetivo:"Ficar mais forte", texto:"Foco da semana: cargas progressivas e força máxima."},
  "2026-01-26": {fase:"FASE 1: OFF SEASON", tipo:"hipertrofia", nome:"SEMANA DE HIPERTROFIA", objetivo:"Crescimento", texto:"Foco: Desenvolvimento e crescimento do físico."},

  "2026-02-02": {fase:"FASE 2: CONSTRUÇÃO", tipo:"manutencao", nome:"SEMANA DE MANUTENÇÃO", objetivo:"Volume", texto:"Manutenção do volume de treino."},
  "2026-07-13": {fase:"FASE 3: PREPARAÇÃO", tipo:"forca", nome:"SEMANA DE FORÇA", objetivo:"Pico de Performance", texto:"Semana de 14/07/2026. Foco total em força máxima e explosão."},

  "2026-12-28": {fase:"DEZEMBRO: FÉRIAS", tipo:"hipertrofia", nome:"SEMANA DE HIPERTROFIA", objetivo:"Mostrar os resultados", texto:"Último treino do ano. Celebração. Resultado e descanso merecido 💪"}
};

function formatarData(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR');}
function getSegunda(d){const dt=new Date(d);dt.setDate(dt.getDate()-dt.getDay()+1);return dt.toISOString().split('T')[0];}

function toggleMenu(){document.getElementById('menu-lateral').classList.toggle('ativo');document.getElementById('overlay').classList.toggle('ativo');}
function abrirBuscaAluno(){document.getElementById('modal-aluno').classList.add('ativo');document.getElementById('input-id-aluno').focus();}
function fecharBuscaAluno(){document.getElementById('modal-aluno').classList.remove('ativo');}

function carregarMenu(){
  const hoje=getSegunda(new Date());
  const fases={};
  Object.keys(CALENDARIO_KTP).sort().forEach(data=>{const s=CALENDARIO_KTP[data];if(!fases[s.fase])fases[s.fase]=[];fases[s.fase].push({data,...s});});

  let html='';let i=0;
  for(let fase in fases){
    const faseId=`fase${i}`;
    html+=`<div class="aba-fase" onclick="document.getElementById('${faseId}').classList.toggle('ativa');this.classList.toggle('ativa')">${fase} <span class="seta">›</span></div>`;
    html+=`<div class="semanas-da-fase" id="${faseId}">`;
    fases[fase].forEach(s=>{
      let classe=s.data===hoje?'ativa':'';
      html+=`<div class="semana-item ${classe}" onclick="mostrarSemana('${s.data}')">${formatarData(s.data)} - ${s.nome}</div>`;
    });
    html+=`</div>`;i++;
  }
  document.getElementById('menu-lateral').innerHTML=html;
}

function mostrarSemana(chave){
  const s=CALENDARIO_KTP[chave];
  const tipos=['manutencao','resistencia','forca','hipertrofia'];
  let grid='';
  tipos.forEach(t=>{
    grid+=`<div class="item-metodo ${t===s.tipo?'ativa':''}">
      <img src="${PASTA_IMG}${t}/${t}.png">
      <div class="nome">${t.toUpperCase()}</div>
      <div class="foco">${t==='manutencao'?'Recuperação':t==='resistencia'?'Definição':t==='forca'?'Força':'Hipertrofia'}</div>
    </div>`;
  });

  document.getElementById('semanaAtualContainer').innerHTML=`
  <div class="card-semana">
    <div class="topo-semana">
      <div style="font-size:11px;font-weight:800">| SEMANA</div>
      <div class="badge-semana">ATUAL</div>
    </div>
    <div class="data-semana">Data: ${formatarData(chave)}</div>
    <div class="titulo-crono">CRONOGRAMA K-TP</div>
    <div class="grid-4">${grid}</div>
    <div class="titulo-fase">${s.fase} - ${s.nome}</div>
    <div class="sub-objetivo">OBJETIVO: ${s.objetivo}</div>
    <div class="box-texto">${s.texto}</div>
  </div>`;
  if(window.innerWidth<768)toggleMenu();
}

function carregarSemanaAtual(){
  const hoje=getSegunda(new Date());
  let chave=hoje;
  if(!CALENDARIO_KTP[chave]){chave=Object.keys(CALENDARIO_KTP).sort().find(d=>d>=hoje)||Object.keys(CALENDARIO_KTP).sort().pop();}
  mostrarSemana(chave);
}

function buscarAluno(){
  const id=document.getElementById('input-id-aluno').value.toLowerCase().trim();

  if(!id){
    document.getElementById('resultado-aluno').innerHTML='<div style="color:#ffaa00">Digite um ID</div>';
    return;
  }

  if(ALUNOS_DB[id]){
    localStorage.setItem('idLogado', id); // SALVA O ID
    fecharBuscaAluno(); // FECHA O MODAL
    carregarSemanaAtual(); // ABRE O CRONOGRAMA
    document.getElementById('resultado-aluno').innerHTML='';
    document.getElementById('input-id-aluno').value='';
    if(id==='ktp1'){
      alert('Acesso ADMIN: Cronograma completo liberado');
    }
  } else {
    document.getElementById('resultado-aluno').innerHTML='<div style="color:#ff4444">ID não encontrado</div>';
  }
}

window.onload=function(){carregarMenu();carregarSemanaAtual();};
</script>
</body>
</html>
