*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}

.header{padding:16px 16px 16px 60px;text-align:center;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}

.btn-aluno{padding:8px 12px;background:var(--c);color:#000;border:0;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-aluno:hover{box-shadow:0 0 15px var(--c);}

.container{display:flex;max-width:1200px;margin:auto;}

/* MENU LATERAL COM ABAS */
#menu-lateral{position:fixed;left:-320px;top:0;width:300px;height:100%;background:#0a0a0a;border-right:2px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:70px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.abas-fases{display:flex;flex-direction:column;}
.aba-fase{padding:12px 16px;background:#111;border-bottom:1px solid var(--borda);cursor:pointer;font-weight:900;font-size:12px;color:var(--c);display:flex;justify-content:space-between;align-items:center;}
.aba-fase.ativa{background:rgba(0,245,255,.1);border-left:3px solid var(--c);}
.seta{transition:.3s;}
.aba-fase.ativa.seta{transform:rotate(90deg);}
.semanas-da-fase{display:none;padding:8px;background:#050505;}
.semanas-da-fase.ativa{display:block;}
.semana-item{padding:8px 10px;margin:4px 0;background:#1a1a1a;border-radius:6px;font-size:11px;cursor:pointer;transition:.2s;border-left:2px solid transparent;}
.semana-item:hover{background:#222;border-left:2px solid var(--c);}
.semana-item.ativa{background:rgba(0,255,136,.2);border-left:2px solid var(--ok);color:var(--ok);font-weight:800;}
.semana-item.passada{opacity:0.5;}

.conteudo{flex:1;padding:16px;padding-bottom:100px;}

/* MODAL ALUNO */
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:14px;padding:20px;max-width:1000px;width:100%;box-shadow:0 0 40px var(--c)40;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-titulo{font-size:16px;font-weight:900;color:var(--c);}

.dado-aluno{padding:8px 0;border-bottom:1px solid var(--borda);font-size:12px;}
.dado-aluno b{color:var(--c);}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}

.sub-titulo{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.4;text-align:center;}

.grid-metodos img.ativa{border:2px solid var(--c);opacity:1;box-shadow:0 0 10px var(--c)40;}

.grupo-horario{margin-top:25px;margin-bottom:10px;color:var(--c);font-weight:900;font-size:14px;border-bottom:2px solid var(--c);padding-bottom:6px;}
.grupo-status{margin-top:12px;margin-bottom:8px;color:var(--aviso);font-weight:800;font-size:12px;padding-left:4px;}

function formatarData(dataString) {
  const data = new Date(dataString + 'T12:00:00');
  const dia = String(data.getDate()).padStart(2, '0');
  const mes = String(data.getMonth() + 1).padStart(2, '0');
  const ano = data.getFullYear();
  return `${dia}/${mes}/${ano}`;
}

function getSegundaSemana(data){
  const d = new Date(data);
  const dia = d.getDay();
  const diff = d.getDate() - dia + (dia === 0? -6 : 1);
  return new Date(d.setDate(diff));
}

function toggleMenu(){
  document.getElementById('menu-lateral').classList.toggle('ativo');
  document.getElementById('overlay').classList.toggle('ativo');
}

function abrirBuscaAluno(){
  document.getElementById('modal-aluno').classList.add('ativo');

function fecharBuscaAluno(){
  document.getElementById('modal-aluno').classList.remove('ativo');

function toggleAba(faseId){
  document.querySelectorAll('.semanas-da-fase').forEach(el=>el.classList.remove('ativa'));
  document.querySelectorAll('.aba-fase').forEach(el=>el.classList.remove('ativa'));
  document.getElementById(faseId).classList.add('ativa');
  event.currentTarget.classList.add('ativa');
}

function carregarMenu(){
  const hoje = new Date();
  const chaveHoje = getSegundaSemana(hoje).toISOString().split('T')[0];
  const fases = {};

  Object.keys(CALENDARIO_KTP).sort().forEach(data => {
    const s = CALENDARIO_KTP[data];
    if(!fases[s.fase]) fases[s.fase] = [];
    fases[s.fase].push({data,...s});
  });

  let html = '<div class="abas-fases">';
  let indiceAbaAtual = 0;
  let i = 0;

  for(let fase in fases){
    if(fases.some(s => s.data === chaveHoje)) indiceAbaAtual = i;
    const faseId = `fase-${i}`;
    html += `<div class="aba-fase" onclick="toggleAba('${faseId}')">${fase} <span class="seta">›</span></div>`;
    html += `<div class="semanas-da-fase" id="${faseId}">`;

      let classe = '';
      if(s.data === chaveHoje) classe = 'ativa';
      else if(s.data < chaveHoje) classe = 'passada';
      html += `<div class="semana-item ${classe}" onclick="mostrarSemana('${s.data}')">${formatarData(s.data)} - ${s.nome}</div>`;
    });
    html += `</div>`;
    i++;
  }
  html += '</div>';
  document.getElementById('menu-lateral').innerHTML = html;
  toggleAba(`fase-${indiceAbaAtual}`);
}

function mostrarSemana(chaveData){
  semanaSelecionada = chaveData;
  const semana = CALENDARIO_KTP[chaveData];
  const dataFormatada = formatarData(chaveData);
  const caminhoImg = `${PASTA_IMG}${semana.tipo}/${semana.tipo}.png`;
  const metodos = ['semana-de-manutencao','semana-de-resistencia','semana-de-forca','semana-de-hipertrofia'];
  let grid = '<div class="grid-metodos">';
  metodos.forEach(m=>{ grid += `<img src="${PASTA_IMG}${m}/${m}.png" class="${m===semana.tipo?'ativa':''}">`; });
  grid += '</div>';

  document.getElementById('semanaAtualContainer').innerHTML = `
  <div class="semana-atual">
    <div class="titulo-secao">| SEMANA <span class="badge">${chaveData === getSegundaSemana(new Date()).toISOString().split('T')[0]? 'ATUAL' : 'SELECIONADA'}</span></div>
    <div class="data-grande">Data: ${dataFormatada}</div>
    <img src="${caminhoImg}" class="img-metodo" alt="${semana.nome}">
    ${grid}
    <div class="semana-titulo">${semana.fase} - ${semana.nome}</div>
    <div class="semana-tipo">OBJETIVO: ${semana.objetivo}</div>
    <div class="protocolo">${semana.texto}</div>
  </div>`;
  if(window.innerWidth < 768) toggleMenu();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function carregarSemanaAtual(){
  const hoje = new Date();
  const segunda = getSegundaSemana(hoje);
  const chaveSegunda = segunda.toISOString().split('T')[0];

  let chave = chaveSegunda;
  if(!CALENDARIO_KTP[chave]){
    chave = Object.keys(CALENDARIO_KTP).sort().find(d => d >= chaveSegunda) || Object.keys(CALENDARIO_KTP).sort().pop();
  }
  mostrarSemana(chave);
}

function mostrarCronogramaCompleto(){
  const alunos = Object.entries(ALUNOS_DB).map(([id, data]) => ({id,...data}));
  alunos.sort((a,b)=>{
    if(a.horario!== b.horario) return a.horario.localeCompare(b.horario);
    if(a.status!== b.status) return a.status === 'Ativo'? -1 : 1;
    return a.nome.localeCompare(b.nome);
  });

  let html = `<div class="titulo-secao">📋 CRONOGRAMA K-TP — PROJETO TRANSFORMAÇÃO</div>`;
  html += `<div class="obs-pix">Olá, sua mensalidade está prestes a vencer.<br>Esteja com o pagamento corretamente em dia para continuar participando.<br><b>Pix: korvilloja@gmail.com</b></div>`;

  let horarioAtual = ''; let statusAtual = ''; let contador = 1;
  alunos.forEach(a=>{
    if(a.horario!== horarioAtual){
      horarioAtual = a.horario;
      html += `<div class="grupo-horario">🕒 ${horarioAtual}</div>`; statusAtual = '';
    }
    if(a.status!== statusAtual){
      statusAtual = a.status;
      html += `<div class="grupo-status">${statusAtual === 'Ativo'? '✅ ATIVOS' : '❌ DESATIVADOS'}</div>`;
      html += `<div class="tabela-wrapper"><table class="tabela-crono"><thead><tr><th>Nº</th><th>Aluno</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>R$</th><th>Venc</th><th>Status</th><th>ID</th></tr></thead><tbody>`;
    }
    html += `<tr><td>${contador++}</td><td><b>${a.nome}</b></td><td>${a.dias}</td><td>${a.freq}</td><td>${a.objetivo}</td><td>R$ ${a.valor}</td><td>${a.venc}</td><td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td><td>${a.id}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function buscarAluno(){
  const id = document.getElementById('input-id-aluno').value.toLowerCase().trim();
  const div = document.getElementById('resultado-aluno');

  if(id === 'ktp1'){
    div.innerHTML = mostrarCronogramaCompleto();
    return;
  }

  const aluno = ALUNOS_DB[id];
  if(!aluno){
    div.innerHTML = `<div style="color:var(--erro);text-align:center;padding:10px;">ID não encontrado</div>`;
    return;
  }

  div.innerHTML = `
    <div class="dado-aluno"><b>Nome:</b> ${aluno.nome}</div>
    <div class="dado-aluno"><b>Plano:</b> ${aluno.plano}</div>
    <div class="dado-aluno"><b>Horário:</b> ${aluno.horario}</div>
    <div class="dado-aluno"><b>Dias:</b> ${aluno.dias}</div>
    <div class="dado-aluno"><b>Frequência:</b> ${aluno.freq}</div>
    <div class="dado-aluno"><b>Objetivo:</b> ${aluno.objetivo}</div>
    <div class="dado-aluno"><b>Mensalidade:</b> R$ ${aluno.valor}</div>
    <div class="dado-aluno"><b>Vencimento:</b> ${aluno.venc}</div>
    <div class="dado-aluno"><b>Status:</b> <span class="${aluno.status==='Ativo'?'status-ativo':'status-desativado'}">${aluno.status}</span></div>
  `;
}

window.onload = function(){
  carregarMenu();
  carregarSemanaAtual();
};
</script>
</body>
</html>
