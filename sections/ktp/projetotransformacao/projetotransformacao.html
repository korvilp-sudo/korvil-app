<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>K-TP PROJETO TRANSFORMAÇÃO 2026</title>
<style>
/* SEU CSS CONTINUA IGUAL */
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff; --text2:#aaa; --borda:#1f1f1f; --ok:#00ff88; --erro:#ff4444; --aviso:#ffaa00;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;}
.header{padding:12px 16px 12px 56px;text-align:left;border-bottom:1px solid var(--borda);background:#0a0a0a;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
h1{font-size:14px;font-weight:900;color:var(--c);}
.menu-btn{position:fixed;top:10px;left:12px;z-index:101;background:var(--c);color:#000;border:0;border-radius:6px;padding:6px 8px;font-weight:900;font-size:16px;cursor:pointer;}
.btn-aluno{padding:6px 10px;background:var(--c);color:#000;border:0;border-radius:6px;font-weight:900;font-size:10px;cursor:pointer;}
#menu-lateral{position:fixed;left:-280px;top:0;width:260px;height:100%;background:#0a0a0a;border-right:1px solid var(--c);z-index:200;transition:.3s;overflow-y:auto;padding:60px 0 20px;}
#menu-lateral.ativo{left:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:199;display:none;}
#overlay.ativo{display:block;}
.menu-titulo{padding:14px 16px;font-size:11px;color:var(--c);font-weight:900;letter-spacing:1px;border-bottom:2px solid var(--c);margin-top:8px;}
.semanas-da-fase{background:#050505;}
.semana-item{padding:10px 16px 10px 24px;font-size:10px;cursor:pointer;border-bottom:1px solid var(--borda);color:var(--text2);line-height:1.4;text-decoration:none;display:block;transition:.2s;}
.semana-item:hover{background:#111;color:#fff;}
.container{padding:12px;max-width:1200px;margin:auto;}
.card-aluno{background:#001a1a;border:2px solid var(--c);border-radius:10px;padding:12px;margin-bottom:12px;position:relative;}
.card-aluno h2{font-size:12px;color:var(--c);margin-bottom:6px;}
.card-aluno p{font-size:11px;color:var(--text2);line-height:1.6;}
.btn-fechar-resultado{position:absolute;top:8px;right:8px;background:var(--erro);color:#fff;border:0;border-radius:50%;width:22px;height:22px;font-weight:900;font-size:12px;cursor:pointer;line-height:22px;text-align:center;}
.obs-pix{padding:14px;background:#0a0a0a;border:1px dashed var(--c);border-radius:8px;font-size:11px;color:var(--text2);margin:15px 0;text-align:center;line-height:1.6;}
.titulo-crono{font-size:16px;font-weight:900;text-align:center;color:var(--c);margin-bottom:10px;}
.msg-inicial{text-align:center;color:var(--text2);font-size:12px;margin-top:40px;}
.abas-plano{display:flex;gap:8px;margin-bottom:12px;border-bottom:2px solid var(--borda);}
.aba-plano{padding:10px 16px;background:#111;border:0;color:var(--text2);font-weight:800;font-size:12px;cursor:pointer;border-radius:6px 6px 0 0;}
.aba-plano.ativa{background:var(--c);color:#000;}
.tabela-wrapper{overflow-x:auto;margin-bottom:20px;border:1px solid var(--borda);border-radius:8px;}
.tabela-crono{width:100%;border-collapse:collapse;font-size:10px;}
.tabela-crono th{background:#111;color:var(--c);padding:8px 6px;text-align:left;font-size:9px;font-weight:900;text-transform:uppercase;border-bottom:2px solid var(--c);}
.tabela-crono td{padding:8px 6px;border-bottom:1px solid #1a1a1a;}
.tabela-crono tbody tr.destaque{background:#001a1a;box-shadow:0 0 0 2px var(--c) inset;}
.grupo-horario{margin-top:20px;margin-bottom:8px;color:var(--c);font-weight:900;font-size:13px;padding:8px;background:#0a0a0a;border-left:3px solid var(--c);}
.grupo-status{margin:8px 0;color:var(--aviso);font-weight:800;font-size:11px;padding-left:8px;}
.status-ativo{color:var(--ok);font-weight:900;}
.status-desativado{color:var(--erro);font-weight:900;}
#modal-aluno{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-aluno.ativo{display:flex;}
.modal-card{background:var(--card);border:2px solid var(--c);border-radius:10px;padding:16px;width:100%;max-width:400px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.btn-fechar{background:var(--erro);color:#fff;border:0;border-radius:4px;padding:4px 8px;font-weight:900;cursor:pointer;}
.busca-id{display:flex;gap:6px;}
.busca-id input{flex:1;padding:8px;background:#000;border:1px solid var(--borda);border-radius:4px;color:#fff;font-size:12px;}
.busca-id button{padding:8px 10px;background:var(--c);color:#000;border:0;border-radius:4px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="header">
  <h1>K-TP PROJETO TRANSFORMAÇÃO 2026</h1>
  <button class="btn-aluno" onclick="abrirBuscaAluno()">👤 COLAR ID</button>
</div>
<div id="overlay" onclick="toggleMenu()"></div>
<div id="menu-lateral"></div>

<div class="container">
  <div id="info-aluno-container"></div>
  <div id="cronograma-container">
    <div class="msg-inicial">Clique em "COLAR ID" e digite seu ID para ver seu cronograma</div>
  </div>
</div>

<div id="modal-aluno">
  <div class="modal-card">
    <div class="modal-header">
      <div style="font-weight:900;color:var(--c)">BUSCAR ALUNO</div>
      <button class="btn-fechar" onclick="fecharBuscaAluno()">X</button>
    </div>
    <div class="busca-id">
      <input type="text" id="input-id-aluno" placeholder="COLAR ID" onkeypress="if(event.key==='Enter') buscarAluno()">
      <button onclick="buscarAluno()">BUSCAR</button>
    </div>
  </div>
</div>

<script>
// MENSAGENS DA SEMANA
const MENSAGENS_SEMANA = {
  "2026-01-05": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE MANUTENÇÃO\n\nEssa é uma semana única...`
  //...COPIA TODAS SUAS MENSAGENS AQUI
};

const MENU = {
  "2026-01-05": `K-TP | PROJETO TRANSFORMAÇÃO 11° ANO - FASE 1: OFF SEASON\nSEMANA DE MANUTENÇÃO`,
  //...COPIA TODO SEU MENU AQUI
};

const FASES_MENU = {
  "FASE 1: OFF SEASON": ["2026-01-05","2026-01-12","2026-01-19","2026-01-26"],
  "FASE 2: BULKING": ["2026-03-02","2026-03-09"],
  "FASE 3: MAINTENANCE": ["2026-06-01"],
  "FASE 4: CUTTING": ["2026-09-07"],
  "DEZEMBRO: FÉRIAS": ["2026-12-07"]
}; // FECHEI AQUI. NÃO ABRE <script> DE NOVO

let ALUNOS_DB = {
  "ktp0": {nome:"SAY KORVIL", tipo:"ADMIN"}, // CORRIGI PRA ktp0
  "mag1": {nome:"Magda Gomes dos Santos", tipo:"ADMIN"},
  "mcarla2": {nome:"Maria Carla Carvalho Santos", tipo:"ALUNO"},
  "hvitoria3": {nome:"Hellem Vitória Carvalho dos Santos", tipo:"ALUNO"},
  "nicol39": {nome:"Nicoli da Silga Guedes", tipo:"ALUNO"},
  "tchuco1": {nome:"Tchuco Silva", tipo:"ALUNO"},
  "dani2": {nome:"Daniele Vieira Leite", tipo:"ALUNO"}
  //...COPIA O RESTO DOS ALUNOS
};

let CRONOGRAMA_DB = { /* SEU CRONOGRAMA_DB INTEIRO AQUI */
"PRESENCIAL": [
    {hora:"08h00 🐢", status:"ATIVOS", alunos:[
      {n:0, id:"mag1", aluno:"Magda Gomes dos Santos", dias:"Segunda a Sexta", freq:"5x", objetivo:"Definição Muscular", valor:"R$150,00", matricula:"R$50,00", total:"R$200,00", venc:"13/05/26", status:"Ativo", cpf:"112.505.24", nasc:"2026-07-27", idade:"0 anos", genero:"Feminino", whats:"(13) 99636-4009", email:"magdagomes998@gmail.com", nivel_atividade:"Intermediário", q1:"Sim", q2:"Irregular", q3:"9 horas", q4:"Não", q5:"Abdômen", q6:"Não", q7:"Sim", q8:"Sim", q9:"Anti depressivo", plano:"Presencial 5x"},
      {n:1, id:"mcarla2", aluno:"Maria Carla Carvalho Santos", dias:"Segunda, Quinta, Sexta", freq:"3x", objetivo:"Emagrecimento", valor:"R$100,00", matricula:"R$50,00", total:"R$150,00", venc:"06/08/2026", status:"Ativo", cpf:"417.344.068-52", nasc:"1996-04-22", idade:"30 anos", genero:"Feminino", whats:"(13) 99768-3699", email:"carlacarvalho8362@gmail.com", nivel_atividade:"Iniciante", q1:"Sim", q2:"Mais ou menos", q3:"6 a 7 horas", q4:"Não", q5:"Barriga", q6:"Não", q7:"Sim", q8:"Sim", q9:"Vitaminas", plano:"Presencial 3x"}
    ]},
    {hora:"19h00 ⭐", status:"ATIVOS", alunos:[
      {n:0, id:"nicol39", aluno:"Nicoli da Silga Guedes", dias:"Segunda, Quarta, Sexta", freq:"3x", objetivo:"Definição Muscular", valor:"R$100,00", matricula:"R$50,00", total:"R$150,00", venc:"30/04/26", status:"Ativo", cpf:"397.764.168-96", nasc:"2001-10-21", idade:"25 anos", genero:"Feminino", whats:"(13) 99657-4924", email:"nicolisgdss@gmail.com", nivel_atividade:"Iniciante", q1:"Apenas na epoca de escola", q2:"Nao me alimento corretamente", q3:"7/8h", q4:"Nao", q5:"Resistencia", q6:"Nao", q7:"Sim", q8:"Sim", q9:"Nao", plano:"Presencial 3x"}
    ]}
  ],
"ONLINE": [
    {hora:"14h00", status:"DESATIVADOS", alunos:[
      {n:0, id:"tchuco1", aluno:"Tchuco Silva", dias:"Segunda a Sexta", freq:"5x", objetivo:"Condicionamento Físico", valor:"R$60,00", matricula:"R$0,00", total:"R$60,00", venc:"15/07/26", status:"Desativado", cpf:"--", nasc:"--", idade:"--", genero:"--", whats:"--", email:"--", nivel_atividade:"--", q1:"--", q2:"--", q3:"--", q4:"--", q5:"--", q6:"--", q7:"--", q8:"--", q9:"--", plano:"Online 5x"},
      {n:1, id:"dani2", aluno:"Daniele Vieira Leite", dias:"Seg a Sex", freq:"5x", objetivo:"Definição", valor:"R$60,00", matricula:"R$0,00", total:"R$60,00", venc:"13/05/26", status:"Desativado", cpf:"--", nasc:"--", idade:"--", genero:"--", whats:"--", email:"--", nivel_atividade:"--", q1:"--", q2:"--", q3:"--", q4:"--", q5:"--", q6:"--", q7:"--", q8:"--", q9:"--", plano:"Online 5x"}
    ]}
  ]
};

let planoAtivo = 'PRESENCIAL';
let idLogado = localStorage.getItem('idLogado') || '';

function toggleMenu(){document.getElementById('menu-lateral').classList.toggle('ativo');document.getElementById('overlay').classList.toggle('ativo');}
function abrirBuscaAluno(){document.getElementById('modal-aluno').classList.add('ativo');}
function fecharBuscaAluno(){document.getElementById('modal-aluno').classList.remove('ativo');}
function fecharResultado(){document.getElementById('cronograma-container').innerHTML='<div class="msg-inicial">Clique em "COLAR ID" e digite seu ID para ver seu cronograma</div>'; document.getElementById('info-aluno-container').innerHTML=''; idLogado=''; localStorage.removeItem('idLogado');}
function formatarData(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR');}

function carregarMenu(){
  let html='';
  for(let fase in FASES_MENU){
    html+=`<div class="menu-titulo">${fase}</div><div class="semanas-da-fase">`;
    FASES_MENU[fase].forEach(data=>{
      const segundaLinha = MENU[data].split('\n')[1] || 'SEMANA';
      html+=`<div class="semana-item" onclick="mostrarInfoSemana('${data}')">${formatarData(data)} - ${segundaLinha}</div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('menu-lateral').innerHTML=html;
}

function mostrarInfoSemana(data){
  const container = document.getElementById('cronograma-container');
  const mensagem = MENSAGENS_SEMANA[data] || "Mensagem da semana não cadastrada.";
  let html = `<div class="card-semana"><h3>${MENU[data]}</h3><div class="mensagem-semana">${mensagem}</div><p style="margin-top:10px;font-size:11px;color:var(--aviso)">Semana inicia em: ${formatarData(data)}</p></div>`;
  container.innerHTML = html;
  if(window.innerWidth<768)toggleMenu();
}

function trocarAba(plano, el){
  planoAtivo = plano;
  document.querySelectorAll('.aba-plano').forEach(b=>b.classList.remove('ativa'));
  el.classList.add('ativa');
  mostrarCronograma();
}

function mostrarDadosAluno(id){
  const aluno = ALUNOS_DB[id];
  const container = document.getElementById('info-aluno-container');
  if(!aluno) return;
  if(aluno.tipo === 'ADMIN'){
    container.innerHTML = `<div class="card-aluno"><button class="btn-fechar-resultado" onclick="fecharResultado()">X</button><h2>👑 MODO ADMIN</h2><p><b>Usuário:</b> ${aluno.nome}<br><b>Acesso:</b> Cronograma completo</p></div>`;
  } else {
    container.innerHTML = `<div class="card-aluno"><button class="btn-fechar-resultado" onclick="fecharResultado()">X</button><h2>👤 MEUS DADOS</h2><p><b>Nome:</b> ${aluno.nome}<br><b>ID:</b> ${id}</p></div>`;
  }
}

function mostrarCronograma(){
  const container = document.getElementById('cronograma-container');
  if(!idLogado){ container.innerHTML = '<div class="msg-inicial">Clique em "COLAR ID" e digite seu ID para ver seu cronograma</div>'; return; }
  let html = `<div class="titulo-crono">📋 CRONOGRAMA K-TP — PROJETO TRANSFORMAÇÃO</div>`;
  html += `<div class="obs-pix">Olá ${ALUNOS_DB[idLogado].nome}, mensalidade em dia.<br><b>Pix: korvilloja@gmail.com</b></div>`;

  const ehAdmin = ALUNOS_DB[idLogado]?.tipo === 'ADMIN';
  if(ehAdmin){
    html += `<div class="abas-plano"><button class="aba-plano ${planoAtivo==='PRESENCIAL'?'ativa':''}" onclick="trocarAba('PRESENCIAL', this)">🌐 PRESENCIAL</button><button class="aba-plano ${planoAtivo==='ONLINE'?'ativa':''}" onclick="trocarAba('ONLINE', this)">💻 ONLINE</button></div>`;
  }

  const planosParaMostrar = ehAdmin? ['PRESENCIAL', 'ONLINE'] : [planoAtivo];
  planosParaMostrar.forEach(plano=>{
    if(ehAdmin) html += `<div style="font-size:14px;font-weight:900;color:var(--c);text-align:center;margin:20px 0">🌐 ${plano} 🌐</div>`;
    CRONOGRAMA_DB[plano].forEach(bloco=>{
      let alunosDoBloco = ehAdmin? bloco.alunos : bloco.alunos.filter(a => a.id === idLogado);
      if(alunosDoBloco.length === 0) return;
      if(bloco.hora) html += `<div class="grupo-horario">🕒 ${bloco.hora}</div>`;
      html += `<div class="grupo-status">${bloco.status==='ATIVOS'?'✅ ATIVOS':'❌ DESATIVADOS'}</div>`;
      html += `<div class="tabela-wrapper"><table class="tabela-crono"><thead><tr><th>Nº</th><th>Aluno</th><th>Dias</th><th>Freq</th><th>Objetivo</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>ID</th></tr></thead><tbody>`;
      alunosDoBloco.sort((a,b)=>a.n-b.n).forEach(a=>{
        html += `<tr class="destaque"><td>${a.n}</td><td>${a.aluno}</td><td>${a.dias}</td><td>${a.freq}</td><td>${a.objetivo}</td><td>${a.valor}</td><td>${a.venc}</td><td class="${a.status==='Ativo'?'status-ativo':'status-desativado'}">${a.status}</td><td style="font-weight:900;color:var(--c)">${a.id}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
  });
  container.innerHTML = html;
}

function buscarAluno(){
  const id=document.getElementById('input-id-aluno').value.toLowerCase().trim().replace(/\s+/g, '');
  if(!ALUNOS_DB[id]){alert('ID não encontrado');return;}
  idLogado = id;
  localStorage.setItem('idLogado', id);
  fecharBuscaAluno();
  mostrarDadosAluno(id);
  mostrarCronograma();
  document.getElementById('input-id-aluno').value='';
}

window.onload=function(){
  carregarMenu(); // CORRIGIDO: AGORA CARREGA O MENU
  if(idLogado && ALUNOS_DB[idLogado]){
    mostrarDadosAluno(idLogado);
    mostrarCronograma();
  }
};
</script>
</body>
</html>
