<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-TP PROJETO TRANSFORMAÇÃO</title>
<style>
:root{--c:#00f5ff; --bg:#000; --card:#0a0a0a; --text:#fff;}
body{background:var(--bg);color:var(--text);padding:16px;font-family:Arial;max-width:700px;margin:auto;}
.card{background:var(--card);border:2px solid var(--c);border-radius:12px;padding:16px;margin-bottom:12px;}
.btn{width:100%;padding:14px;background:var(--c);color:#000;text-align:center;border-radius:10px;font-weight:800;border:0;cursor:pointer;margin-top:14px;}
.oculto{display:none;}
.logo{display:block;margin:0 auto 10px;max-width:220px;}
</style>
</head>
<body>

<!-- TELA 1 -->
<div id="tela1">
  <div class="card">
    <img src="https://korvilp-sudo.github.io/korvil-app/sections/ktp/images/logoktp.png" class="logo">
    <h2 style="text-align:center;color:var(--c)">K-TP PROJETO TRANSFORMAÇÃO</h2>
    <p>Conteúdo da apresentação aqui...</p>
    <button class="btn" onclick="mostrarTela('tela2')">PARTICIPAR DO PROJETO</button>
  </div>
</div>

<!-- TELA 2 -->
<div id="tela2" class="oculto">
  <div class="card">
    <h2 style="text-align:center;color:var(--c)">ANAMNESE</h2>
    <p>Formulário aqui...</p>
    <button class="btn" onclick="mostrarTela('tela3')">CONTINUAR PARA PLANOS</button>
    <button class="btn" style="background:#333;color:#fff" onclick="mostrarTela('tela1')">Voltar</button>
  </div>
</div>

<!-- TELA 3 -->
<div id="tela3" class="oculto">
  <div class="card">
    <h2 style="text-align:center;color:var(--c)">PLANOS</h2>
    <p>Planos aqui...</p>
    <button class="btn" style="background:#333;color:#fff" onclick="mostrarTela('tela2')">Voltar</button>
  </div>
</div>

<script>
function mostrarTela(id){
  document.getElementById('tela1').style.display = 'none';
  document.getElementById('tela2').style.display = 'none';
  document.getElementById('tela3').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>
