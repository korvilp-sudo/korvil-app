<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>INSCRIÇÃO KTP 2026</title>
<style>
body{background:#000;color:#00f5ff;font-family:Arial;padding:40px;text-align:center}
input{width:90%;max-width:400px;padding:15px;background:#001a33;border:2px solid #00f5ff;color:#fff;border-radius:10px;font-size:20px;margin:20px 0}
button{padding:20px 40px;background:#00f5ff;color:#000;border:none;border-radius:10px;font-weight:900;font-size:20px;cursor:pointer}
#msg{margin-top:20px;font-size:18px}
</style>
</head>
<body>
<h1>INSCRIÇÃO KTP 2026</h1>
<input type="text" id="nome" placeholder="DIGITE O NOME COMPLETO" required>
<button onclick="enviar()">INSCREVER</button>
<div id="msg"></div>

<script>
async function enviar(){
  const nome = document.getElementById('nome').value.trim();
  if(!nome) return alert('Digite o nome');
  document.getElementById('msg').innerHTML = 'Enviando...';

  const dados = {
    nome: nome,
    pasta: "sections/ktp/projetotransformacao/projetos/2026",
    data_inscricao: new Date().toLocaleString('pt-BR')
  }

  const res = await fetch('https://api.github.com/repos/korvilp-sudo/korvil-app/issues', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      title: `INSCRICAO: ${nome}`,
      body: btoa(JSON.stringify(dados)), // manda em base64 pra não quebrar
      labels: ["inscricao"]
    })
  });

  if(res.ok) document.getElementById('msg').innerHTML = `✅ PRONTO! <br> Arquivo será criado em até 1 minuto.`;
  else document.getElementById('msg').innerHTML = '❌ ERRO ' + res.status;
}
</script>
</body>
</html>
