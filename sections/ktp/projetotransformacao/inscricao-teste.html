<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>TESTE K-TP</title>
<style>
body{background:#000;color:#00f5ff;font-family:Arial;padding:40px;text-align:center}
input{width:90%;max-width:400px;padding:15px;background:#001a33;border:2px solid #00f5ff;color:#fff;border-radius:10px;font-size:20px;margin:20px 0}
button{padding:20px 40px;background:#00f5ff;color:#000;border:none;border-radius:10px;font-weight:900;font-size:20px;cursor:pointer}
#msg{margin-top:20px;font-size:16px}
</style>
</head>
<body>
<h1>TESTE RÁPIDO - KTP</h1>
<input type="text" id="nome" placeholder="Digite o Nome" required>
<button onclick="enviar()">CADASTRAR</button>
<div id="msg"></div>

<script>
function enviar(){
  const nome = document.getElementById('nome').value.trim();
  if(!nome) return alert('Digite o nome');

  const dados = {
    nome: nome, whats:"--", email:"--", plano:"PRESENCIAL", freq:"3x", objetivo:"Teste",
    dias:"--", valor:"R$0,00", matricula:"R$0,00", total:"R$0,00", venc:"--", status:"Ativo",
    cpf:"--", nasc:"--", idade:"--", genero:"--", nivel_atividade:"--", q1:"--", q2:"--", q3:"--", q4:"--", q5:"--", q6:"--", q7:"--", q8:"--", q9:"--",
    plano: "PRESENCIAL 3x"
  }

  const json = btoa(JSON.stringify(dados)); // codifica em base64
  const link = `https://github.com/korvilp-sudo/korvil-app/actions/workflows/salvar-aluno.yml?query=dados:${json}`;

  document.getElementById('msg').innerHTML = `✅ CLICA AQUI PRA CADASTRAR:<br><a href="${link}" target="_blank" style="color:#00f5ff;font-size:18px">RODAR CADASTRO</a>`;
}
</script>
</body>
</html>
