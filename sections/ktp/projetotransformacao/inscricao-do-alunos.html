<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8">
<title>INSCRIÇÃO K-TP</title>
<style>
body{background:#000;color:#00f5ff;font-family:Arial;padding:20px;text-align:center}
input,select{width:90%;max-width:500px;padding:12px;background:#001a33;border:2px solid #00f5ff;color:#fff;border-radius:8px;font-size:16px;margin:8px auto;display:block}
button{padding:15px 30px;background:#00f5ff;color:#000;border:none;border-radius:8px;font-weight:900;font-size:18px;margin-top:15px;cursor:pointer}
#msg{margin-top:20px;font-size:14px}
</style>
</head>
<body>
<h1>INSCRIÇÃO - PROJETO TRANSFORMAÇÃO 2026</h1>
<input type="text" id="nome" placeholder="Nome Completo *" required>
<input type="text" id="whats" placeholder="WhatsApp">
<input type="email" id="email" placeholder="Email">
<select id="plano"><option value="PRESENCIAL">PRESENCIAL</option><option value="ONLINE">ONLINE</option></select>
<select id="freq"><option value="2x">2x Semana</option><option value="3x">3x Semana</option><option value="5x">5x Semana</option></select>
<input type="text" id="objetivo" placeholder="Objetivo">
<button onclick="enviar()">FINALIZAR INSCRIÇÃO</button>
<div id="msg"></div>
<script>
const REPO = "korvilp-sudo/korvil-app";
const TOKEN = "ghp_TROCA_PELO_SEU_TOKEN"; // GITHUB > SETTINGS > TOKENS > repo + workflow

async function enviar(){
  const dados = {
    nome:document.getElementById('nome').value.trim(), whats:document.getElementById('whats').value, email:document.getElementById('email').value,
    plano:document.getElementById('plano').value, freq:document.getElementById('freq').value, objetivo:document.getElementById('objetivo').value || '--',
    dias:"--", valor:"R$0,00", matricula:"R$0,00", total:"R$0,00", venc:"--", status:"Ativo",
    cpf:"--", nasc:"--", idade:"--", genero:"--", nivel_atividade:"--", q1:"--", q2:"--", q3:"--", q4:"--", q5:"--", q6:"--", q7:"--", q8:"--", q9:"--",
    plano: document.getElementById('plano').value + " + document.getElementById('freq').value
  }
  if(!dados.nome) return alert('Digite o nome');
  document.getElementById('msg').innerHTML = 'Enviando...';
  await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/salvar-aluno.yml/dispatches`,{
    method:'POST', headers:{'Authorization':`Bearer ${TOKEN}`,'Accept':'application/vnd.github+json'},
    body:JSON.stringify({ref:'main', inputs:{ dados: JSON.stringify(dados) }})
  });
  document.getElementById('msg').innerHTML = '✅ ENVIADO! Atualiza em 1 minuto.';
}
</script>
</body>
</html>
