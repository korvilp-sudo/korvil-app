<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-TP | Inscricao Projeto TRANSFORMACAO</title>
<style>
:root{--c:#00f5ff;--bg:#000;--text:#fff;--text2:#bbb;--erro:#ff3b30;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000;color:var(--text);font-size:15px}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#000;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:100}
.btn{border:1px solid var(--c);background:transparent;color:var(--c);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
.logo{color:var(--c);font-weight:700}
.wrap{padding:75px 18px 90px;max-width:680px;margin:auto}
h2{color:var(--text);font-size:18px;margin:24px 0 12px;border-left:3px solid var(--c);padding-left:10px}
h3{color:var(--c);font-size:15px;margin:12px 0}
label{display:block;color:var(--text2);font-size:13px;margin-bottom:6px;font-weight:600}
input,select{width:100%;background:#0b0b0b;border:1px solid #333;color:var(--text);padding:10px;border-radius:6px;font-size:14px;margin-bottom:12px}
input:disabled,select:disabled{background:#111;color:#666;cursor:not-allowed}
input.erro,select.erro{border-color:var(--erro)}
.erro-text{color:var(--erro);font-size:11px;margin-top:-8px;margin-bottom:8px;display:none}
.card{background:#0b0b0b;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
.planos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.plano{background:#0b0b0b;border:1px solid #222;border-radius:10px;padding:14px;text-align:center}
.plano.destaque{border-color:var(--c)}
.preco{font-size:22px;font-weight:700;margin:8px 0}
ul{list-style:none;font-size:12px;color:var(--text2);text-align:left}
ul li{padding:4px 0}ul li:before{content:'✓ ';color:var(--c)}
.btn-main{background:var(--c);color:#000;border:0;padding:14px;border-radius:8px;font-weight:700;font-size:15px;width:100%;margin-top:10px;cursor:pointer}
