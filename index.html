<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6;--bg:#000}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;padding:16px}
canvas#particles{position:fixed;inset:0;z-index:0}
.words-bg{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.28);font-size:17px;font-weight:900;letter-spacing:2px;white-space:nowrap;text-shadow:0 0 25px rgba(0,255,255,.6);animation-fill-mode:forwards;z-index:1}
.type1{animation:fadeInOut 5s}@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
.type2{animation:pulseWord 5s}@keyframes pulseWord{0%{opacity:0;transform:scale(.8)}10%{opacity:1;transform:scale(1)}50%{transform:scale(1.15)}90%{opacity:1}100%{opacity:0;transform:scale(.9)}}
.type3{animation:slideLeft 5s}@keyframes slideLeft{0%{opacity:0;transform:translateX(-100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(50px)}}
.type4{animation:slideRight 5s}@keyframes slideRight{0%{opacity:0;transform:translateX(100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(-50px)}}
.type5{animation:typing 5s steps(30)}@keyframes typing{0%{opacity:0;width:0;overflow:hidden;border-right:2px solid var(--c)}5%{opacity:1}70%{width:100%;border-right:2px solid var(--c)}90%{border-right:transparent}100%{opacity:0;width:100%}}
.card{background:rgba(0,0,0,.65);backdrop-filter:blur(30px);border-radius:24px;padding:35px;width:90%;max-width:460px;position:relative;z-index:10;box-shadow:0 0 60px rgba(0,255,255,.3)}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}
.logo-img{max-width:300px;width:100%;filter:drop-shadow(0 0 35px var(--c));animation:pulseLogo 2s ease-in-out infinite}
@keyframes pulseLogo{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.tabs{display:flex;gap:12px;margin-bottom:25px}
.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000}
.form{display:none;flex-direction:column;gap:16px}
.form.active{display:flex}
input{width:100%;padding:16px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.85);color:#fff;border-radius:12px;font-size:16px}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="words-bg" id="wordsBg"></div>

<div class="card">
  <div class="logo-area">
    <img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-site/main/assets/images/logo-korvil.png" class="logo-img">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">ENTRAR</button>
    <button class="tab" onclick="showTab('cadastro')">NOVO USUÁRIO</button>
  </div>
  <form id="login" class="form active">
    <input type="email" placeholder="Digite seu E-mail" required>
    <input type="password" placeholder="Digite sua Senha" required>
    <button class="btn" type="button" onclick="alert('Botão funcionando!')">ACESSAR</button>
  </form>
  <form id="cadastro" class="form">
    <input type="text" placeholder="Nome completo" required>
    <input type="email" placeholder="E-mail" required>
    <button class="btn" type="button" onclick="alert('Botão funcionando!')">CRIAR ACESSO</button>
  </form>
</div>

<script>
window.onload = function() {
  const palavras = ['KORVIL','NEGÓCIOS','CURSOS','ECOMMERCE','K-TP','LIBERDADE','COMUNIDADE K','MARKETING','RESULTADOS','EXCLUSIVO'];
  const wordsBg = document.getElementById('wordsBg');
  const anims = ['type1','type2','type3','type4','type5'];
  setInterval(()=>{
    const w = document.createElement('div');
    w.className = 'word ' + anims[Math.floor(Math.random()*5)];
    w.innerText = palavras[Math.floor(Math.random()*palavras.length)];
    w.style.left = Math.random()*80 + '%';
    w.style.top = Math.random()*80 + '%';
    wordsBg.appendChild(w);
    setTimeout(()=>w.remove(), 5000);
  }, 700);

  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.2});
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;
  if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}
  draw();
}

function showTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.form').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t).classList.add('active');
}
</script>
</body>
</html>
