<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;padding:16px}
canvas#particles{position:fixed;inset:0;z-index:0}.words-bg{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.28);font-size:17px;font-weight:900;letter-spacing:2px;white-space:nowrap;text-shadow:0 0 25px rgba(0,255,255,.6);animation-fill-mode:forwards}
.type1{animation:fadeInOut 5s}@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
.type2{animation:pulseWord 5s}@keyframes pulseWord{0%{opacity:0;transform:scale(.8)}10%{opacity:1;transform:scale(1)}50%{transform:scale(1.15)}90%{opacity:1}100%{opacity:0;transform:scale(.9)}}
.type3{animation:slideLeft 5s}@keyframes slideLeft{0%{opacity:0;transform:translateX(-100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(50px)}}
.type4{animation:slideRight 5s}@keyframes slideRight{0%{opacity:0;transform:translateX(100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(-50px)}}
.type5{animation:typing 5s steps(30)}@keyframes typing{0%{opacity:0;width:0;overflow:hidden;border-right:2px solid var(--c)}5%{opacity:1}70%{width:100%;border-right:2px solid var(--c)}90%{border-right:transparent}100%{opacity:0;width:100%}}
.card{background:rgba(0,0,0,.65);backdrop-filter:blur(30px);border-radius:24px;padding:35px;width:90%;max-width:460px;position:relative;z-index:10;animation:fadeInUp .8s;box-shadow:0 0 60px rgba(0,255,255,.3)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}.logo-img{max-width:300px;width:100%;height:auto;filter:drop-shadow(0 0 35px var(--c));animation:pulseLogo 2s ease-in-out infinite}
@keyframes pulseLogo{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.tabs{display:flex;gap:12px;margin-bottom:25px}.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px;transition:.4s}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000;border-color:var(--c);box-shadow:0 0 25px var(--c)}
.form{display:none;flex-direction:column;gap:16px}.form.active{display:flex}
.input-wrap{position:relative}input{width:100%;padding:16px 50px 16px 18px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.85);color:#fff;border-radius:12px;outline:none;font-size:16px;font-weight:600}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.error{color:#ff3366;text-align:center;font-weight:700}.ok{color:#00ff88;text-align:center;font-weight:700}
.loader{border:3px solid #000;border-top:3px solid #000;border-radius:50%;width:18px;height:18px;animation:spin .8s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="particles"></canvas><div class="words-bg" id="wordsBg"></div>
<div class="card">
  <div class="logo-area"><img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-app/main/assets/images/logo-korvil.png" class="logo-img" onerror="this.style.display='none'"></div>
  <div class="tabs"><button class="tab active" id="tabLogin">ENTRAR</button><button class="tab" id="tabCadastro">NOVO USUÁRIO</button></div>
  <form id="login" class="form active"><input type="email" id="loginEmail" placeholder="Digite seu E-mail" required><input type="password" id="loginPass" placeholder="Digite sua Senha" required><button class="btn" type="submit" id="btnLogin">ACESSAR</button><div id="msgLogin"></div></form>
  <form id="cadastro" class="form"><input type="text" id="nome" placeholder="Nome completo" required><input type="email" id="email" placeholder="E-mail" required><input type="text" id="cpf" placeholder="CPF 000.000.000-00" maxlength="14" required><input type="text" id="cep" placeholder="CEP 00000-000" maxlength="9" required><input type="text" id="rua" placeholder="Rua" readonly><input type="text" id="bairro" placeholder="Bairro" readonly><input type="text" id="whatsapp" placeholder="Whatsapp (00) 00000-0000" maxlength="15" required><input type="password" id="pass" placeholder="Crie uma Senha" required><input type="password" id="pass2" placeholder="Repita a Senha" required><button class="btn" type="submit" id="btnCadastro">CRIAR ACESSO</button><div id="msgCadastro"></div></form>
</div>
<script>
const { createClient } = supabase;
const db = createClient('https://vtvewhgvuzpxcpzqddpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0dmV3aGd2dXpweGNwenFkZHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTI2NzMsImV4cCI6MjA5ODY4ODY3M30.hHsBZ_0R0fLZGd2mHesiYF3qKmtTCLFX51KuNOeCDg0');
const REDIRECT = "https://korvilp-sudo.github.io/korvil-app/app.html";

// ANIMAÇÕES
const palavras = ['DESENVOLVIMENTO HUMANO','NEGÓCIOS','SERVIÇOS','CURSOS','TECNOLOGIA','SUCESSO'];const wordsBg = document.getElementById('wordsBg');const animacoes = ['type1','type2','type3','type4','type5'];
function spawnWordBlock(){for(let i=0; i<20; i++){const w = document.createElement('div');w.className = 'word ' + animacoes[Math.floor(Math.random()*5)];w.innerText = palavras[Math.floor(Math.random()*palavras.length)];w.style.left = Math.random()*85 + '%';w.style.top = Math.random()*85 + '%';wordsBg.appendChild(w);setTimeout(()=>w.remove(), 5000);}}setInterval(spawnWordBlock, 1500);spawnWordBlock();
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let pts=[];for(let i=0;i<25;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.15,dy:(Math.random()-.5)*.15});function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}draw();

// FUNÇÕES
function showTab(tab){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.form').forEach(x=>x.classList.remove('active'));document.getElementById(tab==='login'?'tabLogin':'tabCadastro').classList.add('active');document.getElementById(tab).classList.add('active');}
function msg(t,cls,id){document.getElementById(id).innerHTML=`<p class="${cls}">${t}</p>`}
function loading(btn,on){btn.disabled=on;btn.innerHTML=on?'<span class="loader"></span>PROCESSANDO':btn.id==='btnLogin'?'ACESSAR':'CRIAR ACESSO'}

document.getElementById('tabLogin').onclick = () => showTab('login');
document.getElementById('tabCadastro').onclick = () => showTab('cadastro');

// CADASTRO + SALVA DADOS
document.getElementById('cadastro').addEventListener('submit', async e=>{
  e.preventDefault(); const btn = document.getElementById('btnCadastro');
  if(document.getElementById('pass').value!==document.getElementById('pass2').value)return msg('Senhas diferentes','error','msgCadastro');
  loading(btn,true);
  const { data, error } = await db.auth.signUp({email: document.getElementById('email').value, password: document.getElementById('pass').value});
  if(error){msg(error.message,'error','msgCadastro')} 
  else{
    await db.from('profiles').insert({
      id: data.user.id, full_name: document.getElementById('nome').value,
      cpf: document.getElementById('cpf').value.replace(/\D/g,''),
      cep: document.getElementById('cep').value.replace(/\D/g,''),
      rua: document.getElementById('rua').value, bairro: document.getElementById('bairro').value,
      whatsapp: document.getElementById('whatsapp').value.replace(/\D/g,'')
    });
    msg('Cadastro ok! Faça login.','ok','msgCadastro'); showTab('login');
  }
  loading(btn,false);
});

// LOGIN
document.getElementById('login').addEventListener('submit', async e=>{
  e.preventDefault(); const btn = document.getElementById('btnLogin'); loading(btn,true);
  const {error} = await db.auth.signInWithPassword({email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value});
  if(error){msg('E-mail ou senha inválidos','error','msgLogin')} else{window.location.href = REDIRECT;}
  loading(btn,false);
});
</script>
</body>
</html>
