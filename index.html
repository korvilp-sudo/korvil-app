<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;padding:16px}
canvas#particles{position:fixed;inset:0;z-index:0}
.words-bg{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.35);font-size:18px;font-weight:900;letter-spacing:2px;white-space:nowrap;text-shadow:0 0 25px rgba(0,255,255,.7);animation-fill-mode:forwards;z-index:1}
.type1{animation:fadeInOut 5s}@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
.type2{animation:pulseWord 5s}@keyframes pulseWord{0%{opacity:0;transform:scale(.8)}10%{opacity:1;transform:scale(1)}50%{transform:scale(1.2)}90%{opacity:1}100%{opacity:0;transform:scale(.9)}}
.type3{animation:slideLeft 5s}@keyframes slideLeft{0%{opacity:0;transform:translateX(-100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(50px)}}
.type4{animation:slideRight 5s}@keyframes slideRight{0%{opacity:0;transform:translateX(100px)}10%{opacity:1;transform:translateX(0)}90%{opacity:1}100%{opacity:0;transform:translateX(-50px)}}
.card{background:rgba(0,0,0,.75);backdrop-filter:blur(30px);border-radius:24px;padding:35px;width:90%;max-width:460px;position:relative;z-index:10;box-shadow:0 0 60px rgba(0,255,255,.3)}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}
.logo-img{max-width:300px;width:100%;filter:drop-shadow(0 0 35px var(--c));animation:pulseLogo 2s ease-in-out infinite}
@keyframes pulseLogo{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.tabs{display:flex;gap:12px;margin-bottom:25px}
.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000}
.form{display:none;flex-direction:column;gap:16px}
.form.active{display:flex}
input{width:100%;padding:16px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.85);color:#fff;border-radius:12px;font-size:16px}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer}
.error{color:#ff3366;text-align:center;font-weight:700}
.ok{color:#00ff88;text-align:center;font-weight:700}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="words-bg" id="wordsBg"></div>

<div class="card">
  <div class="logo-area">
    <img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-site/main/assets/images/logo-korvil.png" class="logo-img">
  </div>

  <div class="tabs">
    <button type="button" class="tab active" id="btnTabLogin">ENTRAR</button>
    <button type="button" class="tab" id="btnTabCadastro">NOVO USUÁRIO</button>
  </div>

  <form id="loginForm" class="form active">
    <input type="email" id="loginEmail" placeholder="Digite seu E-mail" required>
    <input type="password" id="loginPass" placeholder="Digite sua Senha" required>
    <button class="btn" type="submit">ACESSAR</button><div id="msgLogin"></div>
  </form>

  <form id="cadastroForm" class="form">
    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="email" id="email" placeholder="E-mail" required>
    <input type="password" id="pass" placeholder="Crie uma Senha" required>
    <button class="btn" type="submit">CRIAR ACESSO</button><div id="msgCadastro"></div>
  </form>
</div>

<script>
// TESTE 1: SE AS PALAVRAS APARECEREM, O PROBLEMA ERA O SUPABASE
window.onload = function() {

// ANIMAÇÃO PALAVRAS KORVIL
const palavras = ['KORVIL','NEGÓCIOS','CURSOS','ECOMMERCE','K-TP','LIBERDADE','COMUNIDADE K','MARKETING','RESULTADOS'];
const wordsBg = document.getElementById('wordsBg');
const anims = ['type1','type2','type3','type4'];
setInterval(()=>{
  const w = document.createElement('div');
  w.className = 'word ' + anims[Math.floor(Math.random()*4)];
  w.innerText = palavras[Math.floor(Math.random()*palavras.length)];
  w.style.left = Math.random()*80 + '%';
  w.style.top = Math.random()*80 + '%';
  wordsBg.appendChild(w);
  setTimeout(()=>w.remove(), 5000);
}, 700);

// PARTÍCULAS
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.2});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';
pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}
draw();

// TABS
document.getElementById('btnTabLogin').onclick = () => {
  document.querySelectorAll('.tab, .form').forEach(x=>x.classList.remove('active'));
  document.getElementById('btnTabLogin').classList.add('active');
  document.getElementById('loginForm').classList.add('active');
}
document.getElementById('btnTabCadastro').onclick = () => {
  document.querySelectorAll('.tab, .form').forEach(x=>x.classList.remove('active'));
  document.getElementById('btnTabCadastro').classList.add('active');
  document.getElementById('cadastroForm').classList.add('active');
}

// LOGIN FAKE PRA TESTAR
document.getElementById('loginForm').onsubmit = (e) => {
  e.preventDefault();
  document.getElementById('msgLogin').innerHTML = `<p class="ok">Botão funcionando! Agora vamos ligar o Supabase</p>`
}

}
</script>
</body>
</html>
