<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL Login</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{--c:#00FFFF;--bg:#000}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:radial-gradient(#001111,#000);color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:rgba(0,0,0,.8);border:2px solid var(--c);border-radius:14px;padding:24px;width:92%;max-width:400px;box-shadow:0 0 25px var(--c);animation:fadeInUp.6s;position:relative}
.card::before{content:'';position:absolute;inset:-2px;border-radius:14px;background:conic-gradient(from 0deg,var(--c),transparent,var(--c));animation:spin 4s linear infinite;z-index:-1}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
h2{text-align:center;margin-bottom:16px;font-size:20px;text-shadow:0 0 10px var(--c)}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:12px;border:1.5px solid var(--c);background:transparent;color:var(--c);cursor:pointer;border-radius:8px;font-weight:700;transition:.3s}
.tab.active{background:var(--c);color:#000}
.form{display:none;flex-direction:column;gap:12px;animation:slide.4s}
.form.active{display:flex}
input{padding:14px;border:1.5px solid #222;background:#111;color:#fff;border-radius:8px;outline:none;font-size:15px;transition:.3s}
input:focus{border-color:var(--c);transform:scale(1.02);box-shadow:0 0 10px var(--c)}
.btn{padding:14px;border:none;background:var(--c);color:#000;font-weight:800;border-radius:8px;cursor:pointer;font-size:15px;animation:pulse 2s infinite;transition:.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px var(--c)}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--c)}50%{box-shadow:0 0 20px var(--c)}}
.error{color:#f55;font-size:13px;text-align:center;animation:shake.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.ok{color:#5f5;font-size:13px;text-align:center}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px}
.input-wrap{position:relative}
.loader{border:2px solid #000;border-top:2px solid var(--c);border-radius:50%;width:16px;height:16px;animation:spin.8s linear infinite;display:inline-block;margin-right:8px}
</style>
</head>
<body>
<div class="card">
  <h2>KORVIL</h2>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Entrar</button>
    <button class="tab" onclick="showTab('cadastro')">Novo Usuário</button>
  </div>

  <form id="login" class="form active">
    <input type="email" id="loginEmail" placeholder="E-mail" required>
    <div class="input-wrap">
      <input type="password" id="loginPass" placeholder="Senha" required>
      <span class="eye" onclick="toggleEye('loginPass')">👁️</span>
    </div>
    <button class="btn" type="submit" id="btnLogin">Entrar</button>
    <div id="msgLogin"></div>
  </form>

  <form id="cadastro" class="form">
    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="email" id="email" placeholder="E-mail" required>
    <input type="text" id="cpf" placeholder="CPF 000.000.000-00" maxlength="14" required>
    <div style="display:flex;gap:8px">
      <input type="text" id="cep" placeholder="CEP 00000-000" maxlength="9" required>
      <button type="button" class="btn" style="padding:0 12px;flex-shrink:0" onclick="buscarCep()">Buscar</button>
    </div>
    <input type="text" id="rua" placeholder="Rua" readonly>
    <input type="text" id="numero" placeholder="Nº Casa" required>
    <input type="text" id="bairro" placeholder="Bairro" readonly>
    <input type="text" id="whatsapp" placeholder="Whatsapp (00) 00000-0000" maxlength="15" required>
    <div class="input-wrap">
      <input type="password" id="pass" placeholder="Senha" required>
      <span class="eye" onclick="toggleEye('pass')">👁️</span>
    </div>
    <div class="input-wrap">
      <input type="password" id="pass2" placeholder="Repetir Senha" required>
      <span class="eye" onclick="toggleEye('pass2')">👁️</span>
    </div>
    <button class="btn" type="submit" id="btnCadastro">Cadastrar</button>
    <div id="msgCadastro"></div>
  </form>
</div>

<script>
netlifyIdentity.init();

// Se já tiver logado, já joga pro app
netlifyIdentity.on('init', user => { if(user) window.location.href = "app.html"; });

function showTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.form').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${t}')"]`).classList.add('active');
  document.getElementById(t).classList.add('active');
}
function toggleEye(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
cpf.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
cep.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{5})(\d)/,'$1-$2');
whatsapp.oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
async function buscarCep(){const v=cep.value.replace(/\D/g,'');if(v.length!==8)return msg('CEP inválido','error','msgCadastro');const r=await fetch(`https://viacep.com.br/ws/${v}/json/`).then(x=>x.json());if(r.erro)return msg('CEP não encontrado','error','msgCadastro');rua.value=r.logradouro;bairro.value=r.bairro;}
const validaCpf=v=>{v=v.replace(/\D/g,'');if(v.length!==11||/^(\d)\1{10}$/.test(v))return 0;let s=0;for(let i=0;i<9;i++)s+=v[i]*(10-i);let d=11-(s%11);d=d>9?0:d;if(d!=v[9])return 0;s=0;for(let i=0;i<10;i++)s+=v[i]*(11-i);d=11-(s%11);d=d>9?0:d;return d==v[10]}
function msg(t,cls,id){document.getElementById(id).innerHTML=`<p class="${cls}">${t}</p>`}

cadastro.onsubmit=async e=>{
  e.preventDefault();
  const btn=btnCadastro;btn.disabled=1;btn.innerHTML='<span class="loader"></span>Cadastrando...';
  if(!validaCpf(cpf.value))return msg('CPF inválido','error','msgCadastro'),btn.disabled=0,btn.innerHTML='Cadastrar';
  if(pass.value!==pass2.value)return msg('Senhas diferentes','error','msgCadastro'),btn.disabled=0,btn.innerHTML='Cadastrar';
  const data={name:nome.value,cpf:cpf.value.replace(/\D/g,''),cep:cep.value,rua:rua.value,numero:numero.value,bairro:bairro.value,whatsapp:whatsapp.value.replace(/\D/g,'')};
  try{
    await netlifyIdentity.signup(email.value,pass.value,data);
    msg('Cadastro OK! Confirme seu e-mail e faça login.','ok','msgCadastro');
  }catch(err){
    msg(err.message.includes('already')?'E-mail já cadastrado. Use a tela de login.':err.message,'error','msgCadastro');
  }
  btn.disabled=0;btn.innerHTML='Cadastrar';
}

login.onsubmit=async e=>{
  e.preventDefault();
  const btn=btnLogin;btn.disabled=1;btn.innerHTML='<span class="loader"></span>Entrando...';
  try{
    await netlifyIdentity.login(loginEmail.value,loginPass.value,true);
    window.location.href="app.html"; // REDIRECIONA PRO APP
  }catch(err){
    msg('E-mail ou senha inválidos','error','msgLogin');
  }
  btn.disabled=0;btn.innerHTML='Entrar';
}
</script>
</body>
</html>
