<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:var(--c);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;padding:16px}
canvas#particles{position:fixed;inset:0;z-index:0}.words-bg{position:fixed;inset:0;z-index:1;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.25);font-size:14px;font-weight:900;letter-spacing:1.5px;white-space:nowrap;text-shadow:0 0 20px rgba(0,255,255,.6);animation-fill-mode:forwards; pointer-events:none; opacity:0;}
.fadeIn{animation:fadeIn 1.5s forwards}@keyframes fadeIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.fadeOut{animation:fadeOut 1.5s forwards}@keyframes fadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.7)}}
.pulse{animation:pulseWord 5s infinite}@keyframes pulseWord{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.slideL{animation:slideLeft 5s infinite}@keyframes slideLeft{0%,100%{transform:translateX(0)}50%{transform:translateX(-15px)}}
.slideR{animation:slideRight 5s infinite}@keyframes slideRight{0%,100%{transform:translateX(0)}50%{transform:translateX(15px)}}
.card{background:rgba(0,0,0,.78);backdrop-filter:blur(30px);border:1px solid rgba(0,255,255,.2);border-radius:24px;padding:35px;width:90%;max-width:480px;position:relative;z-index:10;animation:fadeInUp.8s;box-shadow:0 0 60px rgba(0,255,255,.3); max-height:92vh; overflow-y:auto}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}
.logo-img{max-width:280px;width:100%;height:auto;border-radius:16px;border:2px solid var(--c);box-shadow:0 0 20px var(--c)40, 0 0 35px var(--c);animation:pulseLogo 2s ease-in-out infinite;padding:6px;background:#000;}
@keyframes pulseLogo{0%,100%{transform:scale(1);box-shadow:0 0 20px var(--c)40, 0 0 35px var(--c)}50%{transform:scale(1.07);box-shadow:0 0 30px var(--c)60, 0 0 50px var(--c)}}
.tabs{display:flex;gap:12px;margin-bottom:15px}.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px;transition:.4s}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000;border-color:var(--c);box-shadow:0 0 25px var(--c)}
.btn-kai{width:100%;padding:16px;border:2px solid var(--c);background:rgba(0,255,255,.1);color:var(--c);font-weight:900;font-size:15px;border-radius:12px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;transition:.3s;letter-spacing:1px}
.btn-kai:hover{transform:scale(1.03); background:linear-gradient(135deg,var(--c),var(--c2)); color:#000; box-shadow:0 0 25px var(--c)}
.form{display:none;flex-direction:column;gap:16px}.form.active{display:flex}
label{font-size:13px; font-weight:700; margin-left:4px; color:var(--c2); display:block; margin-bottom:4px}
.input-group{display:flex; flex-direction:column; gap:4px}
.input-wrap{display:flex; gap:8px; align-items:flex-end}
.input-pass{position:relative; display:flex; align-items:center;}
.input-pass input{padding-right:50px;}
.toggle-pass{position:absolute; right:15px; cursor:pointer; width:22px; height:22px; fill:var(--c2); transition:.3s; z-index:2;}
.toggle-pass:hover{fill:var(--c); transform:scale(1.1);}
.toggle-pass.active{fill:var(--c);}
.eye-closed{display:none;}
input{width:100%;padding:16px 18px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.85);color:#fff;border-radius:12px;outline:none;font-size:16px;font-weight:600;transition:.3s}
input:focus{border-color:var(--c); box-shadow:0 0 15px rgba(0,255,255,.3)}
input[readonly]{opacity:0.6; cursor:not-allowed;}
.grid-2{display:grid; grid-template-columns: 1fr 1fr; gap:12px;}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.3s}
.btn:hover{transform:scale(1.03); box-shadow:0 0 20px var(--c)}
.btn-sec{padding:16px 14px; font-size:14px; white-space:nowrap; flex-shrink:0;}
.error{color:#ff3366;text-align:center;font-weight:700}.ok{color:#00ff88;text-align:center;font-weight:700}
.loader{border:3px solid #000;border-top:3px solid #000;border-radius:50%;width:18px;height:18px;animation:spin.8s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
#idadeDisplay{font-size:13px; color:var(--c2); margin-left:4px; font-weight:700}
</style>
</head>
<body>
<canvas id="particles"></canvas><div class="words-bg" id="wordsBg"></div>
<div class="card">
  <div class="logo-area">
    <img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-app/main/assets/images/korvil-logo.png" class="logo-img">
  </div>

  <div class="tabs"><button type="button" class="tab active" id="tabLogin">ENTRAR</button><button type="button" class="tab" id="tabCadastro">NOVO USUÁRIO</button></div>

  <!-- BOTAO K-AI -->
  <button type="button" class="btn-kai" onclick="window.location.href='kai-core/index.html'">
    🤖 ASSISTENTE VIRTUAL K-AI
  </button>

  <form id="login" class="form active">
    <input type="email" id="loginEmail" placeholder="Digite seu E-mail" required>
    <div class="input-pass">
      <input type="password" id="loginPass" placeholder="Digite sua Senha" required>
      <svg class="toggle-pass" data-target="loginPass" viewBox="0 0 24 24">
        <path class="eye-open" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        <path class="eye-closed" d="M12 7c2.76 0 5 2.24 5 5 0.65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3.22 0.44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
      </svg>
    </div>
    <button class="btn" type="submit" id="btnLogin">ACESSAR</button>
    <div id="msgLogin"></div>
  </form>

  <form id="cadastro" class="form">
    <div class="input-group"><label>Nome completo</label><input type="text" id="nome" placeholder="Digite seu nome" required></div>
    <div class="input-group"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com" required></div>
    <div class="grid-2">
      <div class="input-group"><label>CPF</label><input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required></div>
      <div class="input-group"><label>Data de Nascimento</label><input type="date" id="data_nasc" required><div id="idadeDisplay"></div></div>
    </div>
    <div class="input-group"><label>WhatsApp</label><input type="text" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required></div>
    <div class="input-wrap"><div class="input-group" style="flex:1"><label>CEP</label><input type="text" id="cep" placeholder="00000-000" maxlength="9" required></div><button type="button" class="btn btn-sec" id="btnBuscarCep">BUSCAR</button></div>
    <div class="grid-2"><div class="input-group"><label>N° Casa</label><input type="text" id="numero" placeholder="123" required></div><div class="input-group"><label>Bairro</label><input type="text" id="bairro" placeholder="Bairro" readonly></div></div>
    <div class="input-group"><label>Rua</label><input type="text" id="rua" placeholder="Rua" readonly></div>

    <div class="input-group"><label>Crie uma Senha</label>
      <div class="input-pass">
        <input type="password" id="pass" placeholder="Mínimo 6 caracteres" required>
        <svg class="toggle-pass" data-target="pass" viewBox="0 0 24 24">
          <path class="eye-open" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          <path class="eye-closed" d="M12 7c2.76 0 5 2.24 5 5 0.65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3.22 0.44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
        </svg>
      </div>
    </div>
    <div class="input-group"><label>Repita a Senha</label>
      <div class="input-pass">
        <input type="password" id="pass2" placeholder="Repita a senha" required>
        <svg class="toggle-pass" data-target="pass2" viewBox="0 0 24 24">
          <path class="eye-open" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          <path class="eye-closed" d="M12 7c2.76 0 5 2.24 5 5 0.65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3.22 0.44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
        </svg>
      </div>
    </div>

    <button class="btn" type="submit" id="btnCadastro">CRIAR ACESSO</button>
    <div id="msgCadastro"></div>
  </form>
</div>
<script>
let db;
const REDIRECT = "https://korvilp-sudo.github.io/korvil-app/sections/centralkorvil/index.html";
const TABELA = 'Cadastro de usuários do KORVIL';

window.onload = function() {
  iniciarAnimacoes();
  iniciarParticulas();
}

function iniciarAnimacoes(){
  const frasesKorvil = ['DESENVOLVIMENTO HUMANO','NEGOCIOS','SERVICOS','CURSOS','ECOMMERCE','LOJAS','PRODUTOS','SISTEMA K','TECNOLOGIA','K-TP TREINAMENTO PERSONALIZADO','K-AFORTUNADO','EMPREENDEDORISMO','FINANCAS','K-ALMA','SAUDE','BELEZA','MARKETING DIGITAL','EDUCACAO','JESUS','CONSULTORIA','INOVACAO','COACHING','VENDAS','FRANQUIAS','PLATAFORMA','DE TUDO UM POUCO','NETWORKING','MENTORIA','GESTAO','SUPORTE','COMUNIDADE K','EVENTOS','VIDA','AMOR','CONHECIMENTO','PARCERIAS','CONTEUDO','ACADEMIA K','RESULTADOS','K-CONECTA','K-NETWORK','TRAFEGO PAGO','ALEGRIA','DIVERSAO','COPYWRITING','FUNIL DE VENDAS','LIDERANCA','PRODUTIVIDADE','CONQUISTAS','SEJA INVENCIVEL','METAS','PERFORMANCE','ATENDIMENTO','DEUS','PALESTRAS','WORKSHOPS','FE','WEBINARS','PODCAST','YOUTUBE K','LIVE K','APP KORVIL','CRM K','AREA DO ALUNO','FORMACOES','CERTIFICADOS','EXCELENCIA','DISCIPLINA','FOCO','TRANSFORMACAO','SUCESSO','LIBERDADE FINANCEIRA','ABUNDANCIA','VIP','EXCLUSIVO','ACESSO ILIMITADO','VIVA SEUS SONHOS','ACREDITE EM VOCE','EVOLUA TODO DIA','MINDSET VENCEDOR','PROSPERE'];
  const versiculos = ['TUDO POSSO NAQUELE QUE ME FORTALECE - FP 4:13','O SENHOR E MEU PASTOR E NADA ME FALTARA - SL 23:1','LANCANDO SOBRE ELE TODA A VOSSA ANSIEDADE - 1PE 5:7','PORQUE EU BEM SEI OS PLANOS QUE TENHO PARA VOS - JR 29:11','NAO TEMAS, PORQUE EU SOU CONTIGO - IS 41:10','O GOZO DO SENHOR E A VOSSA FORCA - NE 8:10','ENTREGA O TEU CAMINHO AO SENHOR - SL 37:5','DEUS E O NOSSO REFUGIO E FORTALEZA - SL 46:1','SEJA FORTE E CORAJOSO - JS 1:9','A FE E O FIRME FUNDAMENTO - HB 11:1','EU SOU O CAMINHO, A VERDADE E A VIDA - JO 14:6','AMAI-VOS UNS AOS OUTROS - JO 13:34','BUSCAI PRIMEIRO O REINO DEUS - MT 6:33','A PAZ DEUS GUARDARA O VOSSO CORACAO - FP 4:7','RENOVA-SE A CADA MANHA - LM 3:23','OS QUE ESPERAM NO SENHOR RENOVARAO AS FORCAS - IS 40:31','O SENHOR PELEJARA POR VOS - EX 14:14','NAO ANDES ANSIOSO POR COISA ALGUMA - FP 4:6','EM TUDO DAI GRACAS - 1TS 5:18','DEUS SUPRIRA TODAS AS VOSSAS NECESSIDADES - FP 4:19','A VERDADE VOS LIBERTARA - JO 8:32','EU VIM PARA QUE TENHAM VIDA E A TENHAM EM ABUNDANCIA - JO 10:10','O SENHOR E A MINHA LUZ E A MINHA SALVACAO - SL 27:1','LANCA O TEU PAO SOBRE AS AGUAS - EC 11:1','ONDE ESTA O ESPIRITO DO SENHOR, AI HA LIBERDADE - 2CO 3:17','FAZEI TUDO PARA A GLORIA DEUS - 1CO 10:31','A ORACAO DE UM JUSTO PODE MUITO - TG 5:16','CONFIA NO SENHOR DE TODO O TEU CORACAO - PV 3:5','EU SOU A VIDEIRA, VOS OS RAMOS - JO 15:5','O AMOR NUNCA FALHA - 1CO 13:8'];
  const palavras = [...frasesKorvil,...versiculos];
  const wordsBg = document.getElementById('wordsBg');
  const animacoes = ['pulse','slideL','slideR'];
  let palavrasAtivas = [];
  function criarPalavra(){
    if(palavrasAtivas.length >= 60) return;
    const el = document.createElement('div');
    el.className = 'word fadeIn ' + animacoes[Math.floor(Math.random()*3)];
    el.innerText = palavras[Math.floor(Math.random()*palavras.length)];
    el.style.left = Math.random()*85 + 5 + '%';
    el.style.top = Math.random()*85 + 5 + '%';
    wordsBg.appendChild(el);
    palavrasAtivas.push(el);
    setTimeout(()=>{ el.classList.add('fadeOut'); setTimeout(()=>{el.remove()},1500) }, 8000 + Math.random()*4000);
  }
  for(let i=0; i<50; i++) setTimeout(criarPalavra, i*70);
  setInterval(()=>{ if(palavrasAtivas.length < 40) for(let i=0; i<3; i++) criarPalavra(); }, 600);
}

function iniciarParticulas(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let pts=[];for(let i=0;i<30;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.2});function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}draw();
}

document.addEventListener('DOMContentLoaded', ()=>{
  try{
    const { createClient } = supabase;
    db = createClient('https://vtvewhgvuzpxcpzqddpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0dmV3aGd2dXpweGNwenFkZHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTI2NzMsImV4cCI6MjA5ODY4ODY3M30.hHsBZ_0R0fLZGd2mHesiYF3qKmtTCLFX51KuNOeCDg0');
  }catch(e){ console.log("Supabase erro:", e) }

  // ===== VERIFICAR SE JÁ ESTÁ LOGADO AO ABRIR =====
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      document.getElementById('msgLogin').innerHTML = `<p class="ok">Sessão ativa! Redirecionando...</p>`;
      setTimeout(()=>window.location.replace(REDIRECT), 800);
    }
  });

  document.querySelectorAll('.toggle-pass').forEach(eye => {
    eye.addEventListener('click', function(){
      const input = document.getElementById(this.dataset.target);
      const open = this.querySelector('.eye-open'), closed = this.querySelector('.eye-closed');
      if(input.type === 'password'){ input.type='text'; open.style.display='none'; closed.style.display='block'; this.classList.add('active'); }
      else{ input.type='password'; open.style.display='block'; closed.style.display='none'; this.classList.remove('active'); }
    });
  });

  const mCPF = v=>v.replace(/\D/g,"").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
  const mCEP = v=>v.replace(/\D/g,"").replace(/^(\d{5})(\d)/,"$1-$2");
  const mTel = v=>v.replace(/\D/g,"").replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2");
  document.getElementById('cpf').oninput = e => e.target.value = mCPF(e.target.value);
  document.getElementById('cep').oninput = e => e.target.value = mCEP(e.target.value);
  document.getElementById('whatsapp').oninput = e => e.target.value = mTel(e.target.value);

  document.getElementById('data_nasc').onchange = ()=>{const d=new Date(document.getElementById('data_nasc').value); let i=new Date().getFullYear()-d.getFullYear(); document.getElementById('idadeDisplay').innerText = i>=0?`Idade: ${i} anos`:''};

  const showTab = tab=>{document.querySelectorAll('.tab,.form').forEach(x=>x.classList.remove('active'));document.getElementById(tab==='login'?'tabLogin':'tabCadastro').classList.add('active');document.getElementById(tab).classList.add('active');}
  document.getElementById('tabLogin').onclick = ()=>showTab('login');
  document.getElementById('tabCadastro').onclick = ()=>showTab('cadastro');
  const msg = (t,c,i)=>document.getElementById(i).innerHTML=t?`<p class="${c}">${t}</p>`:'';
  const loading = (b,on)=>{b.disabled=on;b.innerHTML=on?'<span class="loader"></span>PROCESSANDO':b.id==='btnLogin'?'ACESSAR':'CRIAR ACESSO'};

  document.getElementById('btnBuscarCep').onclick = async ()=>{
    const cep = document.getElementById('cep').value.replace(/\D/g,'');
    if(cep.length!=8) return msg('Digite 8 números','error','msgCadastro');
    msg('Buscando...','ok','msgCadastro');
    try{ const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`); const d=await r.json();
      if(!d.erro){ document.getElementById('rua').value=d.logradouro; document.getElementById('bairro').value=d.bairro; msg('CEP OK','ok','msgCadastro'); }
      else msg('CEP inválido','error','msgCadastro');
    }catch{ msg('Erro na busca','error','msgCadastro'); }
  }

  // CADASTRO - VAI PRA APP
  document.getElementById('cadastro').onsubmit = async e=>{
    e.preventDefault(); const btn=document.getElementById('btnCadastro');
    if(document.getElementById('pass').value!=document.getElementById('pass2').value) return msg('Senhas diferentes','error','msgCadastro');
    loading(btn,true);
    const { data, error } = await db.auth.signUp({email:document.getElementById('email').value,password:document.getElementById('pass').value});
    if(error){ msg(error.message,'error','msgCadastro'); loading(btn,false); }
    else{
      await db.from(TABELA).insert({
        id:data.user.id,email:document.getElementById('email').value,nome_completo:document.getElementById('nome').value,
        cpf:document.getElementById('cpf').value.replace(/\D/g,''),data_nascimento:document.getElementById('data_nasc').value,
        whatsapp:document.getElementById('whatsapp').value.replace(/\D/g,''),cep:document.getElementById('cep').value.replace(/\D/g,''),
        rua:document.getElementById('rua').value,numero:document.getElementById('numero').value,bairro:document.getElementById('bairro').value
      });
      msg('Cadastro OK! Redirecionando...','ok','msgCadastro');
      setTimeout(()=>window.location.replace(REDIRECT), 800);
    }
  }

  // LOGIN - VAI PRA APP
  document.getElementById('login').onsubmit = async e=>{
    e.preventDefault();
    const btn=document.getElementById('btnLogin');
    loading(btn,true);
    const { data, error } = await db.auth.signInWithPassword({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPass').value});
    if(error){
      msg('E-mail ou senha inválidos','error','msgLogin');
      loading(btn,false);
    } else {
      msg('Login OK! Redirecionando...','ok','msgLogin');
      setTimeout(()=>window.location.replace(REDIRECT), 500);
    }
  }
});
</script>
</body>
</html>
