<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL ACCESS</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{--c:#00FFFF;--c2:#A8FFE6}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;overflow:hidden}
canvas#particles{position:fixed;inset:0;z-index:0}
.words-bg{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.word{position:absolute;color:rgba(0,255,255,.28);font-size:17px;font-weight:900;letter-spacing:2px;white-space:nowrap;text-shadow:0 0 25px rgba(0,255,255,.6);animation:fadeInOut 5s}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}
.card{background:rgba(0,0,0,.65);backdrop-filter:blur(30px);border-radius:24px;padding:35px;width:90%;max-width:460px;position:relative;z-index:10;box-shadow:0 0 60px rgba(0,255,255,.3);border:1px solid rgba(0,255,255,.1)}
.logo-area{display:flex;justify-content:center;margin-bottom:25px}
.logo-img{max-width:300px;width:100%;filter:drop-shadow(0 0 35px var(--c))}
.tabs{display:flex;gap:12px;margin-bottom:25px}
.tab{flex:1;padding:14px;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.05);color:var(--c);cursor:pointer;border-radius:12px;font-weight:900;font-size:15px;transition:.3s}
.tab.active{background:linear-gradient(135deg,var(--c),var(--c2));color:#000;border-color:var(--c);box-shadow:0 0 25px var(--c)}
.form{display:none;flex-direction:column;gap:15px}
.form.active{display:flex}
input{width:100%;padding:16px 50px 16px 16px;border:2px solid rgba(0,255,255,.4);background:rgba(0,0,0,.9);color:#fff;border-radius:12px;outline:none;font-size:16px}
input:focus{border-color:var(--c);box-shadow:0 0 15px rgba(0,255,255,.4)}
.input-wrap{position:relative}
.eye-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:24px;height:24px;cursor:pointer;stroke:var(--c);fill:none;stroke-width:2}
.btn{padding:16px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-weight:900;font-size:16px;border-radius:12px;cursor:pointer;letter-spacing:1.5px}
.btn:disabled{opacity:.5}
.row{display:flex;gap:10px}
.btn-small{padding:0 14px;font-size:13px}
.msg{color:#00ff88;text-align:center;font-weight:700;font-size:14px;min-height:20px}
.error{color:#ff3366}
.loader{border:3px solid #000;border-top:3px solid #000;border-radius:50%;width:18px;height:18px;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="words-bg" id="wordsBg"></div>

<div class="card">
  <div class="logo-area">
    <img src="https://raw.githubusercontent.com/korvilp-sudo/korvil-app/main/assets/images/logo-korvil.png" class="logo-img" onerror="this.style.display='none'">
  </div>
  <div class="tabs">
    <button class="tab active" id="btnTabLogin">ENTRAR</button>
    <button class="tab" id="btnTabCadastro">NOVO USUÁRIO</button>
  </div>

  <form id="login" class="form active">
    <input type="email" id="loginEmail" placeholder="Digite seu E-mail" required>
    <div class="input-wrap">
      <input type="password" id="loginPass" placeholder="Digite sua Senha" required>
      <svg class="eye-icon" id="eyeLogin" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <button class="btn" type="submit" id="btnLogin">ACESSAR</button><div id="msgLogin" class="msg"></div>
  </form>

  <form id="cadastro" class="form">
    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="email" id="email" placeholder="E-mail" required>
    <input type="text" id="cpf" placeholder="CPF 000.000.000-00" maxlength="14" required>
    <div class="row">
      <input type="text" id="cep" placeholder="CEP 00000-000" maxlength="9" required>
      <button type="button" class="btn btn-small" id="btnBuscarCep">BUSCAR</button>
    </div>
    <input type="text" id="rua" placeholder="Rua" readonly>
    <input type="text" id="bairro" placeholder="Bairro" readonly>
    <input type="text" id="whatsapp" placeholder="Whatsapp (00) 00000-0000" maxlength="15" required>
    <div class="input-wrap">
      <input type="password" id="pass" placeholder="Crie uma Senha" required>
      <svg class="eye-icon" id="eyePass" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="input-wrap">
      <input type="password" id="pass2" placeholder="Repita a Senha" required>
      <svg class="eye-icon" id="eyePass2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <button class="btn" type="submit" id="btnCadastro">CRIAR ACESSO</button><div id="msgCadastro" class="msg"></div>
  </form>
</div>

<script>
window.addEventListener('load', function() {
const { createClient } = supabase;
const SUPABASE_URL = 'https://vtvewhgvuzpxcpzqddpk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0dmV3aGd2dXpweGNwenFkZHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTI2NzMsImV4cCI6MjA5ODY4ODY3M30.hHsBZ_0R0fLZGd2mHesiYF3qKmtTCLFX51KuNOeCDg0';
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const REDIRECT = "https://korvilp-sudo.github.io/korvil-app/app.html";

// ANIMAÇÕES
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let pts=[];for(let i=0;i<20;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.2});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00FFFF';
pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(draw)}
draw();

const palavras = ['DESENVOLVIMENTO HUMANO','NEGÓCIOS','SERVIÇOS','CURSOS','TECNOLOGIA','SUCESSO','FOCO','RESULTADOS'];
const wordsBg = document.getElementById('wordsBg');
function spawnWord(){const w = document.createElement('div');w.className = 'word';w.innerText = palavras[Math.floor(Math.random()*palavras.length)];w.style.left = Math.random()*85 + '%';w.style.top = Math.random()*85 + '%';wordsBg.appendChild(w);setTimeout(()=>w.remove(), 5000);}
setInterval(spawnWord, 1500);

// FUNÇÕES
document.getElementById('btnTabLogin').onclick = ()=>{document.querySelectorAll('.tab,.form').forEach(x=>x.classList.remove('active'));document.getElementById('btnTabLogin').classList.add('active');document.getElementById('login').classList.add('active')}
document.getElementById('btnTabCadastro').onclick = ()=>{document.querySelectorAll('.tab,.form').forEach(x=>x.classList.remove('active'));document.getElementById('btnTabCadastro').classList.add('active');document.getElementById('cadastro').classList.add('active')}

const mostrarSenha = (id) => {const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
document.getElementById('eyeLogin').onclick = ()=>mostrarSenha('loginPass');
document.getElementById('eyePass').onclick = ()=>mostrarSenha('pass');
document.getElementById('eyePass2').onclick = ()=>mostrarSenha('pass2');

const msg = (t,cls,id)=>{document.getElementById(id).className='msg '+cls;document.getElementById(id).innerText=t;}
const loading = (btn,on)=>{btn.disabled=on;btn.innerHTML=on?'<span class="loader"></span>PROCESSANDO':btn.id==='btnLogin'?'ACESSAR':'CRIAR ACESSO'};

document.getElementById('cpf').oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
document.getElementById('cep').oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{5})(\d)/,'$1-$2');
document.getElementById('whatsapp').oninput=e=>e.target.value=e.target.value.replace(/\D/g,'').replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');

document.getElementById('btnBuscarCep').onclick = async ()=>{
  const cep=document.getElementById('cep').value.replace(/\D/g,'');
  if(cep.length!==8)return msg('CEP inválido','error','msgCadastro');
  const res=await fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r=>r.json());
  if(res.erro)return msg('CEP não encontrado','error','msgCadastro');
  document.getElementById('rua').value=res.logradouro;
  document.getElementById('bairro').value=res.bairro;
}

// CADASTRO
document.getElementById('cadastro').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=document.getElementById('btnCadastro');
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  if(pass!==document.getElementById('pass2').value)return msg('Senhas diferentes','error','msgCadastro');
  loading(btn,true);
  const {error} = await db.auth.signUp({email: email, password: pass});
  if(error){msg(error.message,'error','msgCadastro')} 
  else{
    msg('Cadastro ok! Logando...','', 'msgCadastro');
    await db.auth.signInWithPassword({email, password: pass});
    window.location.href = REDIRECT;
  }
  loading(btn,false);
});

// LOGIN
document.getElementById('login').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=document.getElementById('btnLogin');
  loading(btn,true);
  const {error} = await db.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value, 
    password: document.getElementById('loginPass').value
  });
  if(error){msg('E-mail ou senha inválidos','error','msgLogin')} 
  else{window.location.href = REDIRECT;}
  loading(btn,false);
});

});
</script>
</body>
</html>
