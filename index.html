<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AI Jarvis</title>
<link rel="stylesheet" href="kai-style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

<div id="container-3d"></div> <!-- AQUI FICA O CORVO 3D -->

<div id="chat-container">
  <div id="chatBox"></div>
  <div id="inputArea">
    <button onclick="anexarArquivo()">📎</button>
    <input type="text" id="userInput" placeholder="Fale com K-AI..." onkeydown="if(event.key==='Enter') enviarMensagem()">
    <button onclick="enviarMensagem()">➤</button>
    <button onclick="falar()">🎤</button>
  </div>
</div>

<script src="kai.js"></script>
<script src="kai-ui.js"></script>
<script src="kai-voice.js"></script>

<!-- GAVETAS NOVAS -->
<script src="actions/navega.js"></script>
<script src="actions/cria.js"></script>
<script src="actions/copia.js"></script>
<script src="actions/sistema.js"></script>

<script>
  // INICIA O CORVO 3D JARVIS
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('container-3d').appendChild(renderer.domElement);

  const geometry = new THREE.IcosahedronGeometry(1, 2); // Formato do núcleo Jarvis
  const material = new THREE.MeshPhongMaterial({ color: 0x00aaff, wireframe: true });
  const core = new THREE.Mesh(geometry, material);
  scene.add(core);

  const light = new THREE.PointLight(0x00aaff, 1);
  light.position.set(2, 2, 2);
  scene.add(light);

  camera.position.z = 3;

  function animate() {
    requestAnimationFrame(animate);
    core.rotation.x += 0.005;
    core.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

  // Quando K-AI fala, o núcleo pulsa
  window.pulsarCore = function() {
    core.material.color.set(0x00ffaa);
    setTimeout(() => core.material.color.set(0x00aaff), 300);
  }
</script>

</body>
</html>
