<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORVIL</title>
<style>
:root{--c:#00f5ff;--bg:#000;--card:#111;--text:#fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:var(--bg);color:var(--text)}
.topbar{position:fixed;top:0;width:100%;height:56px;background:#000;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #222}
.logo{color:var(--c);font-weight:900;font-size:18px}
.wrap{padding:70px 16px 110px;max-width:700px;margin:auto}
h1{text-align:center;margin-bottom:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.btn-app{background:var(--c);border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:#000;font-weight:800;font-size:12px}
.card{background:var(--card);border:1px solid #222;border-radius:12px;padding:16px;margin:12px 0}
.tela{display:none}.tela.ativa{display:block}
.btn{background:var(--c);color:#000;border:0;padding:14px;border-radius:10px;font-weight:800;width:100%;margin-top:12px;cursor:pointer}
.kai{position:fixed;bottom:16px;right:16px}
.cube{width:66px;height:66px;background:var(--c);border-radius:10px;display:grid;place-items:center;color:#000;font-weight:900;cursor:pointer}
.box{position:fixed;bottom:90px;right:16px;width:280px;height:360px;background:#0a0a0a;border:2px solid var(--c);border-radius:12px;display:none;flex-direction:column}
.box.ativo{display:flex}
.head{background:var(--c);color:#000;padding:10px;font-weight:800;display:flex;justify-content:space-between}
.chat{flex:1;overflow:auto;padding:10px}
.msg{background:#222;border-radius:8px;padding:8px;margin-bottom:8px;font-size:13px}
.msg.bot{border:1px solid var(--c)}
.msg.user{background:#333;margin-left:auto;width:fit-content;max-width:80%}
.input{display:flex;gap:6px;padding:10px;border-top:1px solid #222}
.input input{flex:1;background:#111;border:1px solid #333;border-radius:8px;color:#fff;padding:10px}
.input button{background:var(--c);border:0;border-radius:8px;padding:0 14px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="topbar"><div class="logo">KORVIL</div></div>
<main class="wrap">
<section id="c" class="tela ativa"><h1>CENTRAL KORVIL</h1>
<div class="grid-4">
<div class="btn-app" onclick="t('s')">SISTEMA K</div>
<div class="btn-app" onclick="t('k')">K-AFORTUNADO</div>
<div class="btn-app" onclick="t('a')">K-ALMA</div>
<div class="btn-app" onclick="t('h')">CURSOS</div>
</div></section>
<section id="s" class="tela"><h1>SISTEMA K</h1><div class="card">Eletricista, Carpinteiro, Faxineira, Encanador, Pintor, Pedreiro</div><button class="btn" onclick="t('c')">Voltar</button></section>
<section id="k" class="tela"><h1>K-AFORTUNADO</h1><div class="card">Consultoria Financeira</div><button class="btn" onclick="t('c')">Voltar</button></section>
<section id="a" class="tela"><h1>K-ALMA</h1><div class="card">Saude e Beleza</div><button class="btn" onclick="t('c')">Voltar</button></section>
<section id="h" class="tela"><h1>CURSOS</h1><div class="card">Celular, Treinamento, Negocio, K-TH</div><button class="btn" onclick="t('c')">Voltar</button></section>
</main>
<footer class="kai">
<div class="cube" onclick="b()">K-AI</div>
<div class="box" id="m">
<div class="head">K-AI <span onclick="b()" style="cursor:pointer">X</span></div>
<div class="chat" id="z"><div class="msg bot">Fala! Sou K-AI do KORVIL. Pergunta ai.</div></div>
<div class="input"><input id="i" placeholder="Sobre KORVIL..." onkeydown="if(event.key==='Enter')e()"><button onclick="e()">></button></div>
</div></footer>
<script>
const KEY='AQ.Ab8RN6I0KSN7YO3xnlu_HPu2zr5SKmORmq7GGudlfX4fAofxtw'; // <-- COLE AQUI
const W='5513997690898';
const z=document.getElementById('z'),m=document.getElementById('m');
const t=id=>{document.querySelectorAll('.tela').forEach(x=>x.classList.remove('ativa'));document.getElementById(id).classList.add('ativa')}
const b=()=>m.classList.toggle('ativo');
const P=`Você é K-AI do KORVIL. 11 anos. Sistema K: Eletricista, Carpinteiro, Faxineira, Encanador, Pintor, Pedreiro. K-TP: Projeto Transformacao. K-AFORTUNADO: Financas. K-ALMA: Saude, Beleza. Cursos: Celular, Treino, Negocio, K-TH. Whats 13997690898. REGRA: Só KORVIL. 2 linhas. Preço = mande pro Whats.`;
const a=(txt,w='bot')=>{let d=document.createElement('div');d.className='msg '+w;d.textContent=txt;z.appendChild(d);z.scrollTop=z.scrollHeight};
async function e(){
let x=document.getElementById('i'),v=x.value.trim();if(!v)return;
if(KEY==='AQ.Ab8RN6I0KSN7YO3xnlu_HPu2zr5SKmORmq7GGudlfX4fAofxtw'){a('Cola sua chave Gemini no código.');return}
a(v,'user');x.value='';a('...');
try{let r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:P+'\nPergunta: '+v}]}],genConfig:{maxOut:150}})});
let d=await r.json();z.lastChild.remove();a(d.candidates[0].content.parts[0].text)}
catch{a('Offline. Chama no Whats 13997690898.');z.lastChild.remove()}}
</script>
</body>
</html>
