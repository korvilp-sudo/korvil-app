name: Salvar Aluno
on:
  workflow_dispatch:
    inputs:
      id:
        description: 'ID do Aluno'
        required: true
        type: string
      dados:
        description: 'Dados JSON do Aluno'
        required: true
        type: string
jobs:
  salvar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Criar JSON
        run: |
          mkdir -p sections/ktp/projetotransformacao/projetos/2026
          echo '${{ inputs.dados }}' > sections/ktp/projetotransformacao/projetos/2026/${{ inputs.id }}.json
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add.
          git commit -m "feat: adicionar aluno ${{ inputs.id }}" || echo "nada pra commitar"
          git push
